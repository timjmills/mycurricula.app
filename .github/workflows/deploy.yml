name: Deploy to Cloudflare

# Auto-deploys every push to schedule-and-auth-5.24 (the active dev branch)
# and master. Also exposes a manual trigger so a teacher / Tim can
# redeploy without pushing (Actions tab → "Deploy to Cloudflare" → Run
# workflow).
#
# Secrets required (set at https://github.com/timjmills/mycurricula.app/settings/secrets/actions):
#   • CLOUDFLARE_API_TOKEN          — User API Token with Workers Scripts:Edit,
#                                     Account:Read, Workers R2 Storage:Edit
#   • CLOUDFLARE_ACCOUNT_ID         — 009d3815b362e176031f124202abbcf9
#   • NEXT_PUBLIC_SUPABASE_URL      — https://xuukfpvonsbvvbspsrsl.supabase.co
#   • NEXT_PUBLIC_SUPABASE_ANON_KEY — Public anon key from Supabase dashboard
#   • NEXT_PUBLIC_GOOGLE_CLIENT_ID  — Google OAuth Web client ID
#                                     (…apps.googleusercontent.com). Baked into
#                                     the bundle at build time; without it the
#                                     login page shows "Google sign-in isn't
#                                     configured yet".
#   • NEXT_PUBLIC_TEACH_USE_SUPABASE   — "1" to persist Teach boards to Postgres
#                                        (optional; omit/empty = mock).
#   • NEXT_PUBLIC_PLANNER_USE_SUPABASE — "1" to persist lessons/units/resources
#                                        (optional; omit/empty = mock).
#
# Worker runtime secrets (R2_*, SUPABASE_SERVICE_ROLE_KEY, CLAUDE_BYPASS_TOKEN)
# are already set on the Worker via `wrangler secret put` and the deploy
# does NOT re-set them — they live in the Worker's runtime environment.

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Cancel an in-flight deploy when a newer push arrives on the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Wrangler 4.x requires Node ≥ 22. Wrangler 3 ran on 20 but the
          # `opennextjs-cloudflare` toolchain we use is tied to Wrangler 4.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Test gate (audit finding #25) ──────────────────────────────────
      # Lint, typecheck, and unit tests run BEFORE the build/deploy step so a
      # red gate blocks the deploy. Any non-zero exit here fails the job and
      # the "Build + deploy" step never runs.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      # `deploy:cf` runs `opennextjs-cloudflare build && opennextjs-cloudflare
      # deploy` so this single step covers both the build + deploy.
      - name: Build + deploy to Cloudflare
        run: npm run deploy:cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # NEXT_PUBLIC_* values are inlined by `next build`, so they MUST be
          # present here (in CI), not just on the Cloudflare Worker. Empty/unset
          # falls back to the safe default (login shows "not configured" /
          # planner+teach stay on mock).
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_TEACH_USE_SUPABASE: ${{ secrets.NEXT_PUBLIC_TEACH_USE_SUPABASE }}
          NEXT_PUBLIC_PLANNER_USE_SUPABASE: ${{ secrets.NEXT_PUBLIC_PLANNER_USE_SUPABASE }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy ${{ job.status }}"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Live: https://mycurricula.app"
          } >> "$GITHUB_STEP_SUMMARY"
