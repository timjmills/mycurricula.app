name: Preview deploy (no overwrite)

# Branch PREVIEW deploy. Unlike deploy.yml (which promotes to the production
# Worker serving mycurricula.app), this uploads the current branch as a
# Cloudflare Worker *version* via `wrangler versions upload`. A version upload
# does NOT become the active deployment and does NOT touch the custom-domain
# route — production (mycurricula.app) keeps serving whatever is already live.
# Cloudflare returns a unique Preview URL (…workers.dev) for the uploaded
# version, which this workflow surfaces in the run summary.
#
# Trigger: Actions tab → "Preview deploy (no overwrite)" → Run workflow →
# pick the branch. Reuses the same secrets as deploy.yml.
#
# Auth on the preview URL: Google OAuth redirect URIs won't include the
# workers.dev preview host, so use the Claude bypass to reach the planner:
#   https://<preview-url>/auth/claude-login?token=<CLAUDE_BYPASS_TOKEN>&next=/weekly
# (CLAUDE_BYPASS_TOKEN is already a Worker runtime secret, shared across
# versions.) The two prototype routes also sit behind auth, so reach them as
# /prototypes/timeline and /prototypes/workspace once the bypass cookie is set.

on:
  # Push to THIS preview branch auto-runs the no-overwrite version upload.
  # (Scoped to the one branch so it doesn't fire for unrelated work. A push
  # event runs the workflow from the branch's own file, so it works without
  # the workflow existing on the default branch.)
  push:
    branches:
      - claude/friendly-ride-zExL7
  workflow_dispatch:
    inputs:
      multi_workspace:
        description: "Build with NEXT_PUBLIC_MULTI_WORKSPACE=1 (flag-ON preview QA for the enable cutover)"
        type: boolean
        default: false

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build the OpenNext Worker bundle (does not deploy).
      - name: Build (OpenNext → Cloudflare)
        run: npm run build:cf
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_TEACH_USE_SUPABASE: ${{ secrets.NEXT_PUBLIC_TEACH_USE_SUPABASE }}
          NEXT_PUBLIC_PLANNER_USE_SUPABASE: ${{ secrets.NEXT_PUBLIC_PLANNER_USE_SUPABASE }}
          # v2 redesign shell/router gate — inlined at build; see deploy.yml.
          NEXT_PUBLIC_V2: ${{ vars.NEXT_PUBLIC_V2 || '1' }}
          # Multi-workspace flag — OFF unless this run was dispatched with the
          # multi_workspace input (flag-ON preview QA; push builds stay OFF).
          NEXT_PUBLIC_MULTI_WORKSPACE: ${{ (github.event_name == 'workflow_dispatch' && inputs.multi_workspace) && '1' || '' }}

      # Upload as a non-active version. Captures the Preview URL from wrangler's
      # output and writes it to the job summary. Does NOT promote to production
      # and does NOT modify the mycurricula.app route.
      - name: Upload preview version
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Use the preview-only config (no custom-domain route → no trigger to
        # apply → clean exit; same Worker name → shares prod runtime secrets).
        # URL extraction is non-fatal so a missing match never red-X's a
        # successful upload; the Worker Version ID is captured as a fallback.
        run: |
          set -o pipefail
          npx wrangler versions upload --config wrangler.preview.jsonc \
            --message "v1.3 redesign preview — ${{ github.ref_name }} @ ${{ github.sha }}" \
            2>&1 | tee /tmp/wrangler-preview.log || true
          URL="$(grep -oiE 'https://[a-z0-9.-]+\.workers\.dev[a-z0-9/_-]*' /tmp/wrangler-preview.log | head -1 || true)"
          VID="$(grep -oiE 'Worker Version ID: *[a-f0-9-]+' /tmp/wrangler-preview.log | head -1 | awk '{print $NF}' || true)"
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          echo "version_id=$VID" >> "$GITHUB_OUTPUT"
          if [ -n "$URL" ]; then echo "PREVIEW URL: $URL"; else echo "No preview URL found; version id=$VID"; fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Preview deploy ${{ job.status }}"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Preview URL: ${{ steps.preview.outputs.preview_url || 'not emitted — see note below + “Upload preview version” logs' }}"
            echo "- Worker Version ID: \`${{ steps.preview.outputs.version_id }}\`"
            echo "- Production (\`mycurricula.app\`) is **unchanged** — this is a non-active version upload."
            echo ""
            echo "Planner is behind auth; reach it on the preview via the Claude bypass:"
            echo '`<preview-url>/auth/claude-login?token=<CLAUDE_BYPASS_TOKEN>&next=/weekly`'
          } >> "$GITHUB_STEP_SUMMARY"
