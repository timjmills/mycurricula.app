  useEffect(()=>{colorRef.current=color},[color]);

  const saveCur=()=>{ const c=canvasRef.current; if(c) store.current[slides[prevSlide.current]?.id]=c.toDataURL(); };
  const loadCur=()=>{ const c=canvasRef.current; if(!c) return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); const url=store.current[slides[active]?.id]; if(url){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,c.width,c.height); img.src=url; } };
  const fit=()=>{ const c=canvasRef.current; if(!c) return; const r=c.parentElement.getBoundingClientRect(); if(!r.width) return; c.width=r.width; c.height=r.height; loadCur(); };

  useEffect(()=>{ fit(); const ro=('ResizeObserver'in window)?new ResizeObserver(()=>fit()):null; const stage=canvasRef.current?.parentElement; if(ro&&stage) ro.observe(stage); return ()=>ro&&ro.disconnect(); },[]); // eslint-disable-line
  useEffect(()=>{ // layout changed → refit (size shift)
    const c=canvasRef.current; if(!c) return; saveCur(); const r=c.parentElement.getBoundingClientRect(); if(r.width){ c.width=r.width; c.height=r.height; loadCur(); }
  },[fullscreen,minimized,pinned]); // eslint-disable-line
  useEffect(()=>{ loadCur(); prevSlide.current=active; },[active]); // eslint-disable-line

  const pos=(e)=>{ const r=canvasRef.current.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; };
  const applyTool=(ctx)=>{
    ctx.lineCap='round'; ctx.lineJoin='round';
    if(toolRef.current==='erase'){ ctx.globalCompositeOperation='destination-out'; ctx.globalAlpha=1; ctx.lineWidth=26; }
    else if(toolRef.current==='mark'){ ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=.3; ctx.strokeStyle=colorRef.current; ctx.lineWidth=16; }
    else { ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1; ctx.strokeStyle=colorRef.current; ctx.lineWidth=3; }
  };
  const down=(e)=>{ if(toolRef.current==='text') return; drawing.current=true; last.current=pos(e); try{e.target.setPointerCapture(e.pointerId);}catch(x){} };
  const moveDraw=(e)=>{ if(!drawing.current) return; const ctx=canvasRef.current.getContext('2d'); const p=pos(e); applyTool(ctx); ctx.beginPath(); ctx.moveTo(last.current.x,last.current.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last.current=p; };
  const up=()=>{ if(drawing.current){ drawing.current=false; saveCur(); } };
  const clearBoard=()=>{ const c=canvasRef.current; if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); store.current[slides[active].id]=null; } };

  // ── slides ─────────────────────────────────────────────────
  const goSlide=(i)=>{ saveCur(); setActive(i); };
  const addSlide=()=>{ saveCur(); setSlides(prev=>{ const n=prev.length+1; return [...prev,{ id:'s'+Date.now(), title:'Slide '+n, items:[] }]; }); setActive(slides.length); };

  // ── resources → board ──────────────────────────────────────
  const addRes=(r,xy)=>{ setSlides(prev=>prev.map((sl,i)=> i!==active ? sl : { ...sl, items:[...sl.items, { key:Date.now()+''+Math.random(), rid:r.id, label:r.label, type:r.type, x:(xy?xy.x:70+sl.items.length*28), y:(xy?xy.y:90+sl.items.length*28) }] })); };
  const onDrop=(e)=>{ e.preventDefault(); let id=''; try{ id=e.dataTransfer.getData('text/resource'); }catch(x){} const r=resources.find(x=>x.id===id); if(!r) return; const stage=e.currentTarget.getBoundingClientRect(); addRes(r,{ x:e.clientX-stage.left-70, y:e.clientY-stage.top-22 }); };
  const moveCard=(e,key)=>{
    e.preventDefault();
    const stage=canvasRef.current.parentElement.getBoundingClientRect();
    const onMove=(ev)=>{ const x=ev.clientX-stage.left-70, y=ev.clientY-stage.top-22; setSlides(prev=>prev.map((sl,i)=> i!==active ? sl : { ...sl, items:sl.items.map(it=> it.key===key?{...it,x,y}:it) })); };
    const onUp=()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  };
  const removeCard=(key)=> setSlides(prev=>prev.map((sl,i)=> i!==active ? sl : { ...sl, items:sl.items.filter(it=>it.key!==key) }));

  // ── invisible resizer between lesson pane and board ────────
  const startResize=(e)=>{
    e.preventDefault();
    const teach=e.currentTarget.parentElement.getBoundingClientRect();
    const onMove=(ev)=>{ let w=ev.clientX-teach.left; w=Math.max(210, Math.min(teach.width*0.62, w)); setLessonW(w); };
    const onUp=()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); document.body.style.cursor=''; document.body.style.userSelect=''; };
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  };

  const slide=slides[active];
  const showLT = active===0 && slide.items.length===0;

  return (
    <div className={'teach'+(fullscreen?' full':'')+(trueFull?' truefull':'')} data-mob={mobLesson?'lesson':'board'} style={{gridTemplateColumns: lessonHidden ? '1fr' : (minimized ? '64px 1fr' : lessonW+'px 1fr'), '--subj':cv(s.c), '--subjink':cv(s.ink)}}>
      <button className="teach-mobtoggle" onClick={()=>setMobLesson(v=>!v)} title={mobLesson?'Show the board':'Show the lesson'}>{mobLesson?'‹ Board':'Lesson ›'}</button>
      {/* lesson pane / rail */}
      {!lessonHidden && (minimized ? (
        <div className="teach-rail" style={{borderTopColor:cv(s.c)}}>
          <window.VS.SubjGlyph id={lesson.subjectId} size={34} radius={11}/>
          <button className="trail-btn" title="Expand lesson plan" onClick={()=>setMin(false)}><TI k="expand"/></button>
          <span className="trail-name">{s.label}</span>
        </div>
      ) : (
        <div className="teach-lesson">
          <div className="lb" style={{background:cv(s.c)}}/>
          <div className="teach-lhead">
            <span className="lhead-btns">
              <button className={'tbtn sm'+(pinned?' on':'')} title={pinned?'Unpin':'Pin (keeps it open in fullscreen)'} onClick={()=>setPinned(p=>!p)}><TI k="pin"/></button>
              <button className="tbtn sm" title="Minimize to the side" onClick={()=>setMin(true)}><TI k="min"/></button>
            </span>
          </div>
          <window.LessonNav state={state} tab={navTab} onTab={setNavTab}
            activeLesson={lesson} activeId={lesson.id} version="A"
            onPickLesson={(l)=>onPick&&onPick(l)}
            onPlanLesson={(l)=>onPlan&&onPlan(l)}
            onPostLesson={(l)=>window.dispatchEvent(new CustomEvent('cc-open-post',{detail:{lesson:l}}))}
            onPickResource={(r)=>addRes(r)} onTeach={(l)=>onPick&&onPick(l)} />
        </div>
      ))}

      {/* board */}
      <div className="teach-board">
        <div className="bdhead">
          <div className="bdtitle">
            {lessonHidden && <button className="tbtn sm" title="Show lesson plan" onClick={()=>setFull(false)}><TI k="expand"/></button>}
            <window.VS.SubjGlyph id={lesson.subjectId} size={28} radius={9}/>
            <span className="nm">{s.full} · {lesson.title}</span>
          </div>
          <div className="bdtools">
            <div className="timer"><span className="tt">{mm}:{ss}</span>
              <button className="tbtn" onClick={()=>setRun(r=>!r)} title={run?'Pause timer':'Start timer'}><TI k={run?'pause':'play'}/></button>
              <button className="tbtn" onClick={()=>{setRun(false);setSec(600);}} title="Reset timer"><TI k="reset"/></button>
            </div>
            <span className="bd-div"/>
            {window.Share && <window.Share.Btn kind="board" id={lesson.id} label={s.full+' · '+lesson.title+' board'} />}
            <button className="tbtn" onClick={()=>setFull(f=>!f)} title={fullscreen?'Exit fullscreen':'Expand board to fullscreen'}><TI k={fullscreen?'exit':'full'}/></button>
            <button className="tbtn" onClick={()=>setTrueFull(f=>!f)} title={trueFull?'Exit fullscreen (Esc)':'Present — true fullscreen (Esc to exit)'}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={trueFull?"M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5":"M3 8V5a2 2 0 0 1 2-2h3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M21 16v3a2 2 0 0 1-2 2h-3"}/></svg></button>
          </div>
        </div>

        {/* slide filmstrip */}
        <div className="slide-rail">
          {slides.map((sl,i)=>(
            <button key={sl.id} className={'slide-thumb'+(i===active?' on':'')} onClick={()=>goSlide(i)} title={sl.title}>
              <span className="st-n">{i+1}</span><span className="st-t">{sl.title}</span>
            </button>
          ))}
          <button className="slide-addbtn" onClick={addSlide} title="Add a slide"><TI k="plus"/></button>
        </div>

        {/* stage */}
        <div className="board-stage" onDragOver={(e)=>e.preventDefault()} onDrop={onDrop}>
          {bg.type!=='none' && <div className="board-bg">
            {bg.type==='color' && <div className="board-bgfill" style={{background:bg.value}}/>}
            {bg.type==='wash' && <div className="board-bgfill" style={{background:'var(--grad-dawn)'}}/>}
            {bg.type==='photo' && <div className="board-bgfill" style={{backgroundImage:"url('photos/p1.png')",backgroundSize:'cover',backgroundPosition:'center'}}/>}
            {bg.type==='resource' && <div className="board-bgres" style={{width:(bgW*100)+'%',transform:`translateX(-50%) translateY(${bgY}px)`,background:`linear-gradient(160deg, color-mix(in oklab, ${resColor(bg.r.type)} 24%, white), color-mix(in oklab, ${resColor(bg.r.type)} 8%, white))`}}
              onWheel={(e)=>{ setBgY(y=>y - e.deltaY*0.5); }}
              onPointerDown={(e)=>{ bgDrag.current={y:e.clientY,b:bgY}; try{e.target.setPointerCapture(e.pointerId);}catch(x){} }}
              onPointerMove={(e)=>{ if(bgDrag.current){ setBgY(bgDrag.current.b + (e.clientY-bgDrag.current.y)); } }}
              onPointerUp={()=>{ bgDrag.current=null; }}>
              <span className="board-bgres-pill" style={{color:resColor(bg.r.type)}}>{bg.r.type}</span>
              <span className="board-bgres-label">{bg.r.label}</span>
              <span className="board-bgres-hint">drag or scroll to pan</span>
            </div>}
          </div>}
          {bg.type==='resource' && <div className="board-bgwidth">
            <button onClick={()=>setBgW(w=>Math.max(0.6,+(w-0.1).toFixed(2)))} title="Narrower">–</button>
            <span>width</span>
            <button onClick={()=>setBgW(w=>Math.min(1.8,+(w+0.1).toFixed(2)))} title="Wider — fill margins">+</button>
          </div>}
          <canvas ref={canvasRef} className="draw-layer"
            onPointerDown={down} onPointerMove={moveDraw} onPointerUp={up} onPointerLeave={up}
            style={{cursor: tool==='erase'?'cell':'crosshair'}} />
          <div className="slide-content">
            {showLT && <><span className="bsub">Learning target</span><div className="bobj">{lesson.objective}</div></>}
            {slide.items.map(it=>(
              <div key={it.key} className="board-card" style={{left:it.x,top:it.y}} onMouseDown={(e)=>moveCard(e,it.key)}>
                <span className="bc-pill" style={{background:`color-mix(in oklab, ${resColor(it.type)} 18%, white)`, color:resColor(it.type)}}>{it.type}</span>
                <span className="bc-label">{it.label}</span>
                <button className="bc-x" title="Remove" onMouseDown={(e)=>e.stopPropagation()} onClick={()=>removeCard(it.key)}><TI k="x"/></button>
              </div>
            ))}
          </div>
        </div>

        {/* writing bar */}
        <div className="write-bar">
          {[['pen','Pen'],['mark','Highlighter'],['erase','Eraser'],['text','Text']].map(([k,lab])=>(
            <button key={k} className={'wb-btn'+(tool===k?' on':'')} title={lab} onClick={()=>setTool(k)}><TI k={k}/></button>
          ))}
          <span className="wb-div"/>
          {COLORS.map(c=>(
            <button key={c} className={'wb-color'+(color===c?' on':'')} style={{background:c}} title="Ink color" onClick={()=>setColor(c)}/>
          ))}
          <span className="wb-div"/>
          <button className="wb-btn" title="Clear the board" onClick={clearBoard}><TI k="trash"/></button>
          <span style={{flex:1}}/>
          <div className="wb-respop-wrap">
            <button className="wb-btn lbl" title="Add a resource to the board" onClick={()=>setResOpen(o=>!o)}><TI k="plus"/>Resource</button>
            {resOpen &&
              <div className="wb-respop">
                {resources.map(r=>(
                  <button key={r.id} className="wb-resrow" onClick={()=>{ addRes(r); setResOpen(false); }}>
                    <span className="lp-res-pill" style={{background:`color-mix(in oklab, ${resColor(r.type)} 18%, white)`, color:resColor(r.type)}}>{r.type}</span>{r.label}
                  </button>
                ))}
              </div>}
          </div>
          <div className="wb-respop-wrap bgwrap">
            <button className="wb-btn lbl" title="Board background" onClick={()=>setBgOpen(o=>!o)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="9" cy="9" r="1.4"/></svg>Background</button>
            {bgOpen && <div className="bgpop up" onMouseLeave={()=>setBgOpen(false)}>
              <div className="bgpop-lbl">Color</div>
              <div className="bgcolors">{['#FFFFFF','#1C1B2E',`var(${s.c})`,'#FFF6E6','#E6F1FF','#FCE4EF'].map(c=><button key={c} style={{background:c}} title="Solid color" onClick={()=>{setBg({type:'color',value:c});setBgOpen(false);}}/>)}</div>
              <div className="bgpop-lbl">Wash</div>
              <div className="bgwashes">{[['--grad-dawn','Dawn'],['--grad-honey','Honey'],['--grad-mint','Mint'],['--grad-brand','Sky'],['--grad-hero','Hero']].map(([g,n])=>(
                <button key={g} title={n} style={{background:`var(${g})`}} onClick={()=>{setBg({type:'wash',value:`var(${g})`});setBgOpen(false);}}/>
              ))}</div>
              <div className="bgpop-lbl">Photo</div>
              <div className="bgphotos">
                {['photos/p1.png','photos/p2.png','photos/p3.png','photos/p4.png'].map(p=>(
                  <button key={p} title="Photo library" style={{backgroundImage:`url('${p}')`}} onClick={()=>{setBg({type:'photo',value:p});setBgOpen(false);}}/>
                ))}
                <label className="bgupload" title="Upload an image">+
                  <input type="file" accept="image/*" style={{display:'none'}} onChange={(e)=>{ const f=e.target.files&&e.target.files[0]; if(f){ const u=URL.createObjectURL(f); setBg({type:'photo',value:u}); setBgOpen(false); } }}/>
                </label>
              </div>
              {resources.filter(r=>r.type==='Image').length>0 && <React.Fragment>
                <div className="bgpop-lbl">From lesson images</div>
                {resources.filter(r=>r.type==='Image').map(r=>(
                  <button key={r.id} className="bgpop-row" onClick={()=>{setBg({type:'photo',value:r.url});setBgOpen(false);}}><span className="bgpop-pill" style={{background:`color-mix(in oklab, ${resColor(r.type)} 18%, white)`,color:resColor(r.type)}}>IMG</span>{r.label}</button>
                ))}
              </React.Fragment>}
              <div className="bgpop-lbl">Resource</div>
              {resources.slice(0,5).map(r=><button key={r.id} className="bgpop-row res" onClick={()=>{setBg({type:'resource',r});setBgW(1);setBgY(0);setBgOpen(false);}}><span className="bgpop-pill" style={{background:`color-mix(in oklab, ${resColor(r.type)} 18%, white)`,color:resColor(r.type)}}>{r.type}</span>{r.label}</button>)}
              <button className="bgpop-row off" onClick={()=>{setBg({type:'none'});setBgOpen(false);}}>None</button>
            </div>}
          </div>
        </div>
      </div>
      {!minimized && !lessonHidden &&
        <div className="teach-resizer" style={{left:lessonW}} onMouseDown={startResize} title="Drag to resize the lesson plan and board"/>}
    </div>
  );
}

window.TeachView = TeachView;
})();

</script>
<script type="text/babel" data-src="share.jsx">
/* Share links — a reusable icon button that mints + copies a read-only share
   link for any artifact, and a read-only viewer the link opens into.
   window.Share.Btn({ kind, id, label })  · window.Share.openFromUrl() */
(function(){
const { useState } = React;

const ICON = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>;
const CHECK = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 6"/></svg>;

function mintLink(kind, id, label){
  const tok = btoa(unescape(encodeURIComponent(JSON.stringify({k:kind,id:id||'',t:label||''})))).replace(/=+$/,'');
  const base = location.origin + location.pathname;
  return base + '?share=' + tok;
}

function ShareBtn({ kind, id, label, size, bare }){
  const [done,setDone]=useState(false);
  const copy=(e)=>{
    if(e){ e.stopPropagation(); e.preventDefault(); }
    const url=mintLink(kind,id,label);
    const ok=()=>{ setDone(true); setTimeout(()=>setDone(false),1600); };
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(ok,ok); }
      else { const ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(x){} document.body.removeChild(ta); ok(); }
    }catch(x){ ok(); }
  };
  return (
    <button className={'share-btn'+(bare?' bare':'')+(done?' done':'')} style={size?{width:size,height:size}:null}
      title={done?'Link copied ✓':('Copy read-only share link'+(label?(' · '+label):''))}
      onClick={copy}>{done?CHECK:ICON}</button>
  );
}

/* read-only viewer (opens when the page is loaded with ?share=…) */
function decode(tok){ try{ return JSON.parse(decodeURIComponent(escape(atob(tok)))); }catch(e){ return null; } }
const KIND_LABEL={resource:'Resource',section:'Section',wall:'Resource Wall',lesson:'Lesson',unit:'Unit',subject:'Subject',board:'Teaching Board'};

function Viewer({ data, onClose }){
  const kindLabel=KIND_LABEL[data.k]||'Shared item';
  return (
    <div className="share-view">
      <div className="share-vbar">
        <span className="share-vkind">{kindLabel} · read-only</span>
        <span className="share-vtitle">{data.t||'Shared '+kindLabel}</span>
        <div className="share-vacts">
          <button onClick={()=>window.print()} title="Print">Print</button>
          <button onClick={onClose} title="Close read-only view">Open full app</button>
        </div>
      </div>
      <div className="share-vbody">
        <div className="share-vcard">
          <div className="share-vicon">{KIND_LABEL[data.k]?KIND_LABEL[data.k][0]:'?'}</div>
          <h1>{data.t||'Shared '+kindLabel}</h1>
          <p>This is a read-only copy of a {kindLabel.toLowerCase()} shared from mycurricula. You can read it, and open, download, or print its resources.</p>
          <div className="share-vres">
            {['Slides','Worksheet','Anchor Chart','Exit Ticket','Read-Aloud'].map((r,i)=>(
              <div key={i} className="share-vresrow">
                <span className="share-vrespill">{['SL','WS','IM','DOC','VID'][i]}</span>
                <span className="share-vreslabel">{r}</span>
                <span className="share-vresacts"><button>Open</button><button>Download</button><button onClick={()=>window.print()}>Print</button></span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

window.Share = {
  Btn: ShareBtn,
  mintLink,
  getShared(){ const m=/[?&]share=([^&]+)/.exec(location.search); return m?decode(m[1]):null; },
  Viewer,
};
})();

</script>

const W = {

  dots:<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>,

  play:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l11-6.5z"/></svg>,
  board:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M12 17v4M8 21h8"/></svg>,

/* ── rich mock previews per resource type (stand-ins for live thumbnails) ── */
function Mock({ r }){
  const s = DS.SUBJECTS[r.subjectId];
  if(r.type==='slides') return (
    <div className="rwm rwm-slides" style={{'--mc':cv(s?s.c:'--subj-1')}}>
      <div className="rwm-slk">{s?s.label:''} · Lesson</div>
      <div className="rwm-slt">{r.label.replace(/ — Slides$/,'')}</div>
      <div className="rwm-sldots"><i/><i/><i/></div>
    </div>);
  if(r.type==='worksheet') return (
    <div className="rwm rwm-sheet">
      <div className="rwm-sht">{r.label}</div>
      <div className="rwm-shrow"><span/><span/><span/></div>
      <div className="rwm-shrow"><span/><span/><span/></div>
      <div className="rwm-shgrid"><b>×</b><b>40</b><b>3</b><i/><i/><i/></div>
    </div>);
  if(r.type==='image') return (
    <div className="rwm rwm-photo" style={{'--mc':cv(s?s.c:'--subj-13')}}>
      <div className="rwm-phsun"/><div className="rwm-phhill"/>
      <span className="rwm-phcap">anchor chart · photo</span>
    </div>);
  if(r.type==='video') return (
    <div className="rwm rwm-video"><span className="rwm-vplay">{W.play}</span><span className="rwm-vdur">4:32</span></div>);
  if(r.type==='doc') return (
    <div className="rwm rwm-doc"><div className="rwm-docl"/><div className="rwm-docl"/><div className="rwm-docl sh"/><div className="rwm-docl"/><div className="rwm-docl sh"/></div>);
  if(r.type==='link') return (
    <div className="rwm rwm-link"><span className="rwm-lkfav" style={{background:cv(s?s.c:'--honey-500')}}>{(r.label[0]||'L')}</span><span className="rwm-lkdom">{(r.domain||'resource.org')}</span><span className="rwm-lkurl">/{r.label.toLowerCase().replace(/\s+/g,'-').slice(0,22)}</span></div>);
  return null;
}

/* ── notecard rich body (Padlet-style) ── */
function NoteBody({ r, clamp }){
  return (
    <div className={'rwm-note'+(clamp?' clamp':'')}>
      <p><b>{r.label}</b> — quick teaching notes.</p>
      <div className="rwm-nchecks">
        <span className="rwm-nchk on"><span className="bx">{W.check}</span>Print sentence-stem cards</span>
        <span className="rwm-nchk"><span className="bx"/>Queue partner-talk timer</span>
      </div>
      <p>Anchor on <mark>opinion vs. fact</mark>; gather examples from partners and chart the reason.</p>
    </div>
  );
}
const TYPE_FILTER = { Notes:'note', PDFs:'worksheet', Images:'image', Documents:'doc', Links:'link' };

const PRESETS = ['Current Lesson',"Today's Lessons (Mixed)",'This Week · Mixed','This Week · Subject','Subject View','Unit View'];
const CUSTOM_KEY='cc_customwalls';
function loadCustomWalls(){ try{ return JSON.parse(localStorage.getItem(CUSTOM_KEY)||'[]'); }catch(e){ return []; } }
function saveCustomWalls(w){ try{ localStorage.setItem(CUSTOM_KEY,JSON.stringify(w)); }catch(e){} }
const FILTERS = ['All','Notes','PDFs','Images','Documents','Links'];
const VIEWS = [['med','Medium',W.vMed],['large','Large',W.vLarge],['icon','Icon',W.vIcon],['list','List',W.vList]];

let _uid=1;
function buildSections(state){
  // Today's Lessons (Mixed): one section per subject taught today, with its resources + notecard
  const day = state.days[state.todayIdx];
  const segs = [];
  day.lessons.forEach(L=>{
    const s = DS.SUBJECTS[L.subjectId];
    const res = DS.resourcesFor(L).map(r=>({ ...r, type:String(r.type||'link').toLowerCase(), key:'k'+(_uid++), subjectId:L.subjectId }));
    // inject a notecard so each section mixes notes + resources
    res.splice(2,0,{ key:'k'+(_uid++), type:'note', label:s.full+' — Teaching notes', subjectId:L.subjectId });
    segs.push({ id:'sec-'+L.id, key:'s'+(_uid++), title:s.full, meta:DS.fmt(L.start), color:s.c, subjectId:L.subjectId, items:res });
  });
  return segs;
}

function Toast({ msg, onDone }){
  useEffect(()=>{ const t=setTimeout(onDone,2600); return ()=>clearTimeout(t); },[]);
  return <div className="rw-toast">{W.board}{msg}</div>;
}

function Card({ r, view, dragging, onDragState, onAttach, onOpen, onEnlarge, onBoard, onModal, secId, onDropBefore }){
  const isNote = r.type==='note';
  const composing = isNote && r.composing && !r.attached;
  const [text,setText]=React.useState(r.text||'');
  const [dropOver,setDropOver]=React.useState(false);
  const dropProps = {
    onDragOver:(e)=>{ if(e.dataTransfer.types.includes('text/card')){ e.preventDefault(); e.stopPropagation(); if(!dropOver)setDropOver(true); } },
    onDragLeave:()=>setDropOver(false),
    onDrop:(e)=>{ if(e.dataTransfer.types.includes('text/card')){ e.preventDefault(); e.stopPropagation(); const k=e.dataTransfer.getData('text/card'); setDropOver(false); onDropBefore&&onDropBefore(k, secId, r.key); } }
  };
  if(composing){
    return (
      <div className={'rw-card v-'+view+' note rw-composing'+(dragging?' rw-card-mini':'')+(dropOver?' rw-dropbefore':'')} draggable {...dropProps}
        onDragStart={(e)=>{ e.dataTransfer.setData('text/card', r.key); e.dataTransfer.effectAllowed='move'; onDragState&&onDragState(true); }}
        onDragEnd={()=>{ setDropOver(false); onDragState&&onDragState(false); }} onClick={e=>e.stopPropagation()}>
        <textarea className="rw-noteinput" value={text} placeholder="Type a note…" autoFocus
          onChange={e=>{ setText(e.target.value); r.text=e.target.value; r.label=e.target.value.split('\n')[0].slice(0,40)||'Note'; }}/>
        <div className="rw-noteacts">
          <button className="rw-noteadd" title="Attach a resource (note moves below)" onClick={()=>{ r.attached='doc'; if(onAttach)onAttach(r); }}>{W.plus} Resource</button>
          <button className="rw-notedone" onClick={()=>{ r.composing=false; if(onAttach)onAttach(r); }}>Done</button>
        </div>
      </div>
    );
  }
  return (
    <div className={'rw-card v-'+view+(isNote?' note':'')+(r.attached?' has-attach':'')+(dragging?' rw-card-mini':'')+(dropOver?' rw-dropbefore':'')} draggable {...dropProps}
      onDragStart={(e)=>{ e.dataTransfer.setData('text/card', r.key); e.dataTransfer.effectAllowed='move'; onDragState&&onDragState(true); }}
      onDragEnd={()=>{ setDropOver(false); onDragState&&onDragState(false); }}
      onClick={()=>onModal(r)}>
      <div className={'rw-thumb th-'+(r.attached||r.type)}>
        {r.attached ? <Mock r={{...r,type:r.attached}}/> : (isNote ? <NoteBody r={r} clamp/> : <Mock r={r}/>)}
        <span className="rw-badge" style={{color:cv(TT[r.attached||r.type])}}>{TI[r.attached||r.type]}</span>
        {view!=='list' && <div className="rw-actions" onClick={e=>e.stopPropagation()}>
          <button title="Open" onClick={()=>onModal(r)}>{W.open}</button>
          <button title="Slideshow" onClick={()=>onOpen(r)}>{W.play}</button>
          <button title="Enlarge" onClick={()=>onEnlarge(r)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6M21 3l-7 7M9 21H3v-6M3 21l7-7"/></svg></button>
          <button title="Send to Teaching Board" onClick={()=>onBoard(r, r.lessons&&r.lessons[0]&&r.lessons[0].id)}>{W.board}</button>
          {window.Share && <window.Share.Btn kind="resource" id={r.id} label={r.label} bare />}
        </div>}
      </div>
      <div className="rw-cbody">
        <div className="rw-ctitle">{r.label}</div>
        {r.attached && r.text && <div className="rw-attachnote">{r.text}</div>}
        {view!=='icon' && <div className="rw-cmeta"><span className="rw-type">{r.type==='note'?'NOTE':r.type.toUpperCase()}</span><span className="rw-spill" style={{background:`color-mix(in oklab,${cv(TT[r.type])} 18%,white)`,color:cv(TT[r.type])}}>{DS.SUBJECTS[r.subjectId]?DS.SUBJECTS[r.subjectId].label:'Resource'}</span></div>}
      </div>
      {view==='list' && <button className="rw-rowmenu" onClick={e=>{e.stopPropagation();onBoard(r, r.lessons&&r.lessons[0]&&r.lessons[0].id);}} title="Send to board">{W.board}</button>}
    </div>
  );
}

function secBgGet(sec){
  try{
    const s=localStorage.getItem('cc_secbg_'+sec.id); if(s) return JSON.parse(s);
    const sub=localStorage.getItem('cc_subjbg_'+sec.subjectId); if(sub) return JSON.parse(sub);
  }catch(e){}
  return null;
}
function secBgSet(sec, bg, scope){
  try{
    if(scope==='subject'){ localStorage.setItem('cc_subjbg_'+sec.subjectId, JSON.stringify(bg)); localStorage.removeItem('cc_secbg_'+sec.id); }
    else { localStorage.setItem('cc_secbg_'+sec.id, JSON.stringify(bg)); }
  }catch(e){}
}
const SECBG_WASH=[['--grad-dawn','Dawn'],['--grad-honey','Honey'],['--grad-mint','Mint'],['--grad-brand','Sky']];

function Section({ sec, view, layout, q, filter, dragging, cardDragging, onCardDragState, onForce, onOpen, onEnlarge, onBoard, onModal, onAdd, onAddSection, onDropCard, onDragStartSec, onDropSec, onDragEndSec, onSolo }){
  const [size,setSize]=useState('full');   // min | small | full — cycles on the chevron
  const collapsed = dragging ? true : size==='min';
  const cycle = ()=> setSize(s=> s==='min'?'small':s==='small'?'full':'min');
  const sizeTitle = size==='min'?'Minimized — click for two rows' : size==='small'?'Two rows — click to expand fully' : 'Expanded — click to minimize';
  const [bgOpen,setBgOpen]=useState(false);
  const [scope,setScope]=useState('section');
  const CHECKER="repeating-conic-gradient(#cfd2da 0% 25%, #fff 0% 50%) 50% / 12px 12px";
  const [tShade,setTShade]=useState(()=>cv(sec.color));
  const [tOp,setTOp]=useState(35);
  const tVal=(shade,op)=> shade==='__dark'?'rgba(20,19,30,'+(op/100)+')':'color-mix(in oklab, '+shade+' '+op+'%, transparent)';
  const [bg,setBg]=useState(()=>secBgGet(sec));
  const applyBg=(b)=>{ setBg(b); secBgSet(sec,b,scope); setBgOpen(false); };
  const resetBg=()=>{ setBg(null); try{ localStorage.removeItem('cc_secbg_'+sec.id); localStorage.removeItem('cc_subjbg_'+sec.subjectId); }catch(e){} setBgOpen(false); };
  const bgStyle = bg ? (
    bg.type==='color' ? { background:bg.value } :
    bg.type==='wash' ? { background:`var(${bg.value})` } :
    bg.type==='photo' ? { backgroundImage:`url('${bg.value}')`, backgroundSize:'cover', backgroundPosition:'center' } : {}
  ) : {};
  let items = sec.items;
  if(filter!=='All'){ const t=TYPE_FILTER[filter]; items=items.filter(r=>r.type===t); }
  if(q) items=items.filter(r=>r.label.toLowerCase().includes(q.toLowerCase()));
  return (
    <section className={'rw-sec'+(bg?' has-bg':'')} data-size={size} style={{'--sc':cv(sec.color), ...bgStyle, ...(dragging?{transition:'all .18s ease'}:{})}}
      onDragOver={e=>{ if(e.dataTransfer.types.includes('text/card')||e.dataTransfer.types.includes('text/sec')) e.preventDefault(); }}
      onDrop={e=>{ if(e.dataTransfer.types.includes('text/card')){ onDropCard(e.dataTransfer.getData('text/card'),sec.id); } else if(e.dataTransfer.types.includes('text/sec')){ onDropSec(e.dataTransfer.getData('text/sec'),sec.id); onDragEndSec&&onDragEndSec(); } }}
      data-secdrag={dragging?'1':undefined}>
      <div className="rw-sechead" draggable onDragStart={e=>{ if(e.target.closest('.rw-secbgpop')){ e.preventDefault(); return; } e.dataTransfer.setData('text/sec',sec.id); e.dataTransfer.effectAllowed='move'; onDragStartSec&&onDragStartSec(sec.id); }}
        onDragEnd={()=>onDragEndSec&&onDragEndSec()}
        onClick={(e)=>{ if(e.target.closest('.rw-secactions')||e.target.closest('.rw-grip')||e.target.closest('.rw-collapse')) return; cycle(); }}>
        <span className="rw-grip">{W.grip}</span>
        <button className="rw-collapse" data-size={size} title={sizeTitle} onClick={(e)=>{ e.stopPropagation(); cycle(); }} style={{transform:size==='min'?'rotate(-90deg)':'none'}}>{W.chev}</button>
        <span className="rw-secdot" style={{background:cv(sec.color)}}/>
        <span className="rw-sectitle">{sec.title}</span>
        <span className="rw-secmeta">{sec.meta}</span>
        <span className="rw-seccount">{items.length}</span>
        <span className="rw-secactions">
          {window.Share && <window.Share.Btn kind="section" id={sec.id} label={sec.title} bare />}
          <span className="rw-secbgwrap">
            <button title="Section background" onClick={()=>setBgOpen(o=>!o)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="9" cy="9" r="1.4"/></svg></button>
            {bgOpen && <div className="rw-secbgpop" draggable={false} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
              <div className="rw-bgscope">
                <button className={scope==='section'?'on':''} onClick={()=>setScope('section')}>This section</button>
                <button className={scope==='subject'?'on':''} onClick={()=>setScope('subject')}>Whole subject</button>
              </div>
              <div className="rw-bglbl">Subject color</div>
              <div className="rw-bgcolors">
                {[cv(sec.color),'color-mix(in oklab, '+cv(sec.color)+' 55%, #fff)','color-mix(in oklab, '+cv(sec.color)+' 26%, #fff)'].map((v,i)=><button key={'s'+i} title="Subject color" style={{background:v}} onClick={()=>applyBg({type:'color',value:v})}/>)}
                {['color-mix(in oklab, '+cv(sec.color)+' 55%, transparent)','color-mix(in oklab, '+cv(sec.color)+' 28%, transparent)'].map((v,i)=><button key={'st'+i} className="rw-bgtrans" title="Subject tint (see-through)" style={{backgroundImage:'linear-gradient('+v+','+v+'), '+CHECKER}} onClick={()=>applyBg({type:'color',value:v})}/>)}
              </div>
              <div className="rw-bglbl">Color</div>
              <div className="rw-bgcolors">{['#FFFFFF','#1C1B2E','#FFF6E6','#FFE9D6','#FCE4EF','#F3E6FB','#E6F1FF','#E3F6EE','#FBE9E7','#EEF1F4'].map(c=><button key={c} style={{background:c}} onClick={()=>applyBg({type:'color',value:c})}/>)}</div>
              <div className="rw-bglbl">Translucent — pick a shade + opacity</div>
              <div className="rw-bgshades">
                {[['subject',cv(sec.color)],['white','#FFFFFF'],['honey','#F4B740'],['sky','#5BA8FF'],['blossom','#E083B8'],['mint','#4FD7A6']].map(([k,c])=><button key={k} title={k} className={'rw-bgshade'+(tShade===c?' on':'')} style={{background:c}} onClick={()=>setTShade(c)}/>)}

            <button className="rw-addcard" onClick={()=>onAdd(sec.id)}>{W.plus}<span>Add</span></button>
          </div>
        : null}
    </section>
  );
}

function Annotator({ stageRef }){
  const cv2=useRef(null); const drawing=useRef(false); const last=useRef(null);
  const [tool,setTool]=useState('pen'); const [color,setColor]=useState('#EF5A5A');
  const toolR=useRef(tool), colorR=useRef(color);
  useEffect(()=>{toolR.current=tool},[tool]); useEffect(()=>{colorR.current=color},[color]);
  const fit=()=>{ const c=cv2.current; if(!c) return; const b=c.parentElement.getBoundingClientRect(); if(!b.width) return; const d=c.toDataURL&&c.width?c.toDataURL():null; c.width=b.width; c.height=b.height; if(d){ const im=new Image(); im.onload=()=>c.getContext('2d').drawImage(im,0,0,c.width,c.height); im.src=d; } };
  useEffect(()=>{ fit(); const ro=('ResizeObserver'in window)?new ResizeObserver(()=>fit()):null; const p=cv2.current&&cv2.current.parentElement; if(ro&&p)ro.observe(p); return ()=>ro&&ro.disconnect(); },[]);
  const pos=(e)=>{ const b=cv2.current.getBoundingClientRect(); return {x:e.clientX-b.left,y:e.clientY-b.top}; };
  const apply=(ctx)=>{ ctx.lineCap='round'; ctx.lineJoin='round';
    if(toolR.current==='erase'){ ctx.globalCompositeOperation='destination-out'; ctx.globalAlpha=1; ctx.lineWidth=28; }
    else if(toolR.current==='mark'){ ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=.3; ctx.strokeStyle=colorR.current; ctx.lineWidth=18; }
    else { ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1; ctx.strokeStyle=colorR.current; ctx.lineWidth=3.5; } };
  const down=(e)=>{ drawing.current=true; last.current=pos(e); try{e.target.setPointerCapture(e.pointerId);}catch(x){} };
  const move=(e)=>{ if(!drawing.current)return; const ctx=cv2.current.getContext('2d'); const p=pos(e); apply(ctx); ctx.beginPath(); ctx.moveTo(last.current.x,last.current.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last.current=p; };
  const up=()=>{ drawing.current=false; };
  const clear=()=>{ const c=cv2.current; if(c)c.getContext('2d').clearRect(0,0,c.width,c.height); };
  const COLORS=['#EF5A5A','#3B6CF6','#16A06B','#F4B740','#1C1B2E'];
  return (
    <React.Fragment>
      <canvas ref={cv2} className="rw-annot" style={{cursor:tool==='erase'?'cell':'crosshair'}}
        onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerLeave={up}/>
      <div className="rw-pens" onClick={e=>e.stopPropagation()} onPointerDown={e=>e.stopPropagation()}>
        {[['pen','M5 19l3-1L19 7a2 2 0 0 0-3-3L5 15l-1 3 1 1Z'],['mark','M4 19h6M9 14l6-9 4 3-6 9H8l-2-2 3-1Z'],['erase','M4 15l7-7 6 6-4 4H8zM14 20h6']].map(([k,d])=>(
          <button key={k} className={'rw-pen'+(tool===k?' on':'')} title={k} onClick={()=>setTool(k)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg></button>
        ))}
        <span className="rw-pendiv"/>
        {COLORS.map(c=>(<button key={c} className={'rw-penc'+(color===c?' on':'')} style={{background:c}} onClick={()=>setColor(c)}/>))}
        <span className="rw-pendiv"/>
        <button className="rw-pen" title="Clear" onClick={clear}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>
      </div>
    </React.Fragment>
  );
}

function ResourceWall({ state, focus, onTeach }){

  const [modal,setModal]=useState(null);
  const [light,setLight]=useState(null);
  const [toast,setToast]=useState(null);
  const [chooser,setChooser]=useState(null);
  const [fs,setFs]=useState(false);

  const doBoard=(r,lesson)=>{
    setChooser(null);
    setToast(lesson?('Teaching Board · '+lesson.title):'Untagged Teaching Board');
    if(lesson && onTeach){ setTimeout(()=>onTeach(lesson),350); }
  };
  // fromLessonId = the lesson context the resource was opened from (a wall card knows
  // its lesson; the library passes none). Decides which board to open.
  const board=(r,fromLessonId)=>{
    const ls = r.lessons || [];
    const from = fromLessonId && ls.find(l=>l.id===fromLessonId);
    if(from) return doBoard(r,from);
    if(ls.length===1) return doBoard(r,ls[0]);
    if(ls.length>1) return setChooser({ r, lessons:ls });
    return doBoard(r,null);
  };
  const openLight=(r,list)=>{ const arr=list||[r]; setLight({slides:arr, idx:Math.max(0,arr.findIndex(x=>x.key===r.key))}); };
  const enlarge=(r)=>{ setLight({slides:[r], idx:0, mode:'enlarge'}); };

  const moveCard=(cardKey,toSecId,beforeKey)=>{
    if(cardKey===beforeKey) return;
    setSecs(prev=>{ let moved=null; const stripped=prev.map(s=>({...s,items:s.items.filter(it=>{ if(it.key===cardKey){moved=it;return false;} return true; })})); if(!moved) return prev;
      return stripped.map(s=>{ if(s.id!==toSecId) return s; if(!beforeKey) return {...s,items:[...s.items,moved]}; const idx=s.items.findIndex(it=>it.key===beforeKey); if(idx<0) return {...s,items:[...s.items,moved]}; const items=[...s.items]; items.splice(idx,0,moved); return {...s,items}; }); });
  };
  const moveSec=(fromId,toId)=>{ if(fromId===toId) return; setSecs(prev=>{ const a=[...prev]; const fi=a.findIndex(s=>s.id===fromId), ti=a.findIndex(s=>s.id===toId); if(fi<0||ti<0)return prev; a.splice(ti,0,a.splice(fi,1)[0]); return a; }); };
  const addItem=(secId)=>{ setSecs(prev=>prev.map(s=>s.id===secId?{...s,items:[...s.items,{key:'k'+(_uid++),type:'note',label:'Note',composing:true,text:'',subjectId:s.subjectId}]}:s)); };
  const addSection=()=>{ setSecs(prev=>[...prev,{id:'sec-new'+(_uid++),key:'s'+(_uid++),title:'New section',meta:'',color:'--subj-9',subjectId:'spelling',items:[]}]); };
  const addSectionSaved=(after)=>{
    const name = prompt('Name this new section', 'New section'); if(name===null) return;
    const newSec={ id:'sec-new'+(_uid++), key:'s'+(_uid++), title:name||'New section', meta:'', color:(after&&after.color)||'--subj-9', subjectId:(after&&after.subjectId)||'spelling', items:[] };
    setSecs(prev=>{ const idx=after?prev.findIndex(s=>s.id===after.id)+1:prev.length; const a=[...prev]; a.splice(idx,0,newSec); return a; });
    // auto-save the section as its own single-section wall in the library

  // eslint-disable-next-line

  const E=(fn)=>(...a)=>{ ensurePersonal(); return fn(...a); };
  const addItemP=E(addItem), moveCardP=E(moveCard), moveSecP=E(moveSec), addSectionP=E(addSectionSaved);
  const renameWall=()=>{ if(!activeCustom) return; const n=prompt('Rename wall', activeCustom.name); if(n==null) return; const upd={...activeCustom,name:n||activeCustom.name}; setActiveCustom(upd); setCustomWalls(prev=>{ const x=prev.map(w=>w.id===upd.id?upd:w); saveCustomWalls(x); return x; }); };
  const duplicateWall=()=>{ const src=activeCustom; const w={ ...(src||{}), id:'cw'+Date.now(), name:'Copy of '+(src?src.name:preset), created:Date.now(), layout:(src&&src.layout)||snapshot(), secCount:secs.length }; const next=[w,...customWalls]; setCustomWalls(next); saveCustomWalls(next); setActiveCustom(w); setWallMode('custom'); setToast && setToast('Duplicated ✓'); };
  const deleteWall=()=>{ if(!activeCustom){ setToast && setToast('Presets can’t be deleted'); return; } if(!confirm('Delete “'+activeCustom.name+'”?')) return; const next=customWalls.filter(w=>w.id!==activeCustom.id); setCustomWalls(next); saveCustomWalls(next); setActiveCustom(null); setWallMode('preset'); setToast && setToast('Deleted'); };

      {modal && <div className="rw-modalscrim" onClick={()=>setModal(null)}>
        <div className="rw-modal" onClick={e=>e.stopPropagation()}>
          <div className="rw-modalhead"><span className="ti" style={{color:cv(TT[modal.type])}}>{TI[modal.type]}</span><span className="rw-modaltitle">{modal.label}</span><button onClick={()=>setModal(null)}>{W.x}</button></div>
          <div className={'rw-modalbody th-'+modal.type}>{TI[modal.type]}</div>
          <div className="rw-modalbar"><button onClick={()=>{ setModal(null); openLight(modal, [modal]); }}>{W.play} Slideshow</button><button onClick={()=>{ const m=modal; setModal(null); enlarge(m); }}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg> Enlarge</button><button onClick={()=>window.open('#','_blank')}>{W.open} New tab</button><button onClick={()=>{ if(window.Share){ const url=window.Share.mintLink('resource',modal.id,modal.label); try{navigator.clipboard&&navigator.clipboard.writeText(url);}catch(e){} setToast('Share link copied ✓'); } }}>Share link</button><button onClick={()=>{board(modal);setModal(null);}}>{W.board} Teaching Board</button></div>
        </div>
      </div>}
      {light && <Lightbox slides={light.slides} idx={light.idx} mode={light.mode} setIdx={(f)=>setLight(l=>({...l,idx:typeof f==='function'?f(l.idx):f}))} onClose={()=>setLight(null)} onBoard={board}/>}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
      {chooser && <div className="rw-modalscrim" onClick={()=>setChooser(null)}>
        <div className="rw-chooser" onClick={e=>e.stopPropagation()}>
          <div className="rw-choosehead">Open Teaching Board for…<button onClick={()=>setChooser(null)}>{W.x}</button></div>
          <div className="rw-choosesub">“{chooser.r.label}” is tagged in more than one lesson.</div>
          {chooser.lessons.map(l=>(
            <button key={l.id} className="rw-chooserow" onClick={()=>doBoard(chooser.r,l)}>{W.board}<span>{l.title}</span></button>
          ))}
          <button className="rw-chooserow untag" onClick={()=>doBoard(chooser.r,null)}>{W.open}<span>Untagged board</span></button>
        </div>
      </div>}
    </div>
  );
}
window.ResourceWall = ResourceWall;
})();

</script>
<script type="text/babel" data-src="unit-explorer.jsx">
/* Unit Explorer — hover quick-stats chip + full frosted-glass modal.
   window.UE.Chip(...) wraps a year-view unit element with hover stats + click.
   window.UE.Explorer(...) is the modal. */
(function(){
const { useState, useEffect } = React;
const cv = (x)=>`var(${x})`;

function Ring({ value, size=64, stroke=7, color }){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-value);
  return (
    <svg width={size} height={size} style={{display:'block'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="currentColor" strokeOpacity=".15" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/>
    </svg>
  );
}

const I = {
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 6"/></svg>,
  teach:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>,
  plan:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M16 3v5h5"/></svg>,
  post:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h5"/></svg>,
  clock:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  print:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V3h12v6M6 18H4v-6h16v6h-2M8 14h8v6H8z"/></svg>,
};

/* ── hover quick-stats ── */
function Chip({ sid, uname, progress, onOpen, className, style, children }){
  const [hov,setHov]=useState(null);
  const ref=React.useRef(null);
  const show=()=>{ const r=ref.current.getBoundingClientRect(); setHov({x:r.left+r.width/2,y:r.top}); };
  const d=window.DS.unitDetail(sid,uname,progress);
  const s=window.DS.SUBJECTS[sid];
  return (
    <div ref={ref} className={className} style={style} onClick={()=>onOpen&&onOpen(sid,uname,progress)}
      onMouseEnter={show} onMouseLeave={()=>setHov(null)}>
      {children}
      {hov && ReactDOM.createPortal(
        <div className="ue-hov" style={{left:hov.x,top:hov.y,'--uc':cv(s.c)}}>
          <div className="ue-hov-h"><span className="ue-hov-dot" style={{background:cv(s.c)}}/>{uname}</div>
          <div className="ue-hov-stats">
            <div><b>{Math.round(d.progress*100)}%</b><span>taught</span></div>
            <div><b>{d.taughtN}/{d.total}</b><span>lessons</span></div>
            <div><b>{d.covered}/{d.standards.length}</b><span>standards</span></div>
          </div>
        </div>, document.body)}
    </div>
  );
}

/* ── full modal: Unit Planner | Lesson Planner ── */
const UNIT_TABS=['Overview','Lessons','Catch-Up','Standards','Resources','Pacing','Assessment','Stats','Notes'];
const LESSON_TABS=['Overview','Flow','Standards','Resources','Differentiation','Materials','Stats','Notes'];

const UE_RES_KINDS=['Slides','Worksheet','Image','Document','Video'];
const UE_RES_ARTS=['SL','WS','IM','DOC','VID'];
const UE_RES_NAMES=['Slides Deck','Practice Worksheet','Anchor Chart','Exit Ticket','Read-Aloud','Vocabulary Cards','Sort Mat','Quick-Check','Mini-Lesson','Graphic Organizer','Reflection Sheet','Game Board'];
function ueMakeRes(count){ return Array.from({length:count}).map((_,i)=>({ id:'r'+i, art:UE_RES_ARTS[i%5], kind:UE_RES_KINDS[i%5], label:UE_RES_NAMES[i%UE_RES_NAMES.length] })); }
function ResourcesPanel({ accent, count, onOpen, openLabel }){
  const [list,setList]=React.useState(()=>ueMakeRes(count));
  const [view,setView]=React.useState('grid');
  const [filter,setFilter]=React.useState('All');
  const [sort,setSort]=React.useState('seq');
  const [drag,setDrag]=React.useState(null);
  const chips=['All',...UE_RES_KINDS];
  let shown=list.filter(r=>filter==='All'||r.kind===filter);
  if(sort==='name') shown=[...shown].sort((a,b)=>a.label.localeCompare(b.label));
  else if(sort==='type') shown=[...shown].sort((a,b)=>a.kind.localeCompare(b.kind));
  const reorder=(from,to)=>{ if(from===to) return; setList(l=>{ const n=[...l]; n.splice(to,0,n.splice(from,1)[0]); return n; }); };
  return (
    <div className="ue-respanel" style={{'--uc':accent}}>
      <div className="ue-restoolbar">
        <div className="ue-resfilters">{chips.map(k=><button key={k} className={'ue-rchip'+(filter===k?' on':'')} onClick={()=>setFilter(k)}>{k}</button>)}</div>
        <div className="ue-restools">
          <label className="ue-ressort"><span>Sort</span>
            <select value={sort} onChange={e=>setSort(e.target.value)}><option value="seq">Manual</option><option value="name">Name</option><option value="type">Type</option></select></label>
          <div className="ue-resview">
            <button className={view==='grid'?'on':''} title="Thumbnail view" onClick={()=>setView('grid')}>▦</button>
            <button className={view==='list'?'on':''} title="List view" onClick={()=>setView('list')}>≡</button>
          </div>
        </div>
      </div>
      <div className={view==='grid'?'ue-resgrid':'ue-reslist'}>
        {shown.map((r)=>{ const realIdx=list.indexOf(r); return (
          <div key={r.id} className={'ue-rcard '+view+(drag===r.id?' dragging':'')} draggable={sort==='seq'}
            onDragStart={()=>setDrag(r.id)} onDragEnd={()=>setDrag(null)} onDragOver={e=>e.preventDefault()}
            onDrop={()=>{ if(drag){ reorder(list.findIndex(x=>x.id===drag), realIdx); setDrag(null); } }}>
            {sort==='seq' && <span className="ue-rgrip" title="Drag to reorder">⠿</span>}
            <span className="ue-rnum">{realIdx+1}</span>
            <span className="ue-rart">{r.art}</span>
            <span className="ue-rmeta"><span className="ue-rlabel">{r.label}</span><span className="ue-rkind">{r.kind}</span></span>
          </div>
        );})}
        {!shown.length && <div className="ue-empty2">No {filter.toLowerCase()} resources in this unit.</div>}
      </div>
      <button className="ue-btn ghost ue-rfull" onClick={onOpen}>{I.post} {openLabel||'Open full wall'}</button>
    </div>
  );
}


function lessonExtras(l, d){
  const i=d.lessons.indexOf(l);
  return {
    flow:[['Warm-up',5],['Mini-lesson',15],['Guided practice',15],['Independent',8],['Exit ticket',5]],
    diff:{ support:'Sentence frames + partner think-aloud; pre-teach key vocabulary.', onlevel:'Core task as written with the anchor chart available.', extension:'Apply the skill to a new text/problem and justify reasoning.' },
    materials:['Anchor chart','Student notebooks','Worksheet copies','Exit-ticket slips'],
    target:'I '+(l.objective||'').replace(/^I\s+/,'') ,
    formative:'Exit ticket: 3 questions; aim for 80% mastery before moving on.',
    homework:i%2?'Finish independent practice problems 4–8.':'Read pages 22–25 and jot one question.',
  };
}

function Explorer({ sid, uname, progress, startMode, startLesson, embedded, hideModeSwitch, onJumpToUnit, onJumpToLesson, onClose, onTeach, onPlan, onPost }){
  const d=window.DS.unitDetail(sid,uname,progress);
  const s=d.subject;
  const accent=cv(s.c);
  const [mode,setMode]=useState(startMode==='lesson'?'lesson':'unit');
  const [tab,setTab]=useState(startMode==='lesson'?'Overview':'Overview');
  const startIdx=startLesson? Math.max(0, d.lessons.findIndex(l=>l.id===startLesson.id || l.title===startLesson.title)) : (d.lessons.findIndex(l=>!l.taught)>=0?d.lessons.findIndex(l=>!l.taught):0);
  const [lidx,setLidx]=useState(startIdx<0?0:startIdx);
  const [notes,setNotes]=useState('');
  const [coNotes,setCoNotes]=useState('');
  const [doneMap,setDoneMap]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('cc_lessondone')||'{}'); }catch(e){ return {}; } });
  const isTaught=(l)=> doneMap[l.id]!==undefined ? doneMap[l.id] : l.taught;
  const toggleDone=(l)=>setDoneMap(m=>{ const n={...m,[l.id]:!isTaught(l)}; try{localStorage.setItem('cc_lessondone',JSON.stringify(n));}catch(e){} return n; });
  const [rowMenu,setRowMenu]=useState(null);
  const [,forceTick]=useState(0);
  useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape')onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); },[]);
  const switchMode=(m)=>{ setMode(m); setTab('Overview'); };

  const taught=d.lessons.filter(isTaught), untaught=d.lessons.filter(l=>!isTaught(l));
  const paceColor = d.pace==='On pace'?'var(--done)':d.pace==='Behind'?'var(--danger)':'var(--warn)';
  const L=d.lessons[lidx]||d.lessons[0];
  const lx=lessonExtras(L,d);
  const tabs = mode==='unit'?UNIT_TABS:LESSON_TABS;

  const Stat=({n,l})=> <div className="ue-stat"><b>{n}</b><span>{l}</span></div>;
  const LessonRow=({l,i})=>{
    const t=isTaught(l);
    return (
    <div className={'ue-lrow'+(t?' done':'')} draggable onDragStart={e=>{e.dataTransfer.setData('text/lrow',String(d.lessons.indexOf(l)));}}
      onDragOver={e=>e.preventDefault()} onDrop={e=>{ const from=+e.dataTransfer.getData('text/lrow'); const to=d.lessons.indexOf(l); if(!isNaN(from)&&from!==to){ d.lessons.splice(to,0,d.lessons.splice(from,1)[0]); setRowMenu(x=>x); forceTick(t=>t+1); } }}>
      <span className="ue-lgrip" title="Drag to reorder">⠿</span>
      <span className="ue-lnum">{d.lessons.indexOf(l)+1}</span>
      <button className="ue-lstatus" onClick={()=>toggleDone(l)} title={t?'Mark not taught':'Mark taught'} style={{background:t?'var(--done)':'transparent',borderColor:t?'transparent':cv(s.c)}}>{t&&I.check}</button>
      <span className="ue-ltext" onClick={()=>{ if(onJumpToLesson){ onJumpToLesson(l); return; } const i=d.lessons.indexOf(l); setLidx(i); switchMode('lesson'); }} style={{cursor:'pointer'}}><span className="ue-ltitle">{l.title}</span><span className="ue-lsub">{t?('Taught · '+(l.date||'today')):('Not taught · '+(l.reason||'unscheduled'))} · {l.std}</span></span>
      <span className="ue-lacts">
        <button title="Reschedule / bump" onClick={()=>setRowMenu(rowMenu===l.id?null:l.id)}>⋯</button>
        <button title="Teach" onClick={()=>{onTeach&&onTeach(l);onClose();}}>{I.teach}</button>
        <button title="Plan" onClick={()=>{onPlan&&onPlan(l);onClose();}}>{I.plan}</button>
        <button title="Post" onClick={()=>{onPost&&onPost(l);onClose();}}>{I.post}</button>
      </span>
      {rowMenu===l.id && <div className="ue-rowmenu" onMouseLeave={()=>setRowMenu(null)}>
        <button onClick={()=>{toggleDone(l);setRowMenu(null);}}>{t?'Mark not taught':'Mark taught'}</button>
        <button onClick={()=>setRowMenu(null)}>Reschedule…</button>
        <button onClick={()=>setRowMenu(null)}>Bump to next slot</button>
        <button onClick={()=>setRowMenu(null)}>Move to catch-up</button>
      </div>}
    </div>
    );
  };

  return (
    <div className={embedded?'ue-embed':'ue-scrim'} onClick={embedded?undefined:onClose}>
      <div className="ue-modal" onClick={e=>e.stopPropagation()} style={{'--uc':accent}}>
        {/* top mode switch — hidden when the hub drives Explorer/Planner tabs */}
        {!hideModeSwitch &&
          <div className="ue-modeswitch">
            <button className={mode==='unit'?'on':''} onClick={()=>switchMode('unit')}>Unit Planner</button>
            <button className={mode==='lesson'?'on':''} onClick={()=>switchMode('lesson')}>Lesson Planner</button>
          </div>}

        <div className="ue-head" style={{background:`linear-gradient(135deg, ${accent}, color-mix(in oklab, ${accent} 64%, #1c1b2e))`}}>
          <div className="ue-head-l">
            <window.VS.SubjGlyph id={sid} size={40} radius={12}/>
            <div>
              {mode==='unit'
                ? <React.Fragment><div className="ue-htitle">{uname}</div><div className="ue-hsub">{s.full} · Unit {Math.min(6,Math.max(1,Math.round(progress*6)||1))} of 6</div></React.Fragment>
                : <React.Fragment>
                    <select className="ue-lessonsel" value={lidx} onChange={e=>setLidx(+e.target.value)}>
                      {d.lessons.map((l,i)=><option key={i} value={i}>{i+1}. {l.title}</option>)}
                    </select>
                    <div className="ue-hsub">{s.full} · {onJumpToUnit? <button className="ue-unitlink" title="Open this unit in the Unit Planner" onClick={()=>onJumpToUnit(sid,uname,progress)}>{uname}</button> : uname} · {L.taught?('Taught '+L.date):'Not yet taught'}</div>
                  </React.Fragment>}
            </div>
          </div>
          <div className="ue-head-ring">
            {mode==='unit'
              ? <div className="ue-ringwrap"><Ring value={d.progress} color="#fff"/><span className="ue-ringn">{Math.round(d.progress*100)}%</span></div>
              : <span className={'ue-ltag'+(L.taught?' done':'')}>{L.taught?'Taught':'Planned'}</span>}
            {window.Share && <window.Share.Btn kind={mode==='unit'?'unit':'lesson'} id={mode==='unit'?(sid+':'+uname):L.id} label={mode==='unit'?(uname+' · '+s.full):L.title} />}
            <button className="ue-x" onClick={onClose}>{I.x}</button>
          </div>
        </div>

        {mode==='unit'
          ? <div className="ue-statstrip">
              <Stat n={d.taughtN+'/'+d.total} l="lessons taught"/>
              <Stat n={d.weeksRemaining+'w'} l="remaining"/>
              <Stat n={d.covered+'/'+d.standards.length} l="standards"/>
              <Stat n={d.gaps} l="gaps"/>
              <Stat n={d.resourceCount} l="resources"/>
              <div className="ue-stat"><b style={{color:paceColor}}>{d.pace}</b><span>finish {d.projectedFinish}</span></div>
            </div>
          : <div className="ue-statstrip">
              <Stat n={(lidx+1)+'/'+d.total} l="in sequence"/>
              <Stat n={lx.flow.reduce((a,f)=>a+f[1],0)+'m'} l="planned time"/>
              <Stat n={L.std} l="standard"/>
              <Stat n={Math.min(8,d.resourceCount)} l="resources"/>
              <div className="ue-stat"><b style={{color:L.taught?'var(--done)':'var(--warn)'}}>{L.taught?'Complete':'Upcoming'}</b><span>{L.taught?L.date:'not taught'}</span></div>
            </div>}

        <div className="ue-tabs">
          {tabs.map(t=>(
            <button key={t} className={'ue-tab'+(tab===t?' on':'')} onClick={()=>setTab(t)}>{t}</button>
          ))}
        </div>

        <div className="ue-body">
          {mode==='unit' && <UnitBody {...{d,s,accent,tab,paceColor,taught,untaught,notes,setNotes,onTeach,onPost,onClose,LessonRow}}/>}
          {mode==='lesson' && <LessonBody {...{d,s,L,lx,accent,tab,lidx,notes,setNotes,coNotes,setCoNotes,onTeach,onPost,onClose,isTaught,toggleDone}}/>}
        </div>

        <div className="ue-foot">
          <button className="ue-btn ghost" onClick={()=>window.print()}>{I.print} Print</button>
          {mode==='unit'
            ? <button className="ue-btn pri" onClick={()=>{onTeach&&onTeach(untaught[0]||taught[0]||d.lessons[0]);onClose();}}>{I.teach} Teach next lesson</button>
            : <div className="ue-footacts">
                <button className="ue-btn ghost" onClick={()=>{onPost&&onPost(L);onClose();}}>{I.post} Resource wall</button>
                <button className="ue-btn ghost" title="Duplicate this lesson">Duplicate</button>
                <button className="ue-btn ghost" title="Mark taught">{I.check} Mark taught</button>
                <button className="ue-btn pri" onClick={()=>{onTeach&&onTeach(L);onClose();}}>{I.teach} Teach this lesson</button>
              </div>}
        </div>
      </div>
    </div>
  );
}

function UnitBody({ d,s,accent,tab,paceColor,taught,untaught,notes,setNotes,onTeach,onPost,onClose,LessonRow }){
  return (
    <React.Fragment>
      {tab==='Overview' && <div className="ue-over">
        <p className="ue-summary">{d.summary}</p>
        <div className="ue-overgrid">
          <div className="ue-card"><div className="ue-ch">Big ideas · essential questions</div>
            <ul className="ue-list"><li>How does {d.name.toLowerCase()} help us make sense of the world?</li><li>What patterns repeat, and why?</li><li>How do we know when we've mastered it?</li></ul></div>
          <div className="ue-card"><div className="ue-ch">Unit vocabulary</div>
            <div className="ue-chips">{['pattern','strategy','model','evidence','reasoning','transfer'].map(v=><span key={v} className="ue-vchip">{v}</span>)}</div></div>
        </div>
        <div className="ue-timeline">
          {d.lessons.map((l,i)=>(
            <div key={i} className={'ue-tnode'+(l.taught?' done':'')} title={l.title} style={{'--uc':accent}}>
              <span className="ue-tdot">{l.taught?I.check:i+1}</span>
              <span className="ue-tlabel">{l.title.split(' · ')[0]}</span>
            </div>
          ))}
        </div>
      </div>}

      {tab==='Lessons' && <div className="ue-lessons">
        <div className="ue-lgroup"><div className="ue-lghead">Taught <span>{taught.length}</span></div>{taught.map(l=><LessonRow key={l.id} l={l}/>)}</div>
        <div className="ue-lgroup"><div className="ue-lghead">Not taught <span>{untaught.length}</span></div>{untaught.map(l=><LessonRow key={l.id} l={l}/>)}</div>
      </div>}

      {tab==='Catch-Up' && <div className="ue-lessons">
        {untaught.length? <div className="ue-lgroup"><div className="ue-lghead">Behind / not taught <span>{untaught.length}</span></div>{untaught.map(l=><LessonRow key={l.id} l={l}/>)}</div>
          : <div className="ue-empty2">All lessons in this unit are taught 🎉</div>}
        {d.gaps>0 && <div className="ue-lgroup"><div className="ue-lghead">Standards gaps <span>{d.gaps}</span></div>{d.standards.filter(st=>!st.hits).map(st=><div key={st.code} className="ue-std gap"><span className="ue-stdcode">{st.code}</span><span className="ue-stddesc">{st.desc}</span><span className="ue-stdhits">not yet covered</span></div>)}</div>}
      </div>}

      {tab==='Standards' && <div className="ue-stds">
        {d.standards.map(st=>(
          <div key={st.code} className={'ue-std'+(st.hits?'':' gap')}>
            <span className="ue-stdcode">{st.code}</span><span className="ue-stddesc">{st.desc}</span>
            <span className="ue-stdhits">{st.hits?(st.hits+' lesson'+(st.hits>1?'s':'')):'Gap — not yet taught'}</span>
          </div>
        ))}
      </div>}

      {tab==='Resources' && <ResourcesPanel accent={accent} count={Math.max(6,Math.min(12,d.resourceCount))} onOpen={()=>{onPost&&onPost(taught[0]||d.lessons[0]);onClose();}} openLabel="Open full wall"/>}

      {tab==='Pacing' && <div className="ue-pacing">
        <div className="ue-ch" style={{marginBottom:12}}>Unit spread across weeks</div>
        {[0,1,2,3,4].map(w=>{
          const wl=d.lessons.filter((_,i)=>Math.floor(i/1.2)===w);
          return <div key={w} className="ue-week"><span className="ue-wlabel">Week {12+w}</span><div className="ue-wlessons">{wl.map((l,i)=><span key={i} className={'ue-wchip'+(l.taught?' done':'')} style={{'--uc':accent}}>{l.title.split(' · ')[0]}</span>)}{!wl.length&&<span className="ue-wempty">—</span>}</div></div>;
        })}
      </div>}

      {tab==='Assessment' && <div className="ue-assess">
        <div className="ue-card"><div className="ue-ch">Formative checkpoints</div><ul className="ue-list"><li>Exit tickets each lesson (80% mastery gate)</li><li>Mid-unit quick-check after lesson 3</li><li>Strategy conference — small groups</li></ul></div>
        <div className="ue-card"><div className="ue-ch">Summative</div><ul className="ue-list"><li>End-of-unit performance task</li><li>Standards-aligned rubric ({d.standards.length} criteria)</li><li>Reflection + goal-setting</li></ul></div>
      </div>}

      {tab==='Stats' && <div className="ue-statsgrid">

function LessonBody({ d,s,L,lx,accent,tab,lidx,notes,setNotes,coNotes,setCoNotes,onTeach,onPost,onClose,isTaught,toggleDone }){

      {tab==='Flow' && <div className="ue-flow">

          <div key={i} className="ue-flowrow"><span className="ue-flown" style={{background:accent}}>{i+1}</span><span className="ue-flowt">{f[0]}</span><span className="ue-flowm">{f[1]} min</span></div>
        ))}
        <div className="ue-flowtotal">Total · {lx.flow.reduce((a,f)=>a+f[1],0)} min</div>
      </div>}

      {tab==='Standards' && <div className="ue-stds">
        <div className="ue-stdnote">Auto-pulled from {d.name}</div>
        <div className="ue-std"><span className="ue-stdcode">{L.std}</span><span className="ue-stddesc">{(d.standards.find(x=>L.std.startsWith(x.code.split('.').slice(0,-1).join('.')))||d.standards[0]).desc}</span><span className="ue-stdhits">this lesson</span></div>
      </div>}

      {tab==='Resources' && <ResourcesPanel accent={accent} count={6} onOpen={()=>{onPost&&onPost(L);onClose();}} openLabel="Open this lesson's wall"/>}

      {tab==='Differentiation' && <div className="ue-diffgrid">

        <div className="ue-card" style={{borderTop:'4px solid var(--subj-10-bright)'}}><div className="ue-ch" style={{color:'var(--subj-10-bright)'}}>On level</div><p className="ue-fieldtext">{lx.diff.onlevel}</p></div>
        <div className="ue-card" style={{borderTop:'4px solid var(--subj-13-bright)'}}><div className="ue-ch" style={{color:'var(--subj-13-bright)'}}>Extension</div><p className="ue-fieldtext">{lx.diff.extension}</p></div>
      </div>}

      {tab==='Materials' && <div className="ue-mats">
        {lx.materials.map((m,i)=><label key={i} className="ue-matrow"><input type="checkbox" defaultChecked={i<2}/><span>{m}</span></label>)}

      {tab==='Stats' && <div className="ue-statsgrid">
        <div className="ue-card"><div className="ue-ch">Planned time</div><div className="ue-bignum">{lx.flow.reduce((a,f)=>a+f[1],0)}<small> min</small></div><div className="ue-csub">{lx.flow.length} steps</div></div>
        <div className="ue-card"><div className="ue-ch">Sequence</div><div className="ue-bignum">{lidx+1}<small>/{d.total}</small></div><div className="ue-csub">in {d.name}</div></div>
        <div className="ue-card"><div className="ue-ch">Status</div><div className="ue-bignum" style={{color:L.taught?'var(--done)':'var(--warn)'}}>{L.taught?'Done':'Planned'}</div><div className="ue-csub">{L.taught?L.date:'not yet taught'}</div></div>
        <div className="ue-card"><div className="ue-ch">Resources</div><div className="ue-bignum">5</div><div className="ue-csub">attached</div></div>
      </div>}

      {tab==='Notes' && <div className="ue-notes">

        <textarea value={coNotes} onChange={e=>setCoNotes(e.target.value)} placeholder="Notes for co-teachers, aides, or substitutes…"/>
      </div>}
    </React.Fragment>
  );
}

/* Per-field resources (Formative check · Homework) — add a resource (+), share the
   set, and show attachments as pill links. Writes through DS.addCustomRes so the
   same resources surface in the lesson's resource wall too. */
function FieldResources({ lesson, field, title, body, accent }){
  const DS=window.DS;
  const read=()=>{ try{ return (JSON.parse(localStorage.getItem('cc_res_'+lesson.id))||[]).filter(r=>r.field===field); }catch(e){ return []; } };
  const [items,setItems]=React.useState(read);
  const [open,setOpen]=React.useState(false);
  const [name,setName]=React.useState('');
  const [url,setUrl]=React.useState('');
  const refresh=()=>setItems(read());
  const add=()=>{
    const label=(name||'').trim(); const u=(url||'').trim();
    if(!label && !u) return;
    const type=u?DS.typeFromUrl(u):'Doc';
    DS.addCustomRes(lesson.id,{ id:'cr-'+Date.now().toString(36), label:label||u, type, url:u||'#', field });
    setName(''); setUrl(''); setOpen(false); refresh();
  };
  const remove=(id)=>{ DS.removeCustomRes(lesson.id,id); refresh(); };
  const RT=DS.RESTYPES;
  return (
    <div className="ue-card ue-resfield">
      <div className="ue-cardhead">
        <div className="ue-ch" style={{margin:0}}>{title}</div>
        <div className="ue-cardacts">
          <button className="ue-miniadd" title={'Add a resource to '+title.toLowerCase()} onClick={()=>setOpen(o=>!o)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          {window.Share && <window.Share.Btn kind="resource" id={lesson.id+':'+field} label={title+' · '+lesson.title} />}
        </div>
      </div>
      <div className="ue-fieldtext">{body}</div>
      {items.length>0 && <div className="ue-respills">
        {items.map(r=>(
          <span key={r.id} className="ue-respill" style={{'--rc':cv(RT[r.type]||'--subj-11')}}>
            <a href={r.url||'#'} target="_blank" rel="noopener" title={r.type+' · '+r.label}><span className="ue-respill-dot"/><span className="ue-respill-tx">{r.label}</span></a>
            <button className="ue-respill-x" title="Remove" onClick={()=>remove(r.id)}>×</button>
          </span>
        ))}
      </div>}
      {open && <div className="ue-addres" style={{'--uc':accent}}>
        <input className="ue-addres-in" value={name} onChange={e=>setName(e.target.value)} placeholder="Resource name" autoFocus
          onKeyDown={e=>{ if(e.key==='Enter') add(); if(e.key==='Escape') setOpen(false); }}/>
        <input className="ue-addres-in" value={url} onChange={e=>setUrl(e.target.value)} placeholder="Paste link (optional)"
          onKeyDown={e=>{ if(e.key==='Enter') add(); if(e.key==='Escape') setOpen(false); }}/>
        <div className="ue-addres-foot">
          <span className="ue-addres-hint">Also added to the resource wall</span>
          <div className="ue-addres-btns">
            <button className="ue-addres-cancel" onClick={()=>setOpen(false)}>Cancel</button>
            <button className="ue-addres-add" onClick={add}>Add</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

window.UE = { Chip, Explorer };
})();

<script type="text/babel" data-src="catchup.jsx">
/* Catch-Up — aggregated popup of untaught/overdue lessons + standard gaps,
   filterable by scope, with reschedule/bump/mark-taught + Plan/Post/Teach.
   window.CatchUp({ onClose, onTeach, onPlan, onPost }) */
(function(){
const { useState, useEffect } = React;
const cv=(x)=>`var(${x})`;
const DS=window.DS;

const SCOPES=[['all','Everything'],['day','Today'],['week','This week'],['unit','By unit'],['subject','By subject'],['standards','Standards gaps']];
const I={
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
  teach:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>,
  plan:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M16 3v5h5"/></svg>,
  post:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h5"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 6"/></svg>,
};

function CatchUp({ onClose, onTeach, onPlan, onPost }){
  const [scope,setScope]=useState('all');
  const [data]=useState(()=>DS.catchUp());
  const [done,setDone]=useState({});
  useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape')onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); },[]);

  let lessons=data.lessons.filter(l=>!done[l.id]);
  if(scope==='day') lessons=lessons.filter(l=>l.overdue).slice(0,4);
  else if(scope==='week') lessons=lessons.filter(l=>l.overdue).slice(0,8);
  const showStd = scope==='all'||scope==='standards';
  const showLessons = scope!=='standards';

  // group by subject (and unit when scope=unit)
  const groups={};
  lessons.forEach(l=>{ const key=scope==='unit'?(DS.SUBJECTS[l.subjectId].label+' · '+l.unit):DS.SUBJECTS[l.subjectId].full; (groups[key]=groups[key]||{sid:l.subjectId,items:[]}).items.push(l); });

  const total=data.lessons.filter(l=>!done[l.id]).length;

  return (
    <div className="cu-scrim" onClick={onClose}>
      <div className="cu-modal" onClick={e=>e.stopPropagation()}>
        <div className="cu-head">
          <div className="cu-htitle"><span className="cu-badge">{total}</span>Catch-Up<span className="cu-hsub">lessons & standards behind schedule</span></div>
          <button className="cu-x" onClick={onClose}>{I.x}</button>
        </div>
        <div className="cu-scopes">
          {SCOPES.map(([k,l])=><button key={k} className={'cu-scope'+(scope===k?' on':'')} onClick={()=>setScope(k)}>{l}</button>)}
        </div>
        <div className="cu-body">
          {showLessons && Object.keys(groups).map(g=>{
            const grp=groups[g], s=DS.SUBJECTS[grp.sid];
            return (
              <div key={g} className="cu-group">
                <div className="cu-ghead"><span className="cu-gdot" style={{background:cv(s.c)}}/>{g}<span className="cu-gn">{grp.items.length}</span></div>
                {grp.items.map(l=>(
                  <div key={l.id} className="cu-row" style={{borderLeftColor:cv(s.c),'--rc':cv(s.c)}}>
                    <span className="cu-rtext"><span className="cu-rtitle">{l.title}</span><span className="cu-rsub">{l.unit} · {l.std} {l.overdue?'· overdue':'· not yet taught'}</span></span>
                    <span className="cu-acts">
                      <button className="cu-resched" title="Reschedule">Reschedule</button>
                      <button className="cu-bump" title="Bump to next open slot (cascade after)">Bump</button>
                      <button title="Mark taught" onClick={()=>setDone(d=>({...d,[l.id]:1}))}>{I.check}</button>
                      <button title="Plan" onClick={()=>{onPlan&&onPlan(l);onClose();}}>{I.plan}</button>
                      <button title="Post" onClick={()=>{onPost&&onPost(l);onClose();}}>{I.post}</button>
                      <button title="Teach" onClick={()=>{onTeach&&onTeach(l);onClose();}}>{I.teach}</button>
                    </span>
                  </div>
                ))}
              </div>
            );
          })}
          {showStd && <div className="cu-group">
            <div className="cu-ghead">Standards not yet covered<span className="cu-gn">{data.gaps.length}</span></div>
            {data.gaps.map((g,i)=>{ const s=DS.SUBJECTS[g.subjectId]; return (
              <div key={i} className="cu-stdrow"><span className="cu-stdcode">{g.code}</span><span className="cu-stdtext"><b style={{color:cv(s.c)}}>{s.label}</b> · {g.desc} <span className="cu-stdunit">({g.unit})</span></span></div>
            ); })}
          </div>}
          {showLessons && !Object.keys(groups).length && <div className="cu-empty">{I.check} All caught up for this scope 🎉</div>}
        </div>
      </div>
    </div>
  );
}

window.CatchUp = CatchUp;
})();

</script>

function LessonDoc({ ctx, markEdited, onTeach, onPost, onOpenUnit, onOpenLesson }){
