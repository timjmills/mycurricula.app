          <span className="cur">{L.title}</span>
        </div>
        <div className="ph-doch-row">
          <div className="ph-doch-l">
            <div className="ph-doctitle"><span className="rail" style={{background:cv(s.c)}}/>{L.title}</div>
            <div className="ph-docmeta">
              <Badge st={status} label={status==='done'?'Taught '+(det.lessons[idx]&&det.lessons[idx].date||''):('Scheduled '+day.short+' '+DS.fmt(L.start))}/>
              <span className="sep">·</span>{DS.label('lesson')} {lessonNo} of {det.total}
              <span className="sep">·</span><span className="ph-tag"><span className="d" style={{background:cv(s.c)}}/>{stds[idx%stds.length]?stds[idx%stds.length].code:L.std}</span>
              <span className="sep">·</span>{dur} min
            </div>
          </div>
          <div className="ph-doch-actions">
            <button className="ph-btn ghost sm" onClick={()=>onPost&&onPost(L)}>Resource wall</button>
            <button className="ph-btn primary sm" onClick={()=>onTeach&&onTeach(L)}>{I.teach}Teach</button>
            <More items={[{label:'Duplicate'},{label:'Reschedule'},{label:'Mark taught'},{div:true},{label:'Archive',danger:true}]}/>
          </div>
        </div>
        <DocTabs tabs={allTabs} active={tab} optional={optional} visible={visible}
          onPick={(k)=>{ if(k!=='__more') setTab(k); }} setVisible={setVisible}/>
      </div>
    </div>
  );

  const sectionContent = (fk)=>{
    const f = fSteps.find(x=>x.k===fk)||fSteps[0];
    const seed = pbody[fk]!=null ? pbody[fk] : (fk==='target'?(L.objective||''):'');
    const tagged=(psecres[fk]||[]).map(id=>res.find(r=>r.id===id)).filter(Boolean);
    const untagged=res.filter(r=>!(psecres[fk]||[]).includes(r.id));
    return <div className="ph-pane-center" key={fk}>
      <input className="ph-sectitle-edit" value={f.n} onChange={e=>renameStep(fk,e.target.value)} placeholder="Section name…" />
      <div className="ph-secsub">{f.ph}</div>
      <div className="ph-field">
        <div className="ph-fieldlbl">Plan</div>
        <PHFmtBar/>
        <div className="ph-edit ph-edit-rich" contentEditable suppressContentEditableWarning data-ph="Write this section — type, format, add links…" dangerouslySetInnerHTML={{__html:seed}} onBlur={e=>persistBody({...pbody,[fk]:e.currentTarget.innerHTML})} />
      </div>
      <div className="ph-field">
        <div className="ph-fieldlbl">Teacher notes</div>
        <PHFmtBar/>
        <div className="ph-edit ph-edit-rich" contentEditable suppressContentEditableWarning data-ph="Reminders, grouping, timing…" dangerouslySetInnerHTML={{__html:pbody[fk+':n']||''}} onBlur={e=>persistBody({...pbody,[fk+':n']:e.currentTarget.innerHTML})} />
      </div>
      <div className="ph-field">
        <div className="ph-fieldlbl">Resources for this section</div>
        <div className="ph-secres">
          {tagged.map(r=><span key={r.id} className="ph-secrestag"><span className="ic" style={{background:cv(RESCOLORS[r.type]||'--subj-9')}}>{(r.type||'·')[0]}</span><span className="lbl" onClick={()=>r.url&&window.open(r.url,'_blank','noopener')}>{r.label}</span><button title="Untag" onClick={()=>persistRes({...psecres,[fk]:(psecres[fk]||[]).filter(x=>x!==r.id)})}>{'×'}</button></span>)}
          <PHTagAdd untagged={untagged} onAdd={(id)=>persistRes({...psecres,[fk]:[...(psecres[fk]||[]),id]})} />
          <button className="ph-tagaddbtn ph-tagnew" onClick={()=>onPost&&onPost(L)}>{I.plus}New resource</button>
        </div>
      </div>
    </div>;
  };

  return <div className="ph-doc" style={{'--dc':cv(s.c)}}>
    {head}
    {tab==='flow' && <div className="ph-panes">
      <nav className="ph-pane-rail">
        <div className="ph-railh">Lesson flow{flow.name?<span className="ph-railh-name">{flow.name}</span>:null}</div>
        {fSteps.map((f,i)=>(
          <div key={f.k} className={'ph-flowitem'+(flowK===f.k?' on':'')}>
            <button className="ph-flowitem-main" onClick={()=>setFlowK(f.k)}><span className="num">{i+1}</span><span className="fl">{f.n}</span></button>
            <span className="ph-flowedit">
              <button title="Move up" onClick={()=>moveStep(f.k,-1)} disabled={i===0}>{'↑'}</button>
              <button title="Move down" onClick={()=>moveStep(f.k,1)} disabled={i===fSteps.length-1}>{'↓'}</button>
              <button title="Delete section" onClick={()=>delStep(f.k)}>{'×'}</button>
            </span>
          </div>
        ))}
        <button className="ph-flowadd" onClick={addStep}>{I.plus}Add section</button>
        <div className="ph-flowpreset">
          <select value={allPresets[flow.name]?flow.name:''} onChange={e=>e.target.value&&loadPreset(e.target.value)}>
            <option value="">Load a preset…</option>
            {Object.keys(allPresets).map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <button onClick={saveAsPreset}>Save as preset</button>
        </div>
      </nav>
      {sectionContent(flowK)}
      <aside className="ph-pane-insp">
        <div className="ph-inspsec">
          <div className="ph-insph">Standards</div>
          {stds.map(st=>(<div className="ph-stdrow" key={st.code}><span className="ph-stdcode">{st.code}</span><span className="ph-stddesc">{st.desc}</span></div>))}
        </div>
        <div className="ph-inspsec">
          <div className="ph-insph">Resources</div>
          {res.slice(0,4).map(r=>(<div className="ph-resrow" key={r.id}><span className="ic" style={{background:cv(RESCOLORS[r.type]||'--subj-9')}}>{(r.type||'·')[0]}</span>{r.label}</div>))}
          <button className="ph-btn ghost sm" style={{marginTop:10}} onClick={()=>onPost&&onPost(L)}>{I.plus}Add resource</button>
        </div>
        <div className="ph-inspsec">
          <div className="ph-insph">Differentiation</div>
          <div className="ph-edit" contentEditable suppressContentEditableWarning data-ph="Supports & extensions…" onInput={onEdit}></div>
        </div>
      </aside>
    </div>}

    {tab==='plan' && <div className="ph-page ph-flowall">
      <div className="ph-flowallhead">
        <div className="ph-sectitle">All sections · {flow.name}</div>
        <div className="ph-flowpreset">
          <select value={allPresets[flow.name]?flow.name:''} onChange={e=>e.target.value&&loadPreset(e.target.value)}><option value="">Load a preset…</option>{Object.keys(allPresets).map(n=><option key={n} value={n}>{n}</option>)}</select>
          <button onClick={saveAsPreset}>Save as preset</button>
        </div>
      </div>
      {fSteps.map((f,i)=>{ const seed=pbody[f.k]!=null?pbody[f.k]:(f.k==='target'?(L.objective||''):''); const tagged=(psecres[f.k]||[]).map(id=>res.find(r=>r.id===id)).filter(Boolean); const untagged=res.filter(r=>!(psecres[f.k]||[]).includes(r.id)); return (
        <div className="ph-flowallsec" key={f.k}>
          <div className="ph-flowallnum">{i+1}</div>
          <div className="ph-flowallbody">
            <input className="ph-sectitle-edit" value={f.n} onChange={e=>renameStep(f.k,e.target.value)} />
            <PHFmtBar/>
            <div className="ph-edit ph-edit-rich" contentEditable suppressContentEditableWarning data-ph={f.ph} dangerouslySetInnerHTML={{__html:seed}} onBlur={e=>persistBody({...pbody,[f.k]:e.currentTarget.innerHTML})} />
            <div className="ph-secres"><span className="ph-secreslbl">Resources:</span>
              {tagged.map(r=><span key={r.id} className="ph-secrestag"><span className="ic" style={{background:cv(RESCOLORS[r.type]||'--subj-9')}}>{(r.type||'·')[0]}</span><span className="lbl" onClick={()=>r.url&&window.open(r.url,'_blank','noopener')}>{r.label}</span><button onClick={()=>persistRes({...psecres,[f.k]:(psecres[f.k]||[]).filter(x=>x!==r.id)})}>{'×'}</button></span>)}
              <PHTagAdd untagged={untagged} onAdd={(id)=>persistRes({...psecres,[f.k]:[...(psecres[f.k]||[]),id]})} />
              <button className="ph-tagaddbtn ph-tagnew" onClick={()=>onPost&&onPost(L)}>{I.plus}New resource</button>
            </div>
            <span className="ph-flowdel"><button title="Delete section" onClick={()=>delStep(f.k)}>{'×'} Remove section</button></span>
          </div>
        </div>
      ); })}
      <button className="ph-flowadd" onClick={addStep}>{I.plus}Add section</button>
    </div>}

    {tab==='resources' && <div className="ph-page">
      <div className="ph-list">
        <div className="ph-grouphead">Resources<span className="meta">{res.length} items</span>
          <span className="ph-resview">
            <button className={resView==='list'?'on':''} title="List view" onClick={()=>setResView('list')}><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
            <button className={resView==='thumb'?'on':''} title="Thumbnail view" onClick={()=>setResView('thumb')}><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
          </span>
        </div>
        {resView==='thumb'
          ? <div className="ph-resthumbs">{res.map(r=>(<button className="ph-resthumb" key={r.id} onClick={()=>onPost&&onPost(L)}>
              <span className="ph-resthumb-cover" style={{background:`color-mix(in oklab, ${cv(RESCOLORS[r.type]||'--subj-9')} 22%, transparent)`}}><span className="ic" style={{background:cv(RESCOLORS[r.type]||'--subj-9')}}>{(r.type||'·').slice(0,3).toUpperCase()}</span></span>
              <span className="ph-resthumb-nm">{r.label}</span>
            </button>))}</div>
          : res.map(r=>(<div className="ph-row" key={r.id} onClick={()=>onPost&&onPost(L)}>
          <span className="ic" style={{width:28,height:28,borderRadius:7,display:'grid',placeItems:'center',font:'700 10px/1 var(--font-sans)',color:'#fff',background:cv(RESCOLORS[r.type]||'--subj-9'),flex:'0 0 auto'}}>{(r.type||'·').slice(0,3).toUpperCase()}</span>
          <div className="main"><div className="t">{r.label}</div><div className="m">{r.type}</div></div>
          <div className="acts"><button className="ph-btn ghost sm">Open</button></div>
        </div>))}
      </div>
      <button className="ph-btn ghost sm" style={{marginTop:14}} onClick={()=>onPost&&onPost(L)}>{I.plus}Add resource</button>
    </div>}

    {tab==='support' && <div className="ph-page">
      <div className="ph-difflbl">Differentiation</div>
      <div className="ph-difftiers">
        {[['su','Support','--subj-3'],['on','On level','--subj-10'],['ab','Extension','--subj-7']].map(([k,lab,col])=>(
          <div className="ph-difftier" key={k} style={{'--tier':'var('+col+')'}}>
            <div className="ph-difftier-h">{lab}</div>
            <PHFmtBar/>
            <div className="ph-edit ph-edit-rich" contentEditable suppressContentEditableWarning data-ph="Add steps, scaffolds, a checklist…" dangerouslySetInnerHTML={{__html:pbody['diff:'+k]||''}} onBlur={e=>persistBody({...pbody,['diff:'+k]:e.currentTarget.innerHTML})} />
          </div>
        ))}
      </div>
    </div>}

    {tab==='materials' && <div className="ph-page">
      <div className="ph-ovcard"><h4>Materials</h4>
        <PHFmtBar/>
        <div className="ph-edit ph-edit-rich" contentEditable suppressContentEditableWarning data-ph="What you need ready before class — make a checklist…" dangerouslySetInnerHTML={{__html:pbody['materials']||''}} onBlur={e=>persistBody({...pbody,['materials']:e.currentTarget.innerHTML})} />
      </div>
    </div>}

    {tab==='standards' && <div className="ph-page">
      <div className="ph-ovcard"><h4>Standards covered</h4>
        {(pstds||stds.map(x=>({code:x.code,desc:x.desc}))).map((st,i)=>(<div className="ph-stdrow ph-stdrow-edit" key={st.code+':'+i}><span className="ph-stdcode">{st.code}</span><span className="ph-stddesc">{st.desc}</span><button className="ph-stddel" title="Remove standard" onClick={()=>{ const base=pstds||stds.map(x=>({code:x.code,desc:x.desc})); persistStds(base.filter((_,j)=>j!==i)); }}>{I.x}</button></div>))}
        <div className="ph-stdadd">
          <input className="ph-stdcodein" value={newStd.code} onChange={e=>setNewStd(s=>({...s,code:e.target.value}))} placeholder="Code (e.g. RF.4.3.a)" />
          <input className="ph-stddescin" value={newStd.desc} onChange={e=>setNewStd(s=>({...s,desc:e.target.value}))} placeholder="Description" onKeyDown={e=>{ if(e.key==='Enter'&&newStd.code.trim()){ const base=pstds||stds.map(x=>({code:x.code,desc:x.desc})); persistStds([...base,{code:newStd.code.trim(),desc:newStd.desc.trim()}]); setNewStd({code:'',desc:''}); } }} />
          <button className="ph-btn ghost sm" disabled={!newStd.code.trim()} onClick={()=>{ const base=pstds||stds.map(x=>({code:x.code,desc:x.desc})); persistStds([...base,{code:newStd.code.trim(),desc:newStd.desc.trim()}]); setNewStd({code:'',desc:''}); }}>{I.plus}Add standard</button>
        </div>
      </div>
    </div>}

    {tab==='stats' && <div className="ph-page">
      <div className="ph-ovgrid">
        <div className="ph-ovcard"><h4>Pacing</h4><div className="ph-statusline"><span className="dot" style={{background:cv(det.pace==='On pace'?'--done':'--warn')}}/>{det.pace}</div></div>
        <div className="ph-ovcard"><h4>Duration</h4><div className="ph-statusline">{dur} min planned</div></div>
        <div className="ph-ovcard"><h4>Position</h4><div className="ph-statusline">{DS.label('lesson')} {lessonNo} of {det.total}</div></div>
      </div>
    </div>}

    {tab==='notes' && <div className="ph-page">
      <div className="ph-field"><div className="ph-fieldlbl">Lesson notes</div>
        <div className="ph-edit" contentEditable suppressContentEditableWarning data-ph="Anything to remember for next time…" style={{minHeight:160}} onInput={onEdit}></div></div>
    </div>}
  </div>;
}

/* ======================= UNIT PLANNER ======================= */
function UnitDoc({ ctx, markEdited, onTeach, onPost, onOpenLesson }){
  const allTabs=[{k:'overview',label:'Overview'},{k:'lessons',label:'Lessons'},{k:'standards',label:'Standards'},{k:'assessments',label:'Assessments'},{k:'resources',label:'Resources'},{k:'notes',label:'Notes'}];
  const optional=allTabs.filter(t=>t.optional);
  const [visible,setVisible]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('cc_hub_unittabs'))||['resources']; }catch(e){ return ['resources']; } });
  useEffect(()=>{ try{ localStorage.setItem('cc_hub_unittabs',JSON.stringify(visible)); }catch(e){} },[visible]);
  const [tab,setTab]=useState('overview');
  const _uk='cc_hub_unitdoc_'+(ctx.sid||'')+':'+(ctx.uname||'');
  const [upbody,setUpbody]=useState(()=>{ try{ return JSON.parse(localStorage.getItem(_uk+'_body'))||{}; }catch(e){ return {}; } });
  const persistUp=(n)=>{ setUpbody(n); try{ localStorage.setItem(_uk+'_body',JSON.stringify(n)); }catch(e){} markEdited&&markEdited(); };
  const [taughtOv,setTaughtOv]=useState(()=>{ try{ return JSON.parse(localStorage.getItem(_uk+'_taught'))||{}; }catch(e){ return {}; } });
  const [uResView,setUResView]=useState('list');
  const onEdit=()=>markEdited&&markEdited();

  const det = DS.unitDetail(ctx.sid, ctx.uname, ctx.prog);
  const s = det.subject;
  const pct = Math.round(det.progress*100);
  const complete = det.progress>=1;
  const nextL = det.lessons.find(l=>!l.taught) || det.lessons[0];
  const RTYPES=['Slides','Worksheet','Anchor Chart','Video','Doc'];
  const unitRes = det.lessons.slice(0,6).flatMap((l,li)=> RTYPES.slice(0,(li%3)+1).map((tp)=>({type:tp,label:l.title.split(' · ')[0]+' — '+tp,lesson:l.title.split(' · ')[0]})) );
  const statusLine = complete
    ? `Completed · ${det.total} of ${det.total} lessons taught · ${det.covered} standards covered · Finished ${det.projectedFinish}`
    : `In progress · ${det.taughtN} of ${det.total} lessons taught · ${det.pace} · Projected finish ${det.projectedFinish}`;

  const head = (
    <div className="ph-dochead">
      <div className="ph-dochead-in">
        <div className="ph-kicker">Unit Planner</div>
        <div className="ph-crumb"><button>{DS.label('curriculum')}</button><span className="sep">/</span><button>{s.full}</button><span className="sep">/</span><span className="cur">{ctx.uname}</span></div>
        <div className="ph-doch-row">
          <div className="ph-doch-l">
            <div className="ph-doctitle"><span className="rail" style={{background:cv(s.c)}}/>{ctx.uname}</div>
            <div className="ph-docmeta"><span className="ph-tag"><span className="d" style={{background:cv(s.c)}}/>{s.full}</span><span className="sep">·</span>{statusLine}</div>
          </div>
          <div className="ph-doch-actions">
            <button className="ph-btn primary sm" onClick={()=>onOpenLesson&&onOpenLesson(nextL,ctx)}>{complete?'Review unit':'Open next lesson'}</button>
            <More items={[{label:'Edit sequence'},{label:'Duplicate unit'},{label:'Export'},{div:true},{label:'Archive',danger:true}]}/>
          </div>
        </div>
        <DocTabs tabs={allTabs} active={tab} optional={optional} visible={visible} onPick={(k)=>{ if(k!=='__more') setTab(k); }} setVisible={setVisible}/>
      </div>
    </div>
  );

  return <div className="ph-doc" style={{'--dc':cv(s.c)}}>
    {head}
    {tab==='overview' && <div className="ph-page">
      <div className="ph-ovcard" style={{marginBottom:16}}>
        <div className="ph-statusline" style={{fontWeight:600}}><span className="dot" style={{background:cv(complete?'--done':(det.pace==='On pace'?'--progress':'--warn'))}}/>{statusLine}</div>
        <div className="ph-bigbar"><i style={{width:pct+'%',background:cv(complete?'--done':s.c)}}/></div>
      </div>
      <div className="ph-ovgrid">
        <div className="ph-ovcard"><h4>Purpose</h4><div className="ph-ovtext">{det.summary}</div></div>
        <div className="ph-ovcard"><h4>Essential question</h4><div className="ph-ovtext">How does {ctx.uname.toLowerCase()} help us read, think, and communicate more precisely?</div></div>
      </div>
      <div className="ph-ovgrid" style={{marginTop:16}}>
        <div className="ph-ovcard"><h4>Standards · {det.covered}/{det.standards.length} covered</h4>
          {det.standards.map(st=>(<div className="ph-stdrow" key={st.code}><span className="ph-stdcode">{st.code}</span><span className="ph-stddesc">{st.desc}</span>{st.hits>0 && <span style={{marginLeft:'auto',color:'var(--done)',width:14}}>{I.check}</span>}</div>))}
        </div>
        <div className="ph-ovcard"><h4>Key assessments</h4>
          <div className="ph-resrow">Mid-unit check · {det.standards[1]?det.standards[1].code:''}</div>
          <div className="ph-resrow">End-of-unit assessment · {det.standards[det.standards.length-1]?det.standards[det.standards.length-1].code:''}</div>
          <div className="ph-resrow">Reflection · {det.total>0?'Lesson '+det.total:''}</div>
        </div>
      </div>
      <div className="ph-ovcard" style={{marginTop:16}}><h4>Lesson sequence</h4>
        <div className="ph-ovlist">
          {det.lessons.map((l,i)=>{ const taught=(taughtOv[l.id]!=null)?taughtOv[l.id]:l.taught; return (<div className={'ph-ovlrow'+(taught?' taught':'')} key={l.id}>
            <button className="num" title={taught?'Mark not done':'Mark done'} onClick={()=>{ const n={...taughtOv,[l.id]:!taught}; setTaughtOv(n); try{localStorage.setItem(_uk+'_taught',JSON.stringify(n));}catch(e){} markEdited&&markEdited(); }}>{i+1}</button>
            <span className="t">{l.title}</span>
            <span className="dt">{taught?l.date:(l.reason||'Not scheduled')}</span>
            <button className="ph-btn ghost sm" onClick={()=>onOpenLesson&&onOpenLesson(l,ctx)}>Open</button>
          </div>); })}
        </div>
      </div>
    </div>}

    {tab==='lessons' && <div className="ph-page">
      <div className="ph-list">
        <div className="ph-grouphead">{ctx.uname}<span className="meta">{det.taughtN}/{det.total} taught</span></div>
        {det.lessons.map((l,i)=>(<div className="ph-row" key={l.id} style={{borderLeftColor:cv(s.c),'--rc':cv(s.c)}} onClick={()=>onOpenLesson&&onOpenLesson(l,ctx)}>
          <span className="num" style={{width:24,height:24,borderRadius:'50%',display:'grid',placeItems:'center',font:'700 11px/1 var(--font-sans)',flex:'0 0 auto',background:l.taught?cv('--done-tint'):'var(--ph-glass)',color:l.taught?cv('--done'):'var(--ph-text-2)'}}>{i+1}</span>
          <div className="main"><div className="t">{l.title}</div><div className="m">{l.std}<span className="sep">·</span>{l.taught?('Taught '+l.date):(l.reason||'Not scheduled')}</div></div>
          <Badge st={l.taught?'done':'upcoming'} label={l.taught?'Taught':'Upcoming'}/>
          <div className="acts"><button className="ph-btn ghost sm">Open</button></div>
        </div>))}
      </div>
    </div>}

    {tab==='standards' && <div className="ph-page">
      <div className="ph-list">
        <div className="ph-grouphead">Standards<span className="meta">{det.covered} covered · {det.gaps} gaps</span></div>
        {det.standards.map(st=>(<div className="ph-row" key={st.code}>
          <span className="ph-stdcode" style={{width:64}}>{st.code}</span>
          <div className="main"><div className="t" style={{fontWeight:500}}>{st.desc}</div></div>
          <Badge st={st.hits>0?'done':'idle'} label={st.hits>0?'Covered':'Gap'}/>
        </div>))}
      </div>
    </div>}

    {tab==='resources' && <div className="ph-page">
      <div className="ph-list">
        <div className="ph-grouphead">Resources<span className="meta">{unitRes.length} items</span>

  const openUnit=(u)=>{ const sid=u.sid||u.subjectId, uname=u.uname||u.unit, prog=(u.prog!=null?u.prog:unitProg(sid,uname)); const key='U:'+sid+uname;
    setDocs(d=> d.find(x=>x.key===key)?d:[...d,{key,kind:'unit',ctx:{sid,uname,prog},title:uname,sid}]);
    setActive(key); pushRecent({key,kind:'unit',title:uname,sub:DS.SUBJECTS[sid].full,sid}); };
  const openLesson=(L,ctx)=>{ const sid=L.subjectId, uname=(ctx&&ctx.uname)||L.unit, prog=(ctx&&ctx.prog!=null?ctx.prog:unitProg(sid,uname)); const key='L:'+L.id;
    const lc={sid,uname,prog,lesson:L};
    setDocs(d=> d.find(x=>x.key===key)?d.map(x=>x.key===key?{...x,ctx:lc}:x):[...d,{key,kind:'lesson',ctx:lc,title:L.title,sid}]);
    setActive(key); pushRecent({key,kind:'lesson',title:L.title,sub:DS.SUBJECTS[sid].full+' · '+uname,sid}); };
  const wallSections=(wname,anchor)=>{
    const td=state.days[state.todayIdx]||state.days[0];
    const cur=state.current||state.next||(td.lessons[0]);
    const n=((wname||'')+' '+(anchor||'')).toLowerCase();
    let ls=[];
    if(/current/.test(n)) ls=[cur];
    else if(/today/.test(n)) ls=td.lessons.slice(0,5);
    else if(/week/.test(n)){ state.days.forEach(d=>d.lessons.forEach(l=>ls.push(l))); ls=ls.slice(0,6); }
    else if(/subject/.test(n)){ DS.SUBJECT_ORDER.forEach(sid=>{ const l=td.lessons.find(x=>x.subjectId===sid); if(l) ls.push(l); }); }
    else if(/unit/.test(n)){ const seen={}; td.lessons.forEach(l=>{ if(!seen[l.unit]){ seen[l.unit]=1; ls.push(l); } }); }
    else ls=td.lessons.slice(0,4);
    return ls.map(l=>({title:l.title, sid:l.subjectId, unit:l.unit, lesson:l, items:DS.resourcesFor(l)}));
  };
  const openWall=(w)=>{ const key='W:'+w.id; const sections=wallSections(w.name,w.anchor); const sid=sections[0]?sections[0].sid:'reading';
    setDocs(d=> d.find(x=>x.key===key)?d:[...d,{key,kind:'wall',title:w.name,sid,ctx:{wall:w,sections}}]);
    setActive(key); pushRecent({key,kind:'wall',title:w.name,sub:(w.kind||'Wall')+' · '+sections.length+' sections',sid}); };
  const closeDoc=(key)=>{ setDocs(d=>{ const i=d.findIndex(x=>x.key===key); const nd=d.filter(x=>x.key!==key);
    setActive(a=> a===key ? (nd[i-1]?nd[i-1].key:(nd[0]?nd[0].key:'browse')) : a); return nd; }); };
  const openRecent=(r)=>{ if(r.kind==='unit') openUnit({sid:r.sid,uname:r.title}); else if(r.kind==='wall') openWall({id:r.key.slice(2),name:r.title,anchor:''}); else { const L=allLessons.find(l=>l.id===r.key.slice(2)); if(L) openLesson(L); } setRecentOpen(false); };
  const goTeach=(L)=>{ onTeach&&onTeach(L); };
  const goPost=(L)=>{ onPost&&onPost(L); };

  const back=()=>{ if(q){ setQ(''); return; } if(active!=='browse'){ setActive('browse'); return; } onClose(); };
  useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape'){ back(); } }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); });

  const allLessons=[]; state.days.forEach(d=>d.lessons.forEach(l=>allLessons.push({...l}))); 
  const units=[]; DS.SUBJECT_ORDER.forEach(sid=>(DS.ROADMAP[sid]||[]).forEach(([uname,prog],i)=>units.push({sid,uname,prog,no:i+1})));
  const walls=lj('cc_customwalls',[]);
  const cu=DS.catchUp().lessons.filter(l=>l.overdue);

  // ---------- global search ----------
  const sv=q.trim().toLowerCase();
  const results = sv ? {
    lessons: allLessons.filter(l=>(l.title+l.unit+DS.SUBJECTS[l.subjectId].full).toLowerCase().includes(sv)).slice(0,8),
    units: units.filter(u=>(u.uname+DS.SUBJECTS[u.sid].full).toLowerCase().includes(sv)).slice(0,6),
    walls: walls.filter(w=>(w.name||'').toLowerCase().includes(sv)).slice(0,6),
  } : null;

  const activeDoc = docs.find(d=>d.key===active);

  // ===================== BROWSE: LESSON EXPLORER =====================
  function LessonExplorer(){
    let pool = timeScale==='day' ? [state.days[state.todayIdx]] : state.days;
    let rows=[]; pool.forEach(d=>d.lessons.forEach(l=>rows.push({...l, _day:d})));
    if(statusFilter!=='all') rows=rows.filter(l=>l.status===statusFilter);
    // build groups
    let groups=[];
    if(groupBy==='time'){ pool.forEach(d=>{ const ls=rows.filter(l=>l._day.key===d.key).sort((a,b)=>a.periodIdx-b.periodIdx); if(ls.length) groups.push({label:d.name+' · '+d.date, ls}); }); }
    else if(groupBy==='subject'){ DS.SUBJECT_ORDER.forEach(sid=>{ const ls=rows.filter(l=>l.subjectId===sid); if(ls.length) groups.push({label:DS.SUBJECTS[sid].full, ls, sid}); }); }
    else if(groupBy==='unit'){ const seen={}; rows.forEach(l=>{ (seen[l.unit]=seen[l.unit]||[]).push(l); }); Object.keys(seen).forEach(u=>groups.push({label:u, ls:seen[u]})); }
    else { ['now','upcoming','done','idle'].forEach(st=>{ const ls=rows.filter(l=>l.status===st); if(ls.length) groups.push({label:statusMeta(st).label, ls}); }); }
    return <React.Fragment>
      <div className="ph-toolbar">
        <div className="ph-seg">{[['day','Day'],['week','Week'],['month','Month']].map(([k,l])=><button key={k} className={timeScale===k?'on':''} onClick={()=>setTimeScale(k)}>{l}</button>)}</div>
        <Menu label="Group" value={groupBy} options={[['time','Time'],['subject','Subject'],['unit','Unit'],['status','Status']]} onPick={setGroupBy}/>
        <Menu label="Status" value={statusFilter} options={[['all','All'],['now','In class'],['upcoming','Upcoming'],['done','Done'],['idle','Not started']]} onPick={setStatusFilter}/>
      </div>
      {groups.length? groups.map((g,gi)=>(
        <div className="ph-list" key={gi} style={{marginBottom:16, ...(g.sid?{'--gc':cv(DS.SUBJECTS[g.sid].c)}:{})}}>
          <div className="ph-grouphead">{g.sid && <span className="ph-gdot" style={{background:cv(DS.SUBJECTS[g.sid].c)}}/>}{g.label}<span className="meta">{g.ls.length} {DS.label('lesson',g.ls.length!==1).toLowerCase()}</span></div>
          {g.ls.map(l=>{ const s=DS.SUBJECTS[l.subjectId]; return (
            <div className="ph-row" key={l.id} style={{borderLeftColor:cv(s.c),'--rc':cv(s.c)}} onClick={()=>openLesson(l)}>
              <span className="time">{DS.fmt(l.start)}</span>
              <div className="main"><div className="t">{l.title}</div><div className="m"><span className="ph-tag"><span className="d" style={{background:cv(s.c)}}/>{s.label}</span><span className="sep">·</span>{l.unit}</div></div>
              <Badge st={l.status}/>
              <div className="acts">
                <button className="ph-btn ghost sm" onClick={e=>{e.stopPropagation();openLesson(l);}}>Open</button>
                <RowMore items={[{label:'Teach',fn:()=>goTeach(l)},{label:'Resource wall',fn:()=>goPost(l)},{label:'Reschedule'},{label:'Duplicate'},{div:true},{label:'Archive',danger:true}]}/>
              </div>
            </div>
          ); })}
        </div>
      )) : <div className="ph-empty"><div className="ttl">Nothing here</div><div className="ds">No {DS.label('lesson',true).toLowerCase()} match this filter.</div></div>}
    </React.Fragment>;
  }

  // ===================== BROWSE: UNIT EXPLORER =====================
  function UnitExplorer(){
    return <React.Fragment>
      <div className="ph-toolbar">
        <Menu label="Sort" value={unitSort} options={[['sequence','Sequence'],['progress','Progress'],['name','Name']]} onPick={setUnitSort}/>
        <div className="grow"/>
        <span className="ph-tag" style={{color:'var(--ph-text-2)'}}>Color = subject</span>
      </div>
      {DS.SUBJECT_ORDER.map(sid=>{ const s=DS.SUBJECTS[sid]; let us=units.filter(u=>u.sid===sid);
        if(unitSort==='progress') us=[...us].sort((a,b)=>b.prog-a.prog); else if(unitSort==='name') us=[...us].sort((a,b)=>a.uname.localeCompare(b.uname));
        const done=us.filter(u=>u.prog>=1).length; const avg=Math.round(us.reduce((a,u)=>a+u.prog,0)/us.length*100);
        const col=collapsed[sid];
        return <div className="ph-section" key={sid}>
          <button className={'ph-sechead'+(col?' collapsed':'')} onClick={()=>setCollapsed(c=>({...c,[sid]:!c[sid]}))}>
            <span style={{width:16,height:16,display:'grid',placeItems:'center'}} className="chev">{I.chev}</span>
            <span className="d" style={{background:cv(s.c)}}/><span className="nm">{s.full}</span>
            <span className="miniprog"><i style={{width:avg+'%',background:cv(s.c)}}/></span>
            <span className="sub">{done}/{us.length} complete · {avg}%</span>
          </button>
          {!col && <div className="ph-unitgrid">
            {us.map(u=>{ const complete=u.prog>=1, future=u.prog===0;
              return <button key={u.uname} className={'ph-unitcard'+(complete?' complete':'')+(future?' future':'')} style={{'--uc':cv(s.c)}} onClick={()=>openUnit(u)}>
                <div className="ph-unit-top"><span className="ph-unit-no">{DS.label('unit').toUpperCase()} {u.no}</span>{complete?<span style={{marginLeft:'auto',color:'var(--done)',width:15,height:15}}>{I.check}</span>:future?<span style={{marginLeft:'auto'}}><Badge st="idle" label="Not started"/></span>:<span style={{marginLeft:'auto'}}><Badge st="now" label="Current"/></span>}</div>
                <div className="ph-unit-name">{u.uname}</div>
                <div className="ph-unit-prog"><span className="ph-unit-bar"><i style={{width:(u.prog*100)+'%'}}/></span><span className="ph-unit-pct">{Math.round(u.prog*100)}%</span></div>
              </button>; })}
          </div>}
        </div>;
      })}
    </React.Fragment>;
  }

  // ===================== BROWSE: RESOURCES =====================
  function Resources(){
    const items=[
      ...PRESETS.map(p=>({id:'p:'+p,name:p,kind:'Preset',sections:6,count:14,anchor:'Current lesson',shared:false})),
      ...walls.map(w=>({id:w.id,name:w.name,kind:'Custom',sections:w.secCount||(w.isSection?1:3),count:(w.secCount||3)*2,anchor:w.anchor||'Custom',shared:!!w.forkedFrom})),
    ];
    let fil=items;
    if(resFilter==='preset') fil=items.filter(i=>i.kind==='Preset');
    else if(resFilter==='custom') fil=items.filter(i=>i.kind==='Custom');
    else if(resFilter==='shared') fil=items.filter(i=>i.shared);
    return <React.Fragment>
      <div className="ph-toolbar">
        <div className="ph-chips">{[['all','All'],['preset','Presets'],['custom','Custom'],['shared','Shared']].map(([k,l])=><button key={k} className="ph-chip" style={resFilter===k?{background:'var(--accent-50)',color:'var(--accent)'}:undefined} onClick={()=>setResFilter(k)}>{l}</button>)}</div>
        <div className="grow"/>
        <div className="ph-seg">
          <button className={resLayout==='grid'?'on':''} title="Grid" onClick={()=>setResLayout('grid')}>{I.grid}</button>
          <button className={resLayout==='list'?'on':''} title="List" onClick={()=>setResLayout('list')}>{I.list}</button>
        </div>
      </div>
      <div className={'ph-wallgrid'+(resLayout==='list'?' list':'')}>
        {fil.map((w,i)=>(<button key={w.id} className="ph-wall" style={{'--wc':cv(WALLC[i%WALLC.length])}} onClick={()=>openWall(w)}>
          <span className="ph-wallprev"><span className="mini"/><span className="mini"/><span className="mini"/><span className="ph-wallprevname">{w.name}</span></span>
          <span className="ph-wallbody">
            <span className="ph-wallkind">{w.kind} · {w.anchor}</span>
            <span className="ph-wallmeta">{w.sections} sections · {w.count} resources{w.shared?' · Shared':''}</span>
          </span>
        </button>))}
      </div>
    </React.Fragment>;
  }

  // ===================== BROWSE: CATCH-UP =====================
  function CatchUp(){
    const bulkIds=Object.keys(bulk).filter(k=>bulk[k]);
    // window = how far the catch-up net is cast; group = how rows are clustered
    const cap={day:5,week:12,'2w':20,month:cu.length,unit:cu.length,subject:cu.length}[cuWindow]||cu.length;
    const list=cu.slice(0,cap);
    let groups=[];
    if(cuGroup==='unit'){ const seen={}; list.forEach(l=>{ (seen[l.unit]=seen[l.unit]||[]).push(l); }); Object.keys(seen).forEach(u=>{ const sid=seen[u][0].subjectId; groups.push({key:u,label:u,sub:DS.SUBJECTS[sid].label,dot:DS.SUBJECTS[sid].c,ls:seen[u]}); }); }
    else { DS.SUBJECT_ORDER.forEach(sid=>{ const ls=list.filter(l=>l.subjectId===sid); if(ls.length) groups.push({key:sid,label:DS.SUBJECTS[sid].full,dot:DS.SUBJECTS[sid].c,ls}); }); }
    return <React.Fragment>
      <div className="ph-toolbar">
        <div className="ph-seg">{[['day','Day'],['week','Week'],['2w','2 weeks'],['month','Month']].map(([k,l])=><button key={k} className={cuWindow===k?'on':''} onClick={()=>setCuWindow(k)}>{l}</button>)}</div>
        <Menu label="Group" value={cuGroup} options={[['subject','Subject'],['unit','Unit']]} onPick={setCuGroup}/>
        <div className="grow"/>
        <span className="ph-tag" style={{color:'var(--ph-text-2)'}}>{list.length} behind · {cu.length} total</span>
      </div>
      {bulkIds.length>0 && <div className="ph-bulk"><span className="n">{bulkIds.length} selected</span>
        <button className="ph-btn ghost sm">Reschedule</button><button className="ph-btn ghost sm">Move to next week</button><button className="ph-btn ghost sm">Mark complete</button>
        <button className="ph-btn ghost sm" onClick={()=>setBulk({})}>Clear</button></div>}
      {groups.length? groups.map(g=>(
        <div className="ph-list" key={g.key} style={{marginBottom:16, '--gc': cv(g.dot)}}>
          <div className="ph-grouphead"><span className="d" style={{width:9,height:9,borderRadius:'50%',background:cv(g.dot)}}/>{g.label}{g.sub?<span className="ph-tag" style={{marginLeft:2}}>{g.sub}</span>:null}<span className="meta">{g.ls.length} behind</span></div>
          {g.ls.map((l,i)=>(
            <div className={'ph-row keepacts'+(bulk[l.id]?' sel':'')} key={l.id} style={{borderLeftColor:cv(DS.SUBJECTS[l.subjectId].c)}}>
              <input type="checkbox" className="ck" checked={!!bulk[l.id]} onClick={e=>e.stopPropagation()} onChange={e=>setBulk(b=>({...b,[l.id]:e.target.checked}))}/>
              <div className="main" onClick={()=>openLesson(l)} style={{cursor:'pointer'}}>
                <div className="t">{l.title}</div>
                <div className="m">{cuGroup==='unit'?<span className="ph-tag"><span className="d" style={{background:cv(DS.SUBJECTS[l.subjectId].c)}}/>{DS.SUBJECTS[l.subjectId].label}</span>:l.unit}<span className="sep">·</span><span style={{color:'var(--danger)',fontWeight:600}}>{l.reason||'Behind schedule'}</span>{i===0&&<React.Fragment><span className="sep">·</span>Blocks next {DS.label('lesson').toLowerCase()}</React.Fragment>}</div>
              </div>
              <div className="acts">
                <button className="ph-btn ghost sm">Reschedule</button>
                <button className="ph-btn ghost sm" onClick={e=>{e.stopPropagation();setBulk(b=>({...b,[l.id]:false}));}}>Mark complete</button>
                <RowMore items={[{label:'Open in planner',fn:()=>openLesson(l)},{label:'Teach',fn:()=>goTeach(l)},{label:'Move to next week'}]}/>
              </div>
            </div>
          ))}
        </div>
      )) : <div className="ph-empty"><div className="ttl">All caught up</div><div className="ds">No {DS.label('lesson',true).toLowerCase()} are behind schedule.</div></div>}
    </React.Fragment>;
  }

  // ---------- browse page wrapper ----------
  const AREAS=[['lessons',DS.label('lesson',true)],['units',DS.label('unit',true)],['resources','Resources'],['catchup','Catch-Up']];
  const pageMeta={
    lessons:{title:DS.label('lesson',true),sub:'Browse, plan and schedule your '+DS.label('lesson',true).toLowerCase()+'.',action:'New '+DS.label('lesson').toLowerCase()},
    units:{title:DS.label('unit',true),sub:'Your curriculum sequence and progress, by subject.',action:'New '+DS.label('unit').toLowerCase()},
    resources:{title:'Resources',sub:'Your Resource Walls — preset and custom collections.',action:'New wall'},
    catchup:{title:'Catch-Up',sub:'Lessons behind schedule, prioritised by urgency.',action:null},
  }[area];

  const browse = (
    <div className="ph-page">
      <div className="ph-pagehead">
      <div className="ph-crumb"><button onClick={()=>setArea('lessons')}>Planner</button><span className="sep">/</span><span className="cur">{pageMeta.title}</span></div>
      <div className="ph-titlerow">
        <div className="ph-title">{pageMeta.title}</div>
        {pageMeta.action && <button className="ph-btn primary" onClick={()=>{ if(area==='resources') goPost(); else setToast(pageMeta.action+' — coming soon'); }}>{I.plus}{pageMeta.action}</button>}
      </div>
      <div className="ph-sub">{pageMeta.sub}</div>
      <div className="ph-nav">
        {AREAS.map(([k,l])=>(<button key={k} className={'ph-navitem'+(area===k?' on':'')} onClick={()=>setArea(k)}>{l}{k==='catchup'&&cu.length?<span className="ph-navbadge">{cu.length}</span>:null}</button>))}
      </div>
      </div>
      {area==='lessons'&&<LessonExplorer/>}
      {area==='units'&&<UnitExplorer/>}
      {area==='resources'&&<Resources/>}
      {area==='catchup'&&<CatchUp/>}
    </div>
  );

  const searchView = results && (
    <div className="ph-page">
      <div className="ph-title" style={{fontSize:22,marginBottom:18}}>Results for “{q}”</div>
      {results.lessons.length>0 && <React.Fragment><div className="ph-srhead">{DS.label('lesson',true)}</div><div className="ph-list" style={{marginBottom:16}}>
        {results.lessons.map(l=>{ const s=DS.SUBJECTS[l.subjectId]; return <div className="ph-row" key={l.id} style={{borderLeftColor:cv(s.c),'--rc':cv(s.c)}} onClick={()=>{openLesson(l);setQ('');}}><div className="main"><div className="t">{l.title}</div><div className="m">{s.full}<span className="sep">·</span>{l.unit}</div></div><div className="acts"><button className="ph-btn ghost sm">Open</button></div></div>; })}
      </div></React.Fragment>}
      {results.units.length>0 && <React.Fragment><div className="ph-srhead">{DS.label('unit',true)}</div><div className="ph-list" style={{marginBottom:16}}>
        {results.units.map(u=>{ const s=DS.SUBJECTS[u.sid]; return <div className="ph-row" key={u.uname} style={{borderLeftColor:cv(s.c),'--rc':cv(s.c)}} onClick={()=>{openUnit(u);setQ('');}}><div className="main"><div className="t">{u.uname}</div><div className="m">{s.full}<span className="sep">·</span>{Math.round(u.prog*100)}%</div></div><div className="acts"><button className="ph-btn ghost sm">Open</button></div></div>; })}
      </div></React.Fragment>}
      {results.walls.length>0 && <React.Fragment><div className="ph-srhead">Walls</div><div className="ph-list">
        {results.walls.map(w=><div className="ph-row" key={w.id} onClick={()=>goPost()}><div className="main"><div className="t">{w.name}</div></div></div>)}
      </div></React.Fragment>}
      {!results.lessons.length&&!results.units.length&&!results.walls.length && <div className="ph-empty"><div className="ttl">No matches</div><div className="ds">Nothing found for “{q}”.</div></div>}
    </div>
  );

  return (
    <div className="ph-root" data-frame={appr.frame} data-theme={appr.theme} data-bg={appr.bg} data-glass={appr.glass||'dark'} data-dim={appr.dim||'normal'} data-motion={appr.motion||'fade-zoom'} data-tone={tone}>
      {appr.bg==='photo' ? <div className="ph-bg ph-photo" style={{backgroundImage:`url('${appr.photo||'photos/p3.png'}')`}}/> : <div className={'ph-bg ambient on drift t-'+appr.theme}/>}
      <div className="ph-veil"/>
      <div className="ph-shell">
      {/* GLOBAL top bar */}
      <div className="ph-top">
        <button className="ph-iconbtn ph-back" title="Back" onClick={back}>{I.back}</button>
        <button className="ph-ident" onClick={()=>{setActive('browse');setArea('lessons');}}>
          <span className="ph-glyph">{I.glyph}</span><span className="ph-wordmark">Planner</span>
        </button>
        <Appearance appr={appr} setAppr={setAppr} reset={()=>setAppr(readApp())}/>
        <div className="ph-spacer"/>
        <div className="ph-search collapsible">{I.search}<input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search lessons, units, walls…"/>{q&&<button className="ph-clear" onClick={()=>setQ('')}>×</button>}</div>
        <div className="ph-modesw ph-modesw-icon"><button className={'ph-modesw-ib'+(mode==='personal'?' on':'')} title="Personal — your own copy; edits affect only you" onClick={()=>setMode('personal')}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.1" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5.5 19.5a6.5 6.5 0 0 1 13 0"/></svg></button><button className={'ph-modesw-ib team'+(mode==='team'?' on':'')} title="Team Curriculum — the shared master plan; changes affect everyone" onClick={()=>setMode('team')}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="7.5" r="2.9"/><path d="M7.6 18.5a4.4 4.4 0 0 1 8.8 0"/><circle cx="5" cy="9.5" r="2"/><path d="M1.8 17.8a3.2 3.2 0 0 1 3.2-2.3"/><circle cx="19" cy="9.5" r="2"/><path d="M22.2 17.8a3.2 3.2 0 0 0-3.2-2.3"/></svg></button></div>
        <span className={'ph-saved'+(save==='saving'?' saving':'')}>{save==='saving'?null:I.check}{save==='saving'?'Saving…':'Saved just now'}</span>
        <span className="ph-recent">
          <button className="ph-iconbtn" title="Recent" onClick={()=>setRecentOpen(o=>!o)}>{I.clock}</button>
          {recentOpen && <div className="ph-recentpop" onMouseLeave={()=>setRecentOpen(false)}>
            <div className="h">Recently opened</div>
            {recents.length? recents.map(r=>{ const s=DS.SUBJECTS[r.sid]; return <button key={r.key} className="ph-recentrow" onClick={()=>openRecent(r)}><span className="rail" style={{background:cv(s.c)}}/><span><b>{r.title}</b><span>{r.sub}</span></span></button>; }) : <div className="ph-recent-empty">Nothing opened yet.</div>}
          </div>}
        </span>
      </div>

      {/* document tabs */}
      {docs.length>0 && <div className="ph-doctabs">
        <button className={'ph-doctab home'+(active==='browse'?' on':'')} title="Back to your lists — lessons, units, resources, catch-up" onClick={()=>setActive('browse')}><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg></button>
        {docs.map(d=>{ const s=DS.SUBJECTS[d.sid]; return <button key={d.key} className={'ph-doctab'+(active===d.key?' on':'')} onClick={()=>setActive(d.key)}>
          <span className="rail" style={{background:cv(s.c)}}/><span className="nm">{d.title}</span>
          <span className="x" onClick={e=>{e.stopPropagation();closeDoc(d.key);}}>{I.x}</span>
        </button>; })}
        <button className="ph-doctab-add" title="Open another lesson, unit or wall" onClick={()=>{setActive('browse');setArea('lessons');}}>{I.plus}</button>
      </div>}

      {/* main scroll */}
      <div className="ph-scroll">
        {q ? searchView : activeDoc
          ? (activeDoc.kind==='lesson'
              ? <window.HubPlanner.Lesson ctx={activeDoc.ctx} markEdited={markEdited} onTeach={goTeach} onPost={goPost} onOpenUnit={(c)=>openUnit({sid:c.sid,uname:c.uname,prog:c.prog})} onOpenLesson={openLesson}/>
              : activeDoc.kind==='wall'
              ? <window.HubPlanner.Wall ctx={activeDoc.ctx} onPost={goPost} onTeach={goTeach} setToast={setToast}/>
              : <window.HubPlanner.Unit ctx={activeDoc.ctx} markEdited={markEdited} onTeach={goTeach} onPost={goPost} onOpenLesson={(l,c)=>openLesson(l,c)}/>)
          : browse}
      </div>
      </div>{/* /ph-shell */}

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

function Toast({msg,onDone}){ useEffect(()=>{ const t=setTimeout(onDone,1900); return ()=>clearTimeout(t); },[]);
  return <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:60,background:'var(--ink)',color:'#fff',padding:'11px 20px',borderRadius:'var(--r-pill)',fontSize:13,fontWeight:600,boxShadow:'var(--sh-lg)'}}>{msg}</div>; }

window.PlannerHub = PlannerHub;
})();

</script>
<script type="text/babel" data-src="tools-dock.jsx">
/* Tools Dock — right-side dock (overlay) opened from the Tools menu. Tabbed,
   resizable, pop-out to float. Houses Shout Box (team chat), To-Do, Notes.
   window.ToolsDock({ tool, onTool, onClose, mode }) — tool = active tool key or null */
(function(){
const { useState, useEffect, useRef } = React;
const cv=(x)=>`var(${x})`;
const DS=window.DS;

const TOOLS=[
  ['shout','Shout Box'],
  ['todo','To-Do'],
  ['notes','Notes'],
];
const load=(k,f)=>{ try{ return JSON.parse(localStorage.getItem(k)||JSON.stringify(f)); }catch(e){ return f; } };
const save=(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };

function ShoutBox({ mode }){
  const [msgs,setMsgs]=useState(()=>load('cc_shout',[
    {who:'Sara K.',text:'Anyone have the inference anchor chart?',t:'9:02'},
    {who:'Omar R.',text:'Posted it to the Reading wall @Tim',t:'9:05'},
  ]));
  const [v,setV]=useState('');
  const endRef=useRef(null);
  useEffect(()=>{ endRef.current&&endRef.current.scrollIntoView&&endRef.current.scrollIntoView({block:'end'}); },[msgs]);
  const send=()=>{ if(!v.trim())return; const m=[...msgs,{who:'Tim',text:v,t:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}]; setMsgs(m); save('cc_shout',m); setV(''); };
  return (
    <div className="td-shout">
      <div className="td-chatscroll">
        {msgs.map((m,i)=>(
          <div key={i} className={'td-msg'+(m.who==='Tim'?' me':'')}>
            <span className="td-msgwho">{m.who}<span className="td-msgt">{m.t}</span></span>
            <span className="td-msgbody" dangerouslySetInnerHTML={{__html:m.text.replace(/@(\w+)/g,'<b>@$1</b>')}}/>
          </div>
        ))}
        <div ref={endRef}/>
      </div>
      <div className="td-chatbar">
        <input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter')send(); }} placeholder="Message your team… @name to mention"/>
        <button onClick={send}>Send</button>
      </div>
    </div>
  );
}

/* ===== Notifications store + scheduler (local; Phase-1B realtime-ready) ===== */
const N_TEAM=['Tim Mills','Sara K.','Omar R.','Lena P.'];
const N_ME='Tim Mills';
const N_TYPE={
  message:{c:'var(--brand-500)', label:'Message'},
  todo:{c:'#D9A441', label:'To-do'},
  overdue:{c:'#E0564B', label:'Overdue'},
  team:{c:'#D9568B', label:'Team curriculum'},
};
function nInitials(n){ return (n||'?').split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase(); }
function nAvatarColor(n){ let h=0; for(const ch of (n||'')) h=(h*31+ch.charCodeAt(0))%360; return 'hsl('+h+' 48% 52%)'; }
function nRel(ts){ const d=(Date.now()-ts)/1000; if(d<60)return 'just now'; if(d<3600)return Math.floor(d/60)+'m ago'; if(d<86400)return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; }
function nDue(due){ if(!due)return null; const ms=due-Date.now(), day=86400000; if(ms<0){ const o=Math.ceil(-ms/day); return {cls:'over',label:o<=1?'Overdue':o+'d overdue'}; } if(ms<3600000)return {cls:'soon',label:'Due in '+Math.max(1,Math.round(ms/60000))+'m'}; if(ms<day)return {cls:'soon',label:'Due in '+Math.round(ms/3600000)+'h'}; const d=Math.round(ms/day); return {cls:'up',label:'Due in '+d+'d'}; }

const NotifStore=(()=>{
  let list=load('cc_notifs',null);
  if(!Array.isArray(list)){ const now=Date.now();
    list=[
      {id:'n1',type:'message',title:'Sara K. messaged you',meta:'"Anyone have the inference anchor chart?"',who:'Sara K.',ref:{tool:'shout'},ts:now-1000*60*4,read:false},
      {id:'n2',type:'team',title:'Omar R. edited the team plan',meta:'Reading · Theme & Inference',who:'Omar R.',ref:{view:'Week'},ts:now-1000*60*52,read:false},
      {id:'n3',type:'todo',title:'Exit tickets for Math',meta:'Due in 1h · assigned to you',ref:{tool:'todo'},ts:now-1000*60*120,read:true},
    ];
    save('cc_notifs',list);
  }
  const subs=new Set();
  const emit=()=>{ save('cc_notifs',list); subs.forEach(f=>{try{f();}catch(e){}}); };
  return {
    all:()=>list,
    unread:()=>list.filter(n=>!n.read),
    sub:(f)=>{ subs.add(f); return ()=>subs.delete(f); },
    add:(n)=>{ const item={id:'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),ts:Date.now(),read:false,...n}; list=[item,...list]; emit(); try{ window.dispatchEvent(new CustomEvent('cc-toast',{detail:item})); }catch(e){} return item; },
    markRead:(id)=>{ list=list.map(n=>n.id===id?{...n,read:true}:n); emit(); },
    markAll:()=>{ list=list.map(n=>({...n,read:true})); emit(); },
    remove:(id)=>{ list=list.filter(n=>n.id!==id); emit(); },
  };
})();
window.NotifStore=NotifStore;
function useNotifs(){ const [,bump]=useState(0); useEffect(()=>NotifStore.sub(()=>bump(x=>x+1)),[]); return NotifStore; }

/* scheduler: promote due-soon / overdue personal tasks into notifications */
function nRunScheduler(){
  const todos=load('cc_todo',[]); const fired=load('cc_todo_notified',{}); let changed=false;
  todos.forEach(t=>{
    if(t.done||!t.due) return;
    const di=nDue(t.due); if(!di||di.cls==='up') return;
    const mine=(t.assignee?t.assignee===N_ME:t.who==='me');
    if(!mine) return;
    const key=t.id+':'+di.cls;
    if(!fired[key]){ NotifStore.add({type:di.cls==='over'?'overdue':'todo', title:t.text, meta:di.label+(t.assignee?' · '+t.assignee:''), ref:{tool:'todo'}}); fired[key]=1; changed=true; }
  });
  if(changed) save('cc_todo_notified',fired);
}
try{ setTimeout(nRunScheduler,1800); setInterval(nRunScheduler,60000); }catch(e){}

/* ===== Enriched To-Do ===== */
const PRIO={ high:{c:'#E0564B',l:'High'}, med:{c:'#D9A441',l:'Med'}, low:{c:'#7C8089',l:'Low'} };
function Todo(){
  const [items,setItems]=useState(()=>load('cc_todo',[
    {id:1,text:'Copy exit tickets for Math',done:false,who:'me',tag:'Math',assignee:'Tim Mills',due:Date.now()+1000*60*60,priority:'high'},
    {id:2,text:'Share inference slides with team',done:false,who:'team',tag:'Reading',assignee:'Sara K.',due:Date.now()+1000*60*60*26,priority:'med'},
  ]));
  const [v,setV]=useState(''); const [filter,setFilter]=useState('mine');
  const [assignee,setAssignee]=useState(N_ME); const [due,setDue]=useState(''); const [prio,setPrio]=useState('med');
  const [showAdv,setShowAdv]=useState(false);
  const persist=(n)=>{ setItems(n); save('cc_todo',n); };
  const add=()=>{ if(!v.trim())return; const tagm=v.match(/#(\w+)/); const dueMs=due?new Date(due).getTime():null;
    const it={id:Date.now(),text:v.replace(/#\w+/,'').trim(),done:false,who:assignee===N_ME?'me':'team',tag:tagm?tagm[1]:'',assignee,due:dueMs,priority:prio,status:'open'};
    persist([it,...items]); setV(''); setDue('');
    if(assignee!==N_ME) NotifStore.add({type:'todo',title:it.text,meta:'Assigned to '+assignee+(dueMs?' · '+(nDue(dueMs)||{}).label:''),who:N_ME,ref:{tool:'todo'}});
  };
  const toggle=(id)=>persist(items.map(x=>x.id===id?{...x,done:!x.done,status:!x.done?'done':'open'}:x));
  const rank=(t)=>{ if(t.done)return 9e15; const d=nDue(t.due); if(d&&d.cls==='over')return -1e15+(t.due||0); if(d&&d.cls==='soon')return -1e14+(t.due||0); return t.due||8e14; };
  const shown=items.filter(t=>filter==='all'?true:(t.assignee?t.assignee===N_ME:t.who==='me')).slice().sort((a,b)=>rank(a)-rank(b));
  return (
    <div className="td-todo">
      <div className="td-todoadd">
        <div className="td-whoseg">{[['mine','Mine'],['all','Everyone']].map(([k,l])=><button key={k} className={filter===k?'on':''} onClick={()=>setFilter(k)}>{l}</button>)}</div>
        <div className="td-addrow"><input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter')add(); }} onFocus={()=>setShowAdv(true)} placeholder="New task… #tag a lesson"/><button onClick={add}>+</button></div>
        {showAdv && <div className="td-addmeta">
          <label className="td-mf"><span>Who</span><select value={assignee} onChange={e=>setAssignee(e.target.value)}>{N_TEAM.map(n=><option key={n} value={n}>{n===N_ME?'Me':n}</option>)}</select></label>
          <label className="td-mf"><span>Due</span><input type="datetime-local" value={due} onChange={e=>setDue(e.target.value)} /></label>
          <label className="td-mf"><span>Priority</span><select value={prio} onChange={e=>setPrio(e.target.value)}>{Object.keys(PRIO).map(p=><option key={p} value={p}>{PRIO[p].l}</option>)}</select></label>
        </div>}
      </div>
      <div className="td-todolist">
        {shown.length===0 && <div className="td-todoempty">No tasks{filter==='mine'?' assigned to you':''}.</div>}
        {shown.map(it=>{ const di=nDue(it.due); const pr=PRIO[it.priority||'med'];
          return (
          <div key={it.id} className={'td-todoitem'+(it.done?' done':'')}>
            <button className="td-check" onClick={()=>toggle(it.id)}>{it.done?'✓':''}</button>
            <div className="td-titem">
              <div className="td-tirow"><span className="td-todotext">{it.text}{it.tag&&<span className="td-tag">#{it.tag}</span>}</span></div>
              <div className="td-timeta">
                {it.assignee && <span className="td-tav" title={it.assignee} style={{background:nAvatarColor(it.assignee)}}>{nInitials(it.assignee)}</span>}
                {di && <span className={'td-due '+di.cls}>{di.label}</span>}
                {!it.done && <span className="td-prio" style={{color:pr.c}}>● {pr.l}</span>}
              </div>
            </div>
            <button className="td-todox" onClick={()=>persist(items.filter(x=>x.id!==it.id))}>×</button>
          </div>
        ); })}
      </div>
    </div>
  );
}

function Notes(){
  const [text,setText]=useState(()=>load('cc_quicknotes',''));
  return <textarea className="td-notes" value={text} onChange={e=>{ setText(e.target.value); save('cc_quicknotes',e.target.value); }} placeholder="Quick notes — autosaved…"/>;
}

function NotifRow({ n, onNav }){
  const ty=N_TYPE[n.type]||N_TYPE.message;
  return (
    <div className={'nc-row'+(n.read?'':' unread')} onClick={()=>onNav(n)}>
      <span className="nc-rail" style={{background:ty.c}} />
      {n.who ? <span className="nc-av" style={{background:nAvatarColor(n.who)}}>{nInitials(n.who)}</span>
             : <span className="nc-ic" style={{color:ty.c,background:'color-mix(in oklab,'+ty.c+' 16%,transparent)'}}>{n.type==='overdue'?'!':(n.type==='todo'?'◷':'◆')}</span>}
      <div className="nc-body">
        <div className="nc-title">{n.title}</div>
        {n.meta && <div className="nc-meta">{n.meta}</div>}
        <div className="nc-time">{nRel(n.ts)}</div>
      </div>
      {!n.read && <span className="nc-dot" />}
    </div>
  );
}
function NotifBell(){
  const store=useNotifs();
  const [open,setOpen]=useState(false); const [chip,setChip]=useState('all');
  const ref=useRef(null);
  useEffect(()=>{ if(!open)return; const h=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }; document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h); },[open]);
  const all=store.all(); const unread=all.filter(n=>!n.read).length;
  const nav=(n)=>{ store.markRead(n.id); setOpen(false); try{ window.dispatchEvent(new CustomEvent('cc-notif-nav',{detail:n.ref||{}})); }catch(e){} };
  const filt=all.filter(n=> chip==='all'?true : chip==='message'?n.type==='message' : chip==='todo'?(n.type==='todo'||n.type==='overdue') : n.type==='team');
  const today=filt.filter(n=>Date.now()-n.ts<86400000), earlier=filt.filter(n=>Date.now()-n.ts>=86400000);
  return (
    <span className="nc-wrap" ref={ref}>
      <button className="iconbtn nc-bell" title="Notifications — messages, to-dos & team-plan changes" onClick={()=>setOpen(o=>!o)}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        {unread>0 && <span className="nc-badge">{unread>9?'9+':unread}</span>}
      </button>
      {open && <div className="nc-pop">
        <div className="nc-head"><span className="nc-h">Notifications</span><button className="nc-markall" onClick={()=>store.markAll()} disabled={!unread}>Mark all read</button></div>
        <div className="nc-chips">{[['all','All'],['message','Messages'],['todo','To-dos'],['team','Team']].map(([k,l])=><button key={k} className={chip===k?'on':''} onClick={()=>setChip(k)}>{l}</button>)}</div>
        <div className="nc-list">
          {filt.length===0 && <div className="nc-empty">You're all caught up.</div>}
          {today.length>0 && <div className="nc-grp">Today</div>}
          {today.map(n=><NotifRow key={n.id} n={n} onNav={nav} />)}
          {earlier.length>0 && <div className="nc-grp">Earlier</div>}
          {earlier.map(n=><NotifRow key={n.id} n={n} onNav={nav} />)}
        </div>
      </div>}
    </span>
  );
}
window.NotifBell=NotifBell;

function Toasts(){
  const [toasts,setToasts]=useState([]);
  useEffect(()=>{ const h=(e)=>{ const n=e.detail; setToasts(t=>[...t,n].slice(-3)); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==n.id)),6000); }; window.addEventListener('cc-toast',h); return ()=>window.removeEventListener('cc-toast',h); },[]);
  const dismiss=(id)=>setToasts(t=>t.filter(x=>x.id!==id));
  const nav=(n)=>{ dismiss(n.id); try{ window.NotifStore.markRead(n.id); window.dispatchEvent(new CustomEvent('cc-notif-nav',{detail:n.ref||{}})); }catch(e){} };
  if(!toasts.length) return null;
  return ReactDOM.createPortal(
    <div className="toast-wrap">
      {toasts.map(n=>{ const ty=N_TYPE[n.type]||N_TYPE.message; const act=n.type==='message'?'Reply':(n.type==='team'?'Open':'View');
        return (
        <div key={n.id} className="toast" onClick={()=>nav(n)}>
          <span className="toast-rail" style={{background:ty.c}} />
          {n.who ? <span className="toast-av" style={{background:nAvatarColor(n.who)}}>{nInitials(n.who)}</span>
                 : <span className="toast-ic" style={{color:ty.c,background:'color-mix(in oklab,'+ty.c+' 16%,transparent)'}}>{n.type==='overdue'?'!':'◷'}</span>}
          <div className="toast-body"><div className="toast-title">{n.title}</div>{n.meta&&<div className="toast-meta">{n.meta}</div>}</div>
          <button className="toast-act" onClick={(e)=>{e.stopPropagation();nav(n);}}>{act}</button>
          <button className="toast-x" onClick={(e)=>{e.stopPropagation();dismiss(n.id);}}>×</button>
        </div>
      ); })}
    </div>, document.body);
}
window.Toasts=Toasts;

const RENDER={ shout:<ShoutBox/>, todo:<Todo/>, notes:<Notes/> };

(function(){ try{ if(!localStorage.getItem('cc_dockm2')){ localStorage.setItem('cc_dockm2','1'); localStorage.setItem('cc_dockmode','float'); localStorage.setItem('cc_dockw','340'); localStorage.setItem('cc_dockh','380'); localStorage.removeItem('cc_dockpos'); } }catch(e){} })();
function ToolsDock({ tool, onTool, onClose }){
  const [mode,setMode]=useState(()=>{ const m=load('cc_dockmode','float'); return m==='rail'?'rail':'float'; });
  const [w,setW]=useState(()=>load('cc_dockw',340));
  const [h,setH]=useState(()=>load('cc_dockh',380));
  const [pos,setPos]=useState(()=>load('cc_dockpos',{x:Math.max(20,window.innerWidth-372),y:72}));
  const [railPos,setRailPos]=useState(()=>load('cc_dockrailpos',{x:window.innerWidth-70,y:74}));
  const [railDir,setRailDir]=useState(()=>load('cc_dockraildir','v'));
  const dragRef=useRef(null);
  useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape'&&tool) onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); },[tool,onClose]);
  if(!tool) return null;
  const rail=mode==='rail', floating=!rail;
  const setModeP=(m)=>{ setMode(m); save('cc_dockmode',m); };
  const toggleRailDir=()=>{ setRailDir(d=>{ const nd=d==='v'?'h':'v'; save('cc_dockraildir',nd); return nd; }); };
  const startRailMove=(e)=>{ e.preventDefault(); const ox=e.clientX-railPos.x, oy=e.clientY-railPos.y; let last=railPos; const mv=(ev)=>{ last={x:Math.max(6,Math.min(window.innerWidth-60,ev.clientX-ox)),y:Math.max(56,Math.min(window.innerHeight-60,ev.clientY-oy))}; setRailPos(last); }; const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); save('cc_dockrailpos',last); }; document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); };
  const startResize=(e,dir)=>{ e.preventDefault(); e.stopPropagation(); const sx=e.clientX,sy=e.clientY,sw=w,sh=h;
    const mv=(ev)=>{ const nw=Math.max(300,Math.min(680, sw+(floating?(ev.clientX-sx):(sx-ev.clientX)))); setW(nw); save('cc_dockw',nw); if(dir==='wh'){ const nh=Math.max(360,Math.min(window.innerHeight-70, sh+(ev.clientY-sy))); setH(nh); save('cc_dockh',nh);} };
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}; document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); };
  const startMove=(e)=>{ if(!floating||e.target.closest('button'))return; dragRef.current={x:e.clientX-pos.x,y:e.clientY-pos.y}; let last=pos;
    const mv=(ev)=>{ last={x:Math.max(6,Math.min(window.innerWidth-90,ev.clientX-dragRef.current.x)),y:Math.max(58,Math.min(window.innerHeight-70,ev.clientY-dragRef.current.y))}; setPos(last); };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); save('cc_dockpos',last); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); };

  if(rail) return (
    <div className={'td-dock td-rail td-rail-'+railDir} style={{left:railPos.x,top:railPos.y,right:'auto'}}>
      <button className="td-railgrip" title="Drag to move" onMouseDown={startRailMove}>{railDir==='v'?'⋮':'⋯'}</button>
      {TOOLS.map(([k,l])=><button key={k} className={'td-railbtn'+(tool===k?' on':'')} title={l} onClick={()=>{ onTool(k); setModeP('float'); }}><span className="td-railg">{l[0]}</span></button>)}
      <div className="td-railsp"/>
      <button className="td-railbtn td-railact" title={railDir==='v'?'Make horizontal':'Make vertical'} onClick={toggleRailDir}>{railDir==='v'?'↔':'↕'}</button>
      <button className="td-railbtn td-railact" title="Open" onClick={()=>setModeP('float')}>{'‹'}</button>
      <button className="td-railbtn td-railact" title="Close (Esc)" onClick={onClose}>{'×'}</button>
    </div>
  );

  return (
    <div className={'td-dock'+(floating?' floating':'')} style={floating?{left:pos.x,top:pos.y,width:w,height:h}:{width:w}}>
      {!floating && <div className="td-resizer" onMouseDown={(e)=>startResize(e,'w')}/>}
      <div className="td-head" onMouseDown={startMove} style={floating?{cursor:'grab'}:undefined}>
        <span className="td-title">Tools</span>
        <div className="td-tabs">
          {TOOLS.map(([k,l])=>{ let badge=0; if(k==='todo'){ try{ badge=(load('cc_todo',[])||[]).filter(t=>!t.done&&t.due&&(t.assignee?t.assignee===N_ME:t.who==='me')&&(t.due-Date.now())<86400000).length; }catch(e){} } return <button key={k} className={'td-tab'+(tool===k?' on':'')} title={l} onClick={()=>{ onTool(k); save('cc_docktab',k); }}><span className="td-tabg">{l[0]}</span><span className="td-tablbl">{l}</span>{badge>0 && <span className="td-tabbadge">{badge}</span>}</button>; })}
        </div>
        <div className="td-headacts">
          <button title="Collapse to rail" onClick={()=>{ const rp=floating?{x:Math.max(6,Math.min(window.innerWidth-60,pos.x)),y:Math.max(56,pos.y)}:{x:window.innerWidth-70,y:74}; setRailPos(rp); save('cc_dockrailpos',rp); setModeP('rail'); }}>{'–'}</button>
          <button title="Close (Esc)" onClick={onClose}>{'×'}</button>
        </div>
      </div>
      <div className="td-content">{RENDER[tool]}</div>
      {floating && <div className="td-resizecorner" onMouseDown={(e)=>startResize(e,'wh')} title="Drag to resize"/>}
    </div>
  );
}
window.ToolsDock = ToolsDock;
})();

</script>
<script type="text/babel" data-src="lesson-library.jsx">
/* Lesson Library / Scheduler — organize lessons by day · week(mixed) · week(subject)
   · month(calendar) · unit · all. Per-lesson: Done + Plan/Wall/Teach + ⋮ (reschedule,
   bump, stack, delete). Buckets: Not-yet-taught (unscheduled) + Catch-Up (past, not done).
   Subject-sequence numbering. + Add (lesson/unit/subject). Print dialog.
   window.LessonLibrary({ state, onPlan, onPost, onTeach, embedded, onClose }) */
(function(){
const { useState, useMemo, useEffect } = React;
const cv=(x)=>`var(${x})`;
const DS=window.DS;
const DAYMS=86400000;
const iso=(d)=>d.toISOString().slice(0,10);
const fmtD=(s)=> s? new Date(s+'T00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'Unscheduled';
const wkOf=(d)=>{ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; };

const I={
  done:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 6"/></svg>,
  plan:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M16 3v5h5"/></svg>,
  wall:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h5"/></svg>,
  teach:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>,
  dots:<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  print:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V3h12v6M6 18H4v-6h16v6h-2M8 14h8v6H8z"/></svg>,
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
  expand:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>,
};

const TITLES=['Introduce & Explore','Model the Strategy','Guided Practice','Apply Independently'];
function genLessons(){
  const out=[]; const base=new Date(); base.setHours(0,0,0,0); base.setDate(base.getDate()-18);
  DS.SUBJECT_ORDER.forEach(sid=>{
    const units=DS.ROADMAP[sid]; let off=DS.SUBJECT_ORDER.indexOf(sid);
    let day=0;
    units.forEach(([uname,prog])=>{
      for(let i=0;i<4;i++){
        const frac=(i+0.5)/4;
        const done = prog>=1 || (prog>0 && frac<=prog);
        day+=2;
        // future units with no progress: leave the last unit's lessons unscheduled
        const unscheduled = prog===0 && Math.random()<0; // deterministic: none random
        let date=null;
        const d=new Date(base.getTime()+(day+off)*DAYMS);
        if((d.getDay()===0)) d.setDate(d.getDate()+1);
        if((d.getDay()===6)) d.setDate(d.getDate()+2);
        if(!(prog===0 && i>=2)) date=iso(d); // leave later lessons of untaught units unscheduled
        out.push({ id:sid+'-'+uname.replace(/\W+/g,'')+'-'+i, subjectId:sid, unit:uname,
          title:TITLES[i]+' · '+uname.split(' ').slice(-1)[0],
          objective:'I can apply the key skill of this lesson.',
          std:(DS.POOL[sid]&&DS.POOL[sid].std||'STD')+'.'+String.fromCharCode(97+(i%4)),
          start:'09:40', end:'10:25', date, done });
      }
    });
  });
  return out;
}

function loadOverrides(){ try{ return JSON.parse(localStorage.getItem('cc_lib')||'{}'); }catch(e){ return {}; } }
function saveOverrides(o){ try{ localStorage.setItem('cc_lib',JSON.stringify(o)); }catch(e){} }

const VIEWS=[['day','Day'],['wmix','Week'],['wsub','By subject'],['month','Month'],['unit','By unit'],['all','All']];
const BUCKETS=[['all','All'],['nottaught','Not taught'],['catchup','Catch-Up'],['done','Done']];

function LessonLibrary({ state, onPlan, onPost, onTeach, embedded, onClose }){
  const [view,setView]=useState('day');
  const [bucket,setBucket]=useState('all');
  const [ov,setOv]=useState(loadOverrides);
  const [menu,setMenu]=useState(null);          // {id,x,y}
  const [resched,setResched]=useState(null);    // lesson being rescheduled
  const [addOpen,setAddOpen]=useState(false);
  const [printOpen,setPrintOpen]=useState(false);
  const [q,setQ]=useState('');
  const dragId=React.useRef(null);

  const all=useMemo(()=>{ const g=genLessons(); return g.map(l=>({...l, ...(ov[l.id]||{})})); },[ov]);
  const today=iso(new Date());

  const statusOf=(l)=> l.done ? 'done' : (!l.date ? 'nottaught' : (l.date<today ? 'catchup' : 'upcoming'));
  const setLesson=(id,patch)=>{ const n={...ov,[id]:{...(ov[id]||{}),...patch}}; setOv(n); saveOverrides(n); };
  const toggleDone=(l)=>setLesson(l.id,{done:!l.done});

  // subject-sequence numbering (by date then order)
  const numbering=useMemo(()=>{
    const by={}; const map={};
    all.forEach(l=>{ (by[l.subjectId]=by[l.subjectId]||[]).push(l); });
    Object.values(by).forEach(arr=>{ arr.sort((a,b)=>(a.date||'9999')<(b.date||'9999')?-1:1); arr.forEach((l,i)=>map[l.id]=i+1); });
    return map;
  },[all]);

  let lessons = all.filter(l=> bucket==='all' || statusOf(l)===bucket );
  if(q) lessons=lessons.filter(l=>l.title.toLowerCase().includes(q.toLowerCase())||l.unit.toLowerCase().includes(q.toLowerCase()));

  // grouping per view
  const groups=useMemo(()=>{
    const mk=(title,items,sid)=>({title,items,sid});
    if(view==='wsub'){
      const by={}; lessons.forEach(l=>{ (by[l.subjectId]=by[l.subjectId]||[]).push(l); });
      return DS.SUBJECT_ORDER.filter(s=>by[s]).map(s=>mk(DS.SUBJECTS[s].full,by[s].sort((a,b)=>(a.date||'9999')<(b.date||'9999')?-1:1),s));
    }
    if(view==='unit'){
      const by={}; lessons.forEach(l=>{ const k=l.subjectId+'|'+l.unit; (by[k]=by[k]||[]).push(l); });
      return Object.keys(by).map(k=>{ const [sid]=k.split('|'); return mk(by[k][0].unit,by[k],sid); });
    }
    if(view==='day'){
      const by={}; lessons.forEach(l=>{ const k=l.date||'Unscheduled'; (by[k]=by[k]||[]).push(l); });
      return Object.keys(by).sort().map(k=>mk(k==='Unscheduled'?'Unscheduled':new Date(k+'T00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}),by[k]));
    }
    if(view==='wmix'){
      const by={}; lessons.forEach(l=>{ const k=l.date?iso(wkOf(l.date+'T00:00')):'Unscheduled'; (by[k]=by[k]||[]).push(l); });
      return Object.keys(by).sort().map(k=>mk(k==='Unscheduled'?'Unscheduled':('Week of '+new Date(k+'T00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})),by[k]));
    }
    return [mk('All lessons',lessons.slice().sort((a,b)=>(a.date||'9999')<(b.date||'9999')?-1:1))];
  },[view,lessons]);

  const counts={ nottaught:all.filter(l=>statusOf(l)==='nottaught').length, catchup:all.filter(l=>statusOf(l)==='catchup').length, done:all.filter(l=>statusOf(l)==='done').length };

  const Row=({l})=>{
    const s=DS.SUBJECTS[l.subjectId]; const st=statusOf(l);
    return (
      <div className={'ll-row st-'+st} draggable
        onDragStart={(e)=>{ dragId.current=l.id; e.dataTransfer.effectAllowed='move'; }}
        onDragOver={(e)=>e.preventDefault()}
        onDrop={(e)=>{ e.preventDefault(); if(dragId.current&&dragId.current!==l.id){ /* reorder: copy date of target */ setLesson(dragId.current,{date:l.date}); } }}>
        <span className="ll-num" style={{background:`color-mix(in oklab, ${cv(s.c)} 16%, white)`,color:cv(s.c)}}>{numbering[l.id]}</span>
        <button className={'ll-check'+(l.done?' on':'')} title={l.done?'Mark not done':'Mark done'} onClick={()=>toggleDone(l)}>{l.done&&I.done}</button>
        <span className="ll-bar" style={{background:cv(s.c)}}/>
        <span className="ll-main" style={{cursor:onPlan?'pointer':'default'}} onClick={()=>onPlan&&onPlan(l)} title={onPlan?'Open in Lesson Planner':undefined}>
          <span className="ll-title">{l.title}</span>
          <span className="ll-sub">{s.label} · {l.unit} · {fmtD(l.date)}</span>
        </span>
        {st==='catchup' && <span className="ll-badge catchup">Catch-Up</span>}
        {st==='nottaught' && <span className="ll-badge nottaught">Not taught</span>}
        <span className="ll-acts">
          <button title="Lesson plan" onClick={()=>onPlan&&onPlan(l)}>{I.plan}</button>
          <button title="Resource wall" onClick={()=>onPost&&onPost(l)}>{I.wall}</button>
          <button title="Teach board" onClick={()=>onTeach&&onTeach(l)}>{I.teach}</button>
          <button title="More" onClick={(e)=>{ const r=e.currentTarget.getBoundingClientRect(); setMenu({id:l.id,x:r.right,y:r.bottom}); }}>{I.dots}</button>
        </span>
      </div>
    );
  };

  // month calendar
  const MonthView=()=>{
    const base=wkOf(new Date()); const cells=[];
    for(let w=0;w<5;w++) for(let d=0;d<7;d++){ const day=new Date(base.getTime()+(w*7+d-7)*DAYMS); cells.push(day); }
    const byDate={}; lessons.forEach(l=>{ if(l.date)(byDate[l.date]=byDate[l.date]||[]).push(l); });
    const [exp,setExp]=useState(null);
    return (
      <div className="ll-cal">
        <div className="ll-calhead">{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=><span key={d}>{d}</span>)}</div>
        <div className="ll-calgrid">
          {cells.map((day,i)=>{ const k=iso(day); const items=byDate[k]||[]; const isToday=k===today;
            return (
              <div key={i} className={'ll-celld'+(isToday?' today':'')} onClick={()=>items.length&&setExp(exp===k?null:k)}
                onDragOver={(e)=>e.preventDefault()} onDrop={(e)=>{ e.preventDefault(); if(dragId.current) setLesson(dragId.current,{date:k}); }}>
                <span className="ll-celldate">{day.getDate()}</span>
                {items.slice(0,exp===k?99:3).map(l=>{ const s=DS.SUBJECTS[l.subjectId]; return (
                  <span key={l.id} className={'ll-chip'+(l.done?' done':'')} draggable onDragStart={()=>{dragId.current=l.id;}}
                    style={{background:`color-mix(in oklab, ${cv(s.c)} 22%, white)`,color:cv(s.c)}} onClick={(e)=>{e.stopPropagation();onPlan&&onPlan(l);}} title={l.title}>{s.label}: {l.title.split(' · ')[0]}</span>
                ); })}
                {items.length>3 && exp!==k && <span className="ll-more">+{items.length-3}</span>}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  useEffect(()=>{ if(!menu) return; const h=()=>setMenu(null); document.addEventListener('click',h); return ()=>document.removeEventListener('click',h); },[menu]);
  const menuL = menu && all.find(l=>l.id===menu.id);

  return (
    <div className={'ll-root'+(embedded?' embedded':'')}>
      <div className="ll-bar1">
        <div className="ll-views">{VIEWS.map(([k,lab])=><button key={k} className={view===k?'on':''} onClick={()=>setView(k)}>{lab}</button>)}</div>
        <div className="ll-bar1r">
          <input className="ll-search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search lessons…"/>
          <div className="ll-addwrap">
            <button className="ll-addbtn" onClick={()=>setAddOpen(o=>!o)}>{I.plus}Add</button>
            {addOpen && <div className="ll-addpop" onMouseLeave={()=>setAddOpen(false)}>
              <button onClick={()=>{setAddOpen(false);onPlan&&onPlan(all[0]);}}>Add lesson</button>
              <button onClick={()=>setAddOpen(false)}>Add unit</button>
              <button onClick={()=>setAddOpen(false)}>Add subject</button>
            </div>}
          </div>
          <button className="ll-iconb" title="Print" onClick={()=>setPrintOpen(true)}>{I.print}</button>
          {embedded && onClose && <button className="ll-iconb" title="Expand" onClick={onClose}>{I.expand}</button>}
        </div>
      </div>
      <div className="ll-buckets">
        {BUCKETS.map(([k,lab])=><button key={k} className={bucket===k?'on':''} onClick={()=>setBucket(k)}>{lab}{counts[k]!==undefined&&<span className="ll-bn">{counts[k]}</span>}</button>)}
      </div>

      <div className="ll-body">
        {view==='month' ? <MonthView/> :
          groups.map((g,gi)=>(
            <div key={gi} className="ll-group">
              <div className="ll-ghead">{g.sid&&<span className="ll-gdot" style={{background:cv(DS.SUBJECTS[g.sid].c)}}/>}{g.title}<span className="ll-gn">{g.items.length}</span></div>
              {g.items.map(l=><Row key={l.id} l={l}/>)}
            </div>
          ))}
        {view!=='month' && !groups.some(g=>g.items.length) && <div className="ll-empty">No lessons in this view</div>}
      </div>

      {menu && menuL && <div className="ll-menu" style={{left:Math.min(menu.x-160,window.innerWidth-180),top:menu.y+4}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>{ setResched(menuL); setMenu(null); }}>Change time / date…</button>
        <button onClick={()=>{ const d=menuL.date?new Date(menuL.date+'T00:00'):new Date(); d.setDate(d.getDate()+1); setLesson(menuL.id,{date:iso(d)}); setMenu(null); }}>Bump to next day</button>
        <button onClick={()=>{ toggleDone(menuL); setMenu(null); }}>{menuL.done?'Mark not done':'Mark done'}</button>
        <button className="del" onClick={()=>{ setLesson(menuL.id,{date:null,deleted:true}); setMenu(null); }}>Remove from schedule</button>
      </div>}

      {resched && <RescheduleDialog lesson={resched} allLessons={all} onClose={()=>setResched(null)}
        onApply={(date,time,cascade)=>{
          if(cascade){
            const shift = (new Date(date+'T00:00') - new Date((resched.date||date)+'T00:00'));
            const later=all.filter(l=>l.subjectId===resched.subjectId && l.date && resched.date && l.date>resched.date);
            const next={...ov}; later.forEach(l=>{ const nd=new Date(l.date+'T00:00').getTime()+shift; next[l.id]={...(next[l.id]||{}),date:iso(new Date(nd))}; });
            next[resched.id]={...(next[resched.id]||{}),date,start:time}; setOv(next); saveOverrides(next);
