          } else setLesson(resched.id,{date,start:time});
          setResched(null);
        }} />}

      {printOpen && <PrintDialog view={view} onClose={()=>setPrintOpen(false)} onPrint={()=>{ setPrintOpen(false); setTimeout(()=>window.print(),60); }} />}
    </div>
  );
}

function RescheduleDialog({ lesson, allLessons, onClose, onApply }){
  const [date,setDate]=useState(lesson.date||new Date().toISOString().slice(0,10));
  const [time,setTime]=useState(lesson.start||'09:40');
  const [cascade,setCascade]=useState(false);
  const clash = (allLessons||[]).find(l=>l.id!==lesson.id && l.date===date && l.start===time);
  return (
    <div className="ll-dlgscrim" onClick={onClose}>
      <div className="ll-dlg" onClick={e=>e.stopPropagation()}>
        <div className="ll-dlgh">Change time / date</div>
        <div className="ll-dlgsub">{lesson.title}</div>
        <div className="ll-fld2">
          <label className="ll-fld"><span>Date</span><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></label>
          <label className="ll-fld"><span>Time</span><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></label>
        </div>
        {clash && <div className="ll-clash">Stacks with “{clash.title}” at this time — both lessons will share the slot.</div>}
        <div className="ll-cascade">
          <div className="ll-clabel">Move the later lessons too?</div>
          <div className="ll-cbtns">
            <button className={!cascade?'on':''} onClick={()=>setCascade(false)}>Just this lesson</button>
            <button className={cascade?'on':''} onClick={()=>setCascade(true)}>Bump all after</button>
          </div>
        </div>
        <div className="ll-dlgfoot"><button onClick={onClose}>Cancel</button><button className="pri" onClick={()=>onApply(date,time,cascade)}>Apply</button></div>
      </div>
    </div>
  );
}

function PrintDialog({ view, onClose, onPrint }){
  const [range,setRange]=useState('view');
  const [inc,setInc]=useState({standards:true,resources:true,notes:false});
  return (
    <div className="ll-dlgscrim" onClick={onClose}>
      <div className="ll-dlg" onClick={e=>e.stopPropagation()}>
        <div className="ll-dlgh">Print lessons</div>
        <label className="ll-fld"><span>Range</span>
          <select value={range} onChange={e=>setRange(e.target.value)}>
            <option value="view">Current view ({view})</option>
            <option value="week">This week</option>
            <option value="unit">Current unit</option>
            <option value="all">All lessons</option>
          </select>
        </label>
        <div className="ll-fld"><span>Include</span>
          <div className="ll-incs">
            {[['standards','Standards'],['resources','Resources'],['notes','Notes']].map(([k,lab])=>(
              <label key={k} className="ll-inc"><input type="checkbox" checked={inc[k]} onChange={e=>setInc(p=>({...p,[k]:e.target.checked}))}/>{lab}</label>
            ))}
          </div>
        </div>
        <div className="ll-dlgfoot"><button onClick={onClose}>Cancel</button><button className="pri" onClick={onPrint}>Print</button></div>
      </div>
    </div>
  );
}

window.LessonLibrary = LessonLibrary;
})();

</script>
<script type="text/babel" data-src="wall-library.jsx">
/* Wall Library — popup to browse / present / manage Resource Walls.
   Tabs: Presets · My Walls. Personal/Team filter, search, sort, 16:10 cards.
   window.WallLibrary({ state, customWalls, setCustomWalls, onOpenPreset, onOpenCustom, onClose }) */
(function(){
const { useState, useEffect, useMemo, useRef } = React;
const DS = window.DS;
const cv = (x)=>`var(${x})`;

/* preset cards map to the ResourceWall preset strings (the `raw` value) */
const PRESET_DEFS = [
  { raw:'Current Lesson',            name:'Current Lesson', sub:'' },
  { raw:"Today's Lessons (Mixed)",   name:"Today's Lessons", sub:'Mixed', mixed:true },
  { raw:'This Week · Mixed',         name:'This Week', sub:'Mixed', mixed:true },
  { raw:'This Week · Subject',       name:'This Week', sub:'By subject', mixed:true },
  { raw:'Subject View',              name:'By Subject', sub:'', mixed:true },
  { raw:'Unit View',                 name:'By Unit', sub:'', mixed:true },
];
const GRADIENTS = [['--grad-dawn','Dawn'],['--grad-honey','Honey'],['--grad-mint','Mint'],['--grad-brand','Sky'],['--grad-blossom','Blossom']];
const SOLIDS = ['--subj-1','--subj-10','--subj-13','--subj-7','--subj-5','--subj-12'];

const LU_KEY='cc_wall_lastused', PIN_KEY='cc_wall_pins', PB_KEY='cc_wall_presetbg';
const load=(k,f)=>{ try{ return JSON.parse(localStorage.getItem(k))??f; }catch(e){ return f; } };
const save=(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };

/* a wall's representative subject color (first section) — null if mixed/none */
function wallSubject(w){
  const sid = w && w.layout && w.layout[0] && w.layout[0].subjectId;
  return sid && DS.SUBJECTS[sid] ? sid : null;
}
function bgStyleFor(bg, sid){
  if(bg){
    if(bg.type==='color')   return { background:bg.value };
    if(bg.type==='gradient')return { background:cv(bg.value) };
    if(bg.type==='photo')   return { backgroundImage:`url('${bg.value}')`, backgroundSize:'cover', backgroundPosition:'center' };
    if(bg.type==='wash')    return { background:cv('--grad-dawn') };
  }
  if(sid){ const c=cv(DS.SUBJECTS[sid].c); return { background:`linear-gradient(135deg, color-mix(in oklab, ${c} 34%, white), color-mix(in oklab, ${c} 12%, white))` }; }
  return { background:cv('--grad-dawn') };
}

const I = {
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>,
  dots:<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 6.9 7.1.3-5.6 4.4 2 6.8L12 16.9 6.1 20.4l2-6.8L2.5 9.2l7.1-.3z"/></svg>,
};

function WallLibrary({ state, initialTab, customWalls, setCustomWalls, onOpenPreset, onOpenCustom, onClose }){
  const [tab,setTab]=useState(initialTab==='my'?'my':'presets');     // presets | my
  const [scopeF,setScopeF]=useState('all');   // all | personal | team
  const [q,setQ]=useState('');
  const [sort,setSort]=useState('recent');
  const [menu,setMenu]=useState(null);        // wall id with open ⋯ menu
  const [bgFor,setBgFor]=useState(null);      // wall id with open bg picker
  const [lu,setLu]=useState(()=>load(LU_KEY,{}));
  const [pins,setPins]=useState(()=>load(PIN_KEY,[]));
  const [presetBg,setPresetBg]=useState(()=>load(PB_KEY,{}));
  const fileRef=useRef(null);

  useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape'){ if(menu)setMenu(null); else if(bgFor)setBgFor(null); else onClose(); } }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); },[menu,bgFor,onClose]);
  useEffect(()=>{ if(!menu && !bgFor) return; const d=(e)=>{ if(!(e.target.closest && e.target.closest('.wl-menuwrap'))){ setMenu(null); setBgFor(null); } }; document.addEventListener('mousedown',d); return ()=>document.removeEventListener('mousedown',d); },[menu,bgFor]);

  const persist=(next)=>{ setCustomWalls(next); save('cc_customwalls',next); };
  const touch=(id)=>{ const m={...lu,[id]:Date.now()}; setLu(m); save(LU_KEY,m); };
  const togglePin=(id)=>{ const n=pins.includes(id)?pins.filter(x=>x!==id):[...pins,id]; setPins(n); save(PIN_KEY,n); };

  const openPreset=(p)=>{ touch(p.raw); onOpenPreset(p.raw); };
  const openCustom=(w)=>{ touch(w.id); onOpenCustom(w); };
  const rename=(w)=>{ const n=prompt('Rename wall', w.name); if(n==null) return; persist(customWalls.map(x=>x.id===w.id?{...x,name:n||x.name}:x)); setMenu(null); };
  const duplicate=(w)=>{ const c={...w, id:'cw'+Date.now(), name:'Copy of '+w.name, created:Date.now()}; persist([c,...customWalls]); setMenu(null); };
  const del=(w)=>{ if(!confirm('Delete "'+w.name+'"?')) return; persist(customWalls.filter(x=>x.id!==w.id)); setMenu(null); };
  const setBg=(w,bg,preset)=>{ if(preset){ const m={...presetBg,[w.raw]:bg}; setPresetBg(m); save(PB_KEY,m); } else { persist(customWalls.map(x=>x.id===w.id?{...x,bg}:x)); } setBgFor(null); };
  const resetBg=(w)=>{ const m={...presetBg}; delete m[w.raw]; setPresetBg(m); save(PB_KEY,m); setMenu(null); };

  const sortFn = (a,b)=>{
    const pa=pins.includes(a.id||a.raw), pb=pins.includes(b.id||b.raw);
    if(pa!==pb) return pa?-1:1;
    if(sort==='alpha') return (a.name||'').localeCompare(b.name||'');
    if(sort==='subject') return String(wallSubject(a)||a.sub||'').localeCompare(String(wallSubject(b)||b.sub||''));
    if(sort==='unit') return String((a.anchor||'')+'').localeCompare(String((b.anchor||'')+''));
    if(sort==='created') return (b.created||0)-(a.created||0);
    // recent (last used) — default
    return (lu[b.id||b.raw]||b.created||0) - (lu[a.id||a.raw]||a.created||0);
  };

  const presetCards = useMemo(()=>{
    let arr=[...PRESET_DEFS];
    if(q.trim()){ const s=q.toLowerCase(); arr=arr.filter(p=>(p.name+' '+p.sub).toLowerCase().includes(s)); }
    if(sort==='manual') return arr;
    return arr.slice().sort(sortFn);
  },[q,sort,lu,pins]);

  const myCards = useMemo(()=>{
    let arr=[...(customWalls||[])];
    if(scopeF!=='all') arr=arr.filter(w=> scopeF==='team' ? !!w.team : !w.team );
    if(q.trim()){ const s=q.toLowerCase(); arr=arr.filter(w=>(w.name||'').toLowerCase().includes(s)); }
    if(sort==='manual') return arr;
    return arr.sort(sortFn);
  },[customWalls,scopeF,q,sort,lu,pins]);

  const Card = ({ w, preset })=>{
    const sid = preset ? null : wallSubject(w);
    const cid = preset ? w.raw : w.id;
    const pinned = pins.includes(cid);
    const name = preset ? w.name : w.name;
    const sub  = preset ? w.sub : ((w.secCount||(w.layout?w.layout.length:0))+' section'+(((w.secCount||1)!==1)?'s':''));
    return (
      <div className="wl-card">
        <button className="wl-thumb" style={bgStyleFor(preset?presetBg[w.raw]:w.bg, sid)} onClick={()=>preset?openPreset(w):openCustom(w)}>
          <span className="wl-name">{name}{sub?<span className="wl-sub">{sub}</span>:null}</span>
          {pinned && <span className="wl-pinflag" title="Pinned">{I.pin}</span>}
          {w.team && <span className="wl-teamflag">Team</span>}
        </button>
        <div className="wl-cardbar">
          <button className="wl-open" onClick={()=>preset?openPreset(w):openCustom(w)}>Present</button>
          <button className="wl-ic" title={pinned?'Unpin':'Pin'} onClick={()=>togglePin(cid)} style={pinned?{color:'var(--honey-500)'}:undefined}>{I.pin}</button>
          <div className="wl-menuwrap">
            <button className="wl-ic" title="More" onClick={()=>setMenu(menu===cid?null:cid)}>{I.dots}</button>
            {menu===cid && <div className="wl-menu">
              {!preset && <button onClick={()=>rename(w)}>Rename</button>}
              <button onClick={()=>{ setMenu(null); setBgFor(cid); }}>Set background</button>
              {preset && presetBg[w.raw] && <button onClick={()=>resetBg(w)}>Reset background</button>}
              {!preset && <button onClick={()=>duplicate(w)}>Duplicate</button>}
              {!preset && window.Share && <button onClick={()=>{ setMenu(null); window.dispatchEvent(new CustomEvent('cc-share',{detail:{kind:'wall',id:w.id,label:w.name}})); }}>Share</button>}
              {!preset && <button className="del" onClick={()=>del(w)}>Delete</button>}
            </div>}
            {bgFor===cid && <div className="wl-bgpop">
              <div className="wl-bglbl">Wash</div>
              <button className="wl-bgrow" onClick={()=>setBg(w,{type:'wash'},preset)}>Theme wash</button>
              <div className="wl-bglbl">Gradient</div>
              <div className="wl-bgswatches">{GRADIENTS.map(([t,n])=><button key={t} title={n} style={{background:cv(t)}} onClick={()=>setBg(w,{type:'gradient',value:t},preset)}/>)}</div>
              <div className="wl-bglbl">Solid</div>
              <div className="wl-bgswatches">{SOLIDS.map(t=><button key={t} title={t} style={{background:cv(t)}} onClick={()=>setBg(w,{type:'color',value:cv(t)},preset)}/>)}</div>
              <label className="wl-bgupload">Upload image
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{ const f=e.target.files&&e.target.files[0]; if(f) setBg(w,{type:'photo',value:URL.createObjectURL(f)},preset); }}/>
              </label>
            </div>}
          </div>
        </div>
      </div>
    );
  };

  const SORTS=[['recent','Last used'],['alpha','A–Z'],['subject','Subject'],['unit','Unit'],['created','Date created'],['manual','Manual']];

  return (
    <div className="wl-scrim" onClick={onClose}>
      <div className="wl-modal" onClick={e=>e.stopPropagation()}>
        <div className="wl-head">
          <div className="wl-tabs">
            <button className={tab==='presets'?'on':''} onClick={()=>setTab('presets')}>Presets</button>
            <button className={tab==='my'?'on':''} onClick={()=>setTab('my')}>My Walls</button>
          </div>
          <button className="wl-x" onClick={onClose}>{I.x}</button>
        </div>
        <div className="wl-controls">
          <div className="wl-search">{I.search}<input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search walls…"/></div>
          {tab==='my' && <div className="wl-scope">
            {[['all','All'],['personal','Personal'],['team','Team']].map(([k,l])=><button key={k} className={scopeF===k?'on':''} onClick={()=>setScopeF(k)}>{l}</button>)}
          </div>}
          <label className="wl-sortwrap">Sort
            <select className="wl-sort" value={sort} onChange={e=>setSort(e.target.value)}>{SORTS.map(([k,l])=><option key={k} value={k}>{l}</option>)}</select>
          </label>
        </div>
        <div className="wl-grid">
          {tab==='presets'
            ? presetCards.map(p=><Card key={p.raw} w={p} preset/>)
            : (myCards.length ? myCards.map(w=><Card key={w.id} w={w}/>) : <div className="wl-empty">No saved walls yet — build one on the wall and Save it.</div>)}
        </div>
      </div>
    </div>
  );
}
window.WallLibrary = WallLibrary;
})();

</script>
<script type="text/babel" data-src="settings.jsx">
/* Appearance controls — the look-of-the-whole-app settings.
   Lives INSIDE the gear "Setup" modal (config.jsx → Appearance section).
   A single visual panel for every appearance axis:
     Frame (Calm Glass · Bright · Color) · Frosted glass (Dark · White, Calm Glass only)
     · Background (Photo · Wash) · Theme (6 + Photo) · Photo brightness.
   Drives the persisted tweak state.  window.AppearanceControls({ t, setTweak }) */
(function(){

/* mini wash previews for the Theme swatches (condensed from themes.css) */
const SWATCH = {
  normal:'linear-gradient(135deg,#FFFFFF,#EFEFF3)',
  night:'radial-gradient(60% 60% at 16% 14%, #6076C8, transparent 64%),radial-gradient(60% 60% at 88% 90%, #3C82BE, transparent 64%),linear-gradient(135deg,#10131D,#161B28)',
  honey:'radial-gradient(62% 62% at 12% 10%, #FACE46, transparent 62%),radial-gradient(60% 60% at 88% 12%, #FF8446, transparent 60%),radial-gradient(60% 60% at 84% 90%, #F4606E, transparent 62%),linear-gradient(135deg,#FFEFC4,#FFEEDA)',
  blossom:'radial-gradient(62% 62% at 12% 10%, #FF96C4, transparent 62%),radial-gradient(60% 60% at 88% 12%, #BEA0FF, transparent 62%),radial-gradient(60% 60% at 84% 90%, #FFA08C, transparent 62%),linear-gradient(135deg,#FCE4EF,#F3E6FB)',
  mint:'radial-gradient(62% 62% at 12% 10%, #96D4FF, transparent 62%),radial-gradient(60% 60% at 88% 10%, #96EAC2, transparent 62%),radial-gradient(60% 60% at 84% 90%, #D8F096, transparent 62%),linear-gradient(135deg,#E6F7F1,#EDF8E6)',
  sky:'radial-gradient(62% 62% at 12% 10%, #60A6FF, transparent 62%),radial-gradient(60% 60% at 88% 8%, #96D2FF, transparent 60%),radial-gradient(60% 60% at 84% 90%, #4678EB, transparent 62%),linear-gradient(135deg,#E2EEFF,#EDF6FF)',
};
const THEMES = [
  { k:'normal', label:'Clear' },
  { k:'honey',  label:'Honey'  },
  { k:'blossom',label:'Blossom'},
  { k:'mint',   label:'Mint'   },
  { k:'sky',    label:'Sky'    },
  { k:'night',  label:'Night'  },
  { k:'off',    label:'Photo'  },
];

function Row({ label, hint, children }){
  return (
    <div className="set-row">
      <div className="set-row-h"><span className="set-lbl">{label}</span>{hint && <span className="set-hint">{hint}</span>}</div>
      {children}
    </div>
  );
}

function Seg({ value, options, onChange }){
  return (
    <div className="set-seg" role="radiogroup">
      {options.map(o=>(
        <button key={o.value} role="radio" aria-checked={value===o.value}
          className={'set-seg-btn'+(value===o.value?' on':'')} onClick={()=>onChange(o.value)}>{o.label}</button>
      ))}
    </div>
  );
}

function Toggle({ value, onChange }){
  return (
    <button className={'set-toggle'+(value?' on':'')} role="switch" aria-checked={value} onClick={()=>onChange(!value)}>
      <span className="set-knob"/>
    </button>
  );
}

function ThemePicker({ value, onChange }){
  return (
    <div className="set-themes">
      {THEMES.map(th=>(
        <button key={th.k} className={'set-swatch'+(value===th.k?' on':'')} onClick={()=>onChange(th.k)} title={th.label}>
          <span className="set-sw-chip" style={th.k==='off'
            ? {backgroundImage:"url('photos/p1.png')",backgroundSize:'cover',backgroundPosition:'center'}
            : {backgroundImage:SWATCH[th.k]}}>
            {th.k==='off' && <span className="set-sw-photo">photo</span>}
          </span>
          <span className="set-sw-name">{th.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ── Frame picker — 3 visual mini-previews of each frame's character ── */
function FramePicker({ value, onChange }){
  const frames=[
    { k:'A', label:'Calm Glass', note:'Frosted · floating' },
    { k:'B', label:'Bright',     note:'White paper' },
    { k:'C', label:'Color',      note:'Subject-led' },
  ];
  return (
    <div className="set-frames">
      {frames.map(f=>(
        <button key={f.k} className={'set-frame'+(value===f.k?' on':'')} onClick={()=>onChange(f.k)} title={f.label}>
          <span className={'set-frame-pv pv-'+f.k}>
            <span className="pv-card a"/><span className="pv-card b"/>
          </span>
          <span className="set-frame-nm">{f.label}</span>
          <span className="set-frame-note">{f.note}</span>
        </button>
      ))}
    </div>
  );
}

/* ── Frosted-glass register — Dark vs White, as two glass swatches ── */
function GlassPicker({ value, onChange }){
  const opts=[ { k:'dark', label:'Dark' }, { k:'light', label:'White' } ];
  return (
    <div className="set-glass">
      {opts.map(o=>(
        <button key={o.k} className={'set-glasssw '+o.k+(value===o.k?' on':'')} onClick={()=>onChange(o.k)} title={o.label+' frosted'}>
          <span className="set-glasssw-pane"><span className="rail"/></span>
          <span className="set-glasssw-nm">{o.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ── Background — Photo vs Wash, visual ── */
function BgPicker({ value, onChange }){
  return (
    <div className="set-bgs">
      <button className={'set-bg'+(value==='photo'?' on':'')} onClick={()=>onChange('photo')} title="Photo">
        <span className="set-bg-pv" style={{backgroundImage:"url('photos/p1.png')",backgroundSize:'cover',backgroundPosition:'center'}}/>
        <span className="set-bg-nm">Photo</span>
      </button>
      <button className={'set-bg'+(value==='ambient'?' on':'')} onClick={()=>onChange('ambient')} title="Wash">
        <span className="set-bg-pv" style={{backgroundImage:SWATCH.normal}}/>
        <span className="set-bg-nm">Wash</span>
      </button>
    </div>
  );
}

/* ── Photo picker ── */
const BUILTIN_PH = ['p1','p2','p3','p4','p5'];
function ljPhotos(){ try{ const v=localStorage.getItem('cc_photos'); return v?JSON.parse(v):[]; }catch(e){ return []; } }
function PhotoPicker({ t, setTweak }){
  const [custom,setCustom]=React.useState(ljPhotos);
  const fileRef=React.useRef(null);
  const sel=(t.photoSel&&t.photoSel.length?t.photoSel:BUILTIN_PH);
  const all=[...BUILTIN_PH.map(id=>({id,url:'photos/'+id+'.png',builtin:true})), ...custom];
  const toggle=(id)=>{ const cur=sel.includes(id)?sel.filter(x=>x!==id):[...sel,id]; setTweak('photoSel',cur.length?cur:[id]); };
  const add=(file)=>{ const rd=new FileReader(); rd.onload=()=>{ const np=[...custom,{id:'c'+Date.now().toString(36),url:rd.result}]; setCustom(np); try{localStorage.setItem('cc_photos',JSON.stringify(np));}catch(e){} }; rd.readAsDataURL(file); };
  const remove=(id)=>{ const np=custom.filter(p=>p.id!==id); setCustom(np); try{localStorage.setItem('cc_photos',JSON.stringify(np));}catch(e){} };
  return (
    <div className="set-photos">
      {all.map(p=>(
        <button key={p.id} className={'set-photo'+(sel.includes(p.id)?' on':'')} style={{backgroundImage:`url('${p.url}')`}} onClick={()=>toggle(p.id)} title={p.builtin?'Built-in photo':'Custom photo'}>
          {sel.includes(p.id) && <span className="set-photo-chk">✓</span>}
          {!p.builtin && <span className="set-photo-x" onClick={e=>{ e.stopPropagation(); remove(p.id); }}>×</span>}
        </button>
      ))}
      <button className="set-photo set-photo-add" onClick={()=>fileRef.current&&fileRef.current.click()} title="Upload a picture">＋
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{ const f=e.target.files&&e.target.files[0]; if(f) add(f); e.target.value=''; }} />
      </button>
    </div>
  );
}

/* The appearance controls, embedded directly in the Setup modal's Appearance section. */
function AppearanceControls({ t, setTweak }){
  const [adv,setAdv]=React.useState(false);
  const [tipsOn,setTipsOn]=React.useState(()=>{ try{ return localStorage.getItem('cc_tips')!=='off'; }catch(e){ return true; } });
  const isPhoto = (t.bgMode!=='ambient') && t.theme!=='off' ? (t.bgMode==='photo') : t.bgMode==='photo';
  return (
    <div className="set-appearance">
      <div className="set-group">Frame</div>
      <FramePicker value={t.version} onChange={v=>setTweak('version',v)} />
      {t.version==='A' && (
        <Row label="Frosted glass" hint="surface only — the background is unchanged">
          <GlassPicker value={t.glass||'dark'} onChange={v=>setTweak('glass',v)} />
        </Row>
      )}

      <div className="set-group">Background</div>
      <BgPicker value={t.bgMode==='ambient'?'ambient':'photo'} onChange={v=>setTweak('bgMode',v)} />
      {t.bgMode!=='ambient' && t.theme!=='off' && <PhotoPicker t={t} setTweak={setTweak} />}
      {t.bgMode!=='ambient' && (
        <Row label="Photo light" hint="dark · normal · light">
          <Seg value={t.bgDim||'normal'} onChange={v=>setTweak('bgDim',v)}
            options={[{value:'dim',label:'Dark'},{value:'normal',label:'Normal'},{value:'bright',label:'Light'}]} />
        </Row>
      )}
      {t.bgMode!=='ambient' && (
        <Row label="Motion" hint="rotate · zoom · still">
          <Seg value={t.photoMotion} onChange={v=>setTweak('photoMotion',v)}
            options={[{value:'fade-zoom',label:'Drift'},{value:'fade',label:'Fade'},{value:'static',label:'Still'}]} />
        </Row>
      )}

      <div className="set-group">Theme</div>
      <ThemePicker value={t.theme} onChange={v=>setTweak('theme',v)} />

      <Row label="Help popups" hint="show tips when you hover a control">
        <Toggle value={tipsOn} onChange={v=>{ setTipsOn(v); if(window.applyTips) window.applyTips(!v); }} />
      </Row>
    </div>
  );
}

var __tipsObserver=null;
window.applyTips=function(off){
  window.__tipsOff=off;
  try{ localStorage.setItem('cc_tips', off?'off':'on'); }catch(e){}
  if(__tipsObserver){ __tipsObserver.disconnect(); __tipsObserver=null; }
  if(off){
    document.querySelectorAll('[title]').forEach(function(el){ el.setAttribute('data-htitle', el.getAttribute('title')); el.removeAttribute('title'); });
    __tipsObserver=new MutationObserver(function(muts){ muts.forEach(function(m){
      if(m.type==='attributes' && m.target.getAttribute && m.target.getAttribute('title')){ m.target.setAttribute('data-htitle', m.target.getAttribute('title')); m.target.removeAttribute('title'); }
      if(m.addedNodes) m.addedNodes.forEach(function(n){ if(n.nodeType===1){ if(n.getAttribute && n.getAttribute('title')){ n.setAttribute('data-htitle', n.getAttribute('title')); n.removeAttribute('title'); } if(n.querySelectorAll) n.querySelectorAll('[title]').forEach(function(el){ el.setAttribute('data-htitle', el.getAttribute('title')); el.removeAttribute('title'); }); } });
    }); });
    __tipsObserver.observe(document.body,{subtree:true,childList:true,attributes:true,attributeFilter:['title']});
  } else {
    document.querySelectorAll('[data-htitle]').forEach(function(el){ el.setAttribute('title', el.getAttribute('data-htitle')); el.removeAttribute('data-htitle'); });
  }
};
try{ if(localStorage.getItem('cc_tips')==='off'){ window.addEventListener('load', function(){ setTimeout(function(){ window.applyTips(true); }, 200); }); } }catch(e){}
window.AppearanceControls = AppearanceControls;
window.SettingsUI = { Row, Seg, Toggle, ThemePicker, FramePicker, GlassPicker, BgPicker, PhotoPicker };
})();

</script>
<script type="text/babel" data-src="app.jsx">
/* Reimagined mycurricula — one seamless app.
   Home + Day/Week/Year/Teach navigate in place over the rotating photo.
   Three full design directions (A/B/C) live in the Tweaks panel. */
const { useState, useEffect, useRef } = React;

const LOGO_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" width="24" height="24"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5v-13Z" fill="#fff"></path><path d="M13 4h5.5A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5H13V4Z" fill="#3A2A05"></path></svg>';

const PHOTOS = ['photos/p1.png','photos/p2.png','photos/p3.png','photos/p4.png','photos/p5.png'];
const BUILTIN_PHOTOS = PHOTOS.map((url,i)=>({ id:'p'+(i+1), url, builtin:true }));
const BUILTIN_IDS = BUILTIN_PHOTOS.map(p=>p.id);
const ljson=(k,f)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):f; }catch(e){ return f; } };
const sjson=(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };
const NAV = ['Day','Week','Year','Plan','Post','Teach'];
const NAV_SUB = { Day:'Today', Week:'This week', Year:'Curricular\nplan', Plan:'Lesson\nplan', Post:'Resource\nwall', Teach:'Present' };
const NAV_TIP = {
  Day:'The Day — today’s schedule, lesson by lesson',
  Week:'The Week — all your lessons across this week',
  Year:'The Year — your curriculum plan at a glance',
  Plan:'Lesson Plan — open and edit a single lesson in depth',
  Post:'Resource Wall — collections of resources for your lessons',
  Teach:'Teach Board — present your lesson and resources to the class',
};
const VIEW_TITLES = { Day:'The Day', Week:'The Week', Year:'The Year', Plan:'Lesson Plan', Post:'Resource Wall', Teach:'Teach Board' };
function WallSubjToggle(){
  const [on,setOn]=React.useState(()=>{ try{ return localStorage.getItem('cc_rw_subjcolor')==='1'; }catch(e){ return false; } });
  const toggle=()=>{ setOn(v=>{ const nv=!v; try{ localStorage.setItem('cc_rw_subjcolor', nv?'1':'0'); }catch(e){} window.dispatchEvent(new CustomEvent('cc-rw-subjcolor',{detail:nv})); return nv; }); };
  return (
    <div className="vt-row" style={{marginTop:4}}>
      <div className="vt-rowlbl">Resource wall</div>
      <button className="vt-subjrow" onClick={toggle}><span className={'rw-subjsw'+(on?' on':'')}/><span>Color sections by subject</span></button>
    </div>
  );
}
function ViewTitle({ view, t, setTweak, pageBg, setPageBg }){
  const { useState, useRef, useEffect } = React;
  const title = VIEW_TITLES[view];
  const [open,setOpen]=useState(false);
  const [scope,setScope]=useState('page');
  const [pos,setPos]=useState({x:0,y:0});
  const ref=useRef(null), popRef=useRef(null);
  useEffect(()=>{
    if(!open) return;
    const onDoc=(e)=>{ if((ref.current&&ref.current.contains(e.target))||(popRef.current&&popRef.current.contains(e.target))) return; setOpen(false); };

function Ambient({ theme, motion }){
  const drift  = motion==='fade-zoom';
  const change = motion!=='static';
  // Normal is its own standalone brand-mesh wash — it does NOT cycle.
  // 'off' (theme disabled, photo only) falls back to the normal wash if someone
  // switches to Wash, so the background is never blank.
  const palette = (theme==='normal'||theme==='off') ? 'normal' : theme;
  const layers = [palette];
  const cycling = false;
  const [idx,setIdx]=useState(0);
  useEffect(()=>{
    if(!cycling) return;
    const id=setInterval(()=>setIdx(i=>(i+1)%layers.length), 26000);
    return ()=>clearInterval(id);
  },[cycling,layers.length]);
  if(!cycling){
    return <div className={'ambient t-'+layers[0]+' on'+(drift?' drift':'')} />;
  }
  return (
    <React.Fragment>
      {layers.map((p,i)=>(
        <div key={p} className={'ambient t-'+p+(i===idx?' on':'')+(drift?' drift':'')} />
      ))}
    </React.Fragment>
  );
}

function Clock({ state, t, onPick }){
  const { now } = state;
  const c24 = !!t.clock24;
  const day = now.toLocaleDateString('en-US',{weekday:'long'});
  const date = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const time = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:!c24});
  const ftime = (hhmm)=> c24 ? hhmm : window.DS.fmt(hhmm);
  const n = Math.max(1, Math.min(4, t.classCount||2));
  const rem = state.remaining || [];
  const hasToday = rem.some(l=>l.dayIdx===state.todayIdx && l.status!=='done');
  const list = rem.slice(0, n);
  const [hov,setHov]=useState(null);
  useEffect(()=>{ if(!hov) return; const off=(e)=>{ if(!(e.target&&e.target.closest&&e.target.closest('.per-btn'))) setHov(null); }; document.addEventListener('mousemove',off); window.addEventListener('scroll',off,true); return ()=>{ document.removeEventListener('mousemove',off); window.removeEventListener('scroll',off,true); }; },[hov]);
  const showDay = t.showDay!==false, showDate = t.showDate!==false;
  const Row = ({ L, first })=>{
    const s = window.DS.SUBJECTS[L.subjectId];
    const isNow = L.status==='now';
    const label = isNow ? 'Now' : (first && hasToday ? 'Up next' : 'Next');
    return (
      <button className="per per-btn"
        onMouseEnter={e=>{ const r=e.currentTarget.getBoundingClientRect(); setHov({ L, x:r.left, y:r.top }); }}
        onMouseLeave={()=>setHov(h=>h&&h.L===L?null:h)}
        onClick={e=>{ setHov(null); onPick&&onPick(L,e); }}>
        <span className="pdot" style={{background:`var(${s.c})`}} />
        <span className="pmeta">
          <span className="plabel">{label}</span>
          <span className="psub">
            <span className="pname">{L.title}</span>
            <span className="ptime">{isNow?`${ftime(L.start)}–${ftime(L.end)}`:ftime(L.start)}</span>
          </span>
        </span>
      </button>
    );
  };
  return (
    <div className="clock glass">
      <div className="now-time" title="Your day at a glance — the current time and your upcoming classes. Click a class to open it."><span className="tt">{time}</span>{(showDay||showDate) && <span className="dd">{[showDay?day:null, showDate?date:null].filter(Boolean).join(' · ')}</span>}</div>
      <div className="hr" />
      {!hasToday && <div className="clock-done">Done for today · up next tomorrow</div>}
      {list.length ? list.map((L,i)=><Row key={L.id||i} L={L} first={i===0} />) : <div className="clock-empty">No classes scheduled</div>}
      {hov && <ClockHover L={hov.L} x={hov.x} y={hov.y} />}
    </div>
  );
}

const _lumCache={};
function measureLum(url){
  return new Promise(res=>{
    if(url in _lumCache) return res(_lumCache[url]);
    const img=new Image(); try{img.crossOrigin='anonymous';}catch(e){}
    img.onload=()=>{ try{
      const c=document.createElement('canvas'); const w=c.width=32, h=c.height=32;
      const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
      const d=ctx.getImageData(0,0,w,h).data; let sum=0,n=0;
      for(let i=0;i<d.length;i+=4){ sum+=(0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2])/255; n++; }
      const lum=sum/n; _lumCache[url]=lum; res(lum);
    }catch(e){ res(null); } };
    img.onerror=()=>res(null);
    img.src=url;
  });
}

    return ()=>{ document.removeEventListener('mousedown',onDoc); document.removeEventListener('keydown',onEsc); };
  },[menu]);

  const ovBg = pageBg[view] || {};
  const effBgMode = ovBg.mode || t.bgMode;
  const effVersion = ovBg.version || t.version;
  const effGlass = ovBg.glass || t.glass || 'dark';
  const photoSel = ovBg.photos || t.photoSel || BUILTIN_IDS;
  const photoList = [...BUILTIN_PHOTOS, ...customPhotos].filter(p=>photoSel.includes(p.id)).map(p=>p.url);
  const ambient = effBgMode==='ambient';   // Wash shows whenever Background=Wash, regardless of theme
  const night = t.theme==='night';
  const off = t.theme==='off';
  const photoShowing = !ambient;          // a teaching photo is the background
  // Auto-detect background brightness: sample the photo(s) and average luminance (0–1).
  const [photoLum,setPhotoLum]=React.useState(null);
  React.useEffect(()=>{ let stop=false; if(!photoShowing||!photoList.length){ setPhotoLum(null); return; }
    Promise.all(photoList.slice(0,6).map(measureLum)).then(vs=>{ if(stop)return; const ok=vs.filter(v=>v!=null); setPhotoLum(ok.length? ok.reduce((a,b)=>a+b,0)/ok.length : null); });
    return ()=>{ stop=true; }; }, [photoList.join('|'), photoShowing]);
  // Bright themed photo → light tone with a soft frosted photo behind white cards.
  // The frosted-glass register (data-glass) is a SURFACE-ONLY choice — it must NOT
  // alter the background. Tone/scrim stay driven purely by background + brightness.
  // 'bright'/'dim' are manual overrides; 'normal' (default) auto-detects from photo luminance.
  const autoBright = photoShowing && photoLum!=null && photoLum>0.6;
  const photoBright = photoShowing && !off && (t.bgDim==='bright' ? true : (t.bgDim==='dim' ? false : autoBright));

  // ONE tone for the whole app so every page matches the home screen.
  const tone = night ? 'dark' : photoBright ? 'light' : photoShowing ? 'dark' : 'light';
  const scrimClass = ambient ? 'none' : (night ? 'dim' : photoBright ? 'frost' : 'min');
  const veil = view==='home' ? 'none'

             : photoShowing ? 'photo-soft'
             : night ? 'recede'
             : 'ambient';

  const ViewSet = { A:window.ViewsA, B:window.ViewsB, C:window.ViewsC }[effVersion];

  if(view!=='home' && view!=='Teach' && view!=='Post' && ViewSet) ViewComp = ViewSet[view];

            </div>
            <ToolsBar onCatch={()=>setCatchOpen(true)} onTool={(k)=>{ if(k==='resources'){ setView('Post'); } else { setDockTool(k); } }} />
            {window.NotifBell && <window.NotifBell />}
            <button className="iconbtn iconbtn-planner" title="Planner hub — lessons, units, resources, catch-up" onClick={()=>setLibOpen(true)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.2"/><path d="M3.5 9.5h17"/><path d="M8 3.5v3.5M16 3.5v3.5"/><rect x="7" y="12.5" width="2.6" height="2.6" rx="0.5" fill="currentColor" stroke="none"/><rect x="11" y="12.5" width="2.6" height="2.6" rx="0.5" fill="currentColor" stroke="none"/><rect x="15" y="12.5" width="2.6" height="2.6" rx="0.5" fill="currentColor" stroke="none"/><rect x="7" y="16" width="2.6" height="2.6" rx="0.5" fill="currentColor" stroke="none"/><rect x="11" y="16" width="2.6" height="2.6" rx="0.5" fill="currentColor" stroke="none"/></svg></button>
          </div>
        </div>

          : <div className="viewwrap">
              <div className="navwrap">
                <div className={'navwrap-row'+(view==='Plan'?' pl-navrow':'')}>

                  {view!=='Plan' && <button className="navback" title="Back to the previous screen" onClick={goBack}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>}
                  <div className="views nav">
                    {NAV.map(w=>(
                      <button key={w} className={'nav-item'+(view===w?' active':'')} onClick={()=>setView(w)}>{w}</button>

        {showBot &&
          <div className="botbar">

          </button>

          </button>
          <button onClick={()=>{ setLesson(menu.lesson); setLibOpen(true); setMenu(null); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg>Planner

      <QuotePopup quote={quotePop} onClose={()=>setQuotePop(null)} />
    </div>
  );
}
