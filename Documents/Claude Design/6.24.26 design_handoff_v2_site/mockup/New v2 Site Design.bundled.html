      {t:'Energy in Our World',   o:'I can connect energy concepts to real life.'} ]},
    sel:      { unit:'Self-Awareness', std:'CASEL', items:[
      {t:'Naming Emotions',     o:'I can name what I feel and why.'},
      {t:'Calm-Down Strategies',o:'I can use a strategy to regulate big feelings.'},
      {t:'Empathy Circle',      o:'I can listen and respond with empathy.'},
      {t:'Growth Mindset',      o:'I can reframe a setback as a chance to grow.'},
      {t:'Weekly Reflection',   o:'I can reflect on my week and set a goal.'} ]},
  };

  // build the static week (lessons aligned to periods), stable lesson ids
  function buildWeek(){
    const counters = {};
    return DAYS.map((day, di) => {
      const lessons = PLAN[day.key].map((sid, pi) => {
        const pool = POOL[sid];
        const n = counters[sid] = (counters[sid] || 0);
        counters[sid]++;
        const item = pool.items[n % pool.items.length];
        return {
          id: `${day.key}-${pi}`,
          dayIdx: di, periodIdx: pi,
          subjectId: sid,
          unit: pool.unit, std: pool.std,
          title: item.t, objective: item.o,
          start: PERIODS[pi].start, end: PERIODS[pi].end,
          room: ['Rm 5A','Rm 5A','Rm 5A','Library','Lab 2','Rm 5A'][pi],
        };
      });
      return { ...day, lessons };
    });
  }
  const WEEK = buildWeek();

  const toMin = (hhmm)=>{ const [h,m]=hhmm.split(':').map(Number); return h*60+m; };
  const fmt = (hhmm)=>{ let [h,m]=hhmm.split(':').map(Number); const ap=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')} ${ap}`; };

  // live status across the week, plus now / next refs
  function getState(now){
    const dow = now.getDay();                 // Sun=0 … Thu=4
    const todayIdx = (dow>=0 && dow<=4) ? dow : 0;
    const cur = now.getHours()*60 + now.getMinutes();
    let current=null, next=null;

    const days = WEEK.map((day, di)=>{
      const lessons = day.lessons.map(L=>{
        let status='idle';
        if(di < todayIdx) status='done';
        else if(di > todayIdx) status='idle';
        else { // today
          if(cur >= toMin(L.end)) status='done';
          else if(cur >= toMin(L.start)) status='now';
          else status='upcoming';
        }
        const ov = (function(){ try{ return localStorage.getItem('cc_title_'+L.id); }catch(e){ return null; } })();
        const out = { ...L, title: ov || L.title, status };
        if(status==='now') current = out;
        if(status==='upcoming' && !next && di===todayIdx) next = out;
        return out;
      });
      return { ...day, dayIdx:di, lessons };
    });
    if(!current && !next){ // before/after school → first upcoming today, else Sunday P1
      const today = days[todayIdx];
      next = today.lessons.find(l=>l.status==='upcoming') || days[0].lessons[0];
    }
    // chronological remaining lessons from "now" (today's now+upcoming, then future days)
    const remaining = [];
    for(let di=0; di<days.length; di++){
      for(const L of days[di].lessons){
        if(di > todayIdx || (di === todayIdx && L.status !== 'done')) remaining.push(L);
      }
    }
    return { days, todayIdx, current, next, remaining, now };
  }

  // year roadmap — per subject, sequence of units with progress
  const ROADMAP = {
    math:      [['Place Value',1],['Addition & Subtraction',1],['Multiplication & Division',0.55],['Fractions',0],['Measurement',0],['Geometry',0]],
    reading:   [['Building Readers',1],['Character & Setting',1],['Main Idea',1],['Inference',0.4],['Fact & Opinion',0],['Summarizing',0]],
    ufli:      [['Closed Syllables',1],['Open Syllables',1],['Vowel Teams',0.5],['R-Controlled',0],['Suffixes',0],['Prefixes',0]],
    writing:   [['Personal Essay',1],['Opinion',1],['Informative',0.7],['Narrative',0.3],['Poetry',0],['Research',0]],
    grammar:   [['Nouns & Verbs',1],['Clauses',0.6],['Punctuation',0],['Modifiers',0],['Agreement',0],['Conventions',0]],
    spelling:  [['Short Vowels',1],['Long Vowels',1],['Vowel Teams',0.6],['R-Controlled',0],['Plurals',0],['Affixes',0]],
    explorers: [['Life Cycles',1],['Habitats',1],['Energy & Motion',0.5],['Forces',0],['Weather',0],['Earth Systems',0]],
    sel:       [['Belonging',1],['Self-Awareness',0.6],['Self-Management',0],['Relationships',0],['Decisions',0],['Community',0]],
  };
  const MONTHS = ['Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];

  // resources — sample attachments per lesson (shared by planner + teach board)
  const RESTYPES = { Slides:'--subj-1', Worksheet:'--subj-10', Image:'--subj-13', Doc:'--subj-7', Video:'--subj-3', Link:'--subj-11' };
  function typeFromUrl(u){
    u=(u||'').toLowerCase();
    if(/\.(png|jpe?g|gif|webp|svg)$/.test(u)||u.includes('photos/')) return 'Image';
    if(u.includes('youtube')||u.includes('vimeo')||/\.(mp4|mov)$/.test(u)) return 'Video';
    if(u.includes('presentation')||u.includes('slides')) return 'Slides';
    if(u.includes('document')||u.includes('/doc')) return 'Doc';
    return 'Link';
  }
  function customRes(id){ try{ return JSON.parse(localStorage.getItem('cc_res_'+id))||[]; }catch(e){ return []; } }
  function addCustomRes(id,r){ const a=customRes(id); a.push(r); try{ localStorage.setItem('cc_res_'+id,JSON.stringify(a)); }catch(e){} return a; }
  function removeCustomRes(id,rid){ const a=customRes(id).filter(r=>r.id!==rid); try{ localStorage.setItem('cc_res_'+id,JSON.stringify(a)); }catch(e){} return a; }
  function resourcesFor(lesson){
    const sl = lesson.title.replace(/\s+/g,'-').toLowerCase();
    const base = [
      { id:lesson.id+'-r1', label:lesson.title+' — Slides', type:'Slides',    url:'https://docs.google.com/presentation/d/'+sl },
      { id:lesson.id+'-r2', label:'Practice Worksheet',      type:'Worksheet', url:'https://drive.google.com/file/worksheet-'+sl },
      { id:lesson.id+'-r3', label:'Anchor Chart',            type:'Image',     url:'photos/p2.png' },
      { id:lesson.id+'-r4', label:'Exit Ticket',             type:'Doc',       url:'https://docs.google.com/document/exit-'+sl },
      { id:lesson.id+'-r5', label:'Read-Aloud Video',        type:'Video',     url:'https://youtube.com/watch?v='+sl },
    ];
    // lesson tags — most belong to this lesson; some are shared across two (multi-tag)
    const here={ id:lesson.id, title:lesson.title };
    const shared={ id:'sh-sel', title:'SEL · Naming Emotions' };
    base.forEach((r,i)=>{ r.lessons = (i===0||i===2) && lesson.subjectId!=='sel' ? [here, shared] : [here]; });
    return [...base, ...customRes(lesson.id)];
  }

  // ── unit detail (for the Unit Explorer) ──
  function unitDetail(sid, uname, progress){
    const s=SUBJECTS[sid], pool=POOL[sid]||{items:[],std:'STD'};
    const total=6;
    const taughtN=Math.round((progress||0)*total);
    const baseStd=pool.std||'STD';
    const titles=['Introduce & Explore','Model the Strategy','Guided Practice','Apply Independently','Extend & Connect','Assess & Reflect'];
    const reasons=['Bumped — snow day','Moved to catch-up','Ran short on time'];
    const dates=['Jun 2','Jun 4','Jun 9','Jun 11','Jun 16','Jun 18'];
    const lessons=[];
    for(let i=0;i<total;i++){
      const taught=i<taughtN;
      lessons.push({
        id:sid+'-u-'+i, subjectId:sid, unit:uname,
        title:titles[i]+' · '+uname.split(' ').slice(-1)[0],
        objective:'I can '+['identify','model','practice','apply','extend','demonstrate'][i]+' the key skill of this unit.',
        std:baseStd+'.'+String.fromCharCode(97+(i%4)),
        start:'09:40', end:'10:25', room:'Rm 5A',
        taught, date:taught?dates[i]:null, reason:taught?null:reasons[i%3],
      });
    }
    const stds=[baseStd+'.a',baseStd+'.b',baseStd+'.c',baseStd+'.d'].map((code,i)=>({
      code, desc:['Foundational concept','Strategy application','Independent transfer','Synthesis & reflection'][i],
      hits: i<Math.ceil(progress*4)?(i+1):0,
    }));
    const covered=stds.filter(x=>x.hits>0).length, gaps=stds.length-covered;
    const plannedMin=total*45, actualMin=taughtN*45+ (taughtN?Math.round(Math.random()*0)*0:0);
    const pace= progress>=0.66?'On pace': progress>=0.34?'Slightly behind':'Behind';
    return {
      subject:s, sid, name:uname, progress:progress||0,
      taughtN, total, lessons, standards:stds, covered, gaps,
      resourceCount: total*2 + 3,
      weeksRemaining: Math.max(0, Math.round((1-(progress||0))*5)),
      projectedFinish: ['Jun 20','Jun 24','Jun 27','Jul 2'][Math.min(3,Math.round((1-(progress||0))*3))],
      plannedMin, actualMin,
      pace,
      teamProgress: Math.min(1, (progress||0)+0.12),
      summary:'This unit develops '+uname.toLowerCase()+' through a model→guided→independent arc, building toward '+baseStd+'. Students move from exploration to independent transfer and a reflective assessment.',
    };
  }

  // ── catch-up: untaught/overdue lessons + standard gaps rolled up by scope ──
  const SUBJ_ORDER=['ufli','reading','math','writing','grammar','spelling','explorers','sel'];
  function catchUp(){
    const out=[];
    SUBJ_ORDER.forEach(sid=>{
      const units=(ROADMAP[sid]||[]);
      units.forEach(([uname,prog])=>{
        if(prog>=1) return;
        const d=unitDetail(sid,uname,prog);
        d.lessons.filter(l=>!l.taught).forEach(l=>{
          out.push({ ...l, subjectId:sid, unit:uname, overdue: prog>0.2 });
        });
      });
    });
    // standards gaps
    const gaps=[];
    SUBJ_ORDER.forEach(sid=>{
      const units=(ROADMAP[sid]||[]);
      const cur=units.find(u=>u[1]>0&&u[1]<1);
      if(cur){ const d=unitDetail(sid,cur[0],cur[1]); d.standards.filter(st=>!st.hits).forEach(st=>gaps.push({ subjectId:sid, unit:cur[0], code:st.code, desc:st.desc })); }
    });
    return { lessons:out, gaps };
  }

  // ── hierarchy naming (global, configurable) ──
  const DEFAULT_LABELS={ curriculum:['Curriculum','Curriculums'], subject:['Subject','Subjects'], unit:['Unit','Units'], lesson:['Lesson','Lessons'] };
  function labels(){ try{ return {...DEFAULT_LABELS, ...JSON.parse(localStorage.getItem('cc_labels')||'{}')}; }catch(e){ return DEFAULT_LABELS; } }
  function label(level,plural){ const L=labels()[level]||DEFAULT_LABELS[level]||[level,level]; return plural?L[1]:L[0]; }
  function setLabel(level,sing,plur){ const all=labels(); all[level]=[sing,plur]; try{ localStorage.setItem('cc_labels',JSON.stringify(all)); }catch(e){} window.dispatchEvent(new Event('cc-labels')); }

  window.DS = { SUBJECTS, PERIODS, DAYS, WEEK, POOL, ROADMAP, MONTHS, RESTYPES, getState, fmt, toMin, resourcesFor,
                typeFromUrl, addCustomRes, removeCustomRes, unitDetail, catchUp, labels, label, setLabel,
                SUBJECT_ORDER:SUBJ_ORDER };
})();

</script>
<script data-src="dragscroll.js">
/* dragscroll.js — pan any overflow region by click-dragging it (no scrollbars).
   Skips real controls so clicks, drawing, HTML5-drag, and text editing still work. */
(function(){
  var SKIP = 'button, a, input, textarea, select, canvas, [contenteditable], [draggable="true"], .board-card, .lesson-menu, .twk-panel, .slide-thumb, .lp-res-item, .pl-tab, .view, .nav-item, .teach-resizer';
  function scrollable(el){
    while(el && el !== document.body && el.nodeType === 1){
      var cs = getComputedStyle(el);
      var ox = /(auto|scroll)/.test(cs.overflowX) && el.scrollWidth  > el.clientWidth  + 2;
      var oy = /(auto|scroll)/.test(cs.overflowY) && el.scrollHeight > el.clientHeight + 2;
      if(ox || oy) return { el:el, ox:ox, oy:oy };
      el = el.parentElement;
    }
    return null;
  }
  var drag = null;
  document.addEventListener('mousedown', function(e){
    if(e.button !== 0) return;
    if(e.target.closest && e.target.closest(SKIP)) return;
    var s = scrollable(e.target);
    if(!s) return;
    drag = { s:s, x:e.clientX, y:e.clientY, sl:s.el.scrollLeft, st:s.el.scrollTop, moved:false };
  });
  document.addEventListener('mousemove', function(e){
    if(!drag) return;
    var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
    if(!drag.moved && Math.abs(dx) + Math.abs(dy) > 5){ drag.moved = true; document.body.style.cursor = 'grabbing'; document.body.style.userSelect = 'none'; }
    if(drag.moved){
      if(drag.s.ox) drag.s.el.scrollLeft = drag.sl - dx;
      if(drag.s.oy) drag.s.el.scrollTop  = drag.st - dy;
      e.preventDefault();
    }
  });
  document.addEventListener('mouseup', function(){
    if(!drag) return;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    if(drag.moved){
      // swallow the click that follows a drag so it doesn't open a menu / select
      var cap = function(ev){ ev.stopPropagation(); ev.preventDefault(); document.removeEventListener('click', cap, true); };
      document.addEventListener('click', cap, true);
      setTimeout(function(){ document.removeEventListener('click', cap, true); }, 0);
    }
    drag = null;
  });
})();

</script>
<script data-src="tooltip.js">
/* Global styled tooltips — replaces native title= bubbles app-wide.
   On hover/focus of any [title] (or [data-tip]) element, shows a styled
   glass bubble and suppresses the browser's default tooltip. */
(function(){
  var tip=document.createElement('div');
  tip.className='app-tip'; tip.setAttribute('role','tooltip');
  var ready=false;
  function mount(){ if(!ready){ document.body.appendChild(tip); ready=true; } }
  var cur=null;

  function show(el){
    var txt=el.getAttribute('data-tip');
    if(!txt){ txt=el.getAttribute('title'); if(txt){ el.setAttribute('data-tip',txt); el.removeAttribute('title'); } }
    if(!txt) return;
    mount(); cur=el;
    tip.textContent=txt; tip.classList.add('on');
    position(el);
  }
  function position(el){
    var r=el.getBoundingClientRect();
    var tr=tip.getBoundingClientRect();
    var x=r.left+r.width/2-tr.width/2;
    var y=r.top-tr.height-9;
    var below=false;
    if(y<6){ y=r.bottom+9; below=true; }
    x=Math.max(8,Math.min(window.innerWidth-tr.width-8,x));
    tip.style.left=x+'px'; tip.style.top=y+'px';
    tip.setAttribute('data-below',below?'1':'0');
  }
  function hide(){ tip.classList.remove('on'); cur=null; }

  document.addEventListener('mouseover',function(e){
    var el=e.target.closest&&e.target.closest('[title],[data-tip]');
    if(el&&el!==cur) show(el);
  });
  document.addEventListener('mouseout',function(e){
    if(!cur) return;
    var to=e.relatedTarget;
    if(!to||!cur.contains(to)){ if(!(to&&to.closest&&to.closest('[title],[data-tip]')===cur)) hide(); }
  });
  document.addEventListener('focusin',function(e){
    var el=e.target.closest&&e.target.closest('[title],[data-tip]');
    if(el) show(el);
  });
  document.addEventListener('focusout',hide);
  document.addEventListener('click',hide,true);
  window.addEventListener('scroll',function(){ if(cur) position(cur); },true);
})();

</script>

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-src="views-shared.jsx">

/* live clock state shared by views */

  _uE(()=>{ const id=setInterval(()=>setNow(new Date()),1000*20); return ()=>clearInterval(id); },[]);
  return now;
}

window.VS = { subj, cv, STATUS, SubjGlyph, Ring, StatusDot, useNow };

/* Week navigator — ◀ Week N ▶, shared offset persisted so all frames agree */
function WeekHeader({ extra }){

  const set=(d)=>{ const n=off+d; setOff(n); try{ localStorage.setItem('cc_weekoff',String(n)); }catch(e){} };
  const wk=12+off;
  const mk=(m,d)=>{ const dt=new Date(2026,m-1,d); dt.setDate(dt.getDate()+off*7); return dt; };
  const a=mk(6,14), b=mk(6,18);
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const range = a.getMonth()===b.getMonth() ? `${MO[a.getMonth()]} ${a.getDate()}–${b.getDate()}` : `${MO[a.getMonth()]} ${a.getDate()}–${MO[b.getMonth()]} ${b.getDate()}`;

    <div className="vhead">

        <h2>{off===0?'This Week':'Week '+wk}</h2>
        <button className="wkarrow" title="Next week" onClick={()=>set(1)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>

/* Day navigator — shared offset hook + ◀ Day ▶ header (same style as week) */
function useDayOffset(){

  _uE(()=>{ const h=()=>{ try{ setOff(parseInt(localStorage.getItem('cc_dayoff')||'0',10)||0); }catch(e){} }; window.addEventListener('cc-dayoff',h); return ()=>window.removeEventListener('cc-dayoff',h); },[]);

  return (
    <div className="vhead">
      <div className="wknav">
        <button className="wkarrow" title="Previous day" onClick={()=>onShift(off-1)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <h2>{day.name}</h2>
        <button className="wkarrow" title="Next day" onClick={()=>onShift(off+1)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      {extra}
    </div>
  );
}
window.VS.useDayOffset = useDayOffset;
window.VS.DayHeader = DayHeader;

/* inline-editable lesson title (persists to localStorage; stopPropagation so it
   doesn't trigger the cell's click/menu while editing) */
function EditableTitle({ L, className }){
  const ref=_uR(null);
  return (
    <span ref={ref} className={(className||'')+' celledit'} contentEditable suppressContentEditableWarning

                      </window.UE.Chip>
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

window.ViewsC = { Day:DayC, Week:WeekC, Year:YearC };
})();

</script>
<script type="text/babel" data-src="planning.jsx">
/* Lesson-planning page — tabbed tools (Objective/Standards/Notes/Differentiation/
   Resources) + an expandable, richly-editable lesson flow. Each flow section opens
   into a formatted body (a formatting bar appears at the bottom while editing) and
   can have resources tagged to it. Resources tab = gallery (thumbnails) or list.
   Persists per-lesson to localStorage. Tab treatment adapts per direction (A/B/C). */
(function(){
const { useState, useEffect, useRef, useCallback } = React;
const { SUBJECTS, fmt } = window.DS;
const cv = (x)=>`var(${x})`;
const resColor = (type)=>`var(${window.DS.RESTYPES[type]||'--subj-11'})`;

const PTOOLS = [
  { k:'objective', label:'Objective',      color:'--brand-500' },
  { k:'standards', label:'Standards',       color:'--done' },
  { k:'notes',     label:'Lesson notes',    color:'--subj-5-bright' },
  { k:'diff',      label:'Differentiation', color:'--subj-7-bright' },
  { k:'resources', label:'Resources',        color:'--subj-13-bright' },
  { k:'details',   label:'Details',         color:'--subj-9-bright' },
];

function PIcon({ k }){
  const p = {strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',fill:'none',stroke:'currentColor',viewBox:'0 0 24 24'};
  if(k==='objective') return <svg {...p}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>;
  if(k==='standards') return <svg {...p}><path d="M12 7c-1.5-1.2-3.5-2-6-2v13c2.5 0 4.5.8 6 2 1.5-1.2 3.5-2 6-2V5c-2.5 0-4.5.8-6 2Z"/><path d="M12 7v13"/></svg>;
  if(k==='notes')     return <svg {...p}><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M16 3v5h5M8 12h6M8 16h4"/></svg>;
  if(k==='diff')      return <svg {...p}><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="12" r="2.5"/><path d="M8.2 7.4 15.5 11M8.2 16.6 15.5 13"/></svg>;
  if(k==='resources') return <svg {...p}><path d="M4 7.5A1.5 1.5 0 0 1 5.5 6h3.6l1.8 1.8h7.6A1.5 1.5 0 0 1 20 9.3v7.2A1.5 1.5 0 0 1 18.5 18h-13A1.5 1.5 0 0 1 4 16.5Z"/></svg>;
  if(k==='flow')      return <svg {...p}><path d="M4 6h16M4 12h16M4 18h10"/></svg>;
  if(k==='teach')     return <svg {...p}><path d="M7 5l12 7-12 7z" fill="currentColor" stroke="none"/></svg>;
  if(k==='x')         return <svg {...p}><path d="M18 6 6 18M6 6l12 12"/></svg>;
  if(k==='plus')      return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
  if(k==='back')      return <svg {...p}><path d="M15 18l-6-6 6-6"/></svg>;
  if(k==='chev')      return <svg {...p}><path d="M6 9l6 6 6-6"/></svg>;
  if(k==='film')      return <svg {...p}><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M3 15h18M8 4v16M16 4v16"/></svg>;
  if(k==='list')      return <svg {...p}><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>;
  if(k==='tag')       return <svg {...p}><path d="M3 12V5a2 2 0 0 1 2-2h7l9 9-9 9-9-9Z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor"/></svg>;
  if(k==='ext')       return <svg {...p}><path d="M14 4h6v6M20 4l-9 9M18 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5"/></svg>;
  return null;
}

const stripICan = (s)=> (s||'').replace(/^I can\s+/i,'');
const KEY = (id)=>`cc_plan_v1_${id}`;

function seedPlan(lesson){
  return {
    objective: stripICan(lesson.objective),
    notes: '',
    diff: { support:'', onLevel:'', extension:'' },
    lessonRes: [],
    flow: [
      { t:'Warm-up',         m:5,  body:'', res:[] },
      { t:'Mini-lesson',     m:15, body:'', res:[] },
      { t:'Guided practice', m:15, body:'', res:[] },
      { t:'Exit ticket',     m:5,  body:'', res:[] },
    ],
    modified: false,
  };
}
function loadPlan(lesson){
  try{ const raw=localStorage.getItem(KEY(lesson.id)); if(raw){ const p={ ...seedPlan(lesson), ...JSON.parse(raw) };
    p.flow=(p.flow||[]).map(st=>({ body:'', res:[], ...st })); return p; } }catch(e){}
  return seedPlan(lesson);
}
function persist(id,plan){ try{ localStorage.setItem(KEY(id),JSON.stringify(plan)); }catch(e){} }

/* plain single/multi-line text (innerText) */
function Editable({ initial, onChange, placeholder, single, className }){
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current && ref.current.innerText!==(initial||'')) ref.current.innerText = initial||''; },[]);
  return (
    <div ref={ref} className={'pl-edit '+(single?'single ':'')+(className||'')}
      contentEditable suppressContentEditableWarning data-ph={placeholder}
      onInput={(e)=>onChange(e.currentTarget.innerText)}
      onKeyDown={single?(e)=>{ if(e.key==='Enter'){ e.preventDefault(); e.currentTarget.blur(); } }:undefined} />
  );
}

/* rich text (innerHTML) — raises the formatting bar while focused */
function RichEditable({ initialHtml, onChange, onFocusBar, onBlurBar, placeholder, className }){
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current && ref.current.innerHTML!==(initialHtml||'')) ref.current.innerHTML = initialHtml||''; },[]);
  return (
    <div ref={ref} className={'pl-edit pl-rich '+(className||'')}
      contentEditable suppressContentEditableWarning data-ph={placeholder}
      onFocus={onFocusBar} onBlur={onBlurBar}
      onInput={(e)=>onChange(e.currentTarget.innerHTML)} />
  );
}

function ResThumb({ r, onOpen, onTag, tagged }){
  const isImg = r.type==='Image';
  return (
    <div className="pl-gcard">
      <div className="pl-gthumb" style={isImg?{backgroundImage:`url('${r.url}')`}:{background:`linear-gradient(140deg, ${resColor(r.type)}, color-mix(in oklab, ${resColor(r.type)} 60%, #15131f))`}}>
        {!isImg && <span className="pl-gtype">{r.type}</span>}
        <div className="pl-gactions">
          <button title="Open in a new tab" onClick={()=>window.open(r.url,'_blank','noopener')}><PIcon k="ext"/></button>
          {onTag && <button title="Tag to a lesson step" onClick={()=>onTag(r)}><PIcon k="tag"/></button>}
        </div>
      </div>
      <div className="pl-gmeta"><span className="pl-respill" style={{background:`color-mix(in oklab, ${resColor(r.type)} 18%, white)`, color:resColor(r.type)}}>{r.type}</span><span className="pl-glabel">{r.label}</span></div>
    </div>
  );
}

function PlanPage({ lesson, version, showForking, onTeach, embedded }){
  const s = SUBJECTS[lesson.subjectId];
  const [plan,setPlan] = useState(()=>loadPlan(lesson));
  const [active,setActive] = useState('objective');
  const [details,setDetails] = useState(false);
  const [resView,setResView] = useState('gallery');
  const [openStep,setOpenStep] = useState(0);
  const [fmtOpen,setFmtOpen] = useState(false);
  const [tagFor,setTagFor] = useState(-1);   // step index awaiting a resource tag
  const [saveAsk,setSaveAsk] = useState(false);
  const [tplOpen,setTplOpen] = useState(false);
  const [newOpen,setNewOpen] = useState(false);
  const askedRef = useRef(false);

  const TEMPLATES = {
    'Gradual release':[{t:'Warm-up',m:5},{t:'I do — Model',m:10},{t:'We do — Guided',m:15},{t:'You do — Independent',m:10},{t:'Exit ticket',m:5}],
    '5E inquiry':[{t:'Engage',m:8},{t:'Explore',m:12},{t:'Explain',m:10},{t:'Elaborate',m:10},{t:'Evaluate',m:5}],
    'Workshop':[{t:'Mini-lesson',m:12},{t:'Independent work',m:25},{t:'Conferring',m:8},{t:'Share',m:5}],
    'Direct instruction':[{t:'Review',m:5},{t:'Present',m:15},{t:'Guided practice',m:15},{t:'Independent practice',m:10}],
    'Simple':[{t:'Warm-up',m:5},{t:'Mini-lesson',m:15},{t:'Guided practice',m:15},{t:'Exit ticket',m:5}],
  };
  const applyTemplate = (name)=>{ const f=TEMPLATES[name]; if(!f) return; commit(p=>{ p.flow=f.map(x=>({t:x.t,m:x.m,body:'',res:[]})); p.template=name; return p; }); setTplOpen(false); setOpenStep(0); };
  const [dragKey,setDragKey] = useState(null);
  const dragRef = useRef(null);
  const fmtTimer = useRef();

  useEffect(()=>{ setPlan(loadPlan(lesson)); setActive('objective'); setDetails(false); setOpenStep(0); },[lesson.id]);

  const commit = useCallback((mut)=>{
    setPlan(p=>{ const np = mut({ ...p }); np.modified = true; persist(lesson.id, np); return np; });
    if(!askedRef.current){ try{ if(localStorage.getItem('cc_savePrompt')!=='off'){ askedRef.current=true; setSaveAsk(true); } }catch(e){} }
  },[lesson.id]);

  const onFocusBar = ()=>{ clearTimeout(fmtTimer.current); setFmtOpen(true); };
  const onBlurBar  = ()=>{ fmtTimer.current=setTimeout(()=>setFmtOpen(false),180); };
  const exec = (cmd,val)=>{ document.execCommand(cmd,false,val||null); };

  const resources = window.DS.resourcesFor(lesson);
  const resById = (id)=>resources.find(r=>r.id===id);

  // tab order (persisted, draggable) — falls back to default PTOOLS order
  const orderedTools = (()=>{
    const ord = plan.tabOrder || PTOOLS.map(t=>t.k);
    const seen = ord.filter(k=>PTOOLS.some(t=>t.k===k));
    PTOOLS.forEach(t=>{ if(!seen.includes(t.k)) seen.push(t.k); });
    return seen.map(k=>PTOOLS.find(t=>t.k===k)).filter(Boolean);
  })();
  const reorder = (fromK,toK)=>{
    if(fromK===toK) return;
    const ks = orderedTools.map(t=>t.k);
    const fi = ks.indexOf(fromK), ti = ks.indexOf(toK);
    ks.splice(ti,0,ks.splice(fi,1)[0]);
    commit(p=>{ p.tabOrder = ks; return p; });
  };

  const tabStyle = version==='B'?'console':version==='C'?'pill':'glass';
  const totalMin = plan.flow.reduce((a,st)=>a+(Number(st.m)||0),0);
  const objPreview = plan.objective ? `I can ${plan.objective}` : lesson.objective;

  const renderPane = ()=>{
    if(active==='objective') return (
      <div className="pl-objrow">
        <span className="pl-ican">I can</span>
        <Editable key={lesson.id+':obj'} initial={plan.objective} single
          placeholder="state the lesson objective…"
          onChange={(v)=>commit(p=>{p.objective=v;return p;})} />
      </div>
    );
    if(active==='standards') return (
      <div>
        <div className="pl-stdlist">
          <div className="pl-stdrow"><span className="pl-stdcode">{lesson.std}</span><span className="pl-stddesc">{lesson.unit}</span></div>
          <div className="pl-stdrow"><span className="pl-stdcode">{lesson.std}.a</span><span className="pl-stddesc">{lesson.objective}</span></div>
        </div>
        <button className="pl-btn sm" title="The standards picker isn’t wired in this prototype yet — it will let you search your frameworks and tag standards.">Edit standards</button>
      </div>
    );
    if(active==='notes') return (
      <RichEditable key={lesson.id+':notes'} initialHtml={plan.notes}
        placeholder="Add private notes for yourself… (select text to format)"
        onFocusBar={onFocusBar} onBlurBar={onBlurBar}
        onChange={(v)=>commit(p=>{p.notes=v;return p;})} />
    );
    if(active==='diff') return (
      <div className="pl-diff">
        {[['support','Support','--subj-3-bright'],['onLevel','On level','--subj-10-bright'],['extension','Extension','--subj-13-bright']].map(([key,label,col])=>(
          <div key={key} className="pl-tier" style={{'--tc':cv(col)}}>
            <h5 style={{color:cv(col)}}>{label}</h5>
            <Editable key={lesson.id+':'+key} initial={plan.diff[key]}
              placeholder={`Plan the ${label.toLowerCase()} tier…`}
              onChange={(v)=>commit(p=>{p.diff={...p.diff,[key]:v};return p;})} />
          </div>
        ))}
      </div>
    );
    if(active==='resources') return (
      <div>
        <div className="pl-resbar">
          <div className="pl-viewtog">
            <button className={resView==='gallery'?'on':''} onClick={()=>setResView('gallery')} title="Gallery view"><PIcon k="film"/></button>
            <button className={resView==='list'?'on':''} onClick={()=>setResView('list')} title="List view"><PIcon k="list"/></button>
          </div>
          <button className="pl-btn sm" onClick={()=>{
            const url=prompt('Paste a link, or a path to an image/doc:'); if(!url) return;
            const label=prompt('Name this resource:', url.split('/').pop()||'Resource')||'Resource';
            window.DS.addCustomRes(lesson.id,{ id:'c'+Date.now(), label, type:window.DS.typeFromUrl(url), url, custom:true });
            commit(p=>{p.resBump=(p.resBump||0)+1;return p;});
          }}>+ Add resource / link / picture</button>
        </div>
        {resView==='gallery'
          ? <div className="pl-gallery">{resources.map(r=><ResThumb key={r.id} r={r} />)}</div>
          : <div className="pl-rlist">
              {resources.map(r=>(
                <div key={r.id} className="pl-rrow">
                  <span className="pl-rdot" style={{background:resColor(r.type)}}/>
                  <span className="pl-rtype" style={{color:resColor(r.type)}}>{r.type}</span>
                  <span className="pl-rlabel">{r.label}</span>
                  <button className="pl-rtab" title="Open in a new tab" onClick={()=>window.open(r.url,'_blank','noopener')}><PIcon k="ext"/></button>
                  {r.custom && <button className="pl-rrm" title="Remove resource" onClick={()=>{ window.DS.removeCustomRes(lesson.id,r.id); commit(p=>{p.resBump=(p.resBump||0)+1;return p;}); }}>×</button>}
                </div>
              ))}
            </div>}
      </div>
    );
    if(active==='details') return (
      <div className="pl-details" style={{padding:0}}>
        <div className="pl-drow"><span className="dk">Subject</span><span className="dv">{s.full}</span></div>
        <div className="pl-drow"><span className="dk">Unit</span><span className="dv">{lesson.unit}</span></div>
        <div className="pl-drow"><span className="dk">Time</span><span className="dv">{fmt(lesson.start)}–{fmt(lesson.end)}</span></div>
        <div className="pl-drow"><span className="dk">Room</span><span className="dv">{lesson.room}</span></div>
        <div className="pl-drow"><span className="dk">Standard</span><span className="dv">{lesson.std}</span></div>
        <div className="pl-drow"><span className="dk">Status</span><span className="dv">{lesson.status==='now'?'In progress':lesson.status==='done'?'Complete':'Planned'}</span></div>
      </div>
    );
    return null;
  };

  const meta = PTOOLS.find(x=>x.k===active);

  return (
    <div className="plan" style={{'--subj':cv(s.c), '--subjink':cv(s.ink)}}>
      {/* header */}
      <div className="pl-card pl-head"
           style={{borderLeftColor:cv(s.c), borderLeftStyle:(showForking && plan.modified)?'dashed':'solid'}}>
        <div className="pl-id">
          <window.VS.SubjGlyph id={lesson.subjectId} size={40} radius={12}/>
          <div className="pl-tt">
            <div className="pl-title">{lesson.title}</div>
            <div className="pl-objprev">{objPreview}</div>
          </div>
        </div>
        <div/>
        <div className="pl-right">
          {showForking &&
            <div className="pl-badges">
              {plan.modified && <span className="pl-pill mod"><span className="pd"/>Modified</span>}
              <span className="pl-pill personal">Personal copy</span>
            </div>}
          {!embedded && <button className="pl-btn ghost sm" title="Create a brand-new lesson" onClick={()=>setNewOpen(true)}><PIcon k="plus"/>Make new lesson</button>}
          {!embedded && <button className="pl-btn pri" onClick={()=>onTeach(lesson)}><PIcon k="teach"/>Teach</button>}
          {embedded && <button className="pl-btn ghost sm icon" title="Open the resource wall for this lesson" onClick={()=>window.dispatchEvent(new CustomEvent('cc-open-post',{detail:{lesson}}))}><PIcon k="resources"/></button>}
          {embedded && <button className="pl-btn ghost sm icon" title="Open the full lesson plan page" onClick={()=>window.dispatchEvent(new CustomEvent('cc-open-plan',{detail:{lesson}}))}><PIcon k="notes"/></button>}
        </div>
      </div>

      {/* tool tabs + active pane — connected tabbed card */}
      <div className="pl-folder" style={{'--pc':cv(meta.color)}}>
        <div className="pl-tabs">
          {orderedTools.map(tool=>(
            <button key={tool.k} draggable
                    className={'pl-tab'+(active===tool.k?' on':'')+(dragKey===tool.k?' dragging':'')}
                    style={{'--pc':cv(tool.color)}} onClick={()=>setActive(tool.k)}
                    onDragStart={(e)=>{ dragRef.current=tool.k; setDragKey(tool.k); try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',tool.k);}catch(x){} }}
                    onDragOver={(e)=>{ e.preventDefault(); }}
                    onDrop={(e)=>{ e.preventDefault(); if(dragRef.current) reorder(dragRef.current,tool.k); dragRef.current=null; setDragKey(null); }}
                    onDragEnd={()=>{ dragRef.current=null; setDragKey(null); }}
                    title="Drag to reorder">
              <span className="pdot"/><PIcon k={tool.k}/>{tool.label}
            </button>
          ))}
        </div>
        <div className="pl-pane">
          {renderPane()}
        </div>
      </div>

      {/* expandable, richly-editable lesson flow */}
      <div className="pl-card pl-flowcard">
        <div className="pl-flowhead">
          <span className="nm"><PIcon k="flow"/>Lesson flow{plan.template && <span className="pl-tplname">· {plan.template}</span>}</span>
          <span className="pl-flowtools">
            <button className="pl-flowadd" title="Add resources to this lesson" onClick={()=>setActive('resources')}><PIcon k="plus"/>Add resources</button>
            <div className="pl-tplwrap">
              <button className="pl-tplbtn" title="Choose a lesson structure" onClick={()=>setTplOpen(o=>!o)}>Template<PIcon k="chev"/></button>
              {tplOpen && <div className="pl-tplpop" onMouseLeave={()=>setTplOpen(false)}>
                <div className="pl-tpllbl">Change template</div>
                {Object.keys(TEMPLATES).map(name=>(
                  <button key={name} className={'pl-tplrow'+(plan.template===name?' on':'')} onClick={()=>applyTemplate(name)}>{name}<span className="pl-tplsteps">{TEMPLATES[name].length} steps</span></button>
                ))}
                <button className="pl-tplrow add" onClick={()=>{ setTplOpen(false); }}><PIcon k="plus"/>Add current as template…</button>
              </div>}
            </div>
            <button className="pl-flowbtn" title="Expand all" onClick={()=>setOpenStep('all')}><PIcon k="chev"/></button>
            <button className="pl-flowbtn up" title="Collapse all" onClick={()=>setOpenStep(-1)}><PIcon k="chev"/></button>
            <span className="tot">{totalMin} min · {plan.flow.length} steps</span>
          </span>
        </div>
        {plan.flow.map((st,i)=>{
          const open = openStep==='all' || openStep===i;
          const tagged = (st.res||[]).map(resById).filter(Boolean);
          return (
            <div key={i} className={'pl-step2'+(open?' open':'')}>
              <div className="pl-step-row">
                <button className="pl-stepn" onClick={()=>setOpenStep(open?-1:i)} title={open?'Collapse':'Expand'}>{i+1}</button>
                <Editable key={lesson.id+':flow:'+i+':'+st.t.length} initial={st.t} single
                  placeholder="Step name…"
                  onChange={(v)=>commit(p=>{ const flow=[...p.flow]; flow[i]={...flow[i],t:v}; p.flow=flow; return p; })} />
                <span className="pl-min">
                  <input type="number" min="0" value={st.m}
                    onChange={(e)=>commit(p=>{ const flow=[...p.flow]; flow[i]={...flow[i],m:e.target.value===''?'':Number(e.target.value)}; p.flow=flow; return p; })}/>
                  min
                </span>
                <button className="pl-stepchev" onClick={()=>setOpenStep(open?-1:i)} title={open?'Collapse':'Expand'} style={{transform:open?'rotate(180deg)':'none'}}><PIcon k="chev"/></button>
                <button className="pl-stepadd" title="Add resources" onClick={()=>{ setOpenStep(i); setTagFor(i); }}><PIcon k="plus"/></button>
                <button className="pl-x" title="Remove step"
                  onClick={()=>commit(p=>{ p.flow=p.flow.filter((_,j)=>j!==i); return p; })}><PIcon k="x"/></button>
              </div>
              {open &&
                <div className="pl-step-body">
                  <RichEditable key={lesson.id+':body:'+i} initialHtml={st.body}
                    placeholder="Describe this part of the lesson — steps, prompts, questions… (select text to format)"
                    onFocusBar={onFocusBar} onBlurBar={onBlurBar}
                    onChange={(v)=>commit(p=>{ const flow=[...p.flow]; flow[i]={...flow[i],body:v}; p.flow=flow; return p; })} />
                  <div className="pl-step-res">
                    {tagged.map(r=>(
                      <span key={r.id} className="pl-tagchip" style={{borderColor:`color-mix(in oklab, ${resColor(r.type)} 50%, transparent)`}}>
                        <span className="pl-tagdot" style={{background:resColor(r.type)}}/>
                        <span className="pl-taglbl" onClick={()=>window.open(r.url,'_blank','noopener')} title="Open in a new tab">{r.label}</span>
                        <button className="pl-tagx" title="Untag" onClick={()=>commit(p=>{ const flow=[...p.flow]; flow[i]={...flow[i],res:(flow[i].res||[]).filter(x=>x!==r.id)}; p.flow=flow; return p; })}><PIcon k="x"/></button>
                      </span>
                    ))}
                    <div className="pl-tagwrap">
                      <button className="pl-tagadd" onClick={()=>setTagFor(tagFor===i?-1:i)}><PIcon k="tag"/>Tag resource</button>
                      {tagFor===i &&
                        <div className="pl-tagpop">
                          {resources.filter(r=>!(st.res||[]).includes(r.id)).map(r=>(
                            <button key={r.id} className="pl-tagrow" onClick={()=>{ commit(p=>{ const flow=[...p.flow]; flow[i]={...flow[i],res:[...(flow[i].res||[]),r.id]}; p.flow=flow; return p; }); setTagFor(-1); setActive('resources'); }}>
                              <span className="pl-respill" style={{background:`color-mix(in oklab, ${resColor(r.type)} 18%, white)`, color:resColor(r.type)}}>{r.type}</span>{r.label}
                            </button>
                          ))}
                          {resources.filter(r=>!(st.res||[]).includes(r.id)).length===0 && <div className="pl-tagempty">All resources tagged</div>}
                        </div>}
                    </div>
                  </div>
                </div>}
            </div>
          );
        })}

<script type="text/babel" data-src="lesson-nav.jsx">
/* Shared left-rail navigator — lesson + resource browsing by the wall's category

(function(){
const { useState, useMemo } = React;
const cv = (x)=>`var(${x})`;
const SUBJ = window.DS.SUBJECTS;

const PRESETS = [
  { k:'current', label:'This Lesson' },
  { k:'today', label:"Today's Lessons" },
  { k:'weekmix', label:'This Week · Mixed' },
  { k:'weeksub', label:'This Week · Subject' },
  { k:'subject', label:'By Subject' },
  { k:'unit', label:'By Unit' },
];
const RES_PRESETS = PRESETS.concat([{ k:'untagged', label:'Untagged' }]);

const ICON = {
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>,
  chev:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
};

function lessonsFor(state, preset){
  const days = state.days;
  if(preset==='current'){ const cur=state.current||state.next||state.days[state.todayIdx].lessons[0]; return [{ title:'This lesson', items:[cur] }]; }
  if(preset==='today') return [{ title:state.days[state.todayIdx].name, items:state.days[state.todayIdx].lessons }];
  if(preset==='weekmix'){
    return days.map(d=>({ title:d.short+' · '+d.date, items:d.lessons }));
  }
  if(preset==='weeksub' || preset==='subject'){
    const by={};
    days.forEach(d=>d.lessons.forEach(l=>{ (by[l.subjectId]=by[l.subjectId]||[]).push(l); }));
    return window.DS.SUBJECT_ORDER.filter(s=>by[s]).map(s=>({ title:SUBJ[s].full, sid:s, items:by[s] }));
  }
  if(preset==='unit'){
    const by={};
    days.forEach(d=>d.lessons.forEach(l=>{ (by[l.unit]=by[l.unit]||[]).push(l); }));
    return Object.keys(by).map(u=>({ title:u, items:by[u] }));
  }
  return [{ title:'All', items:days.flatMap(d=>d.lessons) }];
}

function LessonNav({ state, tab='lessons', onTab, onPickLesson, onPickResource, onPlanLesson, onPostLesson, onClose, activeId, activeLesson, version, showForking, onTeach }){

  return (

        {onClose && <button className="lnav-x" onClick={onClose} title="Close">{ICON.x}</button>}
      </div>
      {tab==='lessons' && planning
        ? <div className="lnav-plan">
            <button className="lnav-back" onClick={()=>setPlanning(null)}>{ICON.chev}<span>All lessons</span></button>
            {window.PlanPage
              ? <window.PlanPage lesson={planning} version={version||'A'} showForking={showForking} onTeach={(l)=>{ if(onTeach)onTeach(l||planning); setPlanning(null); }} embedded/>
              : null}
          </div>
        : <React.Fragment>
      <div className="lnav-controls">
        <div className="lnav-presetwrap">
          <button className="lnav-preset" onClick={()=>setPop(p=>!p)}>{presetLabel}{ICON.chev}</button>
          {pop && <div className="lnav-presetpop">
            {presets.map(p=>(
              <button key={p.k} className={preset===p.k?'on':''} onClick={()=>{ setPreset(p.k); setPop(false); }}>{p.label}</button>
            ))}
          </div>}
        </div>
        <div className="lnav-search">{ICON.search}<input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"/></div>
        {tab==='resources' &&
          <div className="lnav-vtog">
            <button className={resView==='list'?'on':''} title="List view" onClick={()=>setResView('list')}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
            <button className={resView==='thumb'?'on':''} title="Thumbnail view" onClick={()=>setResView('thumb')}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
          </div>}
      </div>
      <div className="lnav-list">
        {groups.map((g,gi)=>(
          <div key={gi} className="lnav-group">
            <div className="lnav-ghead"><span className="lnav-gdot" style={{background: g.sid?cv(SUBJ[g.sid].c):'var(--muted)'}}/>{g.title}<span className="lnav-gn">{g.items.length}</span></div>
            <div className={tab==='resources'&&resView==='thumb'?'lnav-thumbs':''}>
            {g.items.map((it,ii)=>{
              const s=SUBJ[it.subjectId];
              const lname = it._lesson ? it._lesson.title : '';
              if(tab==='resources' && resView==='thumb'){
                return (
                  <button key={ii} className="lnav-thumb" onClick={()=>onPickResource&&onPickResource(it)}>
                    <span className="lnav-thumbart" style={{background:`color-mix(in oklab, ${cv(s.c)} 20%, white)`,color:cv(s.c)}}>{(it.type||'').slice(0,1).toUpperCase()}</span>
                    <span className="lnav-thumbtitle">{it.label||it.title}</span>
                    <span className="lnav-thumbsub">{s.label}{lname?' · '+lname:''}</span>
                  </button>
                );
              }
              return (
                <div key={ii} className="lnav-itemwrap">
                <button className={'lnav-item'+(activeId&&it.id===activeId?' on':'')}
                  onClick={()=>tab==='resources'?(onPickResource&&onPickResource(it)):setPlanning(it)}>
                  <span className="lnav-bar" style={{background:cv(s.c)}}/>
                  <span className="lnav-itext">
                    <span className="lnav-ititle">{it.title||it.label}</span>
                    <span className="lnav-isub">{tab==='resources'?((it.type||'').toUpperCase()+' · '+s.full+(lname?' · '+lname:'')):(s.full+(it.std?' · '+it.std:''))}</span>
                  </span>
                </button>
                {tab!=='resources' && <span className="lnav-rowacts">
                  <button title="Lesson plan" onClick={()=>onPlanLesson&&onPlanLesson(it)}>Plan</button>
                  <button title="Resource wall" onClick={()=>onPostLesson&&onPostLesson(it)}>Wall</button>
                </span>}
                {window.Share && <window.Share.Btn kind={tab==='resources'?'resource':'lesson'} id={it.id} label={it.title||it.label} bare />}
                </div>
              );
            })}
            </div>
          </div>
        ))}
        {!groups.length && <div className="lnav-empty">No matches</div>}
      </div>
      <button className="lnav-add">{ICON.plus}{tab==='resources'?'New resource / note':'New lesson'}</button>
      </React.Fragment>}
    </div>
  );
}

window.LessonNav = LessonNav;
})();

</script>
<script type="text/babel" data-src="teach.jsx">
/* Teach board — minimizable/pinnable lesson pane, fullscreen board, slides,
   annotation (writing) bar, and resources you can click or drag onto the board. */
(function(){
const { useState, useRef, useEffect, useCallback } = React;
const { SUBJECTS, RESTYPES, fmt } = window.DS;

function TI({k}){
  const p={strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',fill:'none',stroke:'currentColor',viewBox:'0 0 24 24','aria-hidden':true};
  switch(k){
    case 'pin':   return <svg {...p}><path d="M9 4h6l-1 6 3 3v2H7v-2l3-3-1-6Z"/><path d="M12 15v5"/></svg>;

    case 'reset': return <svg {...p}><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>;

    case 'trash': return <svg {...p}><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>;

    default: return null;
  }

function TeachView({ lesson, state, onPlan, onPick }){

  const [minimized,setMin]=useState(false);

  const mm=String(Math.floor(sec/60)).padStart(2,'0'), ss=String(sec%60).padStart(2,'0');

  const lessonHidden = fullscreen && !pinned;
