.rw-popfilters button.on{background:var(--ink);color:#fff;border-color:transparent}
.home[data-tone="dark"] .rw-popfilters button{border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff}
.home[data-tone="dark"] .rw-popfilters button.on{background:#fff;color:var(--ink)}

.rw-sections{display:flex;flex-direction:column;gap:18px}
.rw-sec{border-radius:var(--r-xl);padding:14px;background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.7);-webkit-backdrop-filter:blur(20px) saturate(1.2);backdrop-filter:blur(20px) saturate(1.2);box-shadow:0 16px 44px -28px rgba(28,27,46,.4)}
.home[data-tone="dark"] .rw-sec{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.16)}
/* wall-level "Color sections by subject" toggle (sections tint by subject; per-section bg overrides) */
.rw-root.rw-subjcolor .rw-sec:not(.has-bg){background:color-mix(in oklab, var(--sc,var(--brand-500)) 14%, rgba(255,255,255,.5));border-color:color-mix(in oklab, var(--sc,var(--brand-500)) 24%, rgba(255,255,255,.7))}
.home[data-tone="dark"] .rw-root.rw-subjcolor .rw-sec:not(.has-bg){background:color-mix(in oklab, var(--sc,var(--brand-500)) 24%, rgba(255,255,255,.08));border-color:color-mix(in oklab, var(--sc,var(--brand-500)) 30%, rgba(255,255,255,.16))}
.home[data-version="B"] .rw-root.rw-subjcolor .rw-sec:not(.has-bg){background:color-mix(in oklab, var(--sc,var(--brand-500)) 12%, #fff);border-color:color-mix(in oklab, var(--sc,var(--brand-500)) 26%, var(--border))}
.rw-subjsw{width:30px;height:18px;border-radius:999px;background:rgba(127,127,150,.32);position:relative;flex:0 0 auto;transition:background .15s}
.rw-subjsw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.rw-subjsw.on{background:var(--accent,var(--brand-500))}
.rw-subjsw.on::after{transform:translateX(12px)}
/* Calm Glass · wall sections honor the Dark/White frosted register (overrides photo tone) */
.home[data-version="A"][data-glass="light"] .rw-root:not(.rw-subjcolor) .rw-sec:not(.has-bg){background:linear-gradient(180deg,rgba(255,255,255,.66),rgba(255,255,255,.5));border:1px solid rgba(255,255,255,.82)}
.home[data-version="A"][data-glass="light"] .rw-root:not(.rw-subjcolor) .rw-sec:not(.has-bg) :is(.rw-sectitle,.rw-secmeta,.rw-seccount,.rw-grip,.rw-collapse){color:var(--ink)}
.home[data-version="A"][data-glass="dark"] .rw-root:not(.rw-subjcolor) .rw-sec:not(.has-bg){background:linear-gradient(180deg,rgba(42,42,60,.5),rgba(28,28,44,.44));border:1px solid rgba(255,255,255,.14)}
.home[data-version="A"][data-glass="dark"] .rw-root:not(.rw-subjcolor) .rw-sec:not(.has-bg) :is(.rw-sectitle,.rw-secmeta,.rw-seccount,.rw-grip,.rw-collapse){color:#fff}
.rw-sec[data-secdrag="1"]{box-shadow:0 0 0 1px var(--accent,var(--brand-500)),0 14px 40px -22px rgba(28,27,46,.5)}
/* while dragging a card, all cards shrink to a tidy compact row (icon + label) */
.rw-card-mini{height:auto !important;min-height:0 !important;padding:0 !important;display:flex !important;align-items:center;gap:0;border-radius:var(--r-md) !important;overflow:hidden;box-shadow:var(--sh-xs)}
.rw-card-mini .rw-badge,.rw-card-mini .rw-actions,.rw-card-mini .rw-cmeta,.rw-card-mini .rw-noteacts{display:none !important}
.rw-card-mini .rw-thumb{width:36px !important;height:36px !important;min-height:0 !important;flex:0 0 auto;border-radius:0 !important;display:grid;place-items:center;padding:0 !important;overflow:hidden}
.rw-card-mini .rw-thumb>*{display:none !important}
.rw-card-mini .rw-thumb svg{display:block !important;width:17px;height:17px;opacity:.9}
.rw-card-mini .rw-cbody{padding:0 12px !important;flex:1;min-width:0;display:flex;align-items:center}
.rw-card-mini .rw-ctitle{font-size:12.5px !important;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-line-clamp:unset !important;display:block !important}

.rw-grid:has(.rw-card-mini){display:flex !important;flex-direction:column;gap:6px}
/* new-note composer */
.rw-composing{display:flex;flex-direction:column;padding:10px;gap:8px}

.rw-noteadd svg{width:14px;height:14px}
.rw-notedone{border:0;background:var(--accent,var(--brand-500));color:#fff;border-radius:var(--r-pill);padding:6px 14px;font-family:var(--font-sans);font-weight:700;font-size:12px;cursor:pointer}
.rw-attachnote{font-size:12px;color:var(--body);line-height:1.45;margin-top:6px;border-top:1px solid var(--hairline);padding-top:6px}
.home[data-tone="dark"] .rw-attachnote{color:rgba(255,255,255,.8)}
.rw-sec.has-bg{padding:8px}
.rw-sec.has-bg .rw-sechead{background:rgba(255,255,255,.6);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
/* drag-to-reorder: insertion indicator on the card you'll drop before */
.rw-card.rw-dropbefore{position:relative}
.rw-card.rw-dropbefore::after{content:"";position:absolute;left:-9px;top:-2px;bottom:-2px;width:3px;border-radius:3px;background:var(--accent,var(--brand-500));box-shadow:0 0 10px var(--accent,var(--brand-500));z-index:5}
/* section size: two-row state clamps the grid to ~2 rows then scrolls */
.rw-grid.rw-grid-two{max-height:392px;overflow-y:auto;scrollbar-width:none;-webkit-mask-image:linear-gradient(180deg,#000 86%,transparent);mask-image:linear-gradient(180deg,#000 86%,transparent)}

/* solo: present one section as its own board */

  background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(34px) saturate(1.3);backdrop-filter:blur(34px) saturate(1.3);
  border:1px solid rgba(255,255,255,.7);box-shadow:0 50px 110px -40px rgba(12,11,20,.6)}

.rw-solohead{display:flex;align-items:center;gap:11px;padding:16px 20px;border-bottom:1px solid var(--hairline);flex:0 0 auto}
.rw-solotitle{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:19px;letter-spacing:-.01em;color:var(--ink)}

.rw-solometa{font-size:12.5px;font-weight:600;color:var(--muted)}
.rw-soloplay{margin-left:auto;width:38px;height:38px;border:0;background:var(--accent,var(--brand-500));color:#fff;border-radius:50%;cursor:pointer;display:grid;place-items:center}
.rw-soloplay svg{width:17px;height:17px}
.rw-soloclose{width:38px;height:38px;border:1px solid var(--border);background:rgba(255,255,255,.6);color:var(--ink-soft);border-radius:50%;cursor:pointer;display:grid;place-items:center}
.rw-soloclose:hover{transform:rotate(90deg)}

.rw-soloclose svg{width:16px;height:16px}
.rw-solo .rw-grid{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:20px;align-content:start}
.rw-solo .rw-grid::-webkit-scrollbar{display:none}
.home[data-tone="dark"] .rw-sec.has-bg .rw-sechead{background:rgba(20,19,30,.55)}
.rw-secbgwrap{position:relative;display:inline-flex}
.rw-secbgpop{position:absolute;top:calc(100% + 8px);right:0;z-index:140;width:236px;padding:12px;border-radius:var(--r-lg);background:#fff;border:1px solid var(--border);box-shadow:var(--sh-lg)}
.rw-bgtrans{background-size:12px 12px, 12px 12px !important}
.rw-bgshades{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:9px}
.rw-bgshade{width:100%;aspect-ratio:1;border:1px solid var(--border);border-radius:7px;cursor:pointer;padding:0}
.rw-bgshade.on{box-shadow:0 0 0 2px var(--accent,var(--brand-500)),0 0 0 4px #fff}

.rw-bgdark{flex:0 0 auto;border:1px solid var(--border);background:#1C1B2E;color:#fff;cursor:pointer;font:700 12px var(--font-sans);padding:9px 12px;border-radius:var(--r-md)}

.home[data-tone="dark"] .rw-bgfollow{background:rgba(255,255,255,.06);color:#fff}
.rw-bgfollow b{font-size:12.5px;font-weight:700;display:block;line-height:1.15}
.rw-bgfollow small{font-size:10px;color:var(--muted);display:block;margin-top:2px;line-height:1.2}
.rw-bgfollow-ic{font-size:16px;opacity:.7;flex:0 0 auto}
.rw-bgfollow-ck{margin-left:auto;color:var(--accent,var(--brand-500));font-weight:800;flex:0 0 auto}
.rw-bgor{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:center;margin:13px 0 9px;opacity:.7}
.home[data-tone="dark"] .rw-secbgpop{background:#26283a;border-color:rgba(255,255,255,.16)}
.rw-bgscope{display:flex;gap:4px;padding:4px;border-radius:var(--r-pill);background:rgba(127,127,150,.12);margin-bottom:12px;border:1px solid var(--border)}
.rw-bgscope button{flex:1;border:0;background:none;cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:11.5px;color:var(--muted);padding:9px 6px;border-radius:0;transition:background .15s,color .15s}
.rw-bgscope button{padding:9px 8px !important;border-radius:var(--r-pill) !important;transition:background .15s,color .15s,box-shadow .15s}
.rw-bgscope button.on{background:var(--accent,var(--brand-500));color:#fff;box-shadow:0 5px 14px -5px color-mix(in oklab,var(--accent,var(--brand-500)) 60%, transparent)}
.rw-bgscope button:not(.on):hover{background:rgba(127,127,150,.16);color:var(--ink)}
.home[data-tone="dark"] .rw-bgscope button:not(.on):hover{background:rgba(255,255,255,.12);color:#fff}
.rw-bglbl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:8px 2px 6px}
.rw-bgcolors,.rw-bgwashes,.rw-bgphotos{display:flex;gap:6px;flex-wrap:wrap}
.rw-bgcolors button{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);cursor:pointer}
.rw-bgwashes button{width:38px;height:26px;border-radius:7px;border:1px solid var(--border);cursor:pointer}
.rw-bgphotos button{width:42px;height:32px;border-radius:7px;border:1px solid var(--border);cursor:pointer;background-size:cover;background-position:center}
.rw-bgupload{width:42px;height:32px;border-radius:7px;border:1px dashed var(--border);cursor:pointer;display:grid;place-items:center;font-size:18px;font-weight:700;color:var(--muted);background:var(--hairline)}
.rw-bgupload:hover{border-style:solid;color:var(--accent,var(--brand-500))}
.rw-bgnone{width:100%;margin-top:12px;border:0;background:var(--accent,var(--brand-500));cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:12.5px;color:#fff;padding:10px;border-radius:var(--r-md);box-shadow:0 6px 16px -8px var(--accent,var(--brand-500))}
.rw-bgnone:hover{filter:brightness(1.05)}
.rw-sechead{display:flex;align-items:center;gap:9px;margin-bottom:12px;cursor:pointer;border-radius:var(--r-md);padding:4px;margin-left:-4px;margin-right:-4px;transition:background .15s;position:relative;z-index:20}
/* when a section's background popover is open, lift the whole section above its siblings */
.rw-sec:has(.rw-secbgpop){position:relative;z-index:120}
.rw-secbgwrap{position:relative;z-index:20}
.rw-sechead:hover{background:rgba(127,127,150,.08)}
.home[data-tone="dark"] .rw-sechead:hover{background:rgba(255,255,255,.06)}
.rw-grip{color:var(--faint);cursor:grab;display:flex}
.rw-grip svg{width:16px;height:16px}
.rw-collapse{border:0;background:none;cursor:pointer;color:var(--muted);display:grid;place-items:center;transition:transform .18s}
.rw-collapse svg{width:18px;height:18px}
.rw-secdot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.rw-sectitle{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:15.5px;color:inherit}
.home[data-tone="light"] .rw-sectitle{color:var(--ink)}
.rw-secmeta{font-size:12px;font-weight:600;opacity:.6}
.rw-seccount{min-width:22px;height:20px;padding:0 7px;border-radius:var(--r-pill);background:rgba(127,127,150,.18);font-size:11.5px;font-weight:700;display:inline-grid;place-items:center;opacity:.8}
.rw-secactions{margin-left:auto;display:flex;gap:4px}
.rw-secactions button{width:32px;height:32px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center}
.rw-secactions button:hover{background:rgba(127,127,150,.16);color:var(--ink-soft)}
.rw-secactions svg{width:16px;height:16px}

/* grids per view mode */
.rw-grid{display:grid;gap:12px}
.rw-grid.v-med{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.rw-grid.v-large{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.rw-grid.v-icon{grid-template-columns:repeat(auto-fill,minmax(108px,1fr))}
.rw-grid.v-list{display:flex;flex-direction:column;gap:7px}
.rw-grid.uniform{align-items:start}

.rw-card{position:relative;border-radius:var(--r-lg);overflow:hidden;background:#fff;border:1px solid var(--border);box-shadow:var(--sh-sm);cursor:pointer;transition:transform .15s,box-shadow .2s;text-align:left}
.rw-card:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.home[data-tone="dark"] .rw-card{background:rgba(255,255,255,.92)}
.rw-thumb{position:relative;height:120px;display:grid;place-items:center}
.rw-card.v-large .rw-thumb{height:160px}
.rw-card.v-icon .rw-thumb{height:78px}
.rw-thumb svg{width:30px;height:30px}
.rw-badge{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.86);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);display:grid;place-items:center;box-shadow:var(--sh-xs)}
.rw-badge svg{width:15px;height:15px}
.rw-actions{position:absolute;right:8px;bottom:8px;display:flex;gap:5px;opacity:0;transition:opacity .14s}
.rw-card:hover .rw-actions{opacity:1}
@media (hover:none){.rw-actions{opacity:1}}
.rw-actions button{width:30px;height:30px;border:0;border-radius:50%;background:rgba(255,255,255,.9);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);box-shadow:var(--sh-xs);display:grid;place-items:center;color:var(--ink-soft);cursor:pointer}
.rw-actions svg{width:15px;height:15px}
.rw-cbody{padding:10px 12px}
.rw-card.v-icon .rw-cbody{padding:8px 10px}
.rw-ctitle{font-size:13.5px;font-weight:700;color:var(--ink-soft);letter-spacing:-.01em;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.rw-card.v-icon .rw-ctitle{font-size:12px;-webkit-line-clamp:1;white-space:nowrap}
.rw-cmeta{display:flex;align-items:center;gap:7px;margin-top:8px}
.rw-type{font-size:10px;font-weight:800;letter-spacing:.06em;color:var(--muted)}
.rw-spill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:var(--r-pill);margin-left:auto}

/* list view */
.rw-card.v-list{display:flex;align-items:center;gap:12px;height:auto;flex-direction:row}
.rw-card.v-list .rw-thumb{width:48px;height:48px;flex:0 0 auto;border-radius:var(--r-md);margin:8px}
.rw-card.v-list .rw-thumb svg{width:20px}
.rw-card.v-list .rw-badge{display:none}
.rw-card.v-list .rw-cbody{flex:1;padding:0}
.rw-card.v-list .rw-cmeta{margin-top:4px}
.rw-rowmenu{flex:0 0 auto;margin-right:12px;width:36px;height:36px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center}
.rw-rowmenu svg{width:17px;height:17px}

/* type-tinted thumbs */
.th-slides{background:var(--subj-1-tint);color:var(--subj-1-ink)}
.th-doc{background:var(--subj-7-tint);color:var(--subj-7-ink)}
.th-worksheet{background:var(--subj-10-tint);color:var(--subj-10-ink)}
.th-image{background:var(--subj-13-tint);color:var(--subj-13-ink)}
.th-video{background:var(--subj-3-tint);color:var(--subj-3-ink)}
.th-link{background:var(--honey-100);color:var(--honey-600)}
.rw-card.note .rw-thumb{background:var(--honey-50,#FFFBF0);color:var(--honey-600)}

/* ── rich mock previews ── */
.rwm{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}
.rwm-slides{padding:14px 14px 0;justify-content:flex-start;background:linear-gradient(150deg,color-mix(in oklab,var(--mc) 22%,white),color-mix(in oklab,var(--mc) 6%,white))}
.rwm-slk{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:color-mix(in oklab,var(--mc) 60%,#1c1b2e);opacity:.8}
.rwm-slt{font-family:var(--font-display-sm);font-weight:700;font-size:15px;line-height:1.15;margin-top:6px;color:color-mix(in oklab,var(--mc) 72%,#1c1b2e)}
.rwm-sldots{display:flex;gap:5px;margin-top:auto;padding:10px 0}
.rwm-sldots i{width:18px;height:4px;border-radius:3px;background:color-mix(in oklab,var(--mc) 45%,white)}
.rwm-sldots i:first-child{background:var(--mc)}
.rwm-sheet{padding:12px;background:#fff;gap:6px}
.rwm-sht{font-size:11px;font-weight:800;color:var(--ink-soft)}
.rwm-shrow{display:flex;gap:4px}
.rwm-shrow span{flex:1;height:7px;border-radius:2px;background:var(--subj-10-tint)}
.rwm-shgrid{margin-top:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.rwm-shgrid b,.rwm-shgrid i{font-size:9px;font-weight:700;text-align:center;padding:3px 0;border-radius:3px;background:var(--subj-10-tint);color:var(--subj-10-ink)}
.rwm-shgrid i{background:var(--hairline);height:14px}
.rwm-photo{background:linear-gradient(160deg,color-mix(in oklab,var(--mc) 40%,#cfeede),color-mix(in oklab,var(--mc) 18%,white));position:relative;justify-content:flex-end}
.rwm-phsun{position:absolute;top:14px;right:18px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.8)}
.rwm-phhill{position:absolute;left:0;right:0;bottom:0;height:46%;background:color-mix(in oklab,var(--mc) 55%,#1c1b2e);border-radius:50% 50% 0 0/40% 40% 0 0}
.rwm-phcap{position:relative;z-index:1;font-size:9.5px;font-weight:700;color:#fff;padding:8px 10px;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.rwm-video{background:linear-gradient(150deg,#2a2230,#191720);align-items:center;justify-content:center}
.rwm-vplay{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:#1c1b2e}
.rwm-vplay svg{width:20px;height:20px;margin-left:2px}
.rwm-vdur{position:absolute;right:8px;bottom:8px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.5);padding:2px 7px;border-radius:5px}
.rwm-doc{padding:14px;background:#fff;gap:7px;justify-content:center}
.rwm-docl{height:6px;border-radius:3px;background:var(--subj-7-tint)}
.rwm-docl.sh{width:62%}
.rwm-link{padding:14px;background:var(--surface-warm);justify-content:center;gap:3px}
.rwm-lkfav{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;margin-bottom:6px}
.rwm-lkdom{font-size:11px;font-weight:800;color:var(--ink-soft)}
.rwm-lkurl{font-size:10px;color:var(--muted);font-family:var(--font-mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* notecard rich body */
.rwm-note{position:absolute;inset:0;padding:13px 14px;overflow:hidden;font-size:11.5px;line-height:1.5;color:var(--ink-soft);background:linear-gradient(160deg,var(--honey-50,#FFFBF0),#fff)}
.rwm-note.clamp{-webkit-mask-image:linear-gradient(180deg,#000 70%,transparent)}
.rwm-note p{margin:0 0 7px}
.rwm-note mark{background:var(--honey-100);color:var(--honey-700,#8a5a00);padding:0 3px;border-radius:3px}
.rwm-nchecks{display:flex;flex-direction:column;gap:5px;margin:0 0 7px}
.rwm-nchk{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600}
.rwm-nchk .bx{width:15px;height:15px;border-radius:5px;border:1.5px solid var(--border);display:grid;place-items:center;flex:0 0 auto}
.rwm-nchk.on .bx{background:var(--done);border-color:transparent;color:#fff}
.rwm-nchk.on .bx svg{width:10px;height:10px}
.rwm-nchk.on{text-decoration:line-through;opacity:.6}

/* ════ FACES — wired to the app frame (A glass · B bright · C color) ════ */
/* B · Bright (default look): clean white cards — already the base. */
/* A · Calm glass: frosted translucent cards, light text */
.home[data-version="A"] .rw-card{background:rgba(22,21,32,.42);border-color:rgba(255,255,255,.2);-webkit-backdrop-filter:blur(20px) saturate(1.3);backdrop-filter:blur(20px) saturate(1.3);box-shadow:0 16px 40px -26px rgba(12,11,20,.7),inset 0 1px 0 rgba(255,255,255,.18)}
.home[data-version="A"] .rw-cbody{background:rgba(14,13,22,.34)}
.home[data-version="A"] .rw-ctitle{color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.home[data-version="A"] .rw-type{color:rgba(255,255,255,.78)}
.home[data-version="A"] .rw-thumb{background:rgba(255,255,255,.1)}
/* Frame A · Resource Wall — WHITE frosted register (dark stays the default) */
.home[data-version="A"][data-glass="light"] .rw-card{background:rgba(255,255,255,.86);border-color:rgba(255,255,255,.9);-webkit-backdrop-filter:blur(22px) saturate(1.4);backdrop-filter:blur(22px) saturate(1.4)}
.home[data-version="A"][data-glass="light"] .rw-cbody{background:rgba(255,255,255,.5)}
.home[data-version="A"][data-glass="light"] .rw-ctitle{color:var(--ink);text-shadow:none}
.home[data-version="A"][data-glass="light"] .rw-type{color:var(--muted)}
.home[data-version="A"][data-glass="light"] .rw-thumb{background:rgba(28,27,46,.05)}

/* ===== Frame A · Calm Glass — neutral-surface frosted registers (grids · landing · Teach) =====
   The Dark/White frosted choice now drives every neutral glass surface regardless of the
   background-derived tone, with text-colour fixes so nothing becomes invisible. ===== */
/* -- DARK frosted -- */
.home[data-version="A"][data-glass="dark"] .vcard,
.home[data-version="A"][data-glass="dark"] .teach-lesson,
.home[data-version="A"][data-glass="dark"] .teach-board,
.home[data-version="A"][data-glass="dark"] .teach-rail{background:linear-gradient(180deg,rgba(44,44,62,.62),rgba(28,28,44,.54));border:1px solid rgba(255,255,255,.16);-webkit-backdrop-filter:blur(24px) saturate(1.35);backdrop-filter:blur(24px) saturate(1.35);box-shadow:0 26px 60px -32px rgba(6,5,14,.8), inset 0 1px 0 rgba(255,255,255,.16);color:#fff}
.home[data-version="A"][data-glass="dark"] .board-stage{background-color:rgba(26,26,40,.52);border-color:rgba(255,255,255,.16);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);background-image:radial-gradient(rgba(255,255,255,.16) 1.4px, transparent 1.4px)}
.home[data-version="A"][data-glass="dark"] :is(.teach-lesson h3,.teach-board .bdtitle .nm,.teach-board .timer .tt,.teach-board .bobj,.teach-lesson .un,.teach-lesson .obj,.teach-lesson .seqi,.teach-board .bsub){color:#fff}
.home[data-version="A"][data-glass="dark"] :is(.tbtn,.trail-btn){background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff}
.home[data-version="A"][data-glass="dark"] .teach-board .bdhead{border-bottom-color:rgba(255,255,255,.16)}
/* -- WHITE frosted -- */
.home[data-version="A"][data-glass="light"] .vcard,
.home[data-version="A"][data-glass="light"] .teach-lesson,
.home[data-version="A"][data-glass="light"] .teach-board,
.home[data-version="A"][data-glass="light"] .teach-rail{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.92);-webkit-backdrop-filter:blur(24px) saturate(1.4);backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 26px 60px -34px rgba(20,22,40,.45), inset 0 1px 0 rgba(255,255,255,.95);color:var(--ink)}
.home[data-version="A"][data-glass="light"] .board-stage{background-color:#fff;border-color:var(--border);-webkit-backdrop-filter:none;backdrop-filter:none;background-image:radial-gradient(rgba(28,27,46,.07) 1.4px, transparent 1.4px)}
.home[data-version="A"][data-glass="light"] :is(.teach-lesson h3,.teach-board .bdtitle .nm,.teach-board .timer .tt,.teach-board .bobj,.teach-lesson .un,.teach-lesson .obj,.teach-lesson .seqi,.teach-board .bsub){color:var(--ink)}
.home[data-version="A"][data-glass="light"] :is(.tbtn,.trail-btn){background:var(--surface-warm);border-color:var(--border);color:var(--ink-soft)}
.home[data-version="A"][data-glass="light"] .teach-board .bdhead{border-bottom-color:var(--hairline)}
.home[data-version="A"] .rwm-sheet,.home[data-version="A"] .rwm-doc{background:rgba(255,255,255,.9)}
/* C · Color-forward: subject-tinted card frame + header band */
.home[data-version="C"] .rw-card{background:#fff;border-color:transparent;box-shadow:0 14px 34px -22px color-mix(in oklab,var(--sc,var(--brand-500)) 60%,transparent),var(--sh-sm)}
.home[data-version="C"] .rw-thumb::after{content:"";position:absolute;inset:0;border-top:4px solid var(--sc,var(--brand-500));pointer-events:none}
.home[data-version="C"] .rw-cbody{border-top:1px solid color-mix(in oklab,var(--sc,var(--brand-500)) 22%,transparent)}
.home[data-version="C"] .rw-ctitle{color:var(--ink)}
/* ===== Resource Wall · distinct SECTION backgrounds per frame ===== */
/* Frame B · Bright — clean opaque paper sections (no glass blur) */
.home[data-version="B"] .rw-sec:not(.has-bg){background:#fff;border:1px solid var(--border);-webkit-backdrop-filter:none;backdrop-filter:none;box-shadow:0 10px 30px -22px rgba(28,27,46,.26)}
.home[data-version="B"][data-tone="dark"] .rw-sec:not(.has-bg){background:rgba(32,32,46,.97);border-color:rgba(255,255,255,.12)}
/* Frame C · Color — each section tinted by its own subject colour */
.home[data-version="C"] .rw-sec:not(.has-bg){background:linear-gradient(180deg, color-mix(in oklab, var(--sc,var(--brand-500)) 26%, #fff) 0%, color-mix(in oklab, var(--sc,var(--brand-500)) 13%, #fff) 100%);border:1px solid color-mix(in oklab,var(--sc,var(--brand-500)) 38%, var(--border));-webkit-backdrop-filter:none;backdrop-filter:none;box-shadow:0 16px 40px -28px color-mix(in oklab,var(--sc,var(--brand-500)) 55%, rgba(28,27,46,.4))}
.home[data-version="C"] .rw-sec:not(.has-bg) .rw-sectitle{color:color-mix(in oklab, var(--sc,var(--brand-500)) 52%, #1c1b2e);text-shadow:none}
.home[data-version="C"] .rw-sec:not(.has-bg) :is(.rw-secmeta,.rw-seccount){color:var(--muted)}
.home[data-version="C"] .rw-sec:not(.has-bg) :is(.rw-grip,.rw-collapse,.rw-secactions button){color:var(--muted)}
.home[data-version="C"] .rw-sec:not(.has-bg) .rw-sechead:hover{background:color-mix(in oklab,var(--sc,var(--brand-500)) 10%, transparent)}

.rw-addcard{border:1px dashed var(--border);background:none;border-radius:var(--r-lg);min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
.rw-addcard:hover{border-color:var(--accent,var(--brand-400));color:var(--accent,var(--brand-600))}
.rw-addcard svg{width:18px;height:18px}
.rw-addsec{border:1px dashed var(--border);background:rgba(255,255,255,.4);border-radius:var(--r-xl);padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13.5px;font-weight:700;cursor:pointer}
.rw-addsec:hover{border-color:var(--accent,var(--brand-400));color:var(--accent,var(--brand-600))}
/* Color frame already tints every section by subject → the toggle is redundant there */
.home[data-version="C"] .rw-subjrow{display:none}
/* dashed add-card / add-section adapt to dark tone */
.home[data-tone="dark"] .rw-addsec{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.66)}
.home[data-tone="dark"] .rw-addcard{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.66)}
.home[data-tone="dark"] :is(.rw-addsec,.rw-addcard):hover{border-color:var(--accent,var(--brand-400));color:#fff}
.rw-addsec svg{width:17px;height:17px}

/* collapsed strip */
.rw-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px}
.rw-strip::-webkit-scrollbar{display:none}
.rw-stripthumb{flex:0 0 auto;width:64px;height:48px;border-radius:var(--r-sm);display:grid;place-items:center}
.rw-stripthumb svg{width:18px;height:18px}

/* modal */
.rw-modalscrim{position:fixed;inset:0;z-index:300;background:rgba(18,17,30,.4);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:grid;place-items:center;animation:rwfade .2s ease}
@keyframes rwfade{from{opacity:0}to{opacity:1}}
.rw-modal{width:min(640px,92vw);border-radius:var(--r-2xl);overflow:hidden;background:#fff;box-shadow:var(--sh-lg)}
.rw-modalhead{display:flex;align-items:center;gap:11px;padding:14px 18px;border-bottom:1px solid var(--hairline)}

.ue-tab{border:0;background:none;cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--muted);padding:10px 14px;border-radius:10px 10px 0 0;white-space:nowrap}
.ue-tab.on{color:var(--ink);background:color-mix(in oklab,var(--uc) 12%,transparent);position:relative}
.home[data-tone="dark"] .ue-tab.on{color:#fff}
.ue-tab.on::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:2.5px;border-radius:3px;background:var(--uc)}

.ue-body{flex:1;min-height:0;overflow-y:auto;padding:20px 22px;scrollbar-width:none}
.ue-body::-webkit-scrollbar{display:none}

.ue-summary{font-size:14.5px;line-height:1.6;color:var(--ink-soft);margin:0 0 18px}
.home[data-tone="dark"] .ue-summary{color:rgba(255,255,255,.85)}
.ue-timeline{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ue-timeline::-webkit-scrollbar{display:none}
.ue-tnode{flex:1;min-width:84px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center}
.ue-tdot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:800;background:var(--hairline);color:var(--muted)}
.ue-tnode.done .ue-tdot{background:var(--uc);color:#fff}
.ue-tdot svg{width:15px;height:15px}
.ue-tlabel{font-size:10.5px;font-weight:600;color:var(--muted);line-height:1.2}
.ue-tnode.done .ue-tlabel{color:var(--ink-soft)}
.home[data-tone="dark"] .ue-tnode.done .ue-tlabel{color:rgba(255,255,255,.8)}

.ue-overgrid,.ue-statsgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ue-card{border-radius:var(--r-lg);padding:16px;background:rgba(255,255,255,.6);border:1px solid var(--border)}
.home[data-tone="dark"] .ue-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
.ue-ch{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.ue-nexttitle{font-weight:700;font-size:15px;color:var(--ink)}
.home[data-tone="dark"] .ue-nexttitle{color:#fff}
.ue-nextsub{font-size:12.5px;color:var(--muted);margin:4px 0 12px;line-height:1.4}
.ue-done{font-size:15px;font-weight:700;color:var(--done)}
.ue-cmp{display:flex;flex-direction:column;gap:10px}
.ue-cmp>div{display:flex;align-items:center;gap:10px}
.ue-cmp span{font-size:11px;font-weight:700;color:var(--muted);width:34px}
.ue-bar{flex:1;height:9px;border-radius:var(--r-pill);background:var(--hairline);overflow:hidden}
.ue-bar i{display:block;height:100%;border-radius:var(--r-pill)}
.ue-bignum{font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--ink);letter-spacing:-.02em}
.home[data-tone="dark"] .ue-bignum{color:#fff}
.ue-bignum small{font-size:16px;color:var(--muted);font-weight:600}
.ue-csub{font-size:12px;color:var(--muted);margin-top:4px}

.ue-lgroup{margin-bottom:18px}
.ue-lghead{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ue-lghead span{background:var(--hairline);border-radius:var(--r-pill);padding:1px 8px;font-size:11px}
.ue-lrow{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--r-md)}
.ue-lrow:hover{background:rgba(127,127,150,.08)}
.home[data-tone="dark"] .ue-lrow:hover{background:rgba(255,255,255,.06)}
.ue-lstatus{width:24px;height:24px;border-radius:50%;border:2px solid;display:grid;place-items:center;color:#fff;flex:0 0 auto;cursor:pointer;background:none}
.ue-lstatus svg{width:14px;height:14px}
.ue-lgrip{color:var(--faint);cursor:grab;font-size:14px;flex:0 0 auto;user-select:none}
.ue-lnum{min-width:20px;height:20px;padding:0 5px;border-radius:6px;background:color-mix(in oklab,var(--uc,var(--accent)) 16%,transparent);color:var(--uc,var(--accent));font-weight:800;font-size:11px;display:grid;place-items:center;flex:0 0 auto;font-variant-numeric:tabular-nums}
/* ── Unit/Lesson Resources panel: filter · sort/reorder · thumbnail/list ── */
.ue-respanel{display:flex;flex-direction:column;gap:14px}
.ue-restoolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ue-resfilters{display:flex;gap:6px;flex-wrap:wrap}
.ue-rchip{appearance:none;border:1px solid var(--border);background:var(--surface,#fff);color:var(--muted);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.ue-rchip.on{background:var(--uc);border-color:transparent;color:#fff}
.ue-restools{display:flex;align-items:center;gap:12px}
.ue-ressort{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:700}
.ue-ressort select{appearance:none;border:1px solid var(--border);border-radius:8px;padding:5px 24px 5px 10px;background:var(--surface,#fff);font-size:12px;font-weight:700;color:var(--ink);cursor:pointer}
.ue-resview{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ue-resview button{appearance:none;border:0;background:var(--surface,#fff);color:var(--muted);padding:6px 11px;font-size:14px;cursor:pointer;line-height:1}
.ue-resview button.on{background:var(--uc);color:#fff}
.ue-resgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(134px,1fr));gap:12px}
.ue-reslist{display:flex;flex-direction:column;gap:7px}
.ue-rcard{position:relative;display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:12px;background:var(--surface,#fff)}
.ue-rcard[draggable="true"]{cursor:grab}
.ue-rcard.grid{flex-direction:column;align-items:flex-start;padding:12px;gap:8px}
.ue-rcard.list{padding:9px 12px}

.ue-rcard .ue-rart{display:grid;place-items:center;font-weight:800;color:#fff;background:var(--uc);border-radius:8px}
.ue-rcard.grid .ue-rart{width:100%;height:58px;font-size:15px;border-radius:9px}
.ue-rcard.list .ue-rart{width:34px;height:34px;font-size:12px;flex:0 0 auto}
.ue-rmeta{display:flex;flex-direction:column;gap:2px;min-width:0}
.ue-rcard .ue-rlabel{font-weight:700;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.ue-rkind{font-size:11px;color:var(--muted);font-weight:600}
.ue-rnum{position:absolute;top:7px;right:9px;font-size:10px;font-weight:800;color:var(--muted)}
.ue-rcard.list .ue-rnum{position:static;margin-left:auto;order:9}
.ue-rgrip{color:var(--faint);font-size:13px;user-select:none}
.ue-rcard.grid .ue-rgrip{position:absolute;top:6px;left:9px}
.ue-lrow{position:relative}
.ue-rowmenu{position:absolute;right:10px;top:calc(100% - 4px);z-index:20;width:190px;padding:6px;border-radius:var(--r-lg);background:#fff;border:1px solid var(--border);box-shadow:var(--sh-lg)}

.ue-rowmenu button{display:block;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:9px 11px;border-radius:var(--r-md);font-family:var(--font-sans);font-weight:600;font-size:13px;color:var(--ink-soft)}
.home[data-tone="dark"] .ue-rowmenu button{color:#fff}
.ue-rowmenu button:hover{background:rgba(127,127,150,.1)}
.ue-donebtn{border:1px solid var(--border);background:rgba(255,255,255,.6);border-radius:var(--r-pill);padding:8px 14px;font-family:var(--font-sans);font-weight:700;font-size:12.5px;color:var(--ink-soft);cursor:pointer}
.ue-donebtn.on{background:var(--done-tint);border-color:transparent;color:#1A6B49}

.ue-empty2{text-align:center;color:var(--done);font-weight:700;font-size:14px;padding:30px}
.ue-ltext{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.ue-ltitle{font-size:13.5px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home[data-tone="dark"] .ue-ltitle{color:#fff}
.ue-lrow.done .ue-ltitle{opacity:.7}
.ue-lsub{font-size:11.5px;font-weight:600;color:var(--muted)}
.ue-resched{flex:0 0 auto;border:1px solid var(--border);background:none;border-radius:var(--r-pill);padding:6px 12px;font-family:var(--font-sans);font-weight:700;font-size:12px;color:var(--warn);cursor:pointer}
.ue-resched:hover{background:var(--warn-tint)}
.ue-lacts{display:flex;gap:3px;flex:0 0 auto}
.ue-lacts button{width:30px;height:30px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center}
.ue-lacts button:hover{background:color-mix(in oklab,var(--uc) 16%,transparent);color:var(--uc)}
.ue-lacts svg{width:15px;height:15px}

.ue-std{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:8px}
.home[data-tone="dark"] .ue-std{border-color:rgba(255,255,255,.12)}
.ue-std.gap{border-style:dashed;border-color:var(--warn)}
.ue-stdcode{font-family:var(--font-mono);font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);background:var(--done-tint);color:#1A6B49;flex:0 0 auto}
.ue-std.gap .ue-stdcode{background:var(--warn-tint);color:var(--warn)}
.ue-stddesc{flex:1;font-size:13.5px;font-weight:600;color:var(--ink-soft)}
.home[data-tone="dark"] .ue-stddesc{color:rgba(255,255,255,.85)}
.ue-stdhits{font-size:12px;font-weight:700;color:var(--muted)}
.ue-std.gap .ue-stdhits{color:var(--warn)}

.ue-res{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.ue-rtile{border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.home[data-tone="dark"] .ue-rtile{border-color:rgba(255,255,255,.12)}
.ue-rart{height:60px;display:grid;place-items:center;font-family:var(--font-display-sm);font-weight:800;font-size:15px;background:color-mix(in oklab,var(--uc) 18%,white);color:var(--uc)}
.ue-rlabel{padding:8px 10px;font-size:12px;font-weight:700;color:var(--ink)}
.home[data-tone="dark"] .ue-rlabel{color:#fff}
.ue-rfull{grid-column:1/-1;justify-content:center}

.ue-notes textarea{width:100%;min-height:160px;resize:vertical;border-radius:var(--r-lg);border:1px solid var(--border);background:rgba(255,255,255,.6);padding:14px;font-family:var(--font-sans);font-size:14px;line-height:1.6;color:var(--ink);outline:none}
.home[data-tone="dark"] .ue-notes textarea{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#fff}

.ue-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-top:1px solid var(--hairline);flex:0 0 auto}
.home[data-tone="dark"] .ue-foot{border-top-color:rgba(255,255,255,.1)}
.ue-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:rgba(255,255,255,.7);border-radius:var(--r-pill);padding:10px 18px;font-family:var(--font-sans);font-weight:700;font-size:13.5px;color:var(--ink-soft);cursor:pointer}
.home[data-tone="dark"] .ue-btn{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);color:#fff}
.ue-btn.pri{background:var(--uc);color:#fff;border-color:transparent}
.ue-btn.ghost{background:none}
.ue-btn svg{width:16px;height:16px}

@media (max-width:640px){ .ue-overgrid,.ue-statsgrid,.ue-res{grid-template-columns:1fr} }

/* mode switch + planner additions */
.ue-modeswitch{display:flex;gap:3px;padding:8px 8px 0;background:rgba(255,255,255,.5);flex:0 0 auto}
.home[data-tone="dark"] .ue-modeswitch{background:rgba(255,255,255,.04)}
.ue-modeswitch button{flex:1;border:0;background:none;cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:14px;color:var(--muted);padding:11px;border-radius:12px 12px 0 0;transition:background .16s,color .16s}

.ue-lessonsel{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-.02em;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:var(--r-md);padding:5px 10px;max-width:340px;cursor:pointer}

.ue-list{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px}

.ue-pacing{display:flex;flex-direction:column;gap:10px}
.ue-week{display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:center}
.ue-wlabel{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.ue-wlessons{display:flex;gap:6px;flex-wrap:wrap}
.ue-wchip{font-size:12px;font-weight:700;padding:6px 11px;border-radius:var(--r-pill);background:color-mix(in oklab,var(--uc) 12%,white);color:var(--uc)}

.ue-flowt{flex:1;font-weight:700;font-size:14px;color:var(--ink)}

.ue-fieldtext{font-size:14px;line-height:1.5;color:var(--ink-soft)}

.ue-stdnote{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px}

.ue-miniadd{width:26px;height:26px;flex:0 0 auto;border:1px solid var(--border);background:rgba(255,255,255,.6);border-radius:50%;cursor:pointer;color:var(--ink-soft);display:grid;place-items:center}

.ue-respills{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.ue-respill{display:inline-flex;align-items:center;gap:2px;max-width:100%;border:1px solid var(--border);background:rgba(255,255,255,.7);border-radius:var(--r-pill);padding:0 4px 0 0;overflow:hidden}

/* ============================================================
   PLANNER HUB v2 — full-screen workspace.

   Component grammar (one form per job): underline tabs · segmented control ·

   Prefix: .ph-   Neutral surfaces/text go through --ph-* so they flip by tone.
   ============================================================ */

  --ph-text:#1C1B2E; --ph-text-2:#57566B; --ph-text-3:#8C8B9E;

.ph-root[data-theme="night"]  {--accent:#8FA8FF;--accent-600:#6383FB;--accent-50:rgba(143,168,255,.18)}
.ph-root[data-theme="honey"]  {--accent:#E59A12;--accent-600:#C9890C;--accent-50:#FFF4DC}
.ph-root[data-theme="blossom"]{--accent:#E8629C;--accent-600:#C53F7B;--accent-50:#FDEAF2}

.ph-root[data-frame="A"] :is(.ph-panes,.ph-list,.ph-unitcard,.ph-wall,.ph-rescard,.ph-ovcard,.ph-pane-insp,.ph-search,.ph-menubtn,.ph-seg,.ph-modesw,.ph-edit){
