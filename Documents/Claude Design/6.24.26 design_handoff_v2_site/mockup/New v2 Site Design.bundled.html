             inset 0 2px 0 rgba(255,255,255,.85), inset 0 -1px 0 rgba(22,26,42,.10)}
.ph-root[data-frame="A"][data-tone="dark"] :is(.ph-list,.ph-unitcard,.ph-wall,.ph-rescard,.ph-ovcard){
  box-shadow:0 2px 6px rgba(8,10,22,.4), 0 24px 50px -22px rgba(8,10,22,.58),
             inset 0 2px 0 rgba(255,255,255,.42), inset 0 -1px 0 rgba(0,0,0,.22)}
.ph-root[data-frame="A"] .ph-row[style*="--uc"]{border-left-width:5px}
/* WHITE frosted register (surface only) — content panels go light over the
   UNCHANGED background; chrome + page title (on the photo) stay light-on-dark. */
.ph-root[data-frame="A"][data-glass="light"] :is(.ph-pagehead,.ph-panes,.ph-list,.ph-ovcard,.ph-unitcard,.ph-wall,.ph-rescard,.ph-pane-insp){
  --ph-text:#1c1b2e; --ph-text-2:#56546a; --ph-text-3:#8b8a9e; --ph-hairline:rgba(28,27,46,.08); --ph-glass:rgba(28,27,46,.05);
  background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.54));
  border:1px solid rgba(255,255,255,.7);color:#1c1b2e;
  -webkit-backdrop-filter:blur(30px) saturate(1.5);backdrop-filter:blur(30px) saturate(1.5)}
.ph-root[data-frame="A"][data-glass="light"] .ph-grouphead{background:rgba(255,255,255,.66)}
/* DARK frosted register — dark glass panels on ANY background (incl. wash), surface only */
.ph-root[data-frame="A"][data-glass="dark"] :is(.ph-pagehead,.ph-panes,.ph-list,.ph-ovcard,.ph-unitcard,.ph-wall,.ph-rescard,.ph-pane-insp){
  --ph-text:#F4F6FB; --ph-text-2:rgba(244,246,251,.72); --ph-text-3:rgba(244,246,251,.5); --ph-hairline:rgba(255,255,255,.1); --ph-glass:rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(40,40,58,.46), rgba(28,28,44,.36)) !important;
  border:1px solid rgba(255,255,255,.14) !important; color:#F4F6FB !important;
  -webkit-backdrop-filter:blur(22px) saturate(1.3); backdrop-filter:blur(22px) saturate(1.3)}
.ph-root[data-frame="A"][data-glass="dark"] .ph-grouphead{background:rgba(255,255,255,.06)}
.ph-root[data-frame="A"][data-glass="dark"] .ph-row{border-bottom-color:rgba(255,255,255,.08)}
/* theme glow around the glass when a theme is active (dark or light frosted) */
.ph-root[data-frame="A"][data-theme]:not([data-theme="normal"]):not([data-theme="off"]) :is(.ph-list,.ph-ovcard,.ph-unitcard,.ph-wall,.ph-rescard,.ph-pagehead){
  box-shadow:0 2px 6px rgba(8,10,22,.3), 0 16px 42px -20px color-mix(in oklab,var(--accent) 55%, transparent), 0 0 0 1px color-mix(in oklab,var(--accent) 24%, transparent), 0 0 26px -6px color-mix(in oklab,var(--accent) 40%, transparent) !important}
/* B · BRIGHT WORKSPACE — opaque paper that recedes the background */
.ph-root[data-frame="B"]{ --ph-surface:#ffffff; --ph-surface-2:#FBFAF7 }
.ph-root[data-frame="B"][data-tone="dark"]{ --ph-surface:rgba(34,34,50,.97); --ph-surface-2:rgba(26,26,40,.95) }
/* C · COLOR-FORWARD — each SUBJECT leads its own section; surfaces stay neutral
   so the colour pops per-section instead of one global accent wash. */
.ph-root[data-frame="C"]{ --ph-surface:#ffffff; --ph-surface-2:#FBFAF7;
  --ph-sticky:rgba(252,250,246,.92) }
.ph-root[data-frame="C"][data-tone="dark"]{ --ph-surface:rgba(34,34,50,.96); --ph-surface-2:rgba(26,26,40,.92);
  --ph-sticky:rgba(16,15,26,.86) }
.ph-root[data-frame="C"] .ph-grouphead{color:#F4F6FB;
  background:linear-gradient(180deg,rgba(26,30,46,.82),rgba(18,21,33,.72));
  -webkit-backdrop-filter:blur(14px) saturate(1.2);backdrop-filter:blur(14px) saturate(1.2)}
.ph-root[data-frame="C"] .ph-list[style*="--gc"] .ph-grouphead{color:var(--gc);
  background:color-mix(in oklab, var(--gc) 13%, var(--ph-sticky))}
.ph-root[data-frame="C"] .ph-gdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;margin-right:2px;
  box-shadow:0 0 0 3px color-mix(in oklab,var(--gc,var(--accent)) 22%, transparent)}
.ph-root[data-frame="C"] .ph-row{border-left-width:4px}
/* Color frame · page header banner — dark wash of the theme accent (or the 4 brand hues when Clear) */
.ph-root[data-frame="C"] .ph-pagehead{background:radial-gradient(64% 120% at 7% 18%, color-mix(in oklab,var(--subj-2) 42%, #fff) 0%, transparent 60%),
  radial-gradient(58% 120% at 34% 88%, color-mix(in oklab,var(--subj-10) 38%, #fff) 0%, transparent 62%),
  radial-gradient(56% 120% at 63% 10%, color-mix(in oklab,var(--subj-1) 40%, #fff) 0%, transparent 58%),
  radial-gradient(60% 120% at 88% 72%, color-mix(in oklab,var(--subj-5) 40%, #fff) 0%, transparent 62%),
  radial-gradient(54% 120% at 100% 24%, color-mix(in oklab,var(--subj-13) 34%, #fff) 0%, transparent 60%),
  linear-gradient(120deg, rgba(253,245,238,.78), rgba(241,246,252,.78) 52%, rgba(251,240,245,.78)) !important;border-color:rgba(28,27,46,.08) !important;color:#1c1b2e;-webkit-backdrop-filter:blur(20px) saturate(1.3) !important;backdrop-filter:blur(20px) saturate(1.3) !important;box-shadow:inset 0 1px 0 rgba(255,255,255,.6), 0 20px 46px -30px rgba(60,50,90,.34)}
.ph-root[data-frame="C"][data-theme="normal"] .ph-pagehead{background:radial-gradient(64% 120% at 7% 18%, color-mix(in oklab,var(--subj-2) 42%, #fff) 0%, transparent 60%),
  radial-gradient(58% 120% at 34% 88%, color-mix(in oklab,var(--subj-10) 38%, #fff) 0%, transparent 62%),
  radial-gradient(56% 120% at 63% 10%, color-mix(in oklab,var(--subj-1) 40%, #fff) 0%, transparent 58%),
  radial-gradient(60% 120% at 88% 72%, color-mix(in oklab,var(--subj-5) 40%, #fff) 0%, transparent 62%),
  radial-gradient(54% 120% at 100% 24%, color-mix(in oklab,var(--subj-13) 34%, #fff) 0%, transparent 60%),
  linear-gradient(120deg, rgba(253,245,238,.78), rgba(241,246,252,.78) 52%, rgba(251,240,245,.78)) !important}
.ph-root[data-frame="C"] .ph-pagehead :is(.ph-crumb,.ph-crumb button,.ph-crumb .cur,.ph-crumb .sep,.ph-sub,.ph-navitem,.ph-navbadge){color:#fff}
.ph-root[data-frame="C"] .ph-pagehead .ph-title{background:none;-webkit-text-fill-color:#fff;color:#fff}
.ph-root[data-frame="C"] .ph-pagehead .ph-title{background:none !important;-webkit-text-fill-color:#fff !important;color:#fff !important}
.ph-root[data-frame="C"] .ph-pagehead{color:#fff !important}
/* dark frosted glass — all page-header text white */
.ph-root[data-frame="A"][data-glass="dark"] .ph-pagehead .ph-title{background:none !important;-webkit-text-fill-color:#fff !important;color:#fff !important}
.ph-root[data-frame="A"][data-glass="dark"] .ph-pagehead{color:#fff !important}
.ph-root[data-frame="A"][data-glass="dark"] .ph-pagehead :is(.ph-crumb,.ph-bcrumb,.ph-pagesub,.ph-sub,.ph-tab){color:#fff !important}
.ph-root[data-frame="C"] .ph-pagehead .ph-navitem.on{color:#fff;border-bottom-color:#fff}
/* light subject-wash banner → dark ink text */
.ph-root[data-frame="C"] .ph-pagehead{color:#1c1b2e !important}
.ph-root[data-frame="C"] .ph-pagehead .ph-title{background:none !important;-webkit-text-fill-color:#1c1b2e !important;color:#1c1b2e !important}
.ph-root[data-frame="C"] .ph-pagehead :is(.ph-crumb,.ph-crumb button,.ph-crumb .cur,.ph-crumb .sep,.ph-sub,.ph-pagesub,.ph-navitem,.ph-tab){color:#56546a !important}
.ph-root[data-frame="C"] .ph-pagehead .ph-navitem.on{color:#1c1b2e !important;border-bottom-color:#1c1b2e !important}
.ph-root[data-frame="C"] .ph-pagehead::before{display:none}
/* Color-forward → each row/card filled with its OWN subject colour (vivid), white text */
.ph-root[data-frame="C"] .ph-row[style*="--rc"]{
  background:linear-gradient(120deg, color-mix(in oklab,var(--rc) 26%, #fff) 0%, color-mix(in oklab,var(--rc) 13%, #fff) 100%);
  -webkit-backdrop-filter:blur(8px) saturate(1.1);backdrop-filter:blur(8px) saturate(1.1);
  border:1px solid color-mix(in oklab,var(--rc) 30%, var(--ph-border));
  border-left:4px solid var(--rc);
  box-shadow:0 8px 22px -16px color-mix(in oklab,var(--rc) 55%, rgba(28,27,46,.4));
  color:#1c1b2e;text-shadow:none}
.ph-root[data-frame="C"] .ph-row[style*="--rc"] .t{color:#1c1b2e}
.ph-root[data-frame="C"] .ph-row[style*="--rc"] :is(.time,.num){color:color-mix(in oklab,var(--rc) 64%, #1c1b2e)}
.ph-root[data-frame="C"] .ph-row[style*="--rc"] .m{color:#56546a}
.ph-root[data-frame="C"] .ph-row[style*="--rc"] .ph-tag{color:color-mix(in oklab,var(--rc) 68%, #1c1b2e)}
.ph-root[data-frame="C"] .ph-row[style*="--rc"]:hover{filter:none;background:linear-gradient(120deg, color-mix(in oklab,var(--rc) 32%, #fff) 0%, color-mix(in oklab,var(--rc) 17%, #fff) 100%)}
.ph-root[data-frame="C"] .ph-row[style*="--rc"]+.ph-row{border-top:1px solid color-mix(in oklab,var(--rc) 30%, var(--ph-border))}
.ph-root[data-frame="C"] :is(.ph-list,.ph-ovcard,.ph-wall,.ph-unitcard){border-color:color-mix(in oklab, var(--gc,var(--accent)) 26%, var(--ph-border))}
/* Color frame · the lesson lists go translucent so the subject rows read as glass over the wash */
.ph-root[data-frame="C"] .ph-list{background:transparent;border-color:transparent;-webkit-backdrop-filter:none;backdrop-filter:none;box-shadow:none;overflow:visible}
.ph-root[data-frame="C"] .ph-list .ph-grouphead{background:transparent}
.ph-root[data-frame="C"] .ph-row[style*="--rc"]{border-radius:14px;margin-bottom:7px}
.ph-root[data-frame="C"] .ph-panes{background:linear-gradient(180deg, color-mix(in oklab,var(--dc,var(--accent)) 10%,#fff) 0%, #fff 58%)}
/* Color frame · the doc body is a light paper, so force dark "paper" text + light fields on
   the whole pane subtree regardless of theme/tone (fixes Color + Wash + Night illegibility) */
.ph-root[data-frame="C"] .ph-panes{
  --ph-text:#1c1b2e; --ph-text-2:#56546a; --ph-text-3:#8b8a9e;
  --ph-hairline:rgba(28,27,46,.1); --ph-border:rgba(28,27,46,.14); --ph-glass:rgba(28,27,46,.05);
  --ph-surface:#fff; --ph-surface-2:color-mix(in oklab,var(--dc,var(--accent)) 6%,#fff)}
.ph-root[data-frame="C"] .ph-panes .ph-edit{background:#fff;border:1px solid color-mix(in oklab,var(--dc,var(--accent)) 22%,rgba(28,27,46,.14));color:#1c1b2e}
.ph-root[data-frame="C"] .ph-panes .ph-edit:empty::before{color:#9b99ad}
.ph-root[data-frame="C"] .ph-panes .ph-flowitem.on{background:color-mix(in oklab,var(--dc,var(--accent)) 14%,#fff)}
.ph-root[data-frame="C"] .ph-panes .ph-flowitem.on .fl{color:var(--dc,var(--accent))}
.ph-root[data-frame="C"] .ph-pane-insp{background:color-mix(in oklab,var(--dc,var(--accent)) 7%,#fff)}
.ph-root[data-frame="C"] :is(.ph-pane-rail,.ph-pane-insp){border-color:color-mix(in oklab,var(--dc,var(--accent)) 18%,var(--ph-border))}

/* ---------- background layers (the hub draws its own) ---------- */
.ph-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center}
.ph-photo{filter:saturate(1.1) contrast(1.03)}
.ph-veil{position:absolute;inset:0;z-index:1;pointer-events:none;
  -webkit-backdrop-filter:blur(16px) saturate(1.15);backdrop-filter:blur(16px) saturate(1.15)}
.ph-root[data-tone="light"] .ph-veil{background:rgba(252,250,246,.82)}
.ph-root[data-tone="dark"]  .ph-veil{background:rgba(13,12,21,.72)}
/* frame character = how much of the living background shows through */
.ph-root[data-frame="A"] .ph-veil{opacity:.4}
/* gentle whole-screen theme gradient */
.ph-root[data-theme]:not([data-theme="normal"]):not([data-theme="off"]) .ph-veil::after{opacity:.95 !important}
.ph-root[data-bg="ambient"][data-theme]:not([data-theme="normal"]) .ph-veil::after{opacity:.9 !important;background:radial-gradient(120% 110% at 50% -10%, color-mix(in oklab,var(--accent) 26%, transparent), transparent 66%) !important}
.ph-root[data-bg="photo"][data-dim="normal"] .ph-veil{background:rgba(13,12,21,.16) !important;opacity:1 !important}
.ph-root[data-bg="photo"][data-dim="dim"] .ph-veil{background:rgba(13,12,21,.62) !important;opacity:1 !important}
.ph-root[data-bg="photo"][data-dim="bright"] .ph-veil{background:rgba(246,246,250,.42) !important;opacity:1 !important}
@keyframes phdrift{0%{transform:scale(1.08) translate3d(0,0,0)}50%{transform:scale(1.17) translate3d(-3.6%,2.6%,0)}100%{transform:scale(1.08) translate3d(0,0,0)}}
.ph-root[data-bg="photo"] .ph-photo{background-size:cover;background-position:center;will-change:transform}
.ph-root[data-bg="photo"][data-motion="fade-zoom"] .ph-photo{animation:phdrift 30s ease-in-out infinite}
.ph-root[data-bg="photo"][data-motion="fade"] .ph-photo{animation:phdrift 44s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.ph-root .ph-photo{animation:none !important}}   /* Calm glass — background most present */
.ph-root[data-frame="B"] .ph-veil{opacity:1}      /* Bright workspace — recedes to paper */
.ph-root[data-frame="C"] .ph-veil{opacity:.88}    /* Color-forward */
/* a soft theme-accent glow on the veil so chrome reads "in theme" */
.ph-veil::after{content:"";position:absolute;inset:0;opacity:.72;
  background:radial-gradient(110% 120% at 100% 0%, color-mix(in oklab,var(--accent) 26%,transparent), transparent 56%), radial-gradient(120% 120% at 0% 100%, color-mix(in oklab,var(--honey-400) 22%,transparent), transparent 58%)}
.ph-root[data-theme="normal"] .ph-veil::after{opacity:0}

/* shell sits above the background */
.ph-shell{position:relative;z-index:2;display:flex;flex-direction:column;height:100%}

/* ---------- GLOBAL TIER · top bar ---------- */
.ph-top{flex:0 0 auto;height:58px;display:flex;align-items:center;gap:14px;
  padding:0 20px;background:var(--ph-sticky);border-bottom:1px solid var(--ph-border);
  position:relative;z-index:40;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.ph-ident{display:flex;align-items:center;gap:10px;flex:0 0 auto;border:0;background:none;cursor:pointer}
.ph-glyph{width:30px;height:30px;border-radius:9px;background:var(--honey-400);display:grid;place-items:center;box-shadow:var(--sh-xs)}
.ph-glyph svg{width:17px;height:17px}
.ph-wordmark{font-family:var(--font-display-sm);font-weight:700;font-size:19px;letter-spacing:-.01em;color:var(--ph-text);font-weight:800}
.ph-iconbtn{width:36px;height:36px;flex:0 0 auto;border:1px solid var(--ph-border);
  background:var(--ph-surface);border-radius:50%;cursor:pointer;color:var(--ph-text-2);
  display:grid;place-items:center;transition:background .15s,color .15s,transform .15s}
.ph-iconbtn:hover{background:var(--ph-glass);color:var(--ph-text)}
.ph-iconbtn svg{width:17px;height:17px}
.ph-back:hover{transform:translateX(-2px)}
.ph-spacer{flex:1}

/* appearance gear popover */
.ph-appr{position:relative;flex:0 0 auto}
.ph-apprpop-full{width:340px !important;max-height:78vh;overflow-y:auto;scrollbar-width:none;padding:14px 16px !important}
.ph-apprpop-full::-webkit-scrollbar{display:none}
.ph-apprpop{position:absolute;top:46px;left:0;z-index:30;width:260px;background:var(--ph-sticky);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--ph-border);
  border-radius:var(--r-lg);box-shadow:var(--sh-lg);padding:16px;animation:phpop .16s ease}
.ph-apprrow{margin-bottom:16px}
.ph-apprlbl{font:700 11px/1 var(--font-sans);letter-spacing:.07em;text-transform:uppercase;color:var(--ph-text-3);margin-bottom:9px}
.ph-apprseg{display:flex;gap:3px;padding:3px;border-radius:var(--r-pill);background:var(--ph-glass);border:1px solid var(--ph-border)}
.ph-apprseg button{flex:1;border:0;background:none;cursor:pointer;font:600 12px/1 var(--font-sans);color:var(--ph-text-2);padding:7px 6px;border-radius:var(--r-pill)}
.ph-apprseg button.on{background:var(--ph-surface);color:var(--ph-text);box-shadow:var(--sh-xs)}
.ph-apprthemes{display:flex;gap:9px;flex-wrap:wrap}
.ph-aprphotos{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:2px}
.ph-aprphoto{aspect-ratio:1;border-radius:9px;background-size:cover;background-position:center;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .12s}
.ph-aprphoto:hover{transform:scale(1.06)}
.ph-aprphoto.on{border-color:var(--accent)}
.ph-aprsw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .12s}
.ph-aprsw:hover{transform:scale(1.1)}
.ph-aprsw.on{border-color:var(--ph-text)}
.ph-aprsw.on::after{content:"";position:absolute;inset:0;display:grid;place-items:center}
.ph-apprreset{width:100%;border:1px solid var(--ph-border);background:none;border-radius:var(--r-pill);
  padding:9px;font:700 12.5px/1 var(--font-sans);color:var(--accent);cursor:pointer}
.ph-apprreset:hover{background:var(--accent-50)}

/* global search */
.ph-search{display:flex;align-items:center;gap:9px;height:38px;width:360px;padding:0 14px;
  border-radius:var(--r-pill);background:var(--ph-surface);border:1px solid var(--ph-border);
  transition:border-color .15s,box-shadow .15s}
.ph-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-50)}
.ph-search svg{width:16px;height:16px;color:var(--ph-text-3);flex:0 0 auto}
.ph-search input{flex:1;min-width:0;border:0;background:none;outline:none;font-family:var(--font-sans);font-size:14px;color:var(--ph-text)}
.ph-search input::placeholder{color:var(--ph-text-3)}
.ph-clear{border:0;background:none;cursor:pointer;color:var(--ph-text-3);font-size:18px;line-height:1;padding:0 2px}

/* personal | team */
.ph-modesw{display:inline-flex;gap:3px;padding:3px;border-radius:var(--r-pill);background:var(--ph-glass);border:1px solid var(--ph-border);flex:0 0 auto}
.ph-modesw button{border:0;background:none;cursor:pointer;font:600 12.5px/1 var(--font-sans);color:var(--ph-text-2);padding:6px 13px;border-radius:var(--r-pill)}
.ph-modesw button.on{background:var(--ph-surface);color:var(--ph-text);box-shadow:var(--sh-xs)}
.ph-modesw button.team.on{color:#E8629C}

/* autosave */
.ph-saved{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ph-text-3);flex:0 0 auto;white-space:nowrap}
.ph-saved svg{width:13px;height:13px;color:var(--done)}
.ph-saved.saving svg{color:var(--ph-text-3)}

/* recent dropdown */
.ph-recent{position:relative;flex:0 0 auto}
.ph-recentpop{position:absolute;top:44px;right:0;z-index:30;width:280px;background:var(--ph-sticky);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--ph-border);
  border-radius:var(--r-lg);box-shadow:var(--sh-lg);padding:8px;animation:phpop .16s ease}
@keyframes phpop{from{transform:translateY(-6px)}to{transform:none}}
.ph-recentpop .h{font:700 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--ph-text-3);padding:8px 10px 6px}
.ph-recentrow{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:9px 10px;border-radius:var(--r-sm)}
.ph-recentrow:hover{background:var(--ph-glass)}
.ph-recentrow .rail{width:3px;height:22px;border-radius:2px;flex:0 0 auto}
.ph-recentrow b{font-weight:600;font-size:13px;color:var(--ph-text);display:block;line-height:1.2}
.ph-recentrow span{font-size:11.5px;color:var(--ph-text-2)}
.ph-recent-empty{font-size:12.5px;color:var(--ph-text-3);padding:12px 10px}

/* ---------- document tabs ---------- */
.ph-doctabs{flex:0 0 auto;display:flex;align-items:stretch;gap:2px;padding:0 32px;
  position:relative;z-index:30;
  background:var(--ph-sticky);border-bottom:1px solid var(--ph-border);overflow-x:auto;scrollbar-width:none;-webkit-backdrop-filter:blur(16px) saturate(1.2);backdrop-filter:blur(16px) saturate(1.2)}
.ph-doctabs::-webkit-scrollbar{display:none}
.ph-root[data-tone="dark"] .ph-doctabs{background:rgba(16,15,26,.72)}
.ph-root[data-tone="light"] .ph-doctabs{background:rgba(255,255,255,.82)}
.ph-doctab{display:flex;align-items:center;gap:8px;border:1px solid transparent;cursor:pointer;
  font:600 13px/1 var(--font-sans);color:var(--ph-text);padding:9px 13px;margin:5px 1px 0;
  border-radius:12px 12px 0 0;white-space:nowrap;max-width:230px;transition:background .14s,color .14s}
.ph-doctab:hover{color:var(--ph-text);background:var(--ph-glass)}
.ph-doctab.on{color:var(--ph-text);background:var(--ph-surface);border-color:var(--ph-border);border-bottom-color:transparent;box-shadow:0 -3px 10px -6px rgba(8,10,22,.4)}
.ph-root[data-tone="dark"] .ph-doctab.on{background:rgba(255,255,255,.16)}
.ph-root[data-tone="light"] .ph-doctab.on{background:#fff}
.ph-doctab.on::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;border-radius:3px 3px 0 0;background:var(--accent)}
.ph-doctab{position:relative}
.ph-doctab.on .nm{font-weight:800}
.ph-doctab .rail{width:4px;height:16px;border-radius:2px;flex:0 0 auto}
.ph-doctab .nm{overflow:hidden;text-overflow:ellipsis}
.ph-doctab .x{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;color:var(--ph-text-3);flex:0 0 auto;margin-left:2px}
.ph-doctab .x:hover{background:var(--ph-border);color:var(--ph-text)}
.ph-doctab .x svg{width:11px;height:11px}
.ph-doctab.home{font-weight:700;background:var(--ph-glass);color:var(--ph-text);min-width:42px;justify-content:center;padding:9px 12px}
.ph-doctab.home svg{width:18px;height:18px;display:block}
.ph-doctab.home:hover{background:var(--ph-border)}
.ph-difflbl{font:800 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--ph-text-3);margin-bottom:10px}
.ph-difftiers{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ph-difftier{border:1px solid var(--ph-border);border-top:4px solid var(--tier);border-radius:var(--r-md);padding:13px;background:var(--ph-surface)}
.ph-difftier-h{font:800 12.5px/1 var(--font-sans);color:var(--tier);margin-bottom:9px}
@media (max-width:720px){.ph-difftiers{grid-template-columns:1fr}}
.ph-doctab-add{flex:0 0 auto;width:30px;height:30px;align-self:center;margin-left:4px;border:0;background:none;cursor:pointer;color:var(--ph-text-3);border-radius:50%;display:grid;place-items:center}
.ph-doctab-add:hover{background:var(--ph-glass);color:var(--ph-text)}
.ph-doctab-add svg{width:16px;height:16px}

/* ---------- scroll region ---------- */
.ph-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative}
.ph-pagehead{position:relative;overflow:hidden;background:var(--ph-surface);border:1px solid var(--ph-border);border-radius:var(--r-xl);padding:20px 22px 6px;margin-bottom:16px;-webkit-backdrop-filter:blur(18px) saturate(1.3);backdrop-filter:blur(18px) saturate(1.3);box-shadow:var(--sh-sm)}
.ph-pagehead::before{display:none}
.ph-root[data-tone="dark"] .ph-pagehead::before{background:rgba(255,255,255,.6)}
.ph-root[data-frame="C"] .ph-pagehead::before{background:rgba(0,0,0,.28)}
.ph-pagehead .ph-crumb,.ph-pagehead .ph-sub{opacity:.92}
.ph-pagehead .ph-nav{margin-top:6px}
.ph-page{max-width:1180px;margin:0 auto;padding:28px 40px 64px;width:100%}

/* ---------- PAGE TIER ---------- */
.ph-crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ph-text-2);margin-bottom:10px}
.ph-crumb button{border:0;background:none;cursor:pointer;color:var(--ph-text-2);font:inherit;padding:0}
.ph-crumb button:hover{color:var(--accent);text-decoration:underline}
.ph-crumb .sep{color:var(--ph-text-3);opacity:.6}
.ph-crumb .cur{color:var(--ph-text);font-weight:600}
.ph-titlerow{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:6px}
.ph-title{font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1.05;letter-spacing:-.02em;color:var(--accent)}
/* Color-forward frame → gradient wordmark title */
.ph-root[data-frame="C"] .ph-title{background:linear-gradient(120deg,var(--accent),color-mix(in oklab,var(--accent) 45%,var(--honey-400)));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ph-sub{font-size:14px;color:var(--ph-text-2);margin-bottom:22px;max-width:640px}

/* ---------- underline nav ---------- */
.ph-nav{display:flex;gap:4px;border-bottom:1px solid var(--ph-border);margin-bottom:18px}
.ph-navitem{position:relative;border:0;background:none;cursor:pointer;font:500 14px/1 var(--font-sans);
  color:var(--ph-text-2);padding:11px 14px;margin-bottom:-1px;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:8px}
.ph-navitem:hover{color:var(--ph-text)}
.ph-navitem.on{color:var(--ph-text);font-weight:700;border-bottom-color:var(--accent)}
.ph-navbadge{background:var(--danger);color:#fff;border-radius:var(--r-pill);min-width:18px;height:18px;display:grid;place-items:center;font:800 10.5px/1 var(--font-sans);padding:0 5px}

/* ---------- toolbar ---------- */
.ph-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.ph-toolbar .grow{flex:1}
.ph-seg{display:inline-flex;gap:3px;padding:3px;border-radius:var(--r-pill);background:var(--ph-glass);border:1px solid var(--ph-border);flex:0 0 auto}
.ph-seg button{border:0;background:none;cursor:pointer;font:600 13px/1 var(--font-sans);color:var(--ph-text-2);padding:7px 14px;border-radius:var(--r-pill);display:flex;align-items:center;gap:6px}
.ph-seg button:hover{color:var(--ph-text)}
.ph-seg button.on{background:var(--ph-surface);color:var(--ph-text);box-shadow:var(--sh-xs)}
.ph-seg button svg{width:15px;height:15px}
.ph-menu{position:relative;flex:0 0 auto}
.ph-menubtn{display:flex;align-items:center;gap:7px;border:1px solid var(--ph-border);background:var(--ph-surface);border-radius:var(--r-pill);padding:8px 13px;cursor:pointer;font:600 13px/1 var(--font-sans);color:var(--ph-text)}
.ph-menubtn:hover{border-color:var(--ph-text-3)}
.ph-menubtn .lbl{color:var(--ph-text-3);font-weight:600}
.ph-menubtn .val{color:var(--ph-text)}
.ph-menubtn svg{width:13px;height:13px;color:var(--ph-text-3)}
.ph-menupop{position:absolute;top:42px;left:0;z-index:30;min-width:170px;background:var(--ph-sticky);
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--ph-border);
  border-radius:var(--r-md);box-shadow:var(--sh-lg);padding:6px;animation:phpop .14s ease}
.ph-menupop button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:0;background:none;cursor:pointer;font:600 13px/1 var(--font-sans);color:var(--ph-text);padding:9px 10px;border-radius:var(--r-sm)}
.ph-menupop button:hover{background:var(--ph-glass)}
.ph-menupop button.on{color:var(--accent)}
.ph-menupop button .ck{margin-left:auto;color:var(--accent);width:14px;height:14px}

/* buttons */
.ph-btn{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;font:700 13.5px/1 var(--font-sans);
  border-radius:var(--r-pill);padding:10px 18px;transition:transform .12s,box-shadow .15s,background .15s}
.ph-btn:active{transform:scale(.97)}
.ph-btn svg{width:16px;height:16px}
.ph-btn.primary{background:var(--accent);color:#fff;box-shadow:var(--sh-brand)}
.ph-btn.honey{background:var(--honey-500);color:#fff;box-shadow:var(--sh-honey)}
.ph-btn.ghost{background:transparent;color:var(--ph-text);border:1.5px solid var(--ph-border)}
.ph-btn.ghost:hover{border-color:var(--ph-text-3);background:var(--ph-glass)}
/* header ghost buttons need a darker fill so they read against the heading background */
.ph-dochead .ph-btn.ghost,.ph-pagehead .ph-btn.ghost{background:rgba(20,17,30,.24);border-color:color-mix(in oklab,currentColor 34%,transparent)}
.ph-dochead .ph-btn.ghost:hover,.ph-pagehead .ph-btn.ghost:hover{background:rgba(20,17,30,.38);border-color:color-mix(in oklab,currentColor 55%,transparent)}
.ph-btn.sm{padding:7px 13px;font-size:12.5px}
.ph-btn.icon{padding:9px;border-radius:50%}
.ph-btn.icon svg{width:15px;height:15px}

/* chips · tags · badges */
.ph-chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.ph-chip{display:inline-flex;align-items:center;gap:6px;border:0;cursor:pointer;font:600 12px/1 var(--font-sans);border-radius:var(--r-pill);padding:5px 11px;background:var(--ph-glass);color:var(--ph-text-2)}
.ph-chip .d{width:7px;height:7px;border-radius:50%}
.ph-chip .x{margin-left:1px;color:inherit;opacity:.6;font-size:13px}
.ph-chip .x:hover{opacity:1}
.ph-tag{display:inline-flex;align-items:center;gap:5px;font:700 11px/1 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--ph-text-3)}
.ph-tag .d{width:7px;height:7px;border-radius:50%}
.ph-badge{display:inline-flex;align-items:center;gap:5px;font:700 11px/1 var(--font-sans);letter-spacing:.03em;padding:5px 9px;border-radius:var(--r-pill);white-space:nowrap}

/* ---------- LIST surface ---------- */
.ph-list{background:var(--ph-surface);border:1px solid var(--ph-border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-xs)}
.ph-grouphead{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:10px;padding:10px 18px;border-radius:12px;
  background:var(--ph-sticky);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--ph-border);font:700 12px/1 var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:var(--ph-text)}
.ph-grouphead .meta{margin-left:auto;font-weight:600;font-size:11.5px;letter-spacing:0;text-transform:none;color:var(--ph-text-3)}
.ph-row{display:flex;align-items:center;gap:14px;padding:13px 18px 13px 16px;border-bottom:1px solid var(--ph-hairline);
  border-left:3px solid transparent;cursor:pointer;position:relative;transition:background .12s}
.ph-row:last-child{border-bottom:0}
.ph-row:hover{background:var(--ph-surface-2)}
.ph-row .time{font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:600;color:var(--ph-text-2);width:104px;flex:0 0 auto}
.ph-row .main{flex:1;min-width:0}
.ph-row .t{font-size:14px;font-weight:600;color:var(--ph-text);line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-row .m{font-size:12.5px;color:var(--ph-text-2);margin-top:2px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ph-row .m .sep{color:var(--ph-text-3);opacity:.6}
.ph-row .acts{display:flex;align-items:center;gap:6px;flex:0 0 auto;opacity:0;transition:opacity .15s}
.ph-row:hover .acts,.ph-row.keepacts .acts{opacity:1}
.ph-row .ck{width:17px;height:17px;flex:0 0 auto;accent-color:var(--accent)}
.ph-row.sel{background:var(--accent-50)}
.ph-rowmore{width:32px;height:32px;border:0;background:none;border-radius:50%;cursor:pointer;color:var(--ph-text-3);display:grid;place-items:center;flex:0 0 auto}
.ph-rowmore:hover{background:var(--ph-border);color:var(--ph-text)}
.ph-rowmore svg{width:16px;height:16px}

.ph-bulk{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r-md);background:var(--accent-50);
  border:1px solid color-mix(in oklab,var(--accent) 24%,transparent);margin-bottom:14px}
.ph-bulk .n{font-weight:700;font-size:13px;color:var(--accent);margin-right:auto}

/* unit sections */
.ph-section{margin-bottom:14px}
.ph-sechead{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:10px 4px}
.ph-sechead .chev{transition:transform .2s;color:var(--ph-text-3)}
.ph-sechead.collapsed .chev{transform:rotate(-90deg)}
.ph-sechead .d{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.ph-sechead .nm{font-family:var(--font-display-sm);font-weight:700;font-size:16px;color:var(--ph-text)}
.ph-sechead .sub{font-size:12.5px;color:var(--ph-text-2);margin-left:auto;font-weight:600}
.ph-sechead .miniprog{width:80px;height:6px;border-radius:var(--r-pill);background:var(--ph-glass);overflow:hidden;flex:0 0 auto}
.ph-sechead .miniprog i{display:block;height:100%;border-radius:var(--r-pill)}
.ph-unitgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;padding:4px 4px 8px}
.ph-unitcard{position:relative;display:flex;flex-direction:column;gap:10px;text-align:left;border:1px solid var(--ph-border);
  background:var(--ph-surface);border-radius:var(--r-lg);padding:16px 16px 16px 18px;cursor:pointer;overflow:hidden;transition:transform .15s,box-shadow .15s}
.ph-unitcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--uc)}
.ph-unitcard:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.ph-unitcard.future{opacity:.6}
.ph-unitcard.future:hover{opacity:1}
.ph-unit-top{display:flex;align-items:center;gap:8px}
.ph-unit-no{font:800 11px/1 var(--font-sans);color:var(--uc);letter-spacing:.04em}
.ph-unit-name{font-family:var(--font-display-sm);font-weight:700;font-size:15.5px;color:var(--ph-text);line-height:1.18}
.ph-unit-prog{display:flex;align-items:center;gap:9px}
.ph-unit-bar{flex:1;height:6px;border-radius:var(--r-pill);background:var(--ph-glass);overflow:hidden}
.ph-unit-bar i{display:block;height:100%;border-radius:var(--r-pill);background:var(--uc)}
.ph-unit-pct{font-size:12px;font-weight:700;color:var(--ph-text-2);font-variant-numeric:tabular-nums}
/* Color-forward → unit cards lead with subject color */
.ph-root[data-frame="C"] .ph-unitcard:not(.future){background:linear-gradient(135deg, color-mix(in oklab,var(--uc) 30%, #fff) 0%, color-mix(in oklab,var(--uc) 14%, #fff) 100%);border-color:color-mix(in oklab,var(--uc) 38%,#fff)}

/* wall cards */
.ph-wallgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.ph-wallgrid.list{grid-template-columns:1fr;gap:0;background:var(--ph-surface);border:1px solid var(--ph-border);border-radius:var(--r-lg);overflow:hidden}
.ph-wall{display:flex;flex-direction:column;text-align:left;border:1px solid var(--ph-border);background:var(--ph-surface);border-radius:20px;overflow:hidden;cursor:pointer;box-shadow:var(--sh-xs);transition:transform .15s,box-shadow .15s}
.ph-wall:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.ph-root[data-frame="A"] .ph-wall{border-radius:20px}
.ph-wallgrid.list .ph-wall{flex-direction:row;align-items:center;border:0;border-radius:12px;border-bottom:1px solid var(--ph-hairline);box-shadow:none}
.ph-wallgrid.list .ph-wall:hover{transform:none;background:var(--ph-surface-2)}
.ph-wallprev{height:112px;margin:8px 8px 0;border-radius:16px;background:linear-gradient(140deg, color-mix(in oklab,var(--wc,#8a93b5) 92%,#fff) 0%, var(--wc,#8a93b5) 60%, color-mix(in oklab,var(--wc,#8a93b5) 88%,#000 12%) 100%);display:flex;gap:5px;padding:12px;position:relative;align-items:flex-end}
.ph-wallgrid.list .ph-wallprev{width:96px;height:64px;flex:0 0 auto;margin:8px;border-radius:12px}
.ph-wallprev .mini{display:none}
.ph-wallprevname{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:12px 16px;font-family:var(--font-display-sm);font-weight:800;font-size:17px;letter-spacing:-.01em;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.42);line-height:1.16;text-wrap:balance}
.ph-wallgrid.list .ph-wallprevname{font-size:12px;padding:6px}
.ph-wallbody{padding:12px 15px;flex:1;min-width:0;text-align:center}
.ph-wallname{display:none}
.ph-wallkind{font:700 10.5px/1 var(--font-sans);letter-spacing:.05em;text-transform:uppercase;color:var(--ph-text-3);margin:0 0 6px}
.ph-wallmeta{font-size:12px;color:var(--ph-text-2)}

/* empty + results */
.ph-empty{text-align:center;padding:56px 24px;color:var(--ph-text-3)}
.ph-empty .ttl{font-family:var(--font-display-sm);font-weight:700;font-size:16px;color:var(--ph-text-2);margin-bottom:6px}
.ph-empty .ds{font-size:13.5px;margin-bottom:16px}
.ph-srhead{font:700 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--ph-text-3);margin:18px 2px 8px}

/* ============================================================
   PLANNER DOCUMENTS
   ============================================================ */
.ph-doc{display:flex;flex-direction:column;min-height:100%}
.ph-dochead{position:sticky;top:0;z-index:10;background:var(--ph-sticky);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--ph-border);padding:16px 40px 0}
.ph-root[data-frame="C"] .ph-dochead{background:linear-gradient(180deg, color-mix(in oklab,var(--dc,var(--accent)) 56%, transparent) 0%, color-mix(in oklab,var(--dc,var(--accent)) 78%, rgba(18,15,28,.42)) 100%);border-bottom-color:transparent;color:#fff;-webkit-backdrop-filter:blur(22px) saturate(1.4);backdrop-filter:blur(22px) saturate(1.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.28)}
.ph-root[data-frame="C"] .ph-dochead :is(.ph-kicker,.ph-doctitle,.ph-crumb,.ph-crumb button,.ph-crumb .cur,.ph-crumb .sep,.ph-docmeta,.ph-navitem,.ph-doctab,.ph-tabgear,.sep){color:#fff}
.ph-root[data-frame="C"] .ph-dochead .ph-navitem.on{color:#fff;border-bottom-color:#fff}
.ph-root[data-frame="C"] .ph-dochead .ph-doctitle .rail{background:rgba(255,255,255,.85)}
.ph-root[data-frame="C"] .ph-dochead .ph-docmeta{opacity:.92}
.ph-dochead-in{max-width:1180px;margin:0 auto}
.ph-doch-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
.ph-doch-l{min-width:0}
.ph-kicker{display:inline-flex;align-items:center;gap:12px;font-size:clamp(28px,3.2vw,40px);font-weight:800;letter-spacing:.02em;line-height:1.05;text-transform:uppercase;color:var(--ph-text);margin-bottom:10px}
.ph-kicker .dot{display:none}
/* kicker is white only on the Color-frame dark gradient header; elsewhere it follows the doc text colour */
.ph-root[data-frame="C"] .ph-dochead .ph-kicker{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.32)}
.ph-root[data-frame="A"][data-tone="dark"] .ph-dochead .ph-kicker{color:#fff}
.ph-doctitle{font-family:var(--font-display-sm);font-weight:700;font-size:21px;letter-spacing:-.01em;color:var(--ph-text);line-height:1.15;display:flex;align-items:center;gap:10px}
.ph-doctitle .rail{width:4px;height:22px;border-radius:2px;flex:0 0 auto}
.ph-docmeta{font-size:12.5px;color:var(--ph-text-2);margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ph-docmeta .sep{color:var(--ph-text-3);opacity:.6}
.ph-doch-actions{display:flex;align-items:center;gap:9px;flex:0 0 auto}
.ph-doctabnav{display:flex;gap:2px;margin-top:14px;overflow-x:auto;scrollbar-width:none}
.ph-doctabnav::-webkit-scrollbar{display:none}
.ph-doctabnav .ph-navitem{font-size:13.5px;padding:11px 12px}
.ph-tabgear{margin-left:auto;align-self:center}
.ph-doctabnav .ph-tabgear:not(.ph-seg){margin-left:0}

/* multi-pane */
.ph-panes{display:grid;grid-template-columns:228px 1fr 280px;gap:0;flex:1;min-height:0;background:var(--ph-surface)}
.ph-pane-rail{border-right:1px solid var(--ph-border);padding:18px 12px;overflow-y:auto}
.ph-pane-center{padding:24px 32px;overflow-y:auto;min-width:0}
.ph-pane-insp{border-left:1px solid var(--ph-border);padding:18px 16px;overflow-y:auto;background:var(--ph-surface-2)}
.ph-railh{display:flex;flex-direction:column;gap:6px;align-items:flex-start;font:700 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--ph-text-3);padding:4px 10px 10px}
.ph-railh-name{text-transform:none;letter-spacing:0;font-weight:700;font-size:12px;color:var(--accent);background:color-mix(in oklab,var(--accent) 12%,transparent);padding:3px 9px;border-radius:var(--r-pill)}
.ph-flowitem{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:10px 11px;border-radius:var(--r-sm);position:relative}
.ph-flowitem:hover{background:var(--ph-glass)}
.ph-flowitem.on{background:var(--accent-50)}
.ph-flowitem .num{width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font:700 11px/1 var(--font-sans);background:var(--ph-glass);color:var(--ph-text-2)}
.ph-flowitem.on .num{background:var(--accent);color:#fff}
.ph-flowitem.done .num{background:var(--done-tint);color:var(--done)}
.ph-flowitem .fl{font-size:13px;font-weight:600;color:var(--ph-text);line-height:1.2}
.ph-fmtfont,.ph-fmtsize{height:28px;border:1px solid var(--ph-border);background:var(--ph-surface);color:var(--ph-text-2);border-radius:7px;font:600 11.5px var(--font-sans);padding:0 4px;cursor:pointer}
.ph-flowitem.on .fl{color:var(--ph-text)}

<style data-src="themes.css">
/* ============================================================
   THEMES — Normal · Night · Honey · Blossom · Mint · Sky
   A theme washes over the whole app: the ambient background palette,
   a gentle soft-light tint over everything (incl. buttons), and the
   accent/glow color. Tone is global (Night = dark, else light) so every
   page matches the home screen. Loaded after home.css / views.css.
   ============================================================ */

/* ---- accent per theme (drives primary buttons, glows, active states) ---- */
.home{ --accent:var(--brand-500); --accent-600:var(--brand-600); --accent-50:var(--brand-50); }
.home[data-theme="normal"]  { --accent:#3B6CF6; --accent-600:#2E55DB; --accent-50:#EEF3FF; }
.home[data-theme="night"]   { --accent:#8FA8FF; --accent-600:#6383FB; --accent-50:rgba(143,168,255,.16); }
.home[data-theme="honey"]   { --accent:#E59A12; --accent-600:#C9890C; --accent-50:#FFF4DC; }
.home[data-theme="blossom"] { --accent:#E8629C; --accent-600:#C53F7B; --accent-50:#FDEAF2; }
.home[data-theme="mint"]    { --accent:#1FA06B; --accent-600:#157A50; --accent-50:#E3F6EC; }
.home[data-theme="sky"]     { --accent:#2E86D8; --accent-600:#1F77C9; --accent-50:#E6F4FF; }

/* grading hues derived from the active accent (deep = shadows, light = highlights) */
.home{ --accent-deep:color-mix(in oklab, var(--accent) 64%, #140f22);
       --accent-light:color-mix(in oklab, var(--accent) 72%, #ffffff); }

/* Normal + photo: cycle slowly through the four LIGHT theme hues (sky-blue lightness)
   instead of the dark default blue. Animating the registered --accent updates the
   grade, glass tint, outlines and text together. */
@property --accent{ syntax:'<color>'; inherits:true; initial-value:#3B6CF6; }
@keyframes accentcycle{
  0%,100%{--accent:#5BA8FF}   /* sky      */
  25%    {--accent:#5AD0A6}   /* mint     */
  50%    {--accent:#F4C460}   /* honey    */
  75%    {--accent:#FF8FC0}   /* blossom  */
}
.home[data-theme="normal"][data-bg="photo"]{--accent:#5BA8FF;animation:accentcycle 52s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.home[data-theme="normal"][data-bg="photo"]{animation:none}}

/* ---- ambient wash palettes (light) ---- */
.ambient.t-normal{background-color:#F6F5F3;background-image:
  radial-gradient(60% 60% at 20% 12%, rgba(255,255,255,.55), transparent 62%),
  linear-gradient(150deg,#F7F5F2,#F1F1F4 55%,#EEF1F0)}
.ambient.t-honey{background-color:#FFF8EC;background-image:
  radial-gradient(54% 58% at 10% 8%, rgba(252,210,70,.66), transparent 62%),
  radial-gradient(50% 54% at 90% 8%, rgba(255,132,70,.5), transparent 60%),
  radial-gradient(50% 54% at 86% 90%, rgba(244,96,110,.46), transparent 62%),
  radial-gradient(48% 52% at 18% 94%, rgba(255,230,110,.66), transparent 64%),
  radial-gradient(44% 46% at 54% 48%, rgba(255,170,72,.46), transparent 64%),
  radial-gradient(40% 42% at 70% 30%, rgba(248,86,86,.32), transparent 62%),
  linear-gradient(160deg,#FFF0C8,#FFEAD2 60%,#FFF2DE)}
.ambient.t-blossom{background-color:#FBEEF6;background-image:
  radial-gradient(56% 60% at 8% 6%, rgba(255,138,190,.68), transparent 60%),
  radial-gradient(50% 56% at 92% 8%, rgba(184,150,255,.64), transparent 60%),
  radial-gradient(46% 52% at 84% 88%, rgba(255,150,128,.48), transparent 62%),
  radial-gradient(48% 54% at 14% 96%, rgba(255,176,214,.58), transparent 62%),
  radial-gradient(40% 44% at 60% 46%, rgba(206,128,255,.44), transparent 64%),
  radial-gradient(34% 38% at 38% 28%, rgba(255,108,166,.42), transparent 66%),
  radial-gradient(30% 34% at 74% 66%, rgba(150,120,230,.36), transparent 68%),
  radial-gradient(64% 74% at 50% 122%, rgba(118,66,138,.34), transparent 70%),
  linear-gradient(160deg,#FBDCEE,#F0DCF8 60%,#FBE2F0)}
.ambient.t-mint{background-color:#F0FBF4;background-image:
  radial-gradient(54% 58% at 10% 10%, rgba(150,212,255,.5), transparent 64%),
  radial-gradient(52% 56% at 88% 8%, rgba(150,234,194,.62), transparent 62%),
  radial-gradient(48% 52% at 84% 92%, rgba(216,240,150,.5), transparent 64%),
  radial-gradient(46% 50% at 16% 92%, rgba(180,238,206,.5), transparent 64%),
  radial-gradient(42% 44% at 58% 52%, rgba(236,244,168,.36), transparent 66%),
  linear-gradient(160deg,#E8F8F1,#EEF9EA 60%,#EAFBF2)}
.ambient.t-sky{background-color:#EEF5FF;background-image:
  radial-gradient(54% 58% at 10% 10%, rgba(96,166,255,.66), transparent 62%),
  radial-gradient(50% 54% at 90% 8%, rgba(150,210,255,.56), transparent 60%),
  radial-gradient(50% 54% at 88% 90%, rgba(70,120,235,.5), transparent 62%),
  radial-gradient(48% 52% at 16% 92%, rgba(140,224,255,.56), transparent 64%),
  radial-gradient(44% 46% at 56% 50%, rgba(120,150,250,.4), transparent 64%),
  radial-gradient(40% 42% at 70% 32%, rgba(180,232,255,.5), transparent 62%),
  linear-gradient(160deg,#E2EEFF,#EAF3FF 52%,#EDF6FF)}
/* Night — deep slate-navy wash (also used for normal-cycle's dark? no: night only) */
.ambient:not(.t-normal):not(.t-night){filter:saturate(1.34) contrast(1.07) brightness(1.02)}
.ambient.t-night{background-color:#0E111A;background-image:
  radial-gradient(56% 60% at 12% 10%, rgba(96,118,200,.5), transparent 66%),
  radial-gradient(52% 56% at 90% 8%, rgba(150,96,200,.44), transparent 64%),
  radial-gradient(54% 58% at 88% 92%, rgba(60,130,190,.46), transparent 66%),
  radial-gradient(48% 52% at 14% 92%, rgba(190,90,150,.34), transparent 64%),
  radial-gradient(44% 46% at 56% 50%, rgba(70,140,130,.32), transparent 64%),
  linear-gradient(135deg,#10131D,#161B28 55%,#0C0F16)}

/* ---- gentle theme tint over the whole app (incl. buttons) ---- */
.theme-tint{position:absolute;inset:0;z-index:90;pointer-events:none;mix-blend-mode:soft-light;opacity:0;transition:opacity .5s ease}
/* ---- gentle per-theme accent glow behind panels (Honey/Blossom/Mint/Sky/Night) ---- */
.home[data-theme]:not([data-theme="normal"]):not([data-theme="off"]) :is(.vcard,.pl-folder,.pl-card,.rw-sec,.vc-cluster,.vc-detail,.teach-board,.teach-lesson,.teach-rail){
  box-shadow:0 24px 60px -32px rgba(18,16,28,.3) !important}
@media (prefers-reduced-motion:no-preference){
  .home[data-theme]:not([data-theme="normal"]):not([data-theme="off"]) :is(.vcard,.pl-folder,.rw-sec,.vc-cluster){transition:box-shadow .4s ease}}
.home[data-theme="honey"]   .theme-tint{opacity:.4;background:radial-gradient(140% 150% at 10% -10%, #F4B740 0%, #FFB35E 32%, #FF9E5C 56%, #FFC274 80%, #FFE2A4 100%)}
.home[data-theme="blossom"] .theme-tint{opacity:.32;background:radial-gradient(140% 150% at 10% -10%, #FF8FC0 0%, #E6A6DC 26%, #C9A8F0 48%, #AEB6F2 68%, #D7BEE0 86%, #FFC8AE 100%)}
.home[data-theme="mint"]    .theme-tint{opacity:.36;background:radial-gradient(140% 150% at 10% -10%, #5BC8FF 0%, #54D7BE 30%, #4FD7A6 54%, #92E7C4 78%, #D2F2E0 100%)}
.home[data-theme="sky"]     .theme-tint{opacity:.38;background:radial-gradient(140% 150% at 10% -10%, #5BA8FF 0%, #7DBFFF 32%, #8FCBFF 56%, #B2DBFF 80%, #D8EDFF 100%)}
.home[data-theme="night"]   .theme-tint{opacity:.3; background:radial-gradient(130% 130% at 12% 0%, #46557E, #1A2238 70%)}
.home[data-theme="normal"]  .theme-tint{opacity:0}

/* Photo background: photo stays prominent but with a clear color wash on top */
.home[data-bg="photo"][data-theme="honey"]   .theme-tint{opacity:.26}
.home[data-bg="photo"][data-theme="blossom"] .theme-tint{opacity:.24}
.home[data-bg="photo"][data-theme="mint"]    .theme-tint{opacity:.22}
.home[data-bg="photo"][data-theme="sky"]     .theme-tint{opacity:.24}
.home[data-bg="photo"][data-theme="night"]   .theme-tint{opacity:.18}

/* ============================================================
   SURFACE THEMING CONTRACT — overlays carry the active theme
   Modals, panels and popovers sit ABOVE .theme-tint (z-index 90), so the
   whole-app wash never reaches them. Give every overlay surface its own faint
   accent wash so it reads as part of the active theme (tone + accent already
   flow through var(--accent) and [data-tone]). Normal & Photo themes = no wash.
   Any NEW surface must either use one of these container classes or add itself
   to this list. (Mirrored in design/V2 Design System.html → "Surface theming".)
   ============================================================ */
.home[data-theme]:not([data-theme="normal"]):not([data-theme="off"]) :is(
  .hub-modal, .cfg-modal, .cu-modal, .ue-modal, .set-panel,
  .ll-dlg, .ll-overlay .ll-root, .td-dock,
  .lnav-presetpop, .ll-menu, .ll-addpop, .lesson-menu, .toolspop, .wb-respop,
  .rw-respop, .hub-detailpane, .qpop, .ue-rowmenu
){
  background-image:radial-gradient(135% 130% at 100% 0%,
    color-mix(in oklab, var(--accent) 14%, transparent), transparent 62%) !important;
}
/* scrims behind overlays pick up a whisper of the accent so the dim reads themed */
.home[data-theme]:not([data-theme="normal"]):not([data-theme="off"]) :is(
  .hub-scrim, .cfg-scrim, .cu-scrim, .ue-scrim, .set-scrim, .ll-dlgscrim, .qpop-scrim
){
  background-image:radial-gradient(120% 100% at 50% 0%,
    color-mix(in oklab, var(--accent) 16%, transparent), transparent 70%);
}

/* Photo mode: chrome stays neutral white/black — only the icons keep a subtle
   accent tint. (Nav words, segmented bar and glass are NOT color-tinted.) */
.home[data-bg="photo"] .lesson-menu button svg,
.home[data-bg="photo"] .toolspop .tool svg{color:var(--accent)}

/* ============================================================
   PHOTO MODE — premium theme grading (4 layers)
   1) duotone color-grade of the photo   (.frame::before, blend:color)
   2) drifting directional light + vignette (.scrim)
   3) contrast/saturation pop            (.photo filter)
   4) theme-tinted glass + accent glow    (chrome)
   ============================================================ */

/* 1 · duotone gradient-map: recolors the photo by hue, keeps its luminance */
.home[data-bg="photo"] .frame::before{
  content:"";position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:inherit;
  mix-blend-mode:color;opacity:.2;background-size:200% 200%;
  background-image:linear-gradient(125deg, var(--accent-deep) 0%, var(--accent) 46%, var(--accent-light) 100%);}
.home[data-theme="off"] .frame::before{opacity:0}          /* Off = true original photo, no grade */
.home[data-bg="photo"][data-zoom="1"] .frame::before{animation:gradedrift 34s ease-in-out infinite}
@keyframes gradedrift{
  0%{background-position:0% 30%}25%{background-position:70% 8%}
  50%{background-position:100% 70%}75%{background-position:34% 100%}100%{background-position:0% 30%}}
@media (prefers-reduced-motion:reduce){.home[data-bg="photo"][data-zoom="1"] .frame::before{animation:none}}

/* 2 · directional light + vignette (neutral white/black shading) */
.home[data-bg="photo"] .scrim.min{background:
  radial-gradient(62% 58% at 16% 10%, rgba(255,255,255,.34), transparent 58%),
  radial-gradient(70% 64% at 88% 96%, rgba(10,8,18,.32), transparent 60%),
  radial-gradient(135% 130% at 50% 46%, transparent 52%, rgba(10,8,18,.5) 100%),
  linear-gradient(180deg, rgba(10,8,18,.20) 0%, transparent 30%, rgba(10,8,18,.30) 100%);
  background-size:160% 160%, 160% 160%, 100% 100%, 100% 100%;}
.home[data-theme="off"] .scrim.min{background:
  radial-gradient(130% 125% at 50% 46%, transparent 56%, rgba(10,8,18,.42) 100%),
  linear-gradient(180deg, rgba(10,8,18,.18) 0%, transparent 28%, rgba(10,8,18,.30) 100%)}
.home[data-bg="photo"][data-zoom="1"] .scrim.min{animation:lightdrift 30s ease-in-out infinite}
@keyframes lightdrift{0%{background-position:0% 0%,100% 100%,0 0,0 0}50%{background-position:60% 40%,40% 60%,0 0,0 0}100%{background-position:0% 0%,100% 100%,0 0,0 0}}
@media (prefers-reduced-motion:reduce){.home[data-bg="photo"][data-zoom="1"] .scrim.min{animation:none}}

/* 3 · grade the photo itself — richer color, gentle contrast */
.home[data-bg="photo"] .photo{filter:saturate(1.18) contrast(1.05) brightness(1.01)}
.home[data-theme="off"] .photo{filter:none}

/* 4 · chrome stays neutral on photo (subtle white inner highlight only) */
.home[data-bg="photo"] .glass,
.home[data-bg="photo"] .clock,
.home[data-bg="photo"] .ctx,
.home[data-bg="photo"] .brand,
.home[data-bg="photo"] .modesw,
.home[data-bg="photo"] .vcard,
.home[data-bg="photo"] .pl-card{
  box-shadow:0 16px 40px -22px rgba(10,8,18,.7),
             inset 0 1px 0 rgba(255,255,255,.28);}
.home[data-theme="off"] .glass,
.home[data-theme="off"] .clock,
.home[data-theme="off"] .ctx,
.home[data-theme="off"] .brand,
.home[data-theme="off"] .modesw,
.home[data-theme="off"] .vcard,
.home[data-theme="off"] .pl-card{background-image:none}

/* ===== Light canvas needs dark text (even when a photo forces dark tone) ===== */
.home[data-canvas="glass-light"] .greeting{color:var(--ink)}
.home[data-canvas="glass-light"] .eyebrow{color:var(--ink-soft)}
.home[data-canvas="glass-light"] .views.console{background:rgba(255,255,255,.6);border-color:rgba(255,255,255,.85)}
.home[data-canvas="glass-light"] .views.console .view{color:var(--ink)}
.home[data-canvas="glass-light"] .views.console .view .vw-sub{opacity:.78}
.home[data-canvas="glass-light"] .views.light .view{color:var(--ink)}
.home[data-canvas="glass-light"] .views.light .view .vw-sub{color:var(--body)}

/* Normal theme: keep hero text neutral black/white (no accent tint) */
.home[data-theme="normal"][data-canvas="glass-light"] .eyebrow{color:var(--ink-soft)}
.home[data-theme="normal"][data-canvas="glass-light"] .views.console .view{color:var(--ink)}

/* ===== BRIGHT (themed photo) — soft frosted photo behind prominent white cards ===== */
/* home: gentle light wash so the centered hero's dark text reads over the photo */
.home[data-bg="photo"] .scrim.frost{background:
  radial-gradient(70% 62% at 50% 40%, rgba(255,255,255,.5), rgba(255,255,255,.26) 60%, transparent 84%),
  linear-gradient(180deg, rgba(255,255,255,.34) 0%, rgba(255,255,255,.14) 38%, rgba(255,255,255,.32) 100%)}
/* data views: frost the photo so it sits soft & dreamy behind the white content cards */
.home[data-bg="photo"] .frame[data-veil="photo-frost"] .veil{opacity:1;
  background:rgba(248,248,250,.46);-webkit-backdrop-filter:blur(16px) saturate(1.1);backdrop-filter:blur(16px) saturate(1.1)}
/* keep the duotone grade very light in bright so the photo reads natural */
.home[data-bg="photo"][data-dim="bright"] .frame::before{opacity:.1}
/* bright = a touch brighter photo */
.home[data-bg="photo"][data-dim="bright"] .photo{filter:saturate(1.14) contrast(1.02) brightness(1.08)}
/* light "chip" subject glyphs in bright (soft pastel tile, like the SEL chip) */
.home[data-bg="photo"][data-dim="bright"] .subjglyph{background:color-mix(in oklab, var(--sc) 55%, white) !important}

/* Light canvas: visible dividers + clearer hover on the segmented switcher */
.home[data-canvas="glass-light"] .views.console .view{border-right-color:rgba(28,27,46,.16)}
.home[data-canvas="glass-light"] .views.console .view:last-child{border-right:0}
.home[data-canvas="glass-light"] .views.console .view:hover{background:rgba(28,27,46,.10)}
/* Light canvas: more pronounced + add button */
.home[data-canvas="glass-light"] .vc-add,
.home[data-bg="ambient"] .vc-add{opacity:.6;border-color:rgba(28,27,46,.3);color:var(--ink-soft)}
.home[data-canvas="glass-light"] .vc-wcell.empty:hover .vc-add,
.home[data-bg="ambient"] .vc-wcell.empty:hover .vc-add{opacity:1}
.home[data-canvas="glass-light"] .vc-add:hover,
.home[data-bg="ambient"] .vc-add:hover{background:var(--accent);border-color:transparent;color:#fff;transform:scale(1.12)}

/* ===== Photo mode: on-photo list text (B rail / C agenda) goes light ===== */
.home[data-tone="dark"] .vc-aitem .an{color:#fff}
.home[data-tone="dark"] .vc-aitem .au,
.home[data-tone="dark"] .vc-aitem .at{color:rgba(255,255,255,.72)}
.home[data-bg="photo"] .vc-aitem:hover{background:rgba(255,255,255,.12)}
.home[data-bg="photo"] .vc-aitem.sel{background:rgba(255,255,255,.16)}
.home[data-bg="photo"] .vc-aitem .ad{border-color:rgba(255,255,255,.5)}
.home[data-tone="dark"] .vb-railitem .rt{color:#fff}
.home[data-tone="dark"] .vb-railitem .rs{color:rgba(255,255,255,.72)}
.home[data-bg="photo"] .vb-railitem:hover{background:rgba(255,255,255,.1)}
.home[data-bg="photo"] .vb-railitem.sel{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.24)}
/* day-view header sublabel on photo */
.home[data-tone="dark"] .vhead .vsub{color:rgba(255,255,255,.8)}

/* all on-photo headers / lane labels go light (Week + Day, every frame) */
.home[data-tone="dark"] .vc-wh,
.home[data-tone="dark"] .vc-llabel .nm,
.home[data-tone="dark"] .vb-colh .cd,
.home[data-tone="dark"] .va-gh .d{color:#fff}
.home[data-tone="dark"] .vc-wh .wt,
.home[data-tone="dark"] .vb-colh .ct,
.home[data-tone="dark"] .va-gh .dt,
.home[data-tone="dark"] .va-ph{color:rgba(255,255,255,.72)}
/* subtle shadow so light text holds over any photo */
.home[data-bg="photo"] .vhead h2,
.home[data-bg="photo"] .vc-aitem .an,
.home[data-tone="dark"] .vc-llabel .nm,
.home[data-tone="dark"] .vc-wh,
.home[data-tone="dark"] .vb-colh .cd,
.home[data-bg="photo"] .va-gh .d{text-shadow:0 1px 10px rgba(0,0,0,.4)}

/* BRIGHT override — light tone, so list/header text is dark again (wash tints it) */
.home[data-bg="photo"][data-dim="bright"] .vc-aitem .an,
.home[data-bg="photo"][data-dim="bright"] .vb-railitem .rt,
.home[data-bg="photo"][data-dim="bright"] .vc-wh,
.home[data-bg="photo"][data-dim="bright"] .vc-llabel .nm,
.home[data-bg="photo"][data-dim="bright"] .vb-colh .cd,
.home[data-bg="photo"][data-dim="bright"] .va-gh .d,
.home[data-bg="photo"][data-dim="bright"] .vhead h2{color:var(--ink);text-shadow:none}
.home[data-bg="photo"][data-dim="bright"] .vc-aitem .au,
.home[data-bg="photo"][data-dim="bright"] .vc-aitem .at,
.home[data-bg="photo"][data-dim="bright"] .vb-railitem .rs,
.home[data-bg="photo"][data-dim="bright"] .vc-wh .wt,
.home[data-bg="photo"][data-dim="bright"] .vb-colh .ct,
.home[data-bg="photo"][data-dim="bright"] .va-gh .dt,
.home[data-bg="photo"][data-dim="bright"] .va-ph,
.home[data-bg="photo"][data-dim="bright"] .vhead .vsub{color:var(--muted)}
.home[data-bg="photo"][data-dim="bright"] .vc-aitem:hover,
.home[data-bg="photo"][data-dim="bright"] .vb-railitem:hover{background:rgba(28,27,46,.05)}
.home[data-bg="photo"][data-dim="bright"] .vc-aitem.sel{background:rgba(28,27,46,.07)}
.home[data-bg="photo"][data-dim="bright"] .vc-nolesson{color:var(--muted)}
/* Frame B = bright white paper → list/rail/header text stays dark even on a photo background */
.home[data-version="B"] .vc-aitem .an,
.home[data-version="B"] .vb-railitem .rt,
.home[data-version="B"] .vc-wh,
.home[data-version="B"] .vc-llabel .nm,
.home[data-version="B"] .vb-colh .cd{color:var(--ink)}
.home[data-version="B"] .vc-aitem .au,
.home[data-version="B"] .vc-aitem .at,
.home[data-version="B"] .vb-railitem .rs,
.home[data-version="B"] .vc-wh .wt,
.home[data-version="B"] .vb-colh .ct,
.home[data-version="B"] .vhead .vsub{color:var(--muted)}
.home[data-version="B"] .vb-railitem:hover,
.home[data-version="B"] .vc-aitem:hover{background:rgba(28,27,46,.05)}
.home[data-version="B"] .vb-railitem.sel{background:#fff;border-color:var(--border);box-shadow:var(--sh-sm)}
/* Frame B (bright paper) · give the Day rail a light panel + dark text so subjects & day header read on any photo */
.home[data-version="B"] .vb-rail{background:linear-gradient(180deg,rgba(255,255,255,.6),rgba(255,255,255,.46));border:1px solid var(--border);border-radius:var(--r-xl);padding:8px;-webkit-backdrop-filter:blur(18px) saturate(1.3);backdrop-filter:blur(18px) saturate(1.3)}
.home[data-version="B"] .vb-railitem .rt{color:var(--ink) !important}
.home[data-version="B"] .vb-railitem .rs{color:var(--ink-soft) !important}
.home[data-version="B"][data-tone="light"] .vhead h2{color:var(--ink) !important;text-shadow:0 1px 2px rgba(255,255,255,.55) !important}
.home[data-version="B"][data-tone="dark"] .vhead h2{color:#fff !important;text-shadow:0 1px 3px rgba(0,0,0,.5) !important}
.home[data-version="B"][data-tone="light"] .vhead .vsub{color:var(--muted) !important;text-shadow:none !important}
.home[data-version="B"][data-tone="dark"] .vhead .vsub{color:rgba(255,255,255,.78) !important;text-shadow:0 1px 6px rgba(0,0,0,.4) !important}
/* ===== Contrast rule (programmed app-wide): view list/rail/header text follows TONE =====
   light bg (light wash · bright photo) → dark text · dark bg (dark photo · night) → light text */
.home[data-tone="light"] :is(.vb-railitem .rt,.vc-aitem .an,.vc-wh,.vc-llabel .nm,.vb-colh .cd){color:var(--ink)}
.home[data-tone="light"] :is(.vb-railitem .rs,.vc-aitem .au,.vc-aitem .at,.vc-wh .wt,.vb-colh .ct,.vhead .vsub,.vc-nolesson){color:var(--muted)}
.home[data-tone="dark"] :is(.vb-railitem .rt,.vc-aitem .an,.vc-wh,.vc-llabel .nm,.vb-colh .cd){color:#fff}
.home[data-tone="dark"] :is(.vb-railitem .rs,.vc-aitem .au,.vc-aitem .at,.vc-wh .wt,.vb-colh .ct,.vhead .vsub,.vc-nolesson){color:rgba(255,255,255,.74)}
.home[data-tone="dark"] :is(.vb-railitem:hover,.vc-aitem:hover){background:rgba(255,255,255,.1)}
.home[data-tone="light"] :is(.vb-railitem:hover,.vc-aitem:hover){background:rgba(28,27,46,.05)}
.home[data-bg="photo"][data-dim="bright"] .vc-add{border-color:rgba(28,27,46,.3);color:var(--ink-soft)}

/* ===== Week-cell readability (all backgrounds, esp. light subject colors) ===== */
/* deepen the gradient floor so white text holds even on honey/yellow */
.vc-wcell:not(.empty){background-image:linear-gradient(150deg,
  color-mix(in oklab, var(--cellc, #888) 92%, #15131f),
  color-mix(in oklab, var(--cellc, #888) 58%, #15131f)) !important}
.vc-wcell .ct,.vc-wcell .cm{text-shadow:0 1px 6px rgba(10,8,18,.45)}
.vc-wcell .cm{opacity:.95}
/* A-frame period labels + day sublabels stay legible in Bright (light tone) */
.home[data-bg="photo"][data-dim="bright"] .va-ph,
.home[data-bg="photo"][data-dim="bright"] .va-gh .dt{color:var(--ink-soft);opacity:.92;text-shadow:0 1px 8px rgba(255,255,255,.7)}
.home[data-bg="photo"][data-dim="bright"] .va-gh .d{color:var(--ink);text-shadow:0 1px 8px rgba(255,255,255,.7)}
/* A-frame tinted cells: firmer base + shadow so they read as crisp cards on the photo */
.home[data-bg="photo"][data-dim="bright"] .va-cell{box-shadow:0 8px 22px -14px rgba(10,8,18,.45)}

/* empty week cells = quiet "no lesson" slot with a hover + to add one */
.home .vc-wcell.empty{background:transparent !important;border:0;box-shadow:none;
  display:flex;align-items:center;justify-content:center;gap:8px;position:relative;min-height:52px}
.vc-nolesson{font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--muted);opacity:.55;transition:opacity .15s}
.home[data-tone="dark"] .vc-nolesson{color:rgba(255,255,255,.6)}
.vc-add{width:26px;height:26px;border-radius:50%;border:1px dashed var(--border);background:none;cursor:pointer;
  color:var(--muted);font-size:17px;font-weight:600;line-height:1;display:grid;place-items:center;
  opacity:0;transition:opacity .15s, background .15s, color .15s, border-color .15s}
.home[data-tone="dark"] .vc-add{border-color:rgba(255,255,255,.34);color:rgba(255,255,255,.8)}
.vc-wcell.empty:hover .vc-nolesson{opacity:.3}
.vc-wcell.empty:hover .vc-add{opacity:1}
.vc-add:hover{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--accent-50)}
.home[data-bg="photo"] .vc-add:hover{background:rgba(255,255,255,.16);border-color:#fff;color:#fff}

/* ===== Photo brightness — Dim / Normal / Bright (Normal = base scrim) ===== */
/* DIM — heavier darkening for maximum text contrast */
.home[data-bg="photo"][data-dim="dim"] .scrim.min{background:
  radial-gradient(72% 64% at 50% 42%, rgba(10,8,18,.34), transparent 72%),
  linear-gradient(180deg, rgba(10,8,18,.44) 0%, rgba(10,8,18,.24) 40%, rgba(10,8,18,.5) 100%) !important}
.home[data-bg="photo"][data-dim="dim"] .frame[data-veil="photo-soft"] .veil{
  background:linear-gradient(180deg, rgba(10,8,18,.44), rgba(10,8,18,.3) 40%, rgba(10,8,18,.5)) !important}

/* BRIGHT is handled above (light tone + frosted photo). No dark-glass overrides. */

/* ---- accent remaps: primary actions/glows follow the theme ---- */
.home .vb-btn.pri,.home .pl-btn.pri{background:var(--accent);border-color:transparent}
.home .pl-btn.pri{box-shadow:0 8px 20px -10px var(--accent)}
.home .vb-btn.pri{box-shadow:0 12px 26px -12px var(--accent)}
.home .slide-fab{background:var(--accent);box-shadow:0 14px 28px -10px var(--accent)}
.home .slide-thumb.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), var(--sh-sm)}
.home .wb-btn.on{background:var(--accent-50);color:var(--accent-600)}
.home[data-tone="dark"] .wb-btn.on{background:rgba(255,255,255,.26);color:#fff}
.home .va-row.now{box-shadow:0 0 0 1.5px var(--accent), 0 18px 44px -20px color-mix(in oklab, var(--accent) 60%, transparent)}
.home .va-cell.now,.home .vc-wcell.now{box-shadow:0 0 0 1.5px var(--accent)}
.home .pl-edit:focus{background:color-mix(in oklab, var(--accent) 8%, transparent)}
.home[data-tone="dark"] .pl-edit:focus{background:rgba(255,255,255,.1)}

/* light tone should never show the dim-glass (white-text) hero panel */
.home[data-tone="light"] .canvas.glass-dim{background:rgba(255,255,255,.58);border:1px solid rgba(255,255,255,.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.3);backdrop-filter:blur(28px) saturate(1.3);
  box-shadow:0 40px 90px -42px rgba(28,27,46,.45), inset 0 1px 0 rgba(255,255,255,.7)}
.home[data-tone="light"] .canvas.glass-dim .eyebrow{color:var(--brand-600)}
.home[data-tone="light"] .canvas.glass-dim .greeting{color:var(--ink)}

/* ============================================================
   NIGHT — dark surfaces for the Bright/Color frames + popovers
   (Calm Glass, Teach & Plan already adapt via [data-tone="dark"]).
   ============================================================ */
.home[data-theme="night"] .vb-focus,
.home[data-theme="night"] .vb-mini,
.home[data-theme="night"] .vb-srow,
.home[data-theme="night"] .vc-cluster,
