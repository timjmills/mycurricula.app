/* ============================================================
   CURRICULA DESIGN SYSTEM  ·  colors_and_type.css
   The mycurricula.app brand foundation, v1.3.
   A curriculum-planning language: a dense, color-navigated
   dashboard fused with a warm, rounded creative site.

   Import this file, then build on the tokens below.
   Fonts are delivered via Google Fonts (Bricolage Grotesque +
   Plus Jakarta Sans) — loaded by the @import below.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700;9..40,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root{
  /* ---------------------------------------------------------
     1 · BASE COLOR TOKENS  (raw values — the palette)
     --------------------------------------------------------- */

  /* Brand / Indigo — functional primary: actions, links, focus, "in progress" */
  --brand-50:#EEF3FF;  --brand-100:#DCE6FF; --brand-200:#BACCFF;
  --brand-300:#8FA8FF; --brand-400:#6383FB; --brand-500:#3B6CF6;
  --brand-600:#2E55DB; --brand-700:#2543B0;

  /* Honey / Amber — warm accent: marketing CTA, highlights, "needs review" */
  --honey-50:#FFF8E7;  --honey-100:#FFEFC2; --honey-200:#FCE095;
  --honey-300:#F8CC5C; --honey-400:#F4B740; --honey-500:#E9A526;
  --honey-600:#C9871A;

  /* Subject scale — 15 muted hues (White Rose register).
     solid = headers/icons/accents · tint = fills/lanes · ink = text on tint */
  --subj-1:#DCC674;  --subj-1-tint:#F4EFDF;  --subj-1-ink:#7A671F;   /* gold       */
  --subj-2:#DCA574;  --subj-2-tint:#F4E9DF;  --subj-2-ink:#7A491F;   /* apricot    */
  --subj-3:#DC8274;  --subj-3-tint:#F4E2DF;  --subj-3-ink:#7A2B1F;   /* coral      */
  --subj-4:#CF778D;  --subj-4-tint:#F2E1E5;  --subj-4-ink:#7A1F36;   /* rose       */
  --subj-5:#CF77AF;  --subj-5-tint:#F2E1EC;  --subj-5-ink:#7A1F59;   /* pink       */
  --subj-6:#C77AC7;  --subj-6-tint:#F0E2F0;  --subj-6-ink:#752475;   /* magenta    */
  --subj-7:#AB7AC7;  --subj-7-tint:#EBE2F0;  --subj-7-ink:#572475;   /* purple     */
  --subj-8:#917AC7;  --subj-8-tint:#E6E2F0;  --subj-8-ink:#3C2475;   /* violet     */
  --subj-9:#7A7FC7;  --subj-9-tint:#E2E3F0;  --subj-9-ink:#242975;   /* periwinkle */
  --subj-10:#7A9EC7; --subj-10-tint:#E2E9F0; --subj-10-ink:#244A75;  /* blue       */
  --subj-11:#7AB8C7; --subj-11-tint:#E2EEF0; --subj-11-ink:#246575;  /* cyan       */
  --subj-12:#7AC7B8; --subj-12-tint:#E2F0EE; --subj-12-ink:#247565;  /* teal       */
  --subj-13:#7AC79B; --subj-13-tint:#E2F0E8; --subj-13-ink:#247547;  /* green      */
  --subj-14:#7AC77A; --subj-14-tint:#E2F0E2; --subj-14-ink:#257425;  /* leaf       */
  --subj-15:#9AC77A; --subj-15-tint:#E8F0E2; --subj-15-ink:#467524;  /* lime       */

  /* Bright chip accents — outlines, icon tiles and dots in the cascade only */
  --subj-1-bright:#E8BB17; --subj-2-bright:#E87917; --subj-3-bright:#E83317;
  --subj-4-bright:#E8174B; --subj-5-bright:#E8179B; --subj-6-bright:#D147D1;
  --subj-7-bright:#9F47D1; --subj-8-bright:#7147D1; --subj-9-bright:#4751D1;
  --subj-10-bright:#4788D1; --subj-11-bright:#47B6D1; --subj-12-bright:#47D1B6;
  --subj-13-bright:#47D183; --subj-14-bright:#47D147; --subj-15-bright:#81D147;

  /* Subject aliases — map onto the scale; repoint in one line */
  --math:var(--subj-1);     --math-tint:var(--subj-1-tint);     --math-ink:var(--subj-1-ink);     --math-bright:var(--subj-1-bright);
  --reading:var(--subj-10); --reading-tint:var(--subj-10-tint); --reading-ink:var(--subj-10-ink); --reading-bright:var(--subj-10-bright);
  --science:var(--subj-13); --science-tint:var(--subj-13-tint); --science-ink:var(--subj-13-ink); --science-bright:var(--subj-13-bright);
  --social:var(--subj-7);   --social-tint:var(--subj-7-tint);   --social-ink:var(--subj-7-ink);   --social-bright:var(--subj-7-bright);

  /* Grade bands — White Rose years (grade-level tagging, NOT subjects) */
  --gK:#F6C96A; --gK-tint:#FFF1C9;
  --g1:#E86A5C; --g1-tint:#FADBD5;
  --g2:#9AB88B; --g2-tint:#DDE8D3;
  --g3:#7A9AC2; --g3-tint:#D5E1EF;
  --g4:#C291B8; --g4-tint:#ECD7E7;
  --g5:#8B7FC0; --g5-tint:#DCD7EE;

  /* Status — semantic, deliberately more saturated than subjects */
  --done:#16A06B;     --done-tint:#E4F6EE;
  --progress:#3B6CF6; --progress-tint:#EEF3FF;
  --idle:#6E6C82;     --idle-tint:#ECEBF1;
  --warn:#E9A526;     --warn-tint:#FFF8E7;
  --danger:#EF5A5A;   --danger-tint:#FDECEC;

  /* Neutrals — warm. White surfaces sit on a cream canvas. */
  --canvas:#FCFAF6; --surface:#FFFFFF; --surface-warm:#FFFDF8;
  --ink:#1C1B2E; --ink-soft:#3A3950; --body:#57566B;
  --muted:#908FA3; --faint:#BFBED0;
  --border:#ECEAE3; --border-cool:#E8EAF2; --hairline:#F4F2EC;

  /* Gradients — atmosphere, not every surface */
  --grad-hero:linear-gradient(118deg,#FFE7C2 0%,#FDEAD9 26%,#F4E7FF 62%,#DCF5EC 100%); /* @kind color */
  --grad-brand:linear-gradient(135deg,#EEF3FF 0%,#F4E7FF 100%); /* @kind color */
  --grad-honey:linear-gradient(135deg,#F8CC5C 0%,#F4B740 100%); /* @kind color */
  --grad-dawn:linear-gradient(135deg,#FFD8A8 0%,#FFB3C7 50%,#C9B6FF 100%); /* @kind color */
  --grad-mint:linear-gradient(135deg,#BFF0DC 0%,#A8E3FF 100%); /* @kind color */

  /* ---------------------------------------------------------
     2 · SPACE · RADIUS · ELEVATION
     --------------------------------------------------------- */

  /* Space — 4px base scale */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px;
  --s6:24px; --s8:32px; --s10:40px; --s12:48px; --s16:64px;

  /* Radius — generous, to carry the soft feel */
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px;
  --r-xl:24px; --r-2xl:32px; --r-pill:999px;

  /* Elevation — soft, low-contrast, cool over the warm canvas */
  --sh-xs:0 1px 2px rgba(28,27,46,.05);
  --sh-sm:0 2px 6px rgba(28,27,46,.06);
  --sh-md:0 10px 24px -10px rgba(28,27,46,.14);
  --sh-lg:0 22px 48px -16px rgba(28,27,46,.20);
  --sh-honey:0 12px 26px -10px rgba(233,165,38,.55);
  --sh-brand:0 12px 26px -10px rgba(59,108,246,.45);

  /* ---------------------------------------------------------
     3 · TYPE — base families + role tokens
     Large display/headings: Poppins (geometric, friendly)
     Smaller headings + logo: DM Sans (neutral, modern)
     UI/body/data:           Plus Jakarta Sans (clean, professional)
     --------------------------------------------------------- */
  --font-display:'Poppins',ui-sans-serif,system-ui,sans-serif;     /* large display + H1 */
  --font-display-sm:'DM Sans',ui-sans-serif,system-ui,sans-serif;  /* smaller headings */
  --font-logo:'DM Sans',ui-sans-serif,system-ui,sans-serif;        /* wordmark */
  --font-sans:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;

  /* Role tokens — family / weight / size / line-height / tracking */
  --display-font:var(--font-display); --display-weight:700; --display-size:44px; --display-line:1.02 /* @kind font */; --display-track:-.02em /* @kind font */;
  --h1-font:var(--font-display);      --h1-weight:700;      --h1-size:28px;      --h1-line:1.1 /* @kind font */;       --h1-track:-.02em /* @kind font */;
  --h2-font:var(--font-display-sm);   --h2-weight:700;      --h2-size:22px;      --h2-line:1.2 /* @kind font */;       --h2-track:-.02em /* @kind font */;
  --h3-font:var(--font-display-sm);   --h3-weight:700;      --h3-size:18px;      --h3-line:1.3 /* @kind font */;       --h3-track:-.01em /* @kind font */;
  --bodyL-font:var(--font-sans);      --bodyL-weight:400;   --bodyL-size:16px;   --bodyL-line:1.6 /* @kind font */;    --bodyL-track:0 /* @kind font */;
  --body-font:var(--font-sans);       --body-weight:400;    --body-size:14px;    --body-line:1.5 /* @kind font */;     --body-track:0 /* @kind font */;
  --small-font:var(--font-sans);      --small-weight:500;   --small-size:13px;   --small-line:1.4 /* @kind font */;    --small-track:0 /* @kind font */;
  --label-font:var(--font-sans);      --label-weight:700;   --label-size:11px;   --label-line:1.2 /* @kind font */;    --label-track:.09em /* @kind font */;
}

/* ============================================================
   4 · SEMANTIC TYPE CLASSES
   Use these directly, or copy the declarations onto your own
   elements. Headings default to ink; body to --body.
   ============================================================ */
.ds-display{font-family:var(--display-font);font-weight:var(--display-weight);font-size:var(--display-size);line-height:var(--display-line);letter-spacing:var(--display-track);color:var(--ink);}
.ds-h1{font-family:var(--h1-font);font-weight:var(--h1-weight);font-size:var(--h1-size);line-height:var(--h1-line);letter-spacing:var(--h1-track);color:var(--ink);}
.ds-h2{font-family:var(--h2-font);font-weight:var(--h2-weight);font-size:var(--h2-size);line-height:var(--h2-line);letter-spacing:var(--h2-track);color:var(--ink);}
.ds-h3{font-family:var(--h3-font);font-weight:var(--h3-weight);font-size:var(--h3-size);line-height:var(--h3-line);letter-spacing:var(--h3-track);color:var(--ink);}
.ds-body-l{font-family:var(--bodyL-font);font-weight:var(--bodyL-weight);font-size:var(--bodyL-size);line-height:var(--bodyL-line);color:var(--body);}
.ds-body{font-family:var(--body-font);font-weight:var(--body-weight);font-size:var(--body-size);line-height:var(--body-line);color:var(--body);}
.ds-small{font-family:var(--small-font);font-weight:var(--small-weight);font-size:var(--small-size);line-height:var(--small-line);color:var(--body);}
.ds-label{font-family:var(--label-font);font-weight:var(--label-weight);font-size:var(--label-size);line-height:var(--label-line);letter-spacing:var(--label-track);text-transform:uppercase;color:var(--muted);}

</style>
<style data-src="home.css">
/* Reimagined Home screen — airy, floating frosted canvas over a rotating teaching photo.
   Loads colors_and_type.css for brand tokens. */

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--font-sans);
  color:var(--ink);
  background:var(--canvas);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
#root{height:100%}

/* HARD RULE: never show a scrollbar anywhere — scroll by drag / wheel instead */
*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{width:0;height:0;display:none}
button{font-family:inherit;cursor:pointer}

/* ============ STAGE ============ */
.home{
  position:fixed; inset:0;
  background:var(--canvas);
  overflow:hidden;
}

/* atmospheric mesh behind the floating photo */
.mesh{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .6s ease}
.mesh.wash{opacity:1;background:
  radial-gradient(40% 36% at 8% 4%, rgba(244,183,64,.16), transparent 62%),
  radial-gradient(38% 34% at 96% 6%, rgba(139,92,246,.13), transparent 62%),
  radial-gradient(46% 42% at 92% 98%, rgba(122,199,155,.14), transparent 64%),
  radial-gradient(40% 40% at 4% 96%, rgba(207,119,143,.10), transparent 64%);}
.mesh.glow{opacity:1;background:
  radial-gradient(58% 70% at 100% 100%, rgba(244,183,64,.20), rgba(207,119,175,.12) 38%, transparent 70%);}

/* ============ PHOTO FRAME ============ */
.frame{
  position:absolute; z-index:1;
  inset:var(--frame-inset, 30px);
  border-radius:var(--frame-radius, 30px);
  overflow:hidden;
  box-shadow:var(--frame-shadow, 0 40px 90px -40px rgba(28,27,46,.42), 0 8px 26px -14px rgba(28,27,46,.22));
  background:#0c0b14;
  transition:inset .5s cubic-bezier(.4,0,.2,1), border-radius .5s ease, box-shadow .5s ease;
}
.frame.fullbleed{--frame-inset:0px;--frame-radius:0px;--frame-shadow:none}

.photo{
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  opacity:0;
  transition:opacity 1.6s ease;
  will-change:opacity, transform;
}
.photo.on{opacity:1}
/* gentle ken-burns when zoom enabled */
.home[data-zoom="1"] .photo.on{animation:kb 12s ease-out forwards}
@keyframes kb{from{transform:scale(1.02)}to{transform:scale(1.12)}}
@media (prefers-reduced-motion:reduce){
  .home[data-zoom="1"] .photo.on{animation:none}
  .photo{transition:opacity .4s ease}
}

/* readability scrim — strength depends on canvas mode */
.scrim{position:absolute;inset:0;pointer-events:none;transition:opacity .5s ease,background .5s ease}
.scrim.dim{background:
  radial-gradient(70% 60% at 50% 46%, rgba(12,11,20,.30), transparent 72%),
  linear-gradient(180deg, rgba(12,11,20,.30) 0%, rgba(12,11,20,.10) 30%, rgba(12,11,20,.18) 62%, rgba(12,11,20,.42) 100%);}
.scrim.light{background:
  radial-gradient(72% 64% at 50% 44%, rgba(255,255,255,.62), rgba(255,255,255,.30) 60%, transparent 82%),
  linear-gradient(180deg, rgba(255,255,255,.30) 0%, rgba(255,255,255,.12) 40%, rgba(255,255,255,.34) 100%);}
.scrim.min{background:
  linear-gradient(180deg, rgba(12,11,20,.22) 0%, transparent 26%, transparent 64%, rgba(12,11,20,.34) 100%);}
.scrim.none{background:none}

/* photo veil for data views — recedes / fades the photo per direction */
.veil{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0;transition:opacity .55s ease}
.frame[data-veil="recede"] .veil{opacity:1;background:rgba(12,11,20,.40);-webkit-backdrop-filter:blur(10px) saturate(1.1);backdrop-filter:blur(10px) saturate(1.1)}
.frame[data-veil="workspace"] .veil{opacity:1;background:rgba(250,248,243,.74);-webkit-backdrop-filter:blur(12px) saturate(1.05);backdrop-filter:blur(12px) saturate(1.05)}
.frame[data-veil="white"] .veil{opacity:1;background:rgba(250,248,243,.90);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px)}
/* Off / photo: keep the photo prominent on data views, just a soft dim for legibility */
.frame[data-veil="photo-soft"] .veil{opacity:1;background:linear-gradient(180deg, rgba(12,11,20,.22) 0%, rgba(12,11,20,.12) 36%, rgba(12,11,20,.30) 100%)}
.frame[data-veil="ambient"] .veil{opacity:1;background:rgba(255,255,255,.42)}

/* ===== Ambient brand mesh wash (alternative to teaching photo) =====
   Four palettes cross-fade like the photos rotate; .drift adds slow motion.
   Light palettes for light tone (Bright/Color) · richer dark palettes for
   dark tone (Calm Glass) so the frosted glass keeps its depth. */
.ambient{position:absolute;inset:0;opacity:0;transition:opacity 4.5s ease;background-size:260% 260%;background-color:#FBF7F0}
.ambient.on{opacity:1}
.ambient.drift{animation:ambientdrift 34s ease-in-out infinite}
.ambient.t-blossom.drift{animation-duration:40s;animation-direction:reverse}
.ambient.t-mint.drift{animation-duration:30s}
.ambient.t-sky.drift{animation-duration:44s;animation-direction:reverse}
.ambient.t-honey.drift{animation-duration:36s}
.ambient.t-night.drift{animation-duration:40s}
@keyframes ambientdrift{
  0%  {background-position:4% 18%; transform:scale(1.15) translate(-1.5%,0.5%) rotate(-1.2deg)}
  20% {background-position:70% 2%; transform:scale(1.3) translate(-3.4%,2.2%) rotate(1.4deg)}
  40% {background-position:100% 70%;transform:scale(1.18) translate(3%,-2.6%) rotate(2deg)}
  60% {background-position:36% 100%;transform:scale(1.34) translate(3.4%,2.6%) rotate(-1.6deg)}
  80% {background-position:10% 74%;transform:scale(1.2) translate(-2.4%,-1.8%) rotate(1deg)}
  100%{background-position:4% 18%; transform:scale(1.15) translate(-1.5%,0.5%) rotate(-1.2deg)}
}
@media (prefers-reduced-motion:reduce){ .ambient.drift{animation:none} }

/* light palettes live in themes.css (per-theme); base + drift stay here */

/* let the moving wash show through on data views */
.frame[data-veil="ambient"] .veil{opacity:1;background:rgba(255,255,255,.4)}
.home[data-theme="night"] .frame[data-veil="ambient"] .veil{background:rgba(12,11,20,.34)}

/* ===== Team Curriculum (Master) mode — pink caution glow ===== */
/* When the top toggle is on Team Curriculum, editing affects the whole team,
   so key surfaces glow pink as a persistent caution cue. */
.frame::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:5;
  box-shadow:inset 0 0 0 2px rgba(232,23,155,.62), inset 0 0 60px rgba(232,23,155,.22);
  opacity:0;transition:opacity .5s ease}
.home[data-mode="team"] .frame::after{opacity:1}
@media (prefers-reduced-motion:no-preference){
  .home[data-mode="team"] .frame::after{animation:teamflash 1s ease 2}
}
@keyframes teamflash{0%,100%{opacity:1}50%{opacity:.3}}

/* mode switch glows pink + the Team button reads pink when active */
.home[data-mode="team"] .modesw{box-shadow:0 0 0 1.5px rgba(232,23,155,.5), 0 0 24px -6px rgba(232,23,155,.65), 0 10px 30px -16px rgba(12,11,20,.5), inset 0 1px 0 rgba(255,255,255,.4)}
.home[data-mode="team"] .modesw button.team.active{color:#E8179B;text-shadow:0 0 16px rgba(232,23,155,.55)}

/* planning header glows pink when planning the team's shared lesson */
.home[data-mode="team"] .pl-head{box-shadow:0 0 0 1.5px rgba(232,23,155,.45), 0 0 34px -10px rgba(232,23,155,.5)}

/* ============ FOREGROUND OVERLAY ============ */
.overlay{position:absolute;z-index:3;inset:var(--frame-inset, 30px);transition:inset .5s cubic-bezier(.4,0,.2,1)}
.home .frame.fullbleed ~ .overlay{--frame-inset:0px}
.overlay{display:grid;grid-template-rows:auto 1fr auto;padding:clamp(18px,2.4vw,34px)}

/* corners */
.topbar,.botbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.botbar{align-items:flex-end;pointer-events:none}
/* the corner controls sit above the centered quote (z-index:6) and stay interactive,
   while the botbar's empty center lets quote hovers/clicks through */
.botbar .ctx,.botbar .clock{pointer-events:auto;position:relative;z-index:7}

/* global styled tooltip */
.app-tip{position:fixed;z-index:300;pointer-events:none;max-width:240px;padding:8px 12px;border-radius:10px;
  background:rgba(20,19,30,.92);color:#fff;font-family:var(--font-sans);font-size:12.5px;font-weight:600;line-height:1.35;
  -webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);
  border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 34px -16px rgba(0,0,0,.6);
  opacity:0;transform:translateY(3px);transition:opacity .14s ease,transform .14s ease}
.app-tip.on{opacity:1;transform:none}
.app-tip::after{content:"";position:absolute;left:50%;margin-left:-5px;border:5px solid transparent}
.app-tip[data-below="0"]::after{top:100%;border-top-color:rgba(20,19,30,.92)}
.app-tip[data-below="1"]::after{bottom:100%;border-bottom-color:rgba(20,19,30,.92)}
@media (prefers-reduced-motion:reduce){.app-tip{transition:none}}

/* glass chip base */
.backbtn{width:42px;height:42px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:#fff;margin-right:2px;animation:backin .2s ease}
@keyframes backin{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.home[data-tone="light"] .backbtn{color:var(--ink-soft)}
.backbtn svg{width:20px;height:20px}
.backbtn:hover{transform:translateX(-1px)}
.topbar{align-items:center}
/* icon mode toggle */
.modesw-icon{padding:3px;gap:2px}
.modesw-ib{width:42px;height:34px;padding:0;display:grid;place-items:center;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:var(--r-pill);transition:background .15s,color .15s}
.modesw-ib svg{width:22.5px;height:22.5px}
.modesw-icon .modesw-ib{padding:0;width:42px;height:34px}
.modesw-ib:hover{color:var(--ink-soft)}
.modesw-ib.active{background:#fff;color:var(--ink);box-shadow:var(--sh-xs)}
.modesw-ib.team.active{color:var(--brand-600);background:#fff}
.home[data-tone="dark"] .modesw-ib.active{background:rgba(255,255,255,.92);color:#1a1c2a}
.home[data-tone="dark"] .modesw-ib.team.active{color:var(--brand-600)}
.glass{
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.34);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  backdrop-filter:blur(18px) saturate(1.3);
  box-shadow:0 10px 30px -16px rgba(12,11,20,.5), inset 0 1px 0 rgba(255,255,255,.4);
}
.home[data-tone="dark"] .glass{color:#fff}
.home[data-tone="light"] .glass{background:rgba(255,255,255,.66);border-color:rgba(255,255,255,.8);color:var(--ink)}

/* logo (top-left) */
.brand{display:flex;align-items:center;gap:11px;padding:9px 15px 9px 11px;border-radius:var(--r-pill)}

.brand .wm .tld{opacity:.62}
.home[data-tone="dark"] .brand .wm{color:#fff}

/* top-right control cluster */
.tools{display:flex;align-items:center;gap:10px}
.iconbtn{
  width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
  border:1px solid rgba(255,255,255,.34);background:rgba(255,255,255,.16);

}

.iconbtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.30)}
.home[data-tone="light"] .iconbtn:hover{background:rgba(255,255,255,.85)}
.iconbtn svg{width:19px;height:19px}
.iconbtn-planner svg{width:26px;height:26px;stroke-width:1.7}

/* Tools launcher — pill that expands into a segmented bar (matches center console) */
.toolswrap{position:relative}
.toolsbtn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 16px;border-radius:var(--r-pill);
  font-family:var(--font-sans);font-weight:700;font-size:13.5px;letter-spacing:-.01em;color:#fff;border:1px solid rgba(255,255,255,.34);
  background:rgba(255,255,255,.16);-webkit-backdrop-filter:blur(18px) saturate(1.3);backdrop-filter:blur(18px) saturate(1.3);
  box-shadow:0 10px 26px -16px rgba(12,11,20,.5), inset 0 1px 0 rgba(255,255,255,.4);transition:transform .15s ease, background .2s ease}
.home[data-tone="light"] .toolsbtn{background:rgba(255,255,255,.66);border-color:rgba(255,255,255,.8);color:var(--ink-soft)}
.toolsbtn svg{width:17px;height:17px}
.toolsbtn-circle{width:42px;height:42px;padding:0;justify-content:center;gap:0}
.toolsbtn-circle svg{width:27px;height:27px}
.toolsbtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.30)}
.home[data-tone="light"] .toolsbtn:hover{background:rgba(255,255,255,.85)}
.toolsbtn.open{background:rgba(255,255,255,.30)}
.home[data-tone="light"] .toolsbtn.open{background:rgba(255,255,255,.9)}

.toolspop{position:absolute;top:calc(100% + 12px);right:0;z-index:30;display:flex;align-items:stretch;
  border-radius:var(--r-xl);overflow:hidden;

  -webkit-backdrop-filter:blur(24px) saturate(1.3);backdrop-filter:blur(24px) saturate(1.3);
  box-shadow:0 26px 60px -26px rgba(12,11,20,.75), inset 0 1px 0 rgba(255,255,255,.22);
  transform-origin:top right;animation:toolsin .22s cubic-bezier(.2,.8,.2,1)}
.home[data-tone="light"] .toolspop{background:rgba(255,255,255,.78);border-color:rgba(255,255,255,.85);box-shadow:0 26px 60px -28px rgba(28,27,46,.4), inset 0 1px 0 rgba(255,255,255,.8)}
@keyframes toolsin{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.toolspop{animation:none}}
.toolspop .tool{appearance:none;border:0;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;padding:15px 20px;min-width:88px;color:#fff;
  border-right:1px solid rgba(255,255,255,.16);transition:background .16s ease}
.home[data-tone="light"] .toolspop .tool{color:var(--ink-soft);border-right-color:rgba(28,27,46,.1)}
.toolspop .tool:last-child{border-right:0}
.toolspop .tool:hover{background:rgba(255,255,255,.22)}
.home[data-tone="light"] .toolspop .tool:hover{background:rgba(255,255,255,.6)}
.toolspop .tool svg{width:21px;height:21px}
.toolspop .tool span{font-size:11.5px;font-weight:700;letter-spacing:.01em;line-height:1}

/* ============ CENTER CANVAS ============ */
.center{align-self:center;justify-self:center;text-align:center;display:flex;flex-direction:column;align-items:center;gap:clamp(20px,2.6vw,34px);max-width:min(92%,920px)}
/* inspirational teaching quote — bottom-centered, airy, clickable */
.hero-quote{position:absolute;left:50%;bottom:clamp(14px,3vh,30px);transform:translateX(-50%);z-index:6;
  display:flex;flex-direction:column;align-items:center;gap:9px;max-width:min(74%,640px);
  border:0;background:none;cursor:pointer;padding:8px 14px;text-align:center;
  animation:quotefade 1.4s ease both}
@keyframes quotefade{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.hero-quote{animation:none}}
.hero-quote-rule{width:34px;height:1px;border-radius:1px;background:currentColor;opacity:.28}
.hero-quote-text{font-family:var(--head-font, var(--font-display-sm));font-weight:300;
  font-size:clamp(16px,1.7vw,21px);line-height:1.45;letter-spacing:.01em;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis}
.hero-quote-by{font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.5}
.hero-quote:hover .hero-quote-text{opacity:.9}
.hero-quote:hover .hero-quote-by{opacity:.7}
.home[data-tone="dark"] .hero-quote{color:#fff}
.home[data-tone="dark"] .hero-quote-text{color:rgba(255,255,255,.82);text-shadow:0 1px 16px rgba(12,11,20,.4)}
.home[data-tone="light"] .hero-quote{color:var(--ink)}
.home[data-tone="light"] .hero-quote-text{color:var(--ink-soft);opacity:.72}
.home[data-bg="ambient"] .hero-quote{color:var(--ink)}
.home[data-bg="ambient"] .hero-quote-text{color:var(--ink-soft);opacity:.72}
.hero-quote-by{color:var(--accent-600)}

/* frosted-glass quote context popup */
.qpop-scrim{position:fixed;inset:0;z-index:170;display:grid;place-items:center;padding:24px;
  background:rgba(18,17,30,.34);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);animation:setfade .25s ease}
.qpop{position:relative;width:min(440px,92vw);border-radius:var(--r-2xl);padding:30px 30px 26px;
  background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.85);
  -webkit-backdrop-filter:blur(34px) saturate(1.4);backdrop-filter:blur(34px) saturate(1.4);
  box-shadow:0 40px 100px -36px rgba(28,27,46,.5), inset 0 1px 0 rgba(255,255,255,.7);color:var(--ink);
  animation:qpopin .3s cubic-bezier(.2,.8,.2,1)}
@keyframes qpopin{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.home[data-tone="dark"] .qpop{background:rgba(26,28,42,.78);border-color:rgba(255,255,255,.16);color:#fff}
.qpop-mark{position:absolute;top:6px;left:18px;font-family:var(--font-display);font-size:90px;line-height:1;opacity:.1;pointer-events:none}
.qpop-quote{margin:0 0 14px;font-family:var(--head-font, var(--font-display));font-weight:400;font-size:21px;line-height:1.4;letter-spacing:-.01em;position:relative}
.qpop-by{margin:0 0 18px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-600)}
.home[data-tone="dark"] .qpop-by{color:var(--accent)}
.qpop-context{margin:0 0 20px;font-size:14.5px;line-height:1.6;opacity:.8}
.qpop-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent-600);text-decoration:none}
.home[data-tone="dark"] .qpop-link{color:var(--accent)}
.qpop-link:hover{text-decoration:underline}
.canvas{
  border-radius:var(--r-2xl);
  padding:clamp(30px,4vw,56px) clamp(26px,5vw,72px);
  display:flex;flex-direction:column;align-items:center;gap:clamp(22px,2.8vw,34px);
}
.canvas.glass-dim{background:rgba(18,17,30,.30);border:1px solid rgba(255,255,255,.20);-webkit-backdrop-filter:blur(26px) saturate(1.25);backdrop-filter:blur(26px) saturate(1.25);box-shadow:0 40px 90px -40px rgba(12,11,20,.7), inset 0 1px 0 rgba(255,255,255,.22)}
.canvas.glass-light{background:rgba(255,255,255,.58);border:1px solid rgba(255,255,255,.8);-webkit-backdrop-filter:blur(28px) saturate(1.3);backdrop-filter:blur(28px) saturate(1.3);box-shadow:0 40px 90px -42px rgba(28,27,46,.45), inset 0 1px 0 rgba(255,255,255,.7)}
.canvas.min{background:transparent;border:0;box-shadow:none;padding:clamp(10px,2vw,24px) 0}

.eyebrow{font-family:var(--font-sans);font-weight:800;font-size:clamp(11px,1vw,13px);letter-spacing:.22em;text-transform:uppercase}
.greeting{font-family:var(--head-font, var(--font-display));font-weight:600;letter-spacing:-.025em;font-size:clamp(30px,5.2vw,62px);line-height:1.02;margin:0}

/* text color by tone */
.home[data-tone="dark"] .eyebrow{color:rgba(255,255,255,.74)}
.home[data-tone="dark"] .greeting{color:#fff;text-shadow:0 2px 30px rgba(12,11,20,.35)}
.home[data-tone="light"] .eyebrow{color:var(--brand-600)}
.home[data-tone="light"] .greeting{color:var(--ink)}

/* ============ VIEW SWITCHERS (Day · Week · Year · Teach) ============ */
.views{display:flex;align-items:stretch;justify-content:center;flex-wrap:nowrap;gap:0}
.views.console{gap:0;border-radius:var(--r-xl);overflow:hidden;flex-wrap:nowrap;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.30);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 16px 40px -22px rgba(12,11,20,.6)}
.home[data-tone="light"] .views.console{background:rgba(255,255,255,.6);border-color:rgba(255,255,255,.85)}

.view{
  appearance:none;border:0;background:none;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  flex:1 1 0;min-width:0;
  padding:clamp(15px,1.5vw,20px) clamp(20px,2.4vw,34px);
  border-radius:var(--r-lg);
  transition:transform .16s ease, background .22s ease, box-shadow .22s ease, color .2s ease;
  min-width:96px;
}
.view .vw-word{font-family:var(--head-font, var(--font-display-sm));font-weight:700;font-size:clamp(17px,1.7vw,22px);letter-spacing:-.01em;line-height:1}
.view .vw-sub{font-size:clamp(10px,.92vw,12px);font-weight:600;letter-spacing:.02em;opacity:.7;line-height:1.25;white-space:pre;text-align:center}
.view:hover{transform:translateY(-2px)}
.view:active{transform:translateY(0)}

/* --- treatment: LIGHT pills (light fill, dark text) — separated --- */
.views.light{gap:10px}
.views.light .view{background:rgba(255,255,255,.82);color:var(--ink);border-radius:var(--r-lg);box-shadow:0 12px 30px -18px rgba(12,11,20,.5)}
.views.light .view .vw-sub{color:var(--body)}
.views.light .view:hover{transform:translateY(-2px);background:#fff}

/* --- treatment: DARK pills (tinted/dark fill, light text) — separated --- */
.views.dark{gap:10px}
.views.dark .view{background:rgba(20,20,26,.72);color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:var(--r-lg);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);box-shadow:0 14px 32px -20px rgba(12,11,20,.7)}
.views.dark .view:hover{transform:translateY(-2px);background:rgba(20,20,26,.82)}

/* --- treatment: CONSOLE (one segmented bar) --- */
.views.console .view{border-radius:0;min-width:0;flex:1 1 0;color:#fff;border-right:1px solid rgba(255,255,255,.18)}
.home[data-tone="light"] .views.console .view{color:var(--ink-soft);border-right-color:rgba(28,27,46,.10)}
.views.console .view:last-child{border-right:0}
.views.console .view:hover{transform:none;background:rgba(255,255,255,.22)}
.home[data-tone="light"] .views.console .view:hover{background:rgba(255,255,255,.7)}

/* accent dot per view */
.view .vw-word{position:relative}

/* ============ CLOCK / NOW-NEXT (bottom-right) ============ */
.clock{padding:14px 18px;border-radius:var(--r-xl);min-width:248px;text-align:left}
.clock .now-time{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.clock .tt{font-family:var(--head-font, var(--font-display-sm));font-weight:700;font-size:26px;letter-spacing:-.02em;line-height:1}
.clock .dd{font-size:12.5px;font-weight:700;opacity:.82;letter-spacing:.01em}
.clock .hr{height:1px;background:currentColor;opacity:.16;margin:0 0 11px}
.clock .per{display:flex;align-items:center;gap:11px;padding:5px 0}
.clock .per + .per{margin-top:4px}
.clock .pdot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(255,255,255,.18)}
.clock .pmeta{display:flex;flex-direction:column;gap:2px;min-width:0}
.clock .plabel{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.6;line-height:1}
.clock .psub{display:flex;align-items:baseline;gap:8px}
.clock .pname{font-size:14.5px;font-weight:700;line-height:1.1}
.clock .ptime{font-size:11.5px;font-weight:600;opacity:.7;font-variant-numeric:tabular-nums}

/* bottom-left context label */
.ctx{padding:10px 16px;border-radius:var(--r-pill);display:flex;align-items:center;gap:9px}
.ctx .cdot{width:8px;height:8px;border-radius:50%;background:var(--g5)}
.ctx .ctop{font-size:13px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
.ctx .csub{font-size:11px;font-weight:600;opacity:.68;line-height:1.1}
.ctx .cstack{display:flex;flex-direction:column;gap:2px}

/* mode toggle (Personal / Team) — carried over from current app */
.modesw{display:inline-flex;border-radius:var(--r-pill);padding:3px;gap:2px}
.modesw button{border:0;background:none;color:inherit;font-size:12.5px;font-weight:700;padding:7px 15px;border-radius:var(--r-pill);opacity:.72;transition:all .18s ease}
.modesw button.active{opacity:1}
.home[data-tone="dark"] .modesw button.active{background:rgba(255,255,255,.92);color:var(--ink)}
.home[data-tone="light"] .modesw button.active{background:#fff;color:var(--ink);box-shadow:var(--sh-xs)}
.modesw button.team.active{color:var(--danger)}

/* responsive */
@media (max-width:760px){
  .frame{inset:var(--frame-inset,14px);border-radius:22px}
  .overlay{padding:14px}
  .clock{min-width:0;width:100%}
  .botbar{flex-direction:column-reverse;align-items:stretch;gap:12px}
  .ctx{align-self:flex-start}
  .views{gap:8px}
  .view{min-width:0;flex:1 1 0;padding:13px 12px}
  .greeting{font-size:30px}
  .tools .label-hide{display:none}
}
@media (max-width:420px){
  .views{flex-wrap:nowrap}
}

/* ============ HOME QUICK-SETTINGS COG (inline with the date) ============ */

.homecog-portal{position:fixed;inset:0;z-index:140;pointer-events:none}

.homecog-pop::-webkit-scrollbar{display:none}
.home[data-tone="dark"] .homecog-pop{background:rgba(26,25,38,.94);border-color:rgba(255,255,255,.14);color:#fff}
.hc-title{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.02em;margin:0 0 14px}

  color:#fff;font-family:var(--font-display-sm);font-weight:700;font-size:21px;display:grid;place-items:center;box-shadow:0 6px 16px -8px rgba(12,11,20,.5)}
.hc-avatar-edit{position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:#fff;color:var(--ink);display:grid;place-items:center;box-shadow:0 2px 6px rgba(12,11,20,.3)}
.hc-avatar-edit svg{width:11px;height:11px}
.home[data-tone="dark"] .hc-avatar-edit{background:#26283a;color:#fff}
.hc-youfields{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}

.hc-piclink{border:0;background:none;cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:11px;color:var(--accent,var(--brand-600));padding:0}

  background:linear-gradient(135deg,var(--accent,var(--brand-500)),color-mix(in oklab,var(--accent,var(--brand-500)) 55%,#1c1b2e));
  color:#fff;font-family:var(--font-display-sm);font-weight:700;font-size:15px}
.homecog-pop .set-row{margin-bottom:14px}
.hc-sec{margin:8px 0 14px;padding:14px;border-radius:var(--r-lg);background:rgba(127,127,150,.08);border:1px solid var(--border)}
.home[data-tone="dark"] .hc-sec{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12)}

.hc-sechead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px}

.hc-scope button{border:0;background:none;cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:11px;color:inherit;opacity:.66;padding:5px 10px;border-radius:var(--r-pill)}
.hc-scope button.on{opacity:1;background:#fff;color:var(--ink);box-shadow:var(--sh-xs)}

.hc-scope button.hc-scope-page.on{background:var(--accent);color:#fff;box-shadow:none}
.hc-scope button.hc-scope-site.on{background:var(--ink);color:#fff;box-shadow:none}

.va-gh .dt{font-size:11px;font-weight:600;opacity:.62}
.va-gh.today{border-radius:var(--r-md)}
.home[data-tone="dark"] .va-gh.today{background:rgba(255,255,255,.16)}
.va-ph{display:flex;flex-direction:column;justify-content:center;font-size:11px;font-weight:700;opacity:.6;font-variant-numeric:tabular-nums;padding-right:6px;text-align:right}
.va-cell{border-radius:var(--r-md);padding:9px 11px;border-left:3px solid;min-height:58px;display:flex;flex-direction:column;gap:3px;transition:transform .14s ease}

.va-cell .ct{font-weight:700;font-size:12.5px;line-height:1.2;letter-spacing:-.01em}
.va-cell .cs{font-size:10.5px;font-weight:600;opacity:.7}
.va-cell.done{opacity:.62}
.va-cell.now{box-shadow:0 0 0 1.5px var(--brand-400)}
.va-addcell{border-radius:var(--r-md);min-height:44px;border:1.5px dashed var(--border);background:none;cursor:pointer;color:var(--muted);display:grid;place-items:center;transition:background .15s,color .15s,border-color .15s}
.va-addcell:hover{background:color-mix(in oklab,var(--accent,var(--brand-500)) 12%,transparent);border-color:var(--accent,var(--brand-500));border-style:solid;color:var(--accent,var(--brand-500))}
.home[data-tone="dark"] .va-addcell{border-color:rgba(255,255,255,.24);color:rgba(255,255,255,.7)}
.va-addcell svg{width:18px;height:18px}

/* year lanes */
.va-year{display:flex;flex-direction:column;gap:9px;min-width:720px}
.va-months{display:grid;grid-template-columns:152px 1fr;gap:12px;align-items:center;margin-bottom:2px}
.va-monthrow{display:grid;grid-template-columns:repeat(11,1fr);font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;opacity:.55}
.va-lane{display:grid;grid-template-columns:152px 1fr;gap:12px;align-items:center;padding:11px 14px}
.va-laneL{display:flex;align-items:center;gap:10px;min-width:0}
.va-laneL .nm{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:14px;line-height:1.1}
.va-laneL .pc{font-size:11px;font-weight:600;opacity:.6}
.va-track{display:flex;gap:5px}
.va-uchip{flex:1 1 0;border-radius:var(--r-sm);padding:7px 9px;font-size:11px;font-weight:700;letter-spacing:-.01em;position:relative;overflow:hidden;min-width:0;white-space:nowrap;text-overflow:ellipsis}
.va-uchip .fill{position:absolute;inset:0;opacity:.9}
.va-uchip .lab{position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis}

/* ============================================================
   VERSION B — Bright Workspace (near-white paper over a faded photo)
   ============================================================ */
.vb-day{display:grid;grid-template-columns:236px 1fr;gap:18px;align-items:start;height:100%}
.vb-rail{display:flex;flex-direction:column;gap:7px}
.vb-railitem{display:grid;grid-template-columns:14px 1fr;gap:10px;align-items:center;padding:11px 13px;border-radius:var(--r-md);cursor:pointer;border:1px solid transparent;transition:background .16s ease,border-color .16s}
.vb-railitem .rt{font-size:13px;font-weight:700;letter-spacing:-.01em;line-height:1.15}
.vb-railitem .rs{font-size:11px;font-weight:600;color:var(--muted)}
.vb-railitem .rbar{width:3px;height:30px;border-radius:3px}
.vb-railitem:hover{background:rgba(28,27,46,.04)}
.vb-railitem.sel{background:#fff;border-color:var(--border);box-shadow:var(--sh-sm)}
.vb-focus{border-radius:var(--r-2xl);overflow:auto;background:#fff;border:1px solid var(--border);box-shadow:var(--sh-lg);max-height:100%}
.vb-focusband{height:8px}
.vb-focusin{padding:clamp(16px,2vw,26px)}
.vb-focus .ey{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.vb-focus .ey .nm{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.vb-focus h3{font-family:var(--head-font,var(--font-display));font-weight:600;letter-spacing:-.02em;font-size:clamp(22px,2.4vw,30px);margin:0 0 5px;color:var(--ink);line-height:1.05}
.vb-focus .un{font-size:13.5px;font-weight:600;color:var(--body);margin-bottom:14px}
.vb-obj{font-size:clamp(14px,1.3vw,17px);font-weight:600;color:var(--ink-soft);line-height:1.45;border-left:3px solid;padding-left:14px;margin-bottom:16px}
.vb-meta{display:flex;flex-wrap:wrap;gap:9px 26px;margin-bottom:16px}
.vb-meta .mi{display:flex;flex-direction:column;gap:3px}
.vb-meta .mk{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.vb-meta .mv{font-size:14px;font-weight:700;color:var(--ink-soft)}
.vb-actions{display:flex;gap:10px}
.vb-btn{font-family:var(--font-sans);font-weight:700;font-size:14px;border-radius:var(--r-pill);padding:12px 22px;border:1px solid var(--border);background:#fff;color:var(--ink-soft);cursor:pointer;box-shadow:var(--sh-xs);transition:transform .14s}
.vb-btn.pri{background:var(--brand-500);color:#fff;border-color:transparent;box-shadow:var(--sh-brand)}
.vb-btn:hover{transform:translateY(-1px)}

/* week columns */
.vb-week{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:14px;min-width:920px;height:100%}
.vb-col{display:flex;flex-direction:column;gap:9px;min-height:0}
.vb-colh{display:flex;align-items:baseline;justify-content:space-between;padding:2px 4px 6px;position:sticky;top:0}
.vb-colh .cd{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:15px;color:var(--ink)}
.vb-colh .ct{font-size:11px;font-weight:600;color:var(--muted)}
.vb-colh.today .cd{color:var(--brand-600)}
.vb-mini{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:11px 13px;border-left:3px solid;box-shadow:var(--sh-xs);cursor:pointer;transition:transform .14s,box-shadow .2s}
.vb-mini:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.vb-mini .mt{font-weight:700;font-size:13px;letter-spacing:-.01em;color:var(--ink);line-height:1.2}
.vb-mini .mm{display:flex;align-items:center;gap:7px;margin-top:6px}
.vb-mini .mm .nm{font-size:11px;font-weight:700;opacity:.8}
.vb-mini .mm .tm{font-size:10.5px;font-weight:600;color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums}
.vb-mini.done{opacity:.6}

/* year list */
.vb-year{display:flex;flex-direction:column;gap:10px;max-width:880px;margin:0 auto}
.vb-srow{background:#fff;border:1px solid var(--border);border-radius:var(--r-xl);padding:16px 20px;box-shadow:var(--sh-sm);display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center}
.vb-srow .sl{display:flex;align-items:center;gap:12px;min-width:170px}
.vb-srow .sl .nm{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:15px;color:var(--ink)}
.vb-srow .sl .cu{font-size:11.5px;font-weight:600;color:var(--muted)}
.vb-prog{display:flex;flex-direction:column;gap:7px}
.vb-track2{height:9px;border-radius:var(--r-pill);background:var(--hairline);overflow:hidden;display:flex}
.vb-seg{height:100%;border-right:2px solid #fff}
.vb-prog .units{display:flex;gap:6px;flex-wrap:wrap}
.vb-upill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);background:var(--hairline);color:var(--body)}
.vb-srow .pct{font-family:var(--head-font,var(--font-display-sm));font-weight:800;font-size:18px;color:var(--ink);font-variant-numeric:tabular-nums}

/* ============================================================
   VERSION C — Color-forward (subject color is the hero, photo→white)
   ============================================================ */
.vc-day{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
.vc-agenda{display:flex;flex-direction:column;gap:4px;position:relative}
.vc-aitem{display:grid;grid-template-columns:54px 16px 1fr;gap:10px;align-items:center;padding:12px 10px;border-radius:var(--r-md);cursor:pointer;transition:background .15s}
.vc-aitem:hover{background:rgba(28,27,46,.04)}
/* Color frame · give the Day agenda a readable light panel (dark text was sitting on the colored background) */
.home[data-version="C"] .vc-agenda{background:linear-gradient(180deg,rgba(255,255,255,.6),rgba(255,255,255,.42));border:1px solid var(--border);border-radius:var(--r-xl);padding:10px 8px;-webkit-backdrop-filter:blur(22px) saturate(1.4);backdrop-filter:blur(22px) saturate(1.4);box-shadow:var(--sh-sm)}
.home[data-version="C"] .vc-aitem .an{color:#1c1b2e !important}
.home[data-version="C"] .vc-aitem .at,.home[data-version="C"] .vc-aitem .au{color:#494857 !important}
.home[data-version="C"] .vc-aitem:hover{background:rgba(28,27,46,.05)}
.home[data-version="C"] .vc-aitem.sel{background:rgba(28,27,46,.08)}
.vc-aitem.sel{background:rgba(28,27,46,.06)}
.vc-aitem .at{font-size:11.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right}
.vc-aitem .ad{width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1.5px rgba(28,27,46,.12)}
.vc-aitem .an{font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.15}
.vc-aitem .au{font-size:11px;font-weight:600;color:var(--muted)}
.vc-detail{border-radius:var(--r-2xl);overflow:visible;color:#fff;display:flex;flex-direction:column;gap:clamp(10px,1.4vw,16px);padding:clamp(18px,2.2vw,30px);box-shadow:var(--sh-lg);position:relative;min-height:0}
.vc-detail .dc-top{flex:0 0 auto}
.vc-detail .dc-target{flex:0 0 auto;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:var(--r-lg);padding:16px 18px}
.vc-detail .dc-tl{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.82}
.vc-detail .dc-flow{display:flex;flex-wrap:wrap;gap:8px}
.vc-detail .dc-step{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;padding:7px 13px 7px 8px;border-radius:var(--r-pill);background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22)}
.vc-detail .dc-step b{width:19px;height:19px;border-radius:50%;background:rgba(255,255,255,.28);display:grid;place-items:center;font-size:11px;font-weight:800}
.vc-detail .dlab{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.85}
.vc-detail h3{font-family:var(--head-font,var(--font-display));font-weight:600;font-size:clamp(23px,2.7vw,34px);letter-spacing:-.025em;margin:7px 0 5px;line-height:1.05}
.vc-detail .dun{font-size:15px;font-weight:600;opacity:.9}
.vc-detail .dobj{font-size:clamp(14px,1.3vw,17px);font-weight:600;line-height:1.4;max-width:60ch;opacity:.98;margin-top:5px}
.vc-detail .dfoot{margin-top:auto;padding-top:4px}
.vc-detail .dfoot{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.vc-detail .dchip{font-size:12px;font-weight:700;padding:7px 14px;border-radius:var(--r-pill);background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(6px)}

/* week subject lanes */
.vc-week{display:grid;grid-template-columns:140px repeat(5,1fr);gap:7px;min-width:760px}
.vc-wh{padding:6px;text-align:center;font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:13.5px;color:var(--ink)}
.vc-wh .wt{display:block;font-size:10.5px;font-weight:600;color:var(--muted)}
.vc-wh.today{color:var(--brand-600)}
.vc-llabel{display:flex;align-items:center;gap:9px;padding:8px 4px}
.vc-llabel .nm{font-weight:700;font-size:13px;color:var(--ink)}
.vc-wcell{border-radius:var(--r-md);padding:9px 10px;min-height:52px;display:flex;flex-direction:column;gap:3px;color:#fff;justify-content:center;transition:transform .14s}
.vc-wcell:hover{transform:scale(1.03)}
.vc-wcell .ct{font-weight:700;font-size:11.5px;line-height:1.15;letter-spacing:-.01em}
.vc-wcell .cm{font-size:10px;font-weight:600;opacity:.85;font-variant-numeric:tabular-nums}
.vc-wcell.empty{background:var(--hairline)!important;box-shadow:none}
.vc-wcell.done{opacity:.72}
.vc-wcell.now{box-shadow:0 0 0 2px var(--ink)}

/* year constellation */
.vc-year{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.vc-cluster{background:#fff;border:1px solid var(--border);border-radius:var(--r-xl);padding:18px 20px;box-shadow:var(--sh-sm)}
/* Year subject cards carry their subject colour */
.home .vc-cluster{background:color-mix(in oklab,var(--clc,var(--brand-500)) 13%, #fff);border-color:color-mix(in oklab,var(--clc,var(--brand-500)) 28%, var(--border))}
.home[data-tone="dark"] .vc-cluster{background:color-mix(in oklab,var(--clc,var(--brand-500)) 26%, rgba(30,30,46,.92));border-color:color-mix(in oklab,var(--clc,var(--brand-500)) 34%, rgba(255,255,255,.16))}
.home[data-version="C"] .vc-cluster{background:linear-gradient(180deg, color-mix(in oklab,var(--clc,var(--brand-500)) 20%, #fff) 0%, color-mix(in oklab,var(--clc,var(--brand-500)) 9%, #fff) 100%);border-color:color-mix(in oklab,var(--clc,var(--brand-500)) 36%, var(--border));box-shadow:0 22px 64px -32px color-mix(in oklab,var(--clc,var(--brand-500)) 46%, rgba(28,27,46,.35)), 0 0 70px 4px color-mix(in oklab,var(--clc,var(--brand-500)) 12%, transparent)}
.vc-clhead{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.vc-clhead .nm{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:15px;color:var(--ink)}
.vc-clhead .pc{font-size:11.5px;font-weight:600;color:var(--muted);margin-left:auto}
.vc-nodes{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vc-node{display:flex;flex-direction:column;align-items:center;gap:7px;width:64px;text-align:center}
.vc-disc{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;position:relative}
.vc-node .nl{font-size:10px;font-weight:700;color:var(--body);line-height:1.15}
.vc-link{width:14px;height:2px;border-radius:2px;background:var(--border);align-self:center;margin-top:-26px}

/* ============================================================
   TEACH — minimized lesson (left) + blank teach board (right)
   ============================================================ */
.teach{display:grid;gap:16px;height:100%;min-height:0;position:relative}
.teach-resizer{position:absolute;top:0;bottom:0;width:16px;z-index:8;cursor:col-resize}
.teach-resizer::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:46px;border-radius:4px;background:transparent;transition:background .15s}
.teach-resizer:hover::after{background:rgba(127,127,150,.55)}
.home[data-tone="dark"] .teach-resizer:hover::after{background:rgba(255,255,255,.6)}
.teach-lesson{background:#fff;border:1px solid var(--border);border-radius:var(--r-2xl);overflow:hidden;box-shadow:var(--sh-lg);display:flex;flex-direction:column;position:relative}
.teach-lhead{position:absolute;top:10px;right:10px;z-index:5}
.teach-lhead .lhead-btns{display:flex;gap:6px}
.teach-lesson .lnav{height:100%;border:0;border-radius:0;box-shadow:none;background:transparent;-webkit-backdrop-filter:none;backdrop-filter:none}
.teach-lesson .lb{height:8px}
.teach-lesson .li{padding:22px;display:flex;flex-direction:column;gap:16px;min-height:0;overflow:auto}
.teach-lesson .ll{display:flex;align-items:center;gap:10px}
.teach-lesson .ll .nm{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.teach-lesson h3{font-family:var(--head-font,var(--font-display));font-weight:600;font-size:24px;letter-spacing:-.02em;margin:0;color:var(--ink);line-height:1.08}
.teach-lesson .un{font-size:13px;font-weight:600;color:var(--body);margin-top:-8px}
.teach-lesson .obj{font-size:15px;font-weight:600;color:var(--ink-soft);line-height:1.5;border-left:3px solid;padding-left:14px}
.teach-lesson .seq{display:flex;flex-direction:column;gap:8px;margin-top:auto}
.teach-lesson .seqi{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--body)}
.teach-lesson .seqi .sn{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;background:var(--hairline);color:var(--ink-soft);flex:0 0 auto}

.teach-board{background:#fff;border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--sh-lg);position:relative;overflow:hidden;display:flex;flex-direction:column}
.teach-board .bdhead{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 26px;border-bottom:1px solid var(--hairline)}
.teach-board .bdtitle{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 auto}
.teach-board .bdtitle .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.teach-board .bdtitle .nm{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:16px;color:var(--ink)}
.teach-board .timer{display:flex;align-items:center;gap:14px}
.teach-board .timer .tt{font-family:var(--head-font,var(--font-display));font-weight:700;font-size:30px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.tbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);transition:transform .14s,background .18s}
.tbtn:hover{transform:translateY(-1px)}
.tbtn svg{width:18px;height:18px}
.teach-board .canvas-area{flex:1 1 auto;position:relative;
  background-image:radial-gradient(rgba(28,27,46,.07) 1.4px, transparent 1.4px);background-size:26px 26px;background-position:14px 14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:30px}
.teach-board .bobj{font-family:var(--head-font,var(--font-display));font-weight:600;font-size:clamp(26px,3.4vw,46px);letter-spacing:-.02em;color:var(--ink);max-width:22ch;line-height:1.12}
.teach-board .bsub{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.teach-board .blank-note{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:12px;font-weight:600;color:var(--faint)}

/* --- Teach in CALM GLASS (Version A · dark tone) --- */
.home[data-tone="dark"] .teach-lesson,
.home[data-tone="dark"] .teach-board{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  -webkit-backdrop-filter:blur(22px) saturate(1.25);backdrop-filter:blur(22px) saturate(1.25);
  box-shadow:0 28px 64px -32px rgba(12,11,20,.72), inset 0 1px 0 rgba(255,255,255,.2);color:#fff}
.home[data-tone="dark"] .teach-lesson h3,
.home[data-tone="dark"] .teach-board .bdtitle .nm,
.home[data-tone="dark"] .teach-board .timer .tt,
.home[data-tone="dark"] .teach-board .bobj{color:#fff}
.home[data-tone="dark"] .teach-lesson .un,
.home[data-tone="dark"] .teach-lesson .obj{color:rgba(255,255,255,.84)}
.home[data-tone="dark"] .teach-lesson .seqi{color:rgba(255,255,255,.8)}
.home[data-tone="dark"] .teach-lesson .seqi .sn{background:rgba(255,255,255,.2);color:#fff}
.home[data-tone="dark"] .teach-board .bdhead{border-bottom-color:rgba(255,255,255,.16)}
.home[data-tone="dark"] .tbtn{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff}
.home[data-tone="dark"] .teach-board .canvas-area{background-image:radial-gradient(rgba(255,255,255,.16) 1.4px, transparent 1.4px)}
.home[data-tone="dark"] .teach-board .bsub{color:rgba(255,255,255,.72)}
.home[data-tone="dark"] .teach-board .blank-note{color:rgba(255,255,255,.5)}

/* ===== Teach board v2 — minimize/pin · fullscreen · slides · writing bar · resources ===== */
.teach-board{display:flex;flex-direction:column;min-height:0}
/* compact headings in the embedded lesson panel so they don't dominate the narrow column */
.teach-lesson .pl-title{font-size:clamp(15px,1.4vw,17px);line-height:1.15}
.teach-lesson .pl-flowhead .nm{font-size:10px}
.teach-lesson .pl-objprev{font-size:12px}
/* declutter the embedded plan in the narrow teach panel */
.teach-lesson .pl-head{padding:12px}
.teach-lesson .pl-title{font-size:15px;line-height:1.2}
.teach-lesson .pl-tabs{display:flex;flex-direction:column;overflow:visible;gap:2px}
.teach-lesson .pl-tabs button{flex:0 0 auto;width:100%;justify-content:flex-start;font-size:13px;padding:10px 12px;white-space:nowrap;border-radius:var(--r-md)}

/* card base reuses tone-aware .vcard; pl-card = same treatment */
.pl-card{border-radius:var(--r-xl)}
.home[data-tone="dark"] .pl-card{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);-webkit-backdrop-filter:blur(18px) saturate(1.25);backdrop-filter:blur(18px) saturate(1.25);box-shadow:0 16px 40px -24px rgba(12,11,20,.6);color:#fff}
.home[data-tone="light"] .pl-card{background:rgba(255,255,255,.9);border:1px solid var(--border);box-shadow:var(--sh-md);color:var(--ink)}

/* ---- header (sticky to top while the page scrolls) ---- */
.pl-head{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:16px 20px;border-left:4px solid;
  position:sticky;top:0;z-index:20}
.pl-head .pl-id{display:flex;align-items:center;gap:13px;min-width:0}
.home[data-tone="light"] .pl-head{background:rgba(255,255,255,.96)}
.home[data-tone="dark"] .pl-head{background:rgba(30,32,46,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.pl-head .pl-tt{min-width:0}
.pl-title{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:clamp(18px,2vw,24px);letter-spacing:-.02em;line-height:1.1}
.pl-objprev{font-size:13px;font-weight:500;opacity:.72;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46ch}
.pl-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.pl-badges{display:flex;align-items:center;gap:7px}
.pl-pill{font-size:11px;font-weight:800;letter-spacing:.02em;padding:4px 10px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:6px}
.pl-pill.mod{background:var(--honey-100);color:var(--honey-600);border:1px solid var(--honey-200)}
.pl-pill.personal{background:rgba(127,127,150,.16);color:inherit;border:1px solid rgba(127,127,150,.22);opacity:.85}
.pl-pill .pd{width:7px;height:7px;border-radius:50%;background:currentColor}

.pl-btn{font-family:var(--font-sans);font-weight:700;font-size:13px;border-radius:var(--r-pill);padding:9px 16px;border:1px solid var(--border);background:#fff;color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .14s}
.pl-btn:hover{transform:translateY(-1px)}
.pl-btn.pri{background:var(--brand-500);color:#fff;border-color:transparent;box-shadow:var(--sh-brand)}
.pl-btn svg{width:15px;height:15px}
.home[data-tone="dark"] .pl-btn:not(.pri){background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);color:#fff}
.pl-btn.ghost{background:none;border-color:transparent}
.pl-btn.sm{padding:6px 12px;font-size:12px}

/* details disclosure */
.pl-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px 22px;padding:14px 20px}
.pl-drow{display:flex;flex-direction:column;gap:3px}
.pl-drow .dk{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.55}
.pl-drow .dv{font-size:14px;font-weight:700}

/* ---- tabbed card: tabs + pane are ONE rounded panel (no protruding tabs) ---- */
.pl-folder{position:relative;border-radius:var(--r-xl);overflow:hidden;display:flow-root;flex:none}
.home[data-tone="light"] .pl-folder{background:#fff;box-shadow:0 14px 36px -22px rgba(28,27,46,.4)}
.home[data-tone="dark"]  .pl-folder{background:rgba(255,255,255,.1);color:#fff;-webkit-backdrop-filter:blur(20px) saturate(1.3);backdrop-filter:blur(20px) saturate(1.3);box-shadow:0 16px 40px -24px rgba(12,11,20,.6), inset 0 1px 0 rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18)}

/* tab row = header strip inside the card, with a hairline divider beneath */
.pl-tabs{display:flex;flex-wrap:wrap;gap:2px 2px;align-items:stretch;position:relative;z-index:2;padding:6px 6px 0;
  scrollbar-width:none}
.pl-tabs::-webkit-scrollbar{display:none}
.home[data-tone="light"] .pl-tabs{border-bottom:1px solid var(--hairline)}
.home[data-tone="dark"]  .pl-tabs{border-bottom:1px solid rgba(255,255,255,.1)}

.pl-tab{position:relative;display:inline-flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;
  font-family:var(--font-sans);font-weight:700;font-size:13px;letter-spacing:-.01em;color:inherit;
  padding:11px 15px 13px;border:0;background:none;border-radius:10px 10px 0 0;
  transition:background .16s,color .16s,opacity .16s;opacity:.55}
.pl-tab svg{width:15px;height:15px;color:var(--pc);opacity:.85}
.pl-tab .pdot{display:none}
.pl-tab:hover{opacity:.82}
.home[data-tone="light"] .pl-tab:hover:not(.on){background:rgba(28,27,46,.035)}
.home[data-tone="dark"]  .pl-tab:hover:not(.on){background:rgba(255,255,255,.06)}
/* active tab: subtle accent-tinted fill + a 2.5px accent underline sitting on the divider */
.pl-tab.on{opacity:1;background:color-mix(in oklab, var(--pc) 9%, transparent)}
.home[data-tone="dark"]  .pl-tab.on{background:color-mix(in oklab, var(--pc) 26%, rgba(255,255,255,.06))}
.pl-tab.on::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:2.5px;border-radius:3px;background:var(--pc)}
.pl-tab{cursor:grab}
.pl-tab:active{cursor:grabbing}
.pl-tab.dragging{opacity:.4}

/* pane = body of the same card (no separate border/shadow) */
.pl-pane{padding:22px;position:relative;z-index:1}
.pl-pane .pl-paneh{display:none}      /* the active tab already labels the pane */

/* standalone flow card keeps full rounded corners + paneh visible */
.pl-flowcard{padding:18px 20px;border-radius:var(--r-xl)}
.pl-flowcard .pl-paneh{display:flex;align-items:center;gap:8px;margin-bottom:12px}

.pl-edit{outline:none;font-size:15px;line-height:1.6;min-height:1.5em;border-radius:var(--r-sm);transition:background .15s}
.pl-edit:focus{background:color-mix(in oklab, var(--pc) 8%, transparent)}
.home[data-tone="dark"] .pl-edit:focus{background:rgba(255,255,255,.1)}
.pl-edit:empty::before{content:attr(data-ph);opacity:.45;font-weight:500}
.pl-edit.single{white-space:nowrap;overflow-x:auto;min-height:auto}
.pl-edit.single::-webkit-scrollbar{display:none}

.pl-objrow{display:flex;align-items:baseline;gap:10px}
.pl-ican{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:15px;opacity:.75;flex:0 0 auto}
.pl-objrow .pl-edit{flex:1 1 auto;font-weight:600}

.pl-diff{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
/* frosted-glass differentiation tiers — same recipe as the site's glass cards */
.pl-tier{border-radius:var(--r-lg);padding:18px 15px 14px;position:relative;overflow:hidden;
  background:rgba(255,255,255,.5);
  border:1px solid color-mix(in oklab, var(--tc) 26%, rgba(255,255,255,.55));
  -webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6);
  box-shadow:0 12px 30px -18px color-mix(in oklab, var(--tc) 50%, rgba(28,27,46,.4)), inset 0 1px 0 rgba(255,255,255,.85)}
.home[data-tone="dark"] .pl-tier{
  background:rgba(255,255,255,.08);
  border-color:color-mix(in oklab, var(--tc) 38%, rgba(255,255,255,.16));
  box-shadow:0 12px 30px -18px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.18)}
.pl-tier::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:var(--tc);opacity:.95}
.pl-tier h5{margin:0 0 8px;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.pl-tier .pl-edit{font-size:13.5px;min-height:3.4em}

.pl-stdlist{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.pl-stdrow{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md)}
.home[data-tone="dark"] .pl-stdrow{background:rgba(255,255,255,.08)}
.home[data-tone="light"] .pl-stdrow{background:var(--surface-warm);border:1px solid var(--border)}
.pl-stdcode{font-family:var(--font-mono);font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);background:var(--done-tint);color:#1A6B49;border:1px solid #C7EAD9;flex:0 0 auto}
.pl-stddesc{font-size:13.5px;font-weight:500;opacity:.85}
.pl-respill{font-size:10.5px;font-weight:800;letter-spacing:.02em;padding:3px 9px;border-radius:var(--r-pill);flex:0 0 auto}
.pl-resrow{gap:12px}
.pl-resrow .pl-stddesc{flex:1 1 auto}
.pl-resbtn{flex:0 0 auto;border:1px solid var(--border);background:#fff;color:var(--ink-soft);font-family:var(--font-sans);
  font-weight:700;font-size:12px;padding:6px 12px;border-radius:var(--r-pill);cursor:pointer;transition:transform .14s}
.pl-resbtn:hover{transform:translateY(-1px)}
.home[data-tone="dark"] .pl-resbtn{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);color:#fff}
.pl-resx{flex:0 0 auto;width:24px;height:24px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;font-size:17px;line-height:1}
.pl-resx:hover{background:var(--danger-tint);color:var(--danger)}

/* resources: gallery / list toggle */
.pl-resbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pl-viewtog{display:inline-flex;gap:2px;padding:3px;border-radius:var(--r-pill);background:rgba(127,127,150,.14);border:1px solid var(--border)}
.home[data-tone="dark"] .pl-viewtog{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18)}
.pl-viewtog button{width:34px;height:30px;border:0;background:none;cursor:pointer;color:inherit;opacity:.6;border-radius:var(--r-pill);display:grid;place-items:center}
.pl-viewtog button svg{width:17px;height:17px}
.pl-viewtog button.on{opacity:1;background:#fff;color:var(--ink);box-shadow:var(--sh-xs)}
.home[data-tone="dark"] .pl-viewtog button.on{background:rgba(255,255,255,.9);color:#1a1c2a}
.pl-resbar .pl-btn{margin-left:auto}

/* compact list view — ultra-thin rows */
.pl-rlist{display:flex;flex-direction:column}
.pl-rrow{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:var(--r-sm)}
.pl-rrow + .pl-rrow{border-top:1px solid var(--hairline)}
.home[data-tone="dark"] .pl-rrow + .pl-rrow{border-top-color:rgba(255,255,255,.1)}
.pl-rrow:hover{background:rgba(127,127,150,.1)}
.pl-rdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.pl-rtype{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;width:64px;flex:0 0 auto}
.pl-rlabel{flex:1 1 auto;min-width:0;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-rtab,.pl-rrm{width:22px;height:22px;flex:0 0 auto;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center;opacity:.6;font-size:15px;line-height:1}
.pl-rtab svg{width:13px;height:13px}
.pl-rtab:hover,.pl-rrm:hover{opacity:1;background:rgba(127,127,150,.16)}
.pl-rrm:hover{background:var(--danger-tint);color:var(--danger)}

/* gallery (movie-frame thumbnails) */
.pl-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
.pl-gcard{display:flex;flex-direction:column;gap:8px}
.pl-gthumb{position:relative;aspect-ratio:16/10;border-radius:var(--r-md);overflow:hidden;background-size:cover;background-position:center;
  box-shadow:inset 0 0 0 1px rgba(28,27,46,.1), var(--sh-xs);display:flex;align-items:center;justify-content:center}
.home[data-tone="dark"] .pl-gthumb{box-shadow:inset 0 0 0 1px rgba(255,255,255,.14)}
.pl-gtype{font-family:var(--font-display-sm);font-weight:800;font-size:14px;letter-spacing:.04em;color:#fff;opacity:.92;text-transform:uppercase}
.pl-gactions{position:absolute;top:7px;right:7px;display:flex;gap:6px;opacity:0;transition:opacity .15s}
.pl-gcard:hover .pl-gactions{opacity:1}
.pl-gactions button{width:28px;height:28px;border-radius:50%;border:0;cursor:pointer;background:rgba(255,255,255,.92);color:#1a1c2a;display:grid;place-items:center;box-shadow:var(--sh-sm)}
.pl-gactions button svg{width:15px;height:15px}
.pl-gmeta{display:flex;align-items:center;gap:8px;min-width:0}
.pl-glabel{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.pl-flowhead .pl-flowtools{display:flex;align-items:center;gap:8px}
.pl-flowadd{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:rgba(255,255,255,.6);border-radius:var(--r-pill);padding:6px 12px;font-family:var(--font-sans);font-weight:700;font-size:12.5px;color:var(--accent,var(--brand-600));cursor:pointer}
.home[data-tone="dark"] .pl-flowadd{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff}
.pl-flowadd:hover{background:var(--accent,var(--brand-500));color:#fff;border-color:transparent}
.pl-flowadd svg{width:14px;height:14px}

/* new-lesson dialog */
.pl-dlg-scrim{position:fixed;inset:0;z-index:140;background:rgba(12,11,20,.5);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);display:grid;place-items:center;padding:24px;animation:plask .2s ease}
.pl-dlg{width:min(460px,94vw);max-height:90vh;overflow-y:auto;scrollbar-width:none;border-radius:var(--r-2xl);background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(34px) saturate(1.3);backdrop-filter:blur(34px) saturate(1.3);border:1px solid rgba(255,255,255,.7);box-shadow:0 40px 100px -36px rgba(12,11,20,.5)}
.pl-dlg::-webkit-scrollbar{display:none}
.home[data-tone="dark"] .pl-dlg{background:rgba(30,29,42,.94);border-color:rgba(255,255,255,.14);color:#fff}
.pl-dlg-h{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-display-sm);font-weight:700;font-size:18px;color:var(--ink);padding:18px 20px 12px}
.home[data-tone="dark"] .pl-dlg-h{color:#fff}
.pl-dlg-h button{width:32px;height:32px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center}
.pl-dlg-h button:hover{background:rgba(127,127,150,.14)}
.pl-dlg-h svg{width:17px;height:17px}
.pl-dlg-body{padding:4px 20px 8px;display:flex;flex-direction:column;gap:13px}
.pl-fld2{display:flex;gap:12px}
.pl-fld2 .pl-fld{flex:1}
.pl-fld{display:flex;flex-direction:column;gap:5px}
.pl-fld.off{opacity:.4}
.pl-fld span{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.pl-fld input,.pl-fld select{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--ink);background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;outline:none}
.home[data-tone="dark"] .pl-fld input,.home[data-tone="dark"] .pl-fld select{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16);color:#fff}
.pl-fld input:focus,.pl-fld select:focus{border-color:var(--accent,var(--brand-500))}
.pl-check{display:flex;align-items:flex-start;gap:9px;padding:10px;border-radius:var(--r-md);background:rgba(127,127,150,.08);cursor:pointer}
.pl-check input{margin-top:2px}
.pl-check span{font-size:13px;font-weight:700;color:var(--ink-soft)}
.home[data-tone="dark"] .pl-check span{color:#fff}
.pl-check em{font-weight:500;font-style:normal;color:var(--muted)}
.pl-dlg-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px 18px}
.pl-btn.pri:disabled{opacity:.5;cursor:not-allowed}
.pl-tplname{font-weight:600;color:var(--accent,var(--brand-500));margin-left:6px;text-transform:none;letter-spacing:0}
.pl-tplwrap{position:relative}
.pl-tplbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:rgba(255,255,255,.6);border-radius:var(--r-pill);padding:6px 12px;font-family:var(--font-sans);font-weight:700;font-size:12.5px;color:var(--ink-soft);cursor:pointer}
.home[data-tone="dark"] .pl-tplbtn{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff}
.pl-tplbtn svg{width:14px;height:14px;opacity:.6}
.pl-tplpop{position:absolute;top:calc(100% + 6px);right:0;z-index:30;width:230px;padding:6px;border-radius:var(--r-lg);background:#fff;border:1px solid var(--border);box-shadow:var(--sh-lg)}
.home[data-tone="dark"] .pl-tplpop{background:#26283a;border-color:rgba(255,255,255,.16);color:#fff}
.pl-tpllbl{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:6px 8px}
.pl-tplrow{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;border:0;background:none;cursor:pointer;text-align:left;padding:9px 10px;border-radius:var(--r-md);font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--ink-soft)}
.home[data-tone="dark"] .pl-tplrow{color:#fff}
.pl-tplrow:hover{background:rgba(127,127,150,.12)}
.pl-tplrow.on{color:var(--accent,var(--brand-500))}
.pl-tplsteps{font-size:11px;font-weight:600;color:var(--muted)}
.pl-tplrow.add{border-top:1px solid var(--hairline);margin-top:4px;color:var(--accent,var(--brand-500));justify-content:flex-start;gap:7px}
.pl-tplrow.add svg{width:15px;height:15px}
.pl-flowbtn{width:28px;height:28px;border:1px solid var(--border);background:none;border-radius:50%;cursor:pointer;color:inherit;display:grid;place-items:center;opacity:.7;transition:opacity .15s,background .15s}
.pl-flowbtn:hover{opacity:1;background:rgba(127,127,150,.14)}
.home[data-tone="dark"] .pl-flowbtn{border-color:rgba(255,255,255,.22)}
.pl-flowbtn svg{width:15px;height:15px}
.pl-flowbtn.up svg{transform:rotate(180deg)}

/* expandable lesson-flow sections */
.pl-step2{border-radius:var(--r-md);transition:background .15s;position:relative}
.pl-step2 + .pl-step2,.pl-step2{border-top:1px solid}
.home[data-tone="dark"] .pl-step2{border-top-color:rgba(255,255,255,.12)}
.home[data-tone="light"] .pl-step2{border-top-color:var(--hairline)}
.pl-step2.open{background:color-mix(in oklab, var(--subj) 5%, transparent)}
.home[data-tone="dark"] .pl-step2.open{background:rgba(255,255,255,.05)}
.pl-step-row{display:grid;grid-template-columns:30px 1fr auto 28px 26px 26px;gap:11px;align-items:center;padding:10px 4px}
.pl-stepn{width:28px;height:28px;border-radius:50%;border:0;cursor:pointer;display:grid;place-items:center;font-size:12px;font-weight:800;flex:0 0 auto;
  background:color-mix(in oklab,var(--subj) 20%, white);color:var(--subjink)}
.home[data-tone="dark"] .pl-stepn{background:rgba(255,255,255,.2);color:#fff}
.pl-step-row .pl-edit{font-size:14.5px;font-weight:700;color:color-mix(in oklab, var(--subj) 78%, var(--ink));letter-spacing:-.01em}
.home[data-tone="dark"] .pl-step-row .pl-edit{color:color-mix(in oklab, var(--subj) 60%, #fff)}
.pl-stepchev{width:28px;height:28px;border:0;background:none;cursor:pointer;color:inherit;opacity:.55;display:grid;place-items:center;transition:transform .2s,opacity .15s;border-radius:50%}
.pl-stepchev:hover{opacity:1;background:rgba(127,127,150,.14)}
.pl-stepchev svg{width:16px;height:16px}
.pl-stepadd{width:26px;height:26px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center}
.pl-stepadd:hover{background:color-mix(in oklab,var(--accent,var(--brand-500)) 16%,transparent);color:var(--accent,var(--brand-500))}
.pl-stepadd svg{width:15px;height:15px}
.pl-step-body{padding:2px 4px 16px 41px;display:flex;flex-direction:column;gap:12px}
.pl-rich{min-height:64px;line-height:1.6}
.pl-rich h3{font-family:var(--head-font,var(--font-display-sm));font-weight:700;font-size:16px;margin:.4em 0 .2em}
.pl-rich ul,.pl-rich ol{margin:.3em 0;padding-left:1.5em}
.pl-step-res{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pl-tagchip{display:inline-flex;align-items:center;gap:8px;padding:6px 6px 6px 11px;border-radius:var(--r-pill);border:1.5px solid var(--border);font-size:12.5px;font-weight:600}
.pl-tagdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.pl-taglbl{cursor:pointer;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-taglbl:hover{text-decoration:underline}
.pl-tagx{width:20px;height:20px;border:0;background:none;cursor:pointer;color:var(--muted);border-radius:50%;display:grid;place-items:center}
.pl-tagx:hover{background:var(--danger-tint);color:var(--danger)}
.pl-tagx svg{width:12px;height:12px}
.pl-tagwrap{position:relative}

/* add split-menu */

/* wall menu (dropdown 2) */

/* popovers — settings-panel aesthetic (frosted glass, rounded, refined) */
.rw-pop{position:absolute;top:calc(100% + 10px);z-index:30;border-radius:var(--r-xl);
  background:rgba(255,255,255,.86);-webkit-backdrop-filter:blur(30px) saturate(1.3);backdrop-filter:blur(30px) saturate(1.3);
  border:1px solid rgba(255,255,255,.8);box-shadow:0 30px 70px -30px rgba(28,27,46,.5), inset 0 1px 0 rgba(255,255,255,.7);padding:10px;animation:rwpop .16s cubic-bezier(.2,.8,.2,1)}

.rw-popseg{display:flex;gap:4px;padding:3px;border-radius:var(--r-pill);background:rgba(127,127,150,.12);border:1px solid var(--border);margin-bottom:6px}

.rw-popseg button{flex:1;border:0;background:none;border-radius:var(--r-pill);padding:9px;font-family:var(--font-sans);font-weight:700;font-size:12.5px;color:var(--body);cursor:pointer}

.rw-popfilters{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:4px}
.rw-popfilters button{height:32px;padding:0 13px;border-radius:var(--r-pill);border:1px solid var(--border);background:rgba(255,255,255,.5);font-size:12px;font-weight:700;color:var(--ink-soft);cursor:pointer;transition:background .14s}
