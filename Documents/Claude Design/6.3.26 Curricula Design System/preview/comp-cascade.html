<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap" style="--c:var(--reading-bright);--ct:var(--reading-tint)">
  <div class="col" style="gap:10px">
    <div class="uchip active">
      <span class="cic solid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5z" stroke-linejoin="round"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v16h5.5a1.5 1.5 0 0 0 1.5-1.5z" stroke-linejoin="round"/></svg></span>
      <div><div class="u">Unit 3 · Inference</div><div class="t">6 weeks · 24 lessons</div></div>
    </div>
    <div class="row" style="gap:10px">
      <div class="wchip"><span class="cic soft"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4" stroke-linecap="round"/></svg></span><div><div class="w">Week 3</div><div class="d">Mon – Fri</div></div></div>
      <div class="wchip active"><span class="cic soft"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4" stroke-linecap="round"/></svg></span><div><div class="w">Week 4</div><div class="d">Mon – Fri</div></div></div>
    </div>
    <div class="row" style="gap:10px">
      <div class="lchip"><span class="ld"></span><span class="ls">Drawing conclusions</span></div>
      <div class="lchip"><span class="ld"></span><span class="ls">Text evidence</span></div>
    </div>
  </div>
  <div class="cap" style="margin-top:12px">Cascade chips · tint fill + bright outline + dark ink · set <code class="mono" style="font-size:11px">--c</code> &amp; <code class="mono" style="font-size:11px">--ct</code> to re-theme</div>
</div></body></html>
