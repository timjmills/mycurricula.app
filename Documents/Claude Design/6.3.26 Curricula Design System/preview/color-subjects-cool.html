<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div class="palcards" style="grid-template-columns:repeat(4,1fr)">
    <div class="palcard"><div class="head" style="background:var(--subj-9)"><span class="sw" style="background:var(--subj-9-tint)"></span><span class="num">9</span></div><div class="bd"><div class="nm">SEL</div><div class="sub">subj-9</div><div class="hex">#7A7FC7 · #E2E3F0</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--subj-10)"><span class="sw" style="background:var(--subj-10-tint)"></span><span class="num">10</span></div><div class="bd"><div class="nm">Reading</div><div class="sub">subj-10</div><div class="hex">#7A9EC7 · #E2E9F0</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--subj-11)"><span class="sw" style="background:var(--subj-11-tint)"></span><span class="num">11</span></div><div class="bd"><div class="nm">Technology</div><div class="sub">subj-11</div><div class="hex">#7AB8C7 · #E2EEF0</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--subj-12)"><span class="sw" style="background:var(--subj-12-tint)"></span><span class="num">12</span></div><div class="bd"><div class="nm">Health</div><div class="sub">subj-12</div><div class="hex">#7AC7B8 · #E2F0EE</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--subj-13)"><span class="sw" style="background:var(--subj-13-tint)"></span><span class="num">13</span></div><div class="bd"><div class="nm">Science</div><div class="sub">subj-13</div><div class="hex">#7AC79B · #E2F0E8</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--subj-14)"><span class="sw" style="background:var(--subj-14-tint)"></span><span class="num">14</span></div><div class="bd"><div class="nm">PE</div><div class="sub">subj-14</div><div class="hex">#7AC77A · #E2F0E2</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--subj-15)"><span class="sw" style="background:var(--subj-15-tint)"></span><span class="num">15</span></div><div class="bd"><div class="nm">Library</div><div class="sub">subj-15</div><div class="hex">#9AC77A · #E8F0E2</div></div></div>
    <div class="palcard" style="display:flex;align-items:center;justify-content:center;background:var(--surface-warm);border-style:dashed"><div style="text-align:center;padding:10px"><div class="cap" style="color:var(--faint)">+ assign any<br>subject to<br>any slot</div></div></div>
  </div>
</div></body></html>
