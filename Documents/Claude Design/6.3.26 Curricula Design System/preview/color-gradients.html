<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="gradcard" style="background:var(--grad-hero)"><span>Hero mesh</span></div>
    <div class="gradcard" style="background:var(--grad-honey)"><span>Honey CTA</span></div>
    <div class="gradcard" style="background:var(--grad-brand)"><span>Brand soft</span></div>
    <div class="gradcard" style="background:var(--grad-dawn)"><span>Dawn · avatars</span></div>
    <div class="gradcard" style="background:var(--grad-mint)"><span>Mint · accents</span></div>
    <div class="gradcard" style="background:radial-gradient(120% 120% at 0% 0%,#FFE7C2,transparent 55%),radial-gradient(120% 120% at 100% 100%,#C9B6FF,transparent 55%),#FFFDF8"><span>Corner glow</span></div>
  </div>
</div></body></html>
