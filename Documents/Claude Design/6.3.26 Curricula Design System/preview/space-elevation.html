<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:8px 4px">
    <div style="text-align:center"><div class="shadowbox" style="box-shadow:var(--sh-xs);margin:0 auto 10px"></div><div class="cap">xs</div></div>
    <div style="text-align:center"><div class="shadowbox" style="box-shadow:var(--sh-sm);margin:0 auto 10px"></div><div class="cap">sm</div></div>
    <div style="text-align:center"><div class="shadowbox" style="box-shadow:var(--sh-md);margin:0 auto 10px"></div><div class="cap">md</div></div>
    <div style="text-align:center"><div class="shadowbox" style="box-shadow:var(--sh-lg);margin:0 auto 10px"></div><div class="cap">lg</div></div>
    <div style="text-align:center"><div class="shadowbox" style="box-shadow:var(--sh-honey);margin:0 auto 10px;background:var(--grad-honey)"></div><div class="cap">honey</div></div>
  </div>
  <div class="cap" style="margin-top:6px;text-align:center">Soft, low-contrast, cast cool — color glows reserved for primary buttons</div>
</div></body></html>
