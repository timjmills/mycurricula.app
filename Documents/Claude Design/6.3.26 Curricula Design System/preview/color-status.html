<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div class="row" style="gap:10px">
    <span class="badge badge-done"><span class="dot" style="background:var(--done)"></span>Completed</span>
    <span class="badge badge-progress"><span class="dot" style="background:var(--progress)"></span>In progress</span>
    <span class="badge badge-idle"><span class="dot" style="background:var(--idle)"></span>Not started</span>
    <span class="badge badge-warn"><span class="dot" style="background:var(--warn)"></span>Needs review</span>
  </div>
  <div class="row" style="gap:24px;margin-top:16px">
    <span class="status"><span class="ring done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 13 4 4 10-11" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Completed</span>
    <span class="status"><span class="ring prog"></span>In progress</span>
    <span class="status"><span class="ring idle"></span>Not started</span>
  </div>
  <div class="cap" style="margin-top:16px">Status stays semantic &amp; separate from subject hue — a marker always reads as progress</div>
</div></body></html>
