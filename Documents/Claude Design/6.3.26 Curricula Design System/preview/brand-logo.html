<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .brandmark{display:flex;align-items:center;gap:12px}
  .brandmark .glyph{width:46px;height:46px;border-radius:13px;background:var(--grad-honey);display:grid;place-items:center;box-shadow:var(--sh-honey);flex:0 0 auto}
  .brandmark .glyph svg{width:24px;height:24px}
  .brandmark b{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--ink);letter-spacing:-.02em;line-height:1}
  .brandmark span{display:block;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
  .onink{background:var(--ink);border-radius:var(--r-lg);padding:18px 22px}
  .onink b{color:#fff}
</style>
</head><body><div class="card-wrap">
  <div class="row" style="gap:32px;align-items:center">
    <div class="brandmark">
      <span class="glyph"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5v-13Z" fill="#fff"/><path d="M13 4h5.5A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5H13V4Z" fill="#3A2A05" opacity=".55"/></svg></span>
      <div><b>mycurricula.app</b><span>For teachers, by teachers</span></div>
    </div>
    <div class="onink brandmark">
      <span class="glyph"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5v-13Z" fill="#fff"/><path d="M13 4h5.5A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5H13V4Z" fill="#3A2A05" opacity=".55"/></svg></span>
      <div><b>mycurricula.app</b><span style="color:var(--faint)">For teachers, by teachers</span></div>
    </div>
  </div>
  <div class="cap" style="margin-top:16px">Open-book glyph in a honey tile · wordmark in Bricolage 800</div>
</div></body></html>
