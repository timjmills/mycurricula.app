<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="field"><label>Unit title</label><input class="input" placeholder="e.g. Multiplication &amp; Division"></div>
    <div class="field"><label>Search</label><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2" stroke-linecap="round"/></svg><input class="input" placeholder="Search units, lessons, standards…"></div></div>
    <div class="field"><label>Subject</label><select class="input"><option>Math</option><option>Reading</option><option>Science</option></select></div>
    <div class="field"><label>Focused state</label><input class="input focus" value="Multiply by 2-digit numbers"></div>
  </div>
</div></body></html>
