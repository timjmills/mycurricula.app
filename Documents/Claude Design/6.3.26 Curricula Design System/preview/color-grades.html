<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div class="palcards" style="grid-template-columns:repeat(6,1fr)">
    <div class="palcard"><div class="head" style="background:var(--gK)"><span class="sw" style="background:var(--gK-tint)"></span><span class="num">K</span></div><div class="bd"><div class="nm">Kinder</div><div class="sub">WR Year 1</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--g1)"><span class="sw" style="background:var(--g1-tint)"></span><span class="num">1</span></div><div class="bd"><div class="nm">Grade 1</div><div class="sub">WR Year 2</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--g2)"><span class="sw" style="background:var(--g2-tint)"></span><span class="num">2</span></div><div class="bd"><div class="nm">Grade 2</div><div class="sub">WR Year 3</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--g3)"><span class="sw" style="background:var(--g3-tint)"></span><span class="num">3</span></div><div class="bd"><div class="nm">Grade 3</div><div class="sub">WR Year 4</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--g4)"><span class="sw" style="background:var(--g4-tint)"></span><span class="num">4</span></div><div class="bd"><div class="nm">Grade 4</div><div class="sub">WR Year 5</div></div></div>
    <div class="palcard"><div class="head" style="background:var(--g5)"><span class="sw" style="background:var(--g5-tint)"></span><span class="num">5</span></div><div class="bd"><div class="nm">Grade 5</div><div class="sub">WR Year 6</div></div></div>
  </div>
  <div class="cap" style="margin-top:12px">Grade bands · White Rose years · grade-level tagging, kept distinct from subjects</div>
</div></body></html>
