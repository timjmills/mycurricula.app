<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div class="row" style="gap:14px;align-items:stretch">
    <div class="subjcard">
      <div class="ic" style="background:var(--math-tint);color:var(--math-ink)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14M9 4v3M7 12h2m3 0h2m3 0h.01M7 16h2m3 0h2m3 0h.01" stroke-linecap="round"/></svg></div>
      <h4>Math</h4><div class="sub">8 of 12 units · 67%</div>
      <div class="bar"><i style="width:67%;background:var(--math)"></i></div>
    </div>
    <div class="subjcard">
      <div class="ic" style="background:var(--reading-tint);color:var(--reading-ink)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5z"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v16h5.5a1.5 1.5 0 0 0 1.5-1.5z"/></svg></div>
      <h4>Reading</h4><div class="sub">9 of 14 units · 64%</div>
      <div class="bar"><i style="width:64%;background:var(--reading)"></i></div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center;gap:18px;padding-left:6px">
      <div class="metric"><div class="mi" style="background:var(--brand-50);color:var(--brand-600)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3 8 4-16 3 8h4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="mv">182</div><div class="ml">lessons planned</div></div></div>
      <div class="metric"><div class="mi" style="background:var(--done-tint);color:var(--done)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m5 13 4 4 10-11" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="mv">68%</div><div class="ml">year complete</div></div></div>
    </div>
  </div>
</div></body></html>
