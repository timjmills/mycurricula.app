<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card-wrap">
  <div class="swatches" style="grid-template-columns:repeat(4,1fr)">
    <div class="swatch"><div class="cc" style="background:var(--canvas);border-bottom:1px solid var(--border)"></div><div class="info"><div class="nm">Canvas</div><div class="hex">#FCFAF6</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--surface);border-bottom:1px solid var(--border)"></div><div class="info"><div class="nm">Surface</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--surface-warm);border-bottom:1px solid var(--border)"></div><div class="info"><div class="nm">Surface warm</div><div class="hex">#FFFDF8</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--ink)"></div><div class="info"><div class="nm">Ink</div><div class="hex">#1C1B2E</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--body)"></div><div class="info"><div class="nm">Body</div><div class="hex">#57566B</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--muted)"></div><div class="info"><div class="nm">Muted</div><div class="hex">#908FA3</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--border)"></div><div class="info"><div class="nm">Border</div><div class="hex">#ECEAE3</div></div></div>
    <div class="swatch"><div class="cc" style="background:var(--hairline)"></div><div class="info"><div class="nm">Hairline</div><div class="hex">#F4F2EC</div></div></div>
  </div>
</div></body></html>
