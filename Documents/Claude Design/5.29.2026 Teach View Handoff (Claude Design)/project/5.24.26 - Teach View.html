<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>5.24.26 — Teach View Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="tokens.css" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;padding:0;height:100%;font-family:"Inter", system-ui, -apple-system, sans-serif;color:#0B1220;background:#F4F6FB}
  #root{min-height:100%}
  .page{max-width:1560px;margin:0 auto;padding:20px}
  .pagetitle{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
  .pagetitle h1{margin:0;font-size:26px;font-weight:800;color:#0B1220;letter-spacing:-0.5px}
  .pagetitle .sub{font-size:13px;color:#4B5563}
  .pageintro{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px 20px;margin-bottom:18px}
  .pageintro h2{margin:0 0 6px;font-size:17px;font-weight:700;color:#0B1220;letter-spacing:-0.3px}
  .pageintro p{margin:0;font-size:13px;color:#4B5563;line-height:1.55;text-wrap:pretty}
  .ab-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(11,18,32,.04);margin-bottom:18px}
  .ab-header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #EEF0F4;background:#FAFBFC;font-size:12px;color:#4B5563}
  .ab-header .num{font-family:"JetBrains Mono", "Geist Mono", ui-monospace, monospace;color:#9CA3AF;font-size:11px;font-weight:500}
  .ab-header .title{color:#0B1220;font-weight:700;font-size:14px;letter-spacing:-0.1px}
  .ab-header .desc{flex:1;color:#4B5563;font-size:11.5px;text-wrap:pretty}
  .ab-frame{position:relative;width:100%;background:#fff;overflow:hidden}
  .teach-widget:hover .teach-chrome { opacity: 1 !important; }
  .cp-mono { font-family: "JetBrains Mono", "Geist Mono", ui-monospace, monospace; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="teach524.jsx"></script>
<script type="text/babel" data-presets="react">
function Artboard({ num, title, desc, h = 980, children }) {
  return (
    <div className="ab-card">
      <div className="ab-header">
        {num && <span className="num">{num}</span>}
        <span className="title">{title}</span>
        {desc && <span className="desc">— {desc}</span>}
      </div>
      <div className="ab-frame" style={{ height: h }}>{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="page">
      <div className="pagetitle">
        <h1>5.24.26 — Teach View Prototype</h1>
        <span className="sub">Top-level Teach tab · live in-class board · collapsible side panels</span>
      </div>
      <div className="pageintro">
        <h2>What's on this page</h2>
        <p>
          Four focused states of the Teach view. <strong>T14</strong> is the new streamlined default — resource-focus center, docked Resources panel on the right, slim hover-expand library rail on the left. <strong>T14b</strong> shows the Widgets library flyout open. <strong>T12</strong> is the simplified lesson-essentials board. <strong>T9</strong> is the empty board state. Board canvas uses a blank white/black background; the floating action offers <strong>Add resource</strong> and <strong>Add widget</strong>.
        </p>
      </div>

      <Artboard num="T14" title="Streamlined default — resource-focus + docked Resources + hover library (rail closed)" desc="The new default. Center is the open resource (full-bleed) on a blank canvas. Resources panel is docked open on the right. Left is a slim 56px library rail (Lessons / Widgets / Boards) that stays collapsed until you mouse over a tab — same open/close behavior as Resources." h={1100}>
        <window.ABTeachStreamlined />
      </Artboard>

      <Artboard num="T14b" title="Streamlined default — Widgets library flyout open" desc="Mousing over the Widgets tab in the left rail slides its flyout open (Widget Library: Timer / I Can / Groups / Agenda / Notes / Model It / Slides / YouTube / Poll / Names). Drag any onto the board. Moving the cursor away collapses it back to the rail." h={1100}>
        <window.ABTeachStreamlined openTab="widgets" />
      </Artboard>

      <Artboard num="T12" title="Simplified Teach view (UX pass)" desc="Lesson-essentials default: I Can + Timer + Notes only. Permanent ⋯ menu on every widget. Single floating action splits into 'Add resource' + 'Add widget'. Right panel defaults to Recents + Search. Top bar collapses to lesson chrome only." h={1100}>
        <window.ABTeachSimplified />
      </Artboard>

      <Artboard num="T9" title="Empty board state" desc="A new or cleared board shows a centered call-to-action on a blank white canvas: Blank board with Add Resource / Add Widget / Background / Blank actions. Resources can still be dragged in from the right panel." h={1100}>
        <window.ABTeachEmpty />
      </Artboard>

      <Artboard num="T13" title="Teach mode — live board only (no side panels)" desc="Entering Teach mode enlarges the live teaching board and hides BOTH side panels entirely — even if they're active or docked on the computer. Just the board, its I-Can banner, the slide content, and a slide pager. Esc shrinks back; ← / → move between slides." h={1020}>
        <window.ABTeachInTeachMode />
      </Artboard>

      <Artboard num="T15" title="Panel behavior — mouseover peek + dock" desc="Panels appear on mouseover and auto-hide. Hovering a rail icon peeks the panel (semi-transparent, dashed edge); releasing over the dock zone pins it. Shown with the Timer panel peeking on the left." h={1020}>
        <window.ABTeachPanelMouseover />
      </Artboard>

      <Artboard num="T16" title="Panel behavior — stacked & tabbed" desc="Panels can stack on the same side and switch as tabs (Resources · Notes · Timer). Each side holds up to 3." h={1020}>
        <window.ABTeachPanelsTabbed />
      </Artboard>

      <Artboard num="T17" title="Panel behavior — drag across sides" desc="Any panel/icon can be dragged from one side to the other. A ghost follows the cursor; the target side shows a drop zone. Shown dragging Notes from right → left." h={1020}>
        <window.ABTeachPanelDragged />
      </Artboard>

      <Artboard num="T18" title="Zone model — the 7-thing rule" desc="Left panel + right panel each hold up to 3 things (widgets or panels). The center holds the one live teaching board, with unlimited slides — each slide carrying its own resources + assessments. Widgets are kinds that live on the board OR as a panel." h={1020}>
        <window.ABTeachZoneModel />
      </Artboard>

      <Artboard num="U1" title="One-tap Start teaching (Weekly/Daily)" desc="A NOW banner surfaces the current time-block lesson with a big Start teaching button that jumps straight into Teach mode, skipping navigation. Up-next strip below with per-lesson Teach buttons." h={760}>
        <window.ABStartTeaching />
      </Artboard>

      <Artboard num="U2" title="Auto-advance boards by agenda timing" desc="Off / Nudge / Auto control. Each board shows its allotted minutes; the active board has a live progress bar. When time's up, a nudge toast offers Next board or +2 min." h={760}>
        <window.ABAutoAdvance />
      </Artboard>

      <Artboard num="U3" title="Carry to tomorrow (unfinished boards)" desc="End-of-day list of untaught boards. One click carries a board to tomorrow's plan (or pick a day), feeding the Catch-up list automatically." h={680}>
        <window.ABCarryTomorrow />
      </Artboard>

      <Artboard num="U4" title="Student-facing toggle" desc="A single switch hides teacher-only chrome (notes + answers) for projection — lighter than full Present mode. Shown teacher view vs student-facing side by side." h={620}>
        <window.ABStudentToggle />
      </Artboard>

      <Artboard num="U5" title="Resources — recently used in this unit" desc="The Resources panel surfaces a 'Recently used in Unit 3' row at the top so teachers reuse what's already attached elsewhere in the unit instead of re-hunting." h={760}>
        <window.ABRecentResources />
      </Artboard>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
