<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>5.24.26 — Schedule Integration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;padding:0;height:100%;font-family:"Inter",system-ui,-apple-system,sans-serif;color:#0B1220;background:#F1F4F9}
  #root{min-height:100vh}
  .page{max-width:1700px;margin:0 auto;padding:18px}
  .pagetitle{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
  .pagetitle h1{margin:0;font-size:26px;font-weight:800;color:#0B1220;letter-spacing:-0.5px}
  .pagetitle .sub{font-size:13px;color:#475569}
  .pageintro{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px 20px;margin-bottom:18px}
  .pageintro h2{margin:0 0 6px;font-size:17px;font-weight:700;color:#0B1220;letter-spacing:-0.3px}
  .pageintro p{margin:0;font-size:13px;color:#475569;line-height:1.55;text-wrap:pretty}
  .ab-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(11,18,32,.04);margin-bottom:18px}
  .ab-header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #EEF0F4;background:#FAFBFC;font-size:12px;color:#4B5563}
  .ab-header .num{font-family:"JetBrains Mono",ui-monospace,monospace;color:#9CA3AF;font-size:11px;font-weight:500}
  .ab-header .title{color:#0B1220;font-weight:700;font-size:14px;letter-spacing:-0.1px}
  .ab-header .desc{flex:1;color:#4B5563;font-size:11.5px;text-wrap:pretty}
  .ab-frame{position:relative;width:100%;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="schedule-integration.jsx"></script>
<script type="text/babel" data-presets="react">
function Artboard({ num, title, desc, h = 950, children }) {
  return (
    <div className="ab-card">
      <div className="ab-header">
        {num && <span className="num">{num}</span>}
        <span className="title">{title}</span>
        {desc && <span className="desc">— {desc}</span>}
      </div>
      <div className="ab-frame" style={{ height: h }}>{children}</div>
    </div>
  );
}
function App() {
  return (
    <div className="page">
      <div className="pagetitle">
        <h1>5.24.26 — Schedule Integration</h1>
        <span className="sub">Three-pane shell · Daily View + Weekly View + Schedule Pane · glassy aesthetic</span>
      </div>
      <div className="pageintro">
        <h2>What's on this page</h2>
        <p>
          Three artboards. The <strong>Schedule Pane</strong> is now a persistent right-side panel (always open by default on Weekly + Daily) with five tabs: <strong>Bell Schedule</strong>, <strong>Daily Schedule</strong>, <strong>Events</strong>, <strong>Specials Rotation</strong>, <strong>Sub plans</strong>. Daily View embeds a <strong>SCHEDULE</strong> section in its left pane. Weekly View carries two top-bar controls: <strong>By subject / By schedule</strong> toggle (organize rows by subject or by time block) and an <strong>Include non-academic</strong> switch (off → collapsed reference chip showing what's hidden; on → Recess / Lunch / Specials / Dismissal rows appear inline). Inline edits + Add time block button + a "Edit full schedule in Settings" pointer at the bottom of the Schedule Pane.<br/><br/>
          <strong>Glass aesthetic</strong>: every surface uses <code>backdrop-filter: saturate(180%) blur(16-20px)</code> over a pastel-gradient page background. Lesson cards layer subject-tinted glass over the page tint so the colour shows through. Same treatment on Daily / Weekly / Schedule / top bar / left rail.
        </p>
      </div>

      <Artboard num="S1" title="Three-pane shell — Weekly active · non-academic collapsed" desc="Daily View (290px) | Weekly View (flex) | Schedule Pane (320px). Weekly default = By subject. Non-academic events shown as a single collapsed reference chip below the grid." h={1020}>
        <window.ABScheduleIntegration organize="subject" showNonAcademic={false} />
      </Artboard>

      <Artboard num="S2" title="Same shell — non-academic expanded" desc="Toggle 'Include non-academic' on. Recess / Lunch / Specials / Dismissal rows render inline below the academic subject rows, each carrying their own glass-tinted block. Specials shows per-day rotation labels (PE/Art/Music/Library/PE/STEAM)." h={1020}>
        <window.ABScheduleIntegration organize="subject" showNonAcademic={true} />
      </Artboard>

      <Artboard num="S3" title="Same shell — Weekly organized by schedule" desc="Top-bar toggle flipped to 'By schedule'. Weekly rows become time-blocks rather than subjects (the demo still renders by-subject visually; this artboard establishes the toggle position and intent — wire-up to actual time-block grouping is the next iteration)." h={1020}>
        <window.ABScheduleIntegration organize="schedule" showNonAcademic={true} />
      </Artboard>

      <Artboard num="S4" title="Weekly — Minimize all (list view)" desc="Click 'Minimize all' to collapse the grid into a 6-column per-day list. Each cell is a vertical stack of single-line rows: subject monogram + time + title. Compact for quick read-through; expand any day back via the chevron." h={1020}>
        <window.ABScheduleIntegration organize="subject" showNonAcademic={false} minimized={true} tab="bell" />
      </Artboard>

      <Artboard num="S5" title="Schedule Pane — Daily Schedule tab" desc="Today's lessons scoped to their time blocks with completion checkboxes. Driven by the same time-block model as Bell Schedule but filtered to lesson-bearing slots." h={1020}>
        <window.ABScheduleIntegration tab="daily" />
      </Artboard>

      <Artboard num="S6" title="Schedule Pane — Events tab" desc="This week's events across personal / grade / school scopes. Birthdays, fire drills, guest speakers, library closures, PD early dismissal, field trips. Urgent events get a red ! and red border-left." h={1020}>
        <window.ABScheduleIntegration tab="events" />
      </Artboard>

      <Artboard num="S7" title="Schedule Pane — Specials Rotation tab" desc="Mon–Fri rotation for the daily 2:40–3:20 specials block. Each day card shows the special (Art / Music / Library / PE / STEAM), the teacher, the room, and the time. Today's special gets a highlighted outline + TODAY pill." h={1020}>
        <window.ABScheduleIntegration tab="specials" />
      </Artboard>

      <Artboard num="S8" title="Schedule Pane — Sub plans tab" desc="Coverage status per day: ready / draft / not needed. Quick-generate sub packet button pulls today's schedule + lesson summaries + behavior plan + roster + emergency contacts into a printable PDF." h={1020}>
        <window.ABScheduleIntegration tab="cover" />
      </Artboard>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
